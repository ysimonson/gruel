# Rue Language Website
base_url = "https://rue-lang.dev"
title = "Rue"
description = "A systems programming language with memory safety and high-level ergonomics"
compile_sass = false
minify_html = true
generate_feeds = true
feed_filenames = ["rss.xml"]

[markdown]
highlight_code = true
highlight_theme = "css"
extra_syntaxes_and_themes = ["syntaxes"]
highlight_themes_css = [
  { theme = "base16-ocean-dark", filename = "syntax-dark.css" },
  { theme = "base16-ocean-light", filename = "syntax-light.css" },
]

[extra]
github_url = "https://github.com/rue-language/rue"
bluesky_url = "https://bsky.app/profile/rue-lang.dev"
