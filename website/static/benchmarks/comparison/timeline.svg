<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" class="benchmark-chart">
  <style>
    .chart-bg { fill: var(--chart-bg, #ffffff); }
    .chart-text { fill: var(--chart-text, #6b7280); font-family: system-ui, sans-serif; }
    .chart-title { fill: var(--chart-title, #1a1a1a); font-family: system-ui, sans-serif; font-weight: 600; }
    .chart-grid { stroke: var(--chart-grid, #e5e7eb); stroke-width: 1; }
    .chart-axis { stroke: var(--chart-axis, #9ca3af); stroke-width: 1; }
    @media (prefers-color-scheme: dark) {
      .chart-bg { fill: #1a1a1a; }
      .chart-text { fill: #9ca3af; }
      .chart-title { fill: #f0f0f0; }
      .chart-grid { stroke: #2e2e2e; }
      .chart-axis { stroke: #4b5563; }
    }
  </style>
  <rect class="chart-bg" width="900" height="400" rx="8"/>
  <text class="chart-title" x="450.0" y="25" text-anchor="middle" font-size="16">Compilation Time - All Platforms</text>
  <line class="chart-grid" x1="70" y1="50.0" x2="750" y2="50.0"/>
  <text class="chart-text" x="60" y="54.0" text-anchor="end" font-size="11">378.4ms</text>
  <line class="chart-grid" x1="70" y1="96.0" x2="750" y2="96.0"/>
  <text class="chart-text" x="60" y="100.0" text-anchor="end" font-size="11">302.7ms</text>
  <line class="chart-grid" x1="70" y1="142.0" x2="750" y2="142.0"/>
  <text class="chart-text" x="60" y="146.0" text-anchor="end" font-size="11">227.0ms</text>
  <line class="chart-grid" x1="70" y1="188.0" x2="750" y2="188.0"/>
  <text class="chart-text" x="60" y="192.0" text-anchor="end" font-size="11">151.4ms</text>
  <line class="chart-grid" x1="70" y1="234.0" x2="750" y2="234.0"/>
  <text class="chart-text" x="60" y="238.0" text-anchor="end" font-size="11">75.7ms</text>
  <line class="chart-grid" x1="70" y1="280.0" x2="750" y2="280.0"/>
  <text class="chart-text" x="60" y="284.0" text-anchor="end" font-size="11">0.0ms</text>
  <line class="chart-axis" x1="70" y1="50" x2="70" y2="280"/>
  <line class="chart-axis" x1="70" y1="280" x2="750" y2="280"/>
  <circle cx="410.0" cy="70.90909090909093" r="4" fill="#4f6ddb"/>
  <text class="chart-text" x="410.0" y="295" text-anchor="end" font-size="9" transform="rotate(-45 410.0 295)">ea72413</text>
  <rect x="70" y="365" width="14" height="14" fill="#4f6ddb" rx="2"/>
  <text class="chart-text" x="90" y="376" font-size="12">Linux x86-64</text>
</svg>