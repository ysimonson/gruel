[[case]]
name = "unused_function_warning"
skip = true
source = """
fn unused_helper() -> i32 { 42 }

fn main() -> i32 {
    0
}
"""
exit_code = 0
warning_contains = ["unused function", "'unused_helper'"]
expected_warning_count = 1

[[case]]
name = "called_function_no_warning"
source = """
fn helper() -> i32 { 42 }

fn main() -> i32 {
    helper()
}
"""
exit_code = 42
no_warnings = true

# TODO: Unused function warnings are defined but not yet implemented
[[case]]
name = "multiple_unused_functions"
skip = true
source = """
fn helper1() -> i32 { 1 }
fn helper2() -> i32 { 2 }
fn helper3() -> i32 { 3 }

fn main() -> i32 {
    0
}
"""
