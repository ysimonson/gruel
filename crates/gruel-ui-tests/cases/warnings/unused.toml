[section]
id = "warnings.unused"
name = "Unused Variable and Function Warnings"
description = "Tests for detection of unused variables and functions."

# =============================================================================
# Unused Variables
# =============================================================================

[[case]]
name = "unused_variable_warning"
source = """
fn main() -> i32 {
    let x = 42;
    0
}
"""
exit_code = 0
warning_contains = ["unused variable", "'x'"]
expected_warning_count = 1

[[case]]
name = "used_variable_no_warning"
source = """
fn main() -> i32 {
    let x = 42;
    x
}
"""
exit_code = 42
no_warnings = true

[[case]]
name = "multiple_unused_variables"
source = """
fn main() -> i32 {
    let a = 1;
    let b = 2;
    let c = 3;
    0
}
"""
exit_code = 0
warning_contains = ["unused variable"]
expected_warning_count = 3

[[case]]
name = "underscore_prefix_suppresses_warning"
source = """
fn main() -> i32 {
    let _unused = 42;
    0
}
"""
exit_code = 0
no_warnings = true

[[case]]
name = "mutable_but_unused"
source = """
fn main() -> i32 {
    let mut x = 42;
    0
}
"""
exit_code = 0
warning_contains = ["unused variable", "'x'"]

[[case]]
name = "used_in_expression"
source = """
fn main() -> i32 {
    let x = 10;
    let y = 20;
    x + y
}
"""
exit_code = 30
no_warnings = true

[[case]]
name = "unused_shadowed_variable"
source = """
fn main() -> i32 {
    let x = 1;
    {
        let x = 2;
    };
    x
}
"""
exit_code = 1
warning_contains = ["unused variable", "'x'"]
expected_warning_count = 1

[[case]]
name = "used_shadowed_variable_no_warning"
source = """
fn main() -> i32 {
    let x = 1;
    {
        let x = 2;
        x
    }
}
"""
exit_code = 2
no_warnings = true

[[case]]
name = "both_shadowing_variables_unused"
source = """
fn main() -> i32 {
    let x = 1;
    {
        let x = 2;
    };
    0
}
"""
exit_code = 0
warning_contains = ["unused variable"]
expected_warning_count = 2

[[case]]
name = "deeply_nested_shadowing_all_unused"
source = """
fn main() -> i32 {
    let x = 1;
    {
        let x = 2;
        {
            let x = 3;
            {
                let x = 4;
            };
        };
    };
    0
}
"""
exit_code = 0
warning_contains = ["unused variable", "'x'"]
expected_warning_count = 4

[[case]]
name = "deeply_nested_shadowing_innermost_used"
source = """
fn main() -> i32 {
    let x = 1;
    {
        let x = 2;
        {
            let x = 3;
            x
        }
    }
}
"""
exit_code = 3
# When innermost is used as the return value, shadowed outer variables
# are not warned about (consistent with used_shadowed_variable_no_warning)
no_warnings = true

[[case]]
name = "deeply_nested_shadowing_outermost_used"
source = """
fn main() -> i32 {
    let x = 1;
    {
        let x = 2;
        {
            let x = 3;
        };
    };
    x
}
"""
exit_code = 1
warning_contains = ["unused variable", "'x'"]
expected_warning_count = 2

[[case]]
name = "shadowed_variables_include_line_numbers"
description = "When multiple unused variables share the same name, include line numbers for disambiguation"
source = """
fn main() -> i32 {
    let x = 1;
    {
        let x = 2;
    };
    0
}
"""
exit_code = 0
warning_contains = ["unused variable 'x' (line", "line 2)", "line 4)"]
expected_warning_count = 2

# =============================================================================
# Unused Pattern Bindings
# =============================================================================

[[case]]
name = "unused_pattern_binding_warning"
source = """
enum IntOption { Some(i32), None }
fn main() -> i32 {
    let x = IntOption::Some(42);
    match x {
        IntOption::Some(v) => 0,
        IntOption::None => 0,
    }
}
"""
exit_code = 0
warning_contains = ["unused variable", "'v'"]
expected_warning_count = 1

[[case]]
name = "used_pattern_binding_no_warning"
source = """
enum IntOption { Some(i32), None }
fn main() -> i32 {
    let x = IntOption::Some(42);
    match x {
        IntOption::Some(v) => v,
        IntOption::None => 0,
    }
}
"""
exit_code = 42
no_warnings = true

[[case]]
name = "underscore_prefix_pattern_binding_no_warning"
source = """
enum IntOption { Some(i32), None }
fn main() -> i32 {
    let x = IntOption::Some(42);
    match x {
        IntOption::Some(_v) => 0,
        IntOption::None => 0,
    }
}
"""
exit_code = 0
no_warnings = true

[[case]]
name = "wildcard_pattern_binding_no_warning"
source = """
enum IntOption { Some(i32), None }
fn main() -> i32 {
    let x = IntOption::Some(42);
    match x {
        IntOption::Some(_) => 0,
        IntOption::None => 0,
    }
}
"""
exit_code = 0
no_warnings = true

# =============================================================================
# Unused Functions
# =============================================================================

# TODO: Unused function warnings are defined but not yet implemented
