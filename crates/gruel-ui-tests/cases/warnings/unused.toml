[[case]]
name = "mixed_unused_warnings"
skip = true
source = """
fn unused_fn() -> i32 { 42 }

fn main() -> i32 {
    let unused_var = 10;
    0
}
"""
exit_code = 0
warning_contains = ["unused function", "unused variable"]
expected_warning_count = 2
