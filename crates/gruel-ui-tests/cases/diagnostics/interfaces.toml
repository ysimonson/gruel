[section]
id = "diagnostics.interfaces"
name = "Interface Diagnostics"
description = "Error messages around interface usage (ADR-0056)."

# Interfaces are accepted in `borrow t: I` / `inout t: I` parameter
# positions. They are rejected as struct field types, return types, and
# local-binding types — those contexts get a tailored error redirecting
# to the comptime path or the borrow-mode parameter form.
[[case]]
name = "interface_as_field_type_redirects"
source = """
interface Greeter {
    fn greet(self);
}

struct Holder {
    g: Greeter,
}

fn main() -> i32 {
    0
}
"""
compile_fail = true
error_contains = ["is an interface"]

# By-value `t: I` (no borrow mode) is rejected with a tailored message
# pointing at `Ref(I)` / `MutRef(I)` (ADR-0076).
[[case]]
name = "interface_by_value_param_rejected"
source = """
interface Greeter {
    fn greet(self);
}

fn use_it(t: Greeter) {
}

fn main() -> i32 {
    0
}
"""
compile_fail = true
error_contains = ["Ref(Greeter)"]

# Interface used as a function return type is rejected with the same
# redirecting diagnostic as the field-type case.
[[case]]
name = "interface_as_return_type_redirects"
source = """
interface Greeter {
    fn greet(self);
}

fn make() -> Greeter {
    @unreachable("not implemented");
}

fn main() -> i32 {
    0
}
"""
compile_fail = true
error_contains = ["is an interface"]

# At the call site, passing a non-conforming type produces a structured
# "does not conform to interface" error.
[[case]]
name = "interface_call_site_conformance_failure"
source = """
interface Greeter {
    fn greet(self);
}

struct Foo {}

fn use_it(borrow t: Greeter) {
}

fn main() -> i32 {
    let f = Foo {};
    use_it(borrow f);
    0
}
"""
compile_fail = true
error_contains = ["does not conform", "missing method", "greet"]
