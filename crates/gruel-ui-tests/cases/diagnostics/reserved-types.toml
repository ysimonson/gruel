[section]
id = "diagnostics.reserved-types"
name = "Reserved Type Name Errors"
description = "Tests that user-defined types cannot collide with built-in type names."

# =============================================================================
# Reserved Type Names
# =============================================================================

[[case]]
name = "struct_named_string"
source = """
struct String {
    data: i32,
}

fn main() -> i32 {
    0
}
"""
compile_fail = true
# ADR-0081: String moved out of `BUILTIN_TYPES` into the prelude. The
# reserved-name check no longer fires; the redeclaration is rejected as
# a duplicate type definition (against the prelude's `pub struct String`).
error_contains = "duplicate type definition"

[[case]]
name = "enum_named_string"
source = """
enum String {
    Empty,
    Full,
}

fn main() -> i32 {
    0
}
"""
compile_fail = true
error_contains = "duplicate type definition"
