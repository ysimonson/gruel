[package]
name = "gruel-compiler"
version.workspace = true
edition.workspace = true
description = "Compiler pipeline orchestration"
build = "build.rs"

[features]
default = ["llvm-dynamic"]
llvm-dynamic = ["gruel-codegen-llvm/llvm-dynamic"]
llvm-static = ["gruel-codegen-llvm/llvm-static"]

[dependencies]
