}
"""
exit_code = 42

[[case]]
name = "struct_return_modified_param"
description = "Return modified struct from parameter"
source = """
struct Counter {
    value: i32,
}

fn increment(c: Counter) -> Counter {
    Counter { value: c.value + 1 }
}

fn main() -> i32 {
    let c1 = Counter { value: 41 };
    let c2 = increment(c1);
    c2.value
}
"""
exit_code = 42

[[case]]
name = "struct_return_recursive"
description = "Return struct from recursive function (single-field to avoid branch multi-value issue)"
source = """
struct Value {
    n: i32,
}

fn countdown(v: Value) -> Value {
    if v.n <= 0 {
        v
    } else {
        countdown(Value { n: v.n - 1 })
    }
}

fn main() -> i32 {
    let result = countdown(Value { n: 42 });
    result.n
}
"""
exit_code = 0

