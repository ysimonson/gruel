    x: i32,
    y: i32,
}

struct Size {
    width: i32,
    height: i32,
}

fn main() -> i32 {
    let p = Point { x: 10, y: 20 };
    let s = Size { width: 6, height: 6 };
    p.x + s.width
}
"""
exit_code = 16

[[case]]
name = "multiple_struct_instances"
description = "Multiple instances of the same struct"
source = """
struct Point {
    x: i32,
    y: i32,
}

fn main() -> i32 {
    let p1 = Point { x: 10, y: 20 };
    let p2 = Point { x: 5, y: 7 };
    p1.x + p2.x + p2.y
}
"""
exit_code = 22

