description = "Using undefined struct type"
source = """
fn main() -> i32 {
    let p = Unknown { x: 42 };
    p.x
}
"""
compile_fail = true
error_contains = "unknown type"

[[case]]
name = "struct_missing_field"
description = "Missing field in struct literal"
source = """
