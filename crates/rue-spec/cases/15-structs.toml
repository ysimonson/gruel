[[case]]
name = "struct_return_use_multiple_fields"
description = "Use multiple fields from returned struct"
source = """
struct Point {
    x: i32,
    y: i32,
}

fn origin() -> Point {
    Point { x: 0, y: 0 }
}

fn make_point() -> Point {
    Point { x: 20, y: 22 }
}

fn main() -> i32 {
    let o = origin();
    let p = make_point();
    o.x + o.y + p.x + p.y
}
"""
exit_code = 42

[[case]]
name = "struct_return_pass_to_function"
description = "Pass returned struct to another function"
source = """
struct Point {
    x: i32,
    y: i32,
}

fn make_point() -> Point {
    Point { x: 10, y: 32 }
}

fn sum_point(p: Point) -> i32 {
    p.x + p.y
}

fn main() -> i32 {
    sum_point(make_point())
}
"""
exit_code = 42

[[case]]
name = "struct_return_chain"
description = "Chain struct return through multiple functions"
source = """
struct Value {
    n: i32,
}

fn make_value(n: i32) -> Value {
    Value { n: n }
}

fn double_value(v: Value) -> Value {
    make_value(v.n * 2)
}

fn main() -> i32 {
    let v1 = make_value(11);
    let v2 = double_value(v1);
    v2.n + v1.n - 1
}
"""
exit_code = 32

[[case]]
name = "struct_return_bool_field"
description = "Return struct with bool field"
source = """
struct Flags {
    active: bool,
    count: i32,
}

fn make_flags(active: bool, count: i32) -> Flags {
    Flags { active: active, count: count }
}

fn main() -> i32 {
    let f = make_flags(true, 42);
    if f.active { f.count } else { 0 }
}
"""
exit_code = 42

[[case]]
name = "struct_return_nested_call"
description = "Struct return in nested function call"
source = """
struct Point {
    x: i32,
    y: i32,
}

fn make_point(x: i32, y: i32) -> Point {
    Point { x: x, y: y }
}

fn add_points(p1: Point, p2: Point) -> Point {
    make_point(p1.x + p2.x, p1.y + p2.y)
}

fn main() -> i32 {
    let p = add_points(make_point(5, 10), make_point(15, 12));
    p.x + p.y
}
"""
exit_code = 42

[[case]]
name = "struct_return_conditional"
description = "Return struct from conditional expression"
source = """
