# =============================================================================
# Structs as Function Parameters
# =============================================================================

[[case]]
name = "struct_param_single_field"
description = "Pass struct with single field to function"
source = """
struct Point {
    x: i32,
}

fn get_x(p: Point) -> i32 {
    p.x
}

fn main() -> i32 {
    let pt = Point { x: 42 };
    get_x(pt)
}
"""
exit_code = 42

[[case]]
name = "struct_param_two_fields"
description = "Pass struct with two fields to function"
source = """
struct Point {
    x: i32,
    y: i32,
}

fn sum_coords(p: Point) -> i32 {
    p.x + p.y
}

fn main() -> i32 {
    let pt = Point { x: 10, y: 32 };
    sum_coords(pt)
}
"""
exit_code = 42

[[case]]
name = "struct_param_multiple_fields"
description = "Pass struct with multiple fields to function"
source = """
struct Data {
    a: i32,
    b: i32,
    c: i32,
    d: i32,
}

fn sum_data(d: Data) -> i32 {
    d.a + d.b + d.c + d.d
}

fn main() -> i32 {
    let data = Data { a: 10, b: 20, c: 7, d: 5 };
    sum_data(data)
}
"""
exit_code = 42

[[case]]
name = "struct_param_with_other_params"
description = "Struct parameter mixed with other parameters"
source = """
struct Point {
    x: i32,
    y: i32,
}

fn offset(p: Point, dx: i32, dy: i32) -> i32 {
    p.x + dx + p.y + dy
}

fn main() -> i32 {
    let pt = Point { x: 10, y: 20 };
    offset(pt, 5, 7)
}
"""
exit_code = 42

[[case]]
name = "struct_param_copy_semantics"
description = "Struct parameters have copy semantics"
source = """
struct Counter {
    value: i32,
}

fn try_modify(c: Counter) -> i32 {
    c.value
}

fn main() -> i32 {
    let c = Counter { value: 42 };
    let result = try_modify(c);
    c.value
}
"""
exit_code = 42

[[case]]
name = "struct_param_use_after_pass"
description = "Original struct can be used after passing to function"
source = """
struct Point {
    x: i32,
    y: i32,
}

fn get_x(p: Point) -> i32 {
    p.x
}

fn main() -> i32 {
    let pt = Point { x: 10, y: 32 };
    let x = get_x(pt);
    pt.y + x
}
"""
exit_code = 42

[[case]]
name = "struct_param_nested_calls"
description = "Pass struct through multiple function calls"
source = """
struct Value {
    n: i32,
}

fn double_val(v: Value) -> i32 {
    v.n * 2
}

fn add_one(v: Value) -> i32 {
    double_val(v) + 1
}

fn main() -> i32 {
    let val = Value { n: 20 };
    add_one(val) + 1
}
"""
exit_code = 42

[[case]]
name = "struct_param_inline_construction"
description = "Pass struct literal directly to function"
source = """
struct Point {
    x: i32,
    y: i32,
}

fn sum_coords(p: Point) -> i32 {
    p.x + p.y
}

fn main() -> i32 {
    sum_coords(Point { x: 10, y: 32 })
}
"""
exit_code = 42

[[case]]
name = "struct_param_multiple_struct_params"
description = "Multiple struct parameters in same function"
source = """
struct Point {
    x: i32,
    y: i32,
}

fn distance_squared(p1: Point, p2: Point) -> i32 {
    let dx = p2.x - p1.x;
    let dy = p2.y - p1.y;
    dx * dx + dy * dy
}

fn main() -> i32 {
    let a = Point { x: 0, y: 0 };
    let b = Point { x: 3, y: 4 };
    distance_squared(a, b)
}
"""
exit_code = 25

[[case]]
name = "struct_param_different_struct_types"
description = "Different struct types as parameters"
source = """
struct Point {
    x: i32,
    y: i32,
}

struct Size {
    width: i32,
    height: i32,
}

fn area_at_point(p: Point, s: Size) -> i32 {
    p.x + s.width * s.height
}

fn main() -> i32 {
    let pt = Point { x: 2, y: 0 };
    let sz = Size { width: 4, height: 10 };
    area_at_point(pt, sz)
}
"""
exit_code = 42

[[case]]
name = "struct_param_bool_field"
description = "Struct with bool field as parameter"
source = """
struct Flags {
    active: bool,
    count: i32,
}

fn get_count_if_active(f: Flags) -> i32 {
    if f.active { f.count } else { 0 }
}

fn main() -> i32 {
    let f = Flags { active: true, count: 42 };
    get_count_if_active(f)
}
"""
exit_code = 42

[[case]]
name = "struct_param_recursive_function"
description = "Struct parameter in recursive function"
source = """
struct Counter {
    n: i32,
    acc: i32,
}

fn countdown(c: Counter) -> i32 {
    if c.n <= 0 {
        c.acc
    } else {
        countdown(Counter { n: c.n - 1, acc: c.acc + c.n })
    }
}

fn main() -> i32 {
    countdown(Counter { n: 8, acc: 6 })
}
"""
exit_code = 42

