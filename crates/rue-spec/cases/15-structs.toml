[section]
id = "7.1"
name = "Structs"
description = "User-defined struct types with value semantics."

# =============================================================================
# Basic Struct Declaration and Instantiation
# =============================================================================

[[case]]
name = "struct_single_field"
description = "Struct with a single i32 field"
source = """
struct Point {
    x: i32,
}

fn main() -> i32 {
    let p = Point { x: 42 };
    p.x
}
"""
exit_code = 42

[[case]]
name = "struct_two_fields"
description = "Struct with two i32 fields"
source = """
struct Point {
    x: i32,
    y: i32,
}

fn main() -> i32 {
    let p = Point { x: 10, y: 32 };
    p.x + p.y
}
"""
exit_code = 42

[[case]]
name = "struct_multiple_fields"
description = "Struct with multiple fields"
source = """
struct Data {
    a: i32,
    b: i32,
    c: i32,
    d: i32,
}

fn main() -> i32 {
    let d = Data { a: 10, b: 20, c: 7, d: 5 };
    d.a + d.b + d.c + d.d
}
"""
exit_code = 42

[[case]]
name = "struct_bool_field"
description = "Struct with bool field"
source = """
struct Flags {
    active: bool,
    count: i32,
}

fn main() -> i32 {
    let f = Flags { active: true, count: 42 };
    if f.active { f.count } else { 0 }
}
"""
exit_code = 42

# =============================================================================
# Field Access
# =============================================================================

[[case]]
name = "field_access_first"
description = "Access first field of struct"
source = """
struct Pair {
    first: i32,
    second: i32,
}

fn main() -> i32 {
    let p = Pair { first: 42, second: 100 };
    p.first
}
"""
exit_code = 42

[[case]]
name = "field_access_second"
description = "Access second field of struct"
source = """
struct Pair {
    first: i32,
    second: i32,
}

fn main() -> i32 {
    let p = Pair { first: 100, second: 42 };
    p.second
}
"""
exit_code = 42

[[case]]
name = "field_access_in_expression"
description = "Use field access in arithmetic expressions"
source = """
struct Point {
    x: i32,
    y: i32,
}

fn main() -> i32 {
    let p = Point { x: 10, y: 5 };
    (p.x * 4) + (p.y - 3)
}
"""
exit_code = 42

[[case]]
name = "field_access_multiple_reads"
description = "Read the same field multiple times"
source = """
struct Value {
    n: i32,
}

fn main() -> i32 {
    let v = Value { n: 14 };
    v.n + v.n + v.n
}
"""
exit_code = 42

# =============================================================================
# Field Mutation
# =============================================================================

[[case]]
name = "field_mutation_single"
description = "Mutate a single field"
source = """
struct Counter {
    value: i32,
}

fn main() -> i32 {
    let mut c = Counter { value: 0 };
    c.value = 42;
    c.value
}
"""
exit_code = 42

[[case]]
name = "field_mutation_multiple"
description = "Mutate multiple fields"
source = """
struct Point {
    x: i32,
    y: i32,
}

fn main() -> i32 {
    let mut p = Point { x: 0, y: 0 };
    p.x = 20;
    p.y = 22;
    p.x + p.y
}
"""
exit_code = 42

[[case]]
name = "field_mutation_preserve_other"
description = "Mutating one field preserves others"
source = """
struct Triple {
    a: i32,
    b: i32,
    c: i32,
}

fn main() -> i32 {
    let mut t = Triple { a: 10, b: 20, c: 12 };
    t.b = 30;
    t.a + t.c
}
"""
exit_code = 22

[[case]]
name = "field_mutation_read_after_write"
description = "Read field after writing to it"
source = """
struct Box {
    value: i32,
}

fn main() -> i32 {
    let mut b = Box { value: 10 };
    b.value = b.value + 32;
    b.value
}
"""
exit_code = 42

