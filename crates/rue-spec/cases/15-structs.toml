# =============================================================================
# Copy Semantics
# =============================================================================

[[case]]
name = "struct_copy_independence"
description = "Copied structs are independent"
source = """
struct Counter {
    value: i32,
}

fn main() -> i32 {
    let c1 = Counter { value: 10 };
    let mut c2 = c1;
    c2.value = 42;
    c1.value
}
"""
exit_code = 10

# =============================================================================
# Edge Cases
# =============================================================================

[[case]]
name = "struct_field_order_independence"
description = "Field order in literal doesn't matter (matches definition order)"
source = """
struct Point {
    x: i32,
    y: i32,
}

fn main() -> i32 {
    let p = Point { y: 32, x: 10 };
    p.x + p.y
}
"""
exit_code = 42

[[case]]
name = "struct_same_field_names_different_structs"
description = "Different structs can have same field names"
source = """
struct A {
    value: i32,
}

struct B {
    value: i32,
}

fn main() -> i32 {
    let a = A { value: 20 };
    let b = B { value: 22 };
    a.value + b.value
}
"""
exit_code = 42

