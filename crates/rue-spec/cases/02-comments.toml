[section]
id = "1.2"
name = "Comments"
description = "Line comments start with // and extend to the end of the line."

[[case]]
name = "line_comment_after_code"
source = """
fn main() -> i32 { 42 } // this is a comment
"""
exit_code = 42

[[case]]
name = "line_comment_before_code"
source = """
// this is a comment
fn main() -> i32 { 42 }
"""
exit_code = 42

[[case]]
name = "line_comment_between_tokens"
source = """
fn main() -> i32 {
    // return value
    42
}
"""
exit_code = 42

[[case]]
name = "multiple_line_comments"
source = """
// first comment
// second comment
fn main() -> i32 { 42 }
// trailing comment
"""
exit_code = 42

[[case]]
name = "empty_comment"
source = """
//
fn main() -> i32 { 42 }
"""
exit_code = 42

[[case]]
name = "comment_with_slashes"
source = """
// this // has // multiple // slashes
fn main() -> i32 { 42 }
"""
exit_code = 42
