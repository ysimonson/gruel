[section]
id = "11.1"
name = "Logical Operators"
description = "Boolean negation (!), logical AND (&&), and logical OR (||). These operators work on bool values and enable compound boolean expressions."

# =============================================================================
# Boolean Negation (!)
# =============================================================================

[[case]]
name = "not_true"
source = "fn main() -> i32 { if !true { 1 } else { 0 } }"
exit_code = 0

[[case]]
name = "not_false"
source = "fn main() -> i32 { if !false { 1 } else { 0 } }"
exit_code = 1

[[case]]
name = "not_bool_variable"
source = """
fn main() -> i32 {
    let flag = true;
    if !flag { 1 } else { 0 }
}
"""
exit_code = 0

[[case]]
name = "double_negation"
source = "fn main() -> i32 { if !!true { 1 } else { 0 } }"
exit_code = 1

[[case]]
name = "triple_negation"
source = "fn main() -> i32 { if !!!false { 1 } else { 0 } }"
exit_code = 1

[[case]]
name = "not_comparison"
source = "fn main() -> i32 { if !(1 == 2) { 10 } else { 20 } }"
exit_code = 10

[[case]]
name = "not_comparison_true"
source = "fn main() -> i32 { if !(1 == 1) { 10 } else { 20 } }"
exit_code = 20

# =============================================================================
# Logical AND (&&)
# =============================================================================

[[case]]
name = "and_true_true"
source = "fn main() -> i32 { if true && true { 1 } else { 0 } }"
exit_code = 1

[[case]]
name = "and_true_false"
source = "fn main() -> i32 { if true && false { 1 } else { 0 } }"
exit_code = 0

[[case]]
name = "and_false_true"
source = "fn main() -> i32 { if false && true { 1 } else { 0 } }"
exit_code = 0

[[case]]
name = "and_false_false"
source = "fn main() -> i32 { if false && false { 1 } else { 0 } }"
exit_code = 0

[[case]]
name = "and_with_variables"
source = """
fn main() -> i32 {
    let a = true;
    let b = true;
    if a && b { 10 } else { 20 }
}
"""
exit_code = 10

[[case]]
name = "and_with_comparisons"
source = "fn main() -> i32 { if 1 < 2 && 3 < 4 { 10 } else { 20 } }"
exit_code = 10

[[case]]
name = "and_with_comparisons_first_false"
source = "fn main() -> i32 { if 2 < 1 && 3 < 4 { 10 } else { 20 } }"
exit_code = 20

[[case]]
name = "and_with_comparisons_second_false"
source = "fn main() -> i32 { if 1 < 2 && 4 < 3 { 10 } else { 20 } }"
exit_code = 20

[[case]]
name = "chained_and"
source = "fn main() -> i32 { if true && true && true { 1 } else { 0 } }"
exit_code = 1

[[case]]
name = "chained_and_one_false"
source = "fn main() -> i32 { if true && false && true { 1 } else { 0 } }"
exit_code = 0

# =============================================================================
# Logical OR (||)
# =============================================================================

[[case]]
name = "or_true_true"
source = "fn main() -> i32 { if true || true { 1 } else { 0 } }"
exit_code = 1

[[case]]
name = "or_true_false"
source = "fn main() -> i32 { if true || false { 1 } else { 0 } }"
exit_code = 1

[[case]]
name = "or_false_true"
source = "fn main() -> i32 { if false || true { 1 } else { 0 } }"
exit_code = 1

[[case]]
name = "or_false_false"
source = "fn main() -> i32 { if false || false { 1 } else { 0 } }"
exit_code = 0

[[case]]
name = "or_with_variables"
source = """
fn main() -> i32 {
    let a = false;
    let b = true;
    if a || b { 10 } else { 20 }
}
"""
exit_code = 10

[[case]]
name = "or_with_comparisons"
source = "fn main() -> i32 { if 1 > 2 || 3 < 4 { 10 } else { 20 } }"
exit_code = 10

[[case]]
name = "or_with_comparisons_both_false"
source = "fn main() -> i32 { if 2 < 1 || 4 < 3 { 10 } else { 20 } }"
exit_code = 20

[[case]]
name = "chained_or"
source = "fn main() -> i32 { if false || false || true { 1 } else { 0 } }"
exit_code = 1

[[case]]
name = "chained_or_all_false"
source = "fn main() -> i32 { if false || false || false { 1 } else { 0 } }"
exit_code = 0

# =============================================================================
# Precedence: ! binds tighter than && binds tighter than ||
# =============================================================================

# ! has highest precedence among logical operators
[[case]]
name = "not_binds_tighter_than_and"
source = "fn main() -> i32 { if !false && true { 1 } else { 0 } }"
exit_code = 1

[[case]]
name = "not_binds_tighter_than_and_2"
source = "fn main() -> i32 { if !true && true { 1 } else { 0 } }"
exit_code = 0

[[case]]
name = "not_binds_tighter_than_or"
source = "fn main() -> i32 { if !false || false { 1 } else { 0 } }"
exit_code = 1

# && binds tighter than ||
# true || false && false  =>  true || (false && false)  =>  true || false  =>  true
[[case]]
name = "and_binds_tighter_than_or"
source = "fn main() -> i32 { if true || false && false { 1 } else { 0 } }"
exit_code = 1

# false && true || true  =>  (false && true) || true  =>  false || true  =>  true
[[case]]
name = "and_binds_tighter_than_or_2"
source = "fn main() -> i32 { if false && true || true { 1 } else { 0 } }"
exit_code = 1

# false && false || false && false  =>  (false && false) || (false && false)  =>  false
[[case]]
name = "and_binds_tighter_than_or_3"
source = "fn main() -> i32 { if false && false || false && false { 1 } else { 0 } }"
exit_code = 0

# Parentheses override precedence
# (true || false) && false  =>  true && false  =>  false
[[case]]
name = "parens_override_and_or_precedence"
source = "fn main() -> i32 { if (true || false) && false { 1 } else { 0 } }"
exit_code = 0

# =============================================================================
# Precedence: Comparison operators vs logical operators
# Comparisons bind tighter than logical operators
# =============================================================================

# 1 < 2 && 2 < 3  =>  (1 < 2) && (2 < 3)  =>  true && true  =>  true
[[case]]
name = "comparison_binds_tighter_than_and"
source = "fn main() -> i32 { if 1 < 2 && 2 < 3 { 1 } else { 0 } }"
exit_code = 1

# 1 > 2 || 2 < 3  =>  (1 > 2) || (2 < 3)  =>  false || true  =>  true
[[case]]
name = "comparison_binds_tighter_than_or"
source = "fn main() -> i32 { if 1 > 2 || 2 < 3 { 1 } else { 0 } }"
exit_code = 1

# 1 == 1 && 2 == 2 || 3 == 4  =>  ((1 == 1) && (2 == 2)) || (3 == 4)  =>  true || false  =>  true
[[case]]
name = "complex_precedence"
source = "fn main() -> i32 { if 1 == 1 && 2 == 2 || 3 == 4 { 1 } else { 0 } }"
exit_code = 1

# =============================================================================
# Mixed Logical Operators
# =============================================================================

[[case]]
name = "not_and_combination"
source = "fn main() -> i32 { if !false && !false { 1 } else { 0 } }"
exit_code = 1

[[case]]
name = "not_or_combination"
source = "fn main() -> i32 { if !true || !false { 1 } else { 0 } }"
exit_code = 1

[[case]]
name = "complex_logical"
source = """
fn main() -> i32 {
    let a = true;
    let b = false;
    let c = true;
    if (a || b) && c { 10 } else { 20 }
}
"""
exit_code = 10

[[case]]
name = "negated_and"
source = "fn main() -> i32 { if !(true && false) { 1 } else { 0 } }"
exit_code = 1

[[case]]
name = "negated_or"
source = "fn main() -> i32 { if !(false || false) { 1 } else { 0 } }"
exit_code = 1

[[case]]
name = "demorgan_and"
source = """
fn main() -> i32 {
    let a = true;
    let b = false;
    // !(a && b) should equal !a || !b
    let lhs = !(a && b);
    let rhs = !a || !b;
    // Both should be true
    if lhs && rhs { 1 } else { 0 }
}
"""
exit_code = 1

[[case]]
name = "demorgan_or"
source = """
fn main() -> i32 {
    let a = false;
    let b = false;
    // !(a || b) should equal !a && !b
    let lhs = !(a || b);
    let rhs = !a && !b;
    // Both should be true
    if lhs && rhs { 1 } else { 0 }
}
"""
exit_code = 1

# =============================================================================
# Note: Short-circuit evaluation is not yet implemented.
# These tests verify that && and || correctly compute results,
# but both sides are always evaluated.
# =============================================================================

# Both true and true - should return true
[[case]]
name = "and_both_evaluated"
source = "fn main() -> i32 { if true && true { 1 } else { 0 } }"
exit_code = 1

# Both false or false - should return false
[[case]]
name = "or_both_evaluated"
source = "fn main() -> i32 { if false || false { 1 } else { 0 } }"
exit_code = 0

# =============================================================================
# Associativity: && and || are left-associative
# =============================================================================

# true && true && false  =>  (true && true) && false  =>  true && false  =>  false
[[case]]
name = "and_left_associative"
source = "fn main() -> i32 { if true && true && false { 1 } else { 0 } }"
exit_code = 0

# false || false || true  =>  (false || false) || true  =>  false || true  =>  true
[[case]]
name = "or_left_associative"
source = "fn main() -> i32 { if false || false || true { 1 } else { 0 } }"
exit_code = 1

# =============================================================================
# Edge Cases
# =============================================================================

[[case]]
name = "nested_not"
source = "fn main() -> i32 { if !(!(!true)) { 1 } else { 0 } }"
exit_code = 0

[[case]]
name = "complex_nested"
source = """
fn main() -> i32 {
    if (true && false) || (false && true) || (true && true) { 1 } else { 0 }
}
"""
exit_code = 1

[[case]]
name = "all_operators_combined"
source = """
fn main() -> i32 {
    let x = 5;
    let y = 10;
    if x < y && !(x == y) || x > 100 { 1 } else { 0 }
}
"""
exit_code = 1

[[case]]
name = "logical_in_let"
source = """
fn main() -> i32 {
    let a = true && false;
    let b = true || false;
    let c = !a && b;
    if c { 1 } else { 0 }
}
"""
exit_code = 1

# =============================================================================
# Type Errors
# =============================================================================

[[case]]
name = "not_requires_bool"
source = "fn main() -> i32 { !42 }"
compile_fail = true
error_contains = "expected bool"

[[case]]
name = "and_requires_bool_lhs"
source = "fn main() -> i32 { if 1 && true { 1 } else { 0 } }"
compile_fail = true
error_contains = "expected bool"

[[case]]
name = "and_requires_bool_rhs"
source = "fn main() -> i32 { if true && 1 { 1 } else { 0 } }"
compile_fail = true
error_contains = "expected bool"

[[case]]
name = "or_requires_bool_lhs"
source = "fn main() -> i32 { if 1 || true { 1 } else { 0 } }"
compile_fail = true
error_contains = "expected bool"

[[case]]
name = "or_requires_bool_rhs"
source = "fn main() -> i32 { if true || 1 { 1 } else { 0 } }"
compile_fail = true
error_contains = "expected bool"
