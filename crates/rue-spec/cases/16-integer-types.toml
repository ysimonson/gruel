# =============================================================================
# Type Mismatch Errors
# =============================================================================

[[case]]
name = "type_mismatch_i8_i32"
source = """
fn main() -> i32 {
    let x: i8 = 42;
    x
}
"""
compile_fail = true
error_contains = "type mismatch"

[[case]]
name = "type_mismatch_i32_i64"
source = """
fn main() -> i64 {
    let x: i32 = 42;
    x
}
"""
compile_fail = true
error_contains = "type mismatch"

[[case]]
name = "type_mismatch_arithmetic_i8_i32"
source = """
fn main() -> i32 {
    let a: i8 = 10;
    let b: i32 = 20;
    a + b
}
"""
compile_fail = true
error_contains = "type mismatch"

[[case]]
name = "type_mismatch_arithmetic_i16_i64"
source = """
fn main() -> i64 {
    let a: i16 = 10;
    let b: i64 = 20;
    a + b
}
"""
compile_fail = true
error_contains = "type mismatch"

[[case]]
name = "type_mismatch_function_arg_i8_i32"
source = """
fn foo(x: i32) -> i32 { x }
fn main() -> i32 {
    let y: i8 = 10;
    foo(y)
}
"""
compile_fail = true
error_contains = "type mismatch"

[[case]]
name = "type_mismatch_function_arg_i64_i16"
source = """
fn foo(x: i16) -> i16 { x }
fn main() -> i16 {
    let y: i64 = 10;
    foo(y)
}
"""
compile_fail = true
error_contains = "type mismatch"
