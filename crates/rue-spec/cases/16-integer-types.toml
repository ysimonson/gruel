[section]
id = "16.1"
name = "Integer Types"
description = "Support for i8, i16, i32, and i64 signed integer types."

# =============================================================================
# i8 Type
# =============================================================================

[[case]]
name = "i8_return"
source = "fn main() -> i8 { 42 }"
exit_code = 42

[[case]]
name = "i8_zero"
source = "fn main() -> i8 { 0 }"
exit_code = 0

[[case]]
name = "i8_max_positive"
source = "fn main() -> i8 { 127 }"
exit_code = 127

[[case]]
name = "i8_variable"
source = """
fn main() -> i8 {
    let x: i8 = 50;
    x
}
"""
exit_code = 50

[[case]]
name = "i8_arithmetic"
source = """
fn main() -> i8 {
    let a: i8 = 10;
    let b: i8 = 5;
    a + b
}
"""
exit_code = 15

[[case]]
name = "i8_param"
source = """
fn double(x: i8) -> i8 { x + x }
fn main() -> i8 { double(21) }
"""
exit_code = 42

# =============================================================================
# i16 Type
# =============================================================================

[[case]]
name = "i16_return"
source = "fn main() -> i16 { 100 }"
exit_code = 100

[[case]]
name = "i16_zero"
source = "fn main() -> i16 { 0 }"
exit_code = 0

[[case]]
name = "i16_variable"
source = """
fn main() -> i16 {
    let x: i16 = 200;
    x
}
"""
exit_code = 200

[[case]]
name = "i16_arithmetic"
source = """
fn main() -> i16 {
    let a: i16 = 100;
    let b: i16 = 50;
    a - b
}
"""
exit_code = 50

[[case]]
name = "i16_param"
source = """
fn add(x: i16, y: i16) -> i16 { x + y }
fn main() -> i16 { add(30, 12) }
"""
exit_code = 42

