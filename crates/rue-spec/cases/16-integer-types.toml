# =============================================================================
# Type Mismatch Errors
# =============================================================================

[[case]]
name = "type_mismatch_i8_i32"
source = """
fn main() -> i32 {
    let x: i8 = 42;
    x
}
"""
compile_fail = true
error_contains = "type mismatch"

[[case]]
name = "type_mismatch_i32_i64"
source = """
fn main() -> i64 {
    let x: i32 = 42;
    x
}
"""
compile_fail = true
error_contains = "type mismatch"

[[case]]
name = "type_mismatch_arithmetic_i8_i32"
source = """
fn main() -> i32 {
    let a: i8 = 10;
    let b: i32 = 20;
    a + b
}
"""
compile_fail = true
error_contains = "type mismatch"

[[case]]
name = "type_mismatch_arithmetic_i16_i64"
source = """
fn main() -> i64 {
    let a: i16 = 10;
    let b: i64 = 20;
    a + b
}
"""
compile_fail = true
error_contains = "type mismatch"

[[case]]
name = "type_mismatch_function_arg_i8_i32"
source = """
fn foo(x: i32) -> i32 { x }
fn main() -> i32 {
    let y: i8 = 10;
    foo(y)
}
"""
compile_fail = true
error_contains = "type mismatch"

[[case]]
name = "type_mismatch_function_arg_i64_i16"
source = """
fn foo(x: i16) -> i16 { x }
fn main() -> i16 {
    let y: i64 = 10;
    foo(y)
}
"""
compile_fail = true
error_contains = "type mismatch"

# =============================================================================
# Comparison Type Inference
# =============================================================================

[[case]]
name = "comparison_literal_eq_literal"
source = """
fn main() -> i32 {
    if 10 == 10 { 1 } else { 0 }
}
"""
exit_code = 1

[[case]]
name = "comparison_literal_ne_literal"
source = """
fn main() -> i32 {
    if 5 != 10 { 1 } else { 0 }
}
"""
exit_code = 1

[[case]]
name = "comparison_literal_lt_literal"
source = """
fn main() -> i32 {
    if 5 < 10 { 1 } else { 0 }
}
"""
exit_code = 1

[[case]]
name = "comparison_i64_eq"
source = """
fn main() -> i32 {
    let x: i64 = 100;
    if x == 100 { 1 } else { 0 }
}
"""
exit_code = 1

[[case]]
name = "comparison_i64_ne"
source = """
fn main() -> i32 {
    let x: i64 = 100;
    if x != 50 { 1 } else { 0 }
}
"""
exit_code = 1

[[case]]
name = "comparison_i64_lt"
source = """
fn main() -> i32 {
    let x: i64 = 10;
    if x < 20 { 1 } else { 0 }
}
"""
exit_code = 1

[[case]]
name = "comparison_i64_gt"
source = """
fn main() -> i32 {
    let x: i64 = 20;
    if x > 10 { 1 } else { 0 }
}
"""
exit_code = 1

[[case]]
name = "comparison_i64_le"
source = """
fn main() -> i32 {
    let x: i64 = 10;
    if x <= 10 { 1 } else { 0 }
}
"""
exit_code = 1

[[case]]
name = "comparison_i64_ge"
source = """
fn main() -> i32 {
    let x: i64 = 10;
    if x >= 10 { 1 } else { 0 }
}
"""
exit_code = 1

[[case]]
name = "comparison_i8_variables"
source = """
fn main() -> i32 {
    let a: i8 = 10;
    let b: i8 = 20;
    if a < b { 1 } else { 0 }
}
"""
exit_code = 1

[[case]]
name = "comparison_i16_with_literal"
source = """
fn main() -> i32 {
    let x: i16 = 100;
    if x == 100 { 1 } else { 0 }
}
"""
exit_code = 1

[[case]]
name = "comparison_bool_eq"
source = """
fn main() -> i32 {
    let x = true;
    if x == true { 1 } else { 0 }
}
"""
exit_code = 1

[[case]]
name = "comparison_bool_ne"
source = """
fn main() -> i32 {
    let x = false;
    if x != true { 1 } else { 0 }
}
"""
exit_code = 1

[[case]]
name = "comparison_type_mismatch_i64_i32"
source = """
fn main() -> i32 {
    let x: i64 = 100;
    let y: i32 = 100;
    if x == y { 1 } else { 0 }
}
"""
compile_fail = true
error_contains = "type mismatch"

[[case]]
name = "comparison_lt_on_bool"
source = """
fn main() -> i32 {
    let x = true;
    if x < false { 1 } else { 0 }
}
"""
compile_fail = true
error_contains = "expected integer"

[[case]]
name = "comparison_gt_on_bool"
source = """
fn main() -> i32 {
    if true > false { 1 } else { 0 }
}
"""
compile_fail = true
error_contains = "expected integer"

[[case]]
name = "comparison_le_on_bool"
source = """
fn main() -> i32 {
    if true <= false { 1 } else { 0 }
}
"""
compile_fail = true
error_contains = "expected integer"

[[case]]
name = "comparison_ge_on_bool"
source = """
fn main() -> i32 {
    if true >= false { 1 } else { 0 }
}
"""
compile_fail = true
error_contains = "expected integer"

