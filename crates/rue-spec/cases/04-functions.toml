[section]
id = "2.1"
name = "Functions"
description = "Function declarations with the fn keyword, including parameters and function calls. The entry point must be named 'main'."

# =========================================================================
# Basic function declarations (no parameters)
# =========================================================================

[[case]]
name = "simple_main"
source = "fn main() -> i32 { 0 }"
exit_code = 0

[[case]]
name = "main_returns_value"
source = "fn main() -> i32 { 123 }"
exit_code = 123

[[case]]
name = "main_multiline"
source = """
fn main() -> i32 {
    42
}
"""
exit_code = 42

[[case]]
name = "main_with_comment"
source = """
// Entry point
fn main() -> i32 { 42 }
"""
exit_code = 42

[[case]]
name = "type_annotation_i32"
source = "fn main() -> i32 { 99 }"
exit_code = 99

# =========================================================================
# Function parameters
# =========================================================================

[[case]]
name = "function_one_param"
source = """
fn identity(x: i32) -> i32 { x }
fn main() -> i32 { identity(42) }
"""
exit_code = 42

[[case]]
name = "function_two_params"
source = """
fn add(x: i32, y: i32) -> i32 { x + y }
fn main() -> i32 { add(40, 2) }
"""
exit_code = 42

[[case]]
name = "function_three_params"
source = """
fn sum3(a: i32, b: i32, c: i32) -> i32 { a + b + c }
fn main() -> i32 { sum3(10, 20, 12) }
"""
exit_code = 42

[[case]]
name = "function_bool_param"
source = """
fn choose(cond: bool, x: i32, y: i32) -> i32 {
    if cond { x } else { y }
}
fn main() -> i32 { choose(true, 42, 0) }
"""
exit_code = 42

[[case]]
name = "function_bool_param_false"
source = """
fn choose(cond: bool, x: i32, y: i32) -> i32 {
    if cond { x } else { y }
}
fn main() -> i32 { choose(false, 0, 42) }
"""
exit_code = 42

[[case]]
name = "function_returns_bool"
source = """
fn is_positive(x: i32) -> bool { x > 0 }
fn main() -> i32 {
    if is_positive(5) { 42 } else { 0 }
}
"""
exit_code = 42

# =========================================================================
# Multiple functions
# =========================================================================

[[case]]
name = "multiple_functions"
source = """
fn double(x: i32) -> i32 { x + x }
fn main() -> i32 { double(21) }
"""
exit_code = 42

[[case]]
name = "function_calls_function"
source = """
fn double(x: i32) -> i32 { x + x }
fn quadruple(x: i32) -> i32 { double(double(x)) }
fn main() -> i32 { quadruple(10) }
"""
exit_code = 40

[[case]]
name = "multiple_helper_functions"
source = """
fn add(x: i32, y: i32) -> i32 { x + y }
fn sub(x: i32, y: i32) -> i32 { x - y }
fn main() -> i32 {
    let a = add(30, 20);
    sub(a, 8)
}
"""
exit_code = 42

[[case]]
name = "function_order_matters"
description = "Functions can call other functions defined before them"
source = """
fn first(x: i32) -> i32 { x + 1 }
fn second(x: i32) -> i32 { first(x) + 1 }
fn main() -> i32 { second(40) }
"""
exit_code = 42

# =========================================================================
# Recursion
# =========================================================================

[[case]]
name = "recursive_factorial"
source = """
fn factorial(n: i32) -> i32 {
    if n <= 1 { 1 }
    else { n * factorial(n - 1) }
}
fn main() -> i32 { factorial(5) }
"""
exit_code = 120

[[case]]
name = "recursive_fibonacci"
source = """
fn fib(n: i32) -> i32 {
    if n <= 1 { n }
    else { fib(n - 1) + fib(n - 2) }
}
fn main() -> i32 { fib(10) }
"""
exit_code = 55

[[case]]
name = "recursive_countdown"
source = """
fn countdown(n: i32) -> i32 {
    if n == 0 { 42 }
    else { countdown(n - 1) }
}
fn main() -> i32 { countdown(100) }
"""
exit_code = 42

# =========================================================================
# Call expressions
# =========================================================================

[[case]]
name = "call_with_expression_args"
source = """
fn add(x: i32, y: i32) -> i32 { x + y }
fn main() -> i32 { add(20 + 10, 6 * 2) }
"""
exit_code = 42

[[case]]
name = "nested_call_expressions"
source = """
fn add(x: i32, y: i32) -> i32 { x + y }
fn main() -> i32 { add(add(10, 20), add(5, 7)) }
"""
exit_code = 42

[[case]]
name = "call_in_arithmetic"
source = """
fn square(x: i32) -> i32 { x * x }
fn main() -> i32 { square(5) + square(4) + 1 }
"""
exit_code = 42

[[case]]
name = "call_in_condition"
source = """
fn is_even(x: i32) -> bool { x % 2 == 0 }
fn main() -> i32 {
    if is_even(4) { 42 } else { 0 }
}
"""
exit_code = 42

[[case]]
name = "call_in_let_binding"
source = """
fn compute(x: i32) -> i32 { x * 2 + 1 }
fn main() -> i32 {
    let result = compute(20);
    result + 1
}
"""
exit_code = 42

# =========================================================================
# Parameters and local variables interaction
# =========================================================================

[[case]]
name = "param_and_local"
source = """
fn process(x: i32) -> i32 {
    let y = x + 10;
    y + 2
}
fn main() -> i32 { process(30) }
"""
exit_code = 42

[[case]]
name = "param_shadows_nothing"
description = "Parameters are local to the function"
source = """
fn add_ten(x: i32) -> i32 { x + 10 }
fn main() -> i32 {
    let x = 100;
    add_ten(32)
}
"""
exit_code = 42

[[case]]
name = "multiple_params_with_locals"
source = """
fn calc(a: i32, b: i32) -> i32 {
    let sum = a + b;
    let diff = a - b;
    sum + diff
}
fn main() -> i32 { calc(25, 4) }
"""
exit_code = 50

# =========================================================================
# Edge cases
# =========================================================================

[[case]]
name = "zero_return"
source = """
fn zero() -> i32 { 0 }
fn main() -> i32 { zero() }
"""
exit_code = 0

[[case]]
name = "negative_return"
source = """
fn neg() -> i32 { -1 }
fn main() -> i32 { neg() + 43 }
"""
exit_code = 42

[[case]]
name = "pass_negative_arg"
source = """
fn abs(x: i32) -> i32 {
    if x < 0 { -x } else { x }
}
fn main() -> i32 { abs(-42) }
"""
exit_code = 42

[[case]]
name = "function_with_six_params"
description = "Test with six parameters (all fit in registers on System V AMD64)"
source = """
fn sum6(a: i32, b: i32, c: i32, d: i32, e: i32, f: i32) -> i32 {
    a + b + c + d + e + f
}
fn main() -> i32 { sum6(1, 2, 3, 4, 5, 27) }
"""
exit_code = 42

[[case]]
name = "function_with_seven_params"
description = "Test with seven parameters (7th goes on stack per System V AMD64)"
source = """
fn sum7(a: i32, b: i32, c: i32, d: i32, e: i32, f: i32, g: i32) -> i32 {
    a + b + c + d + e + f + g
}
fn main() -> i32 { sum7(1, 2, 3, 4, 5, 6, 21) }
"""
exit_code = 42

[[case]]
name = "function_with_eight_params"
description = "Test with eight parameters (7th and 8th go on stack)"
source = """
fn sum8(a: i32, b: i32, c: i32, d: i32, e: i32, f: i32, g: i32, h: i32) -> i32 {
    a + b + c + d + e + f + g + h
}
fn main() -> i32 { sum8(1, 2, 3, 4, 5, 6, 7, 14) }
"""
exit_code = 42

[[case]]
name = "function_with_ten_params"
description = "Test with ten parameters (last four go on stack)"
source = """
fn sum10(a: i32, b: i32, c: i32, d: i32, e: i32, f: i32, g: i32, h: i32, i: i32, j: i32) -> i32 {
    a + b + c + d + e + f + g + h + i + j
}
fn main() -> i32 { sum10(1, 2, 3, 4, 5, 6, 7, 8, 9, -3) }
"""
exit_code = 42

[[case]]
name = "stack_params_with_expressions"
description = "Test stack parameters passed as expressions"
source = """
fn sum7(a: i32, b: i32, c: i32, d: i32, e: i32, f: i32, g: i32) -> i32 {
    a + b + c + d + e + f + g
}
fn main() -> i32 { sum7(1, 2, 3, 4, 5, 6, 10 * 2 + 1) }
"""
exit_code = 42

[[case]]
name = "nested_call_with_many_params"
description = "Test calling many-param functions from other functions"
source = """
fn add7(a: i32, b: i32, c: i32, d: i32, e: i32, f: i32, g: i32) -> i32 {
    a + b + c + d + e + f + g
}
fn double(x: i32) -> i32 { x + x }
fn main() -> i32 { double(add7(1, 2, 3, 4, 5, 6, 0)) }
"""
exit_code = 42
