[section]
id = "11.1"
name = "Match Expressions"
description = "Match expressions provide multi-way branching on values. Currently supports integer and boolean patterns with wildcard (_)."

# =============================================================================
# Basic Match with Integers
# =============================================================================

[[case]]
name = "match_int_first"
source = """
fn main() -> i32 {
    match 1 {
        1 => 10,
        2 => 20,
        _ => 0,
    }
}
"""
exit_code = 10

[[case]]
name = "match_int_second"
source = """
fn main() -> i32 {
    match 2 {
        1 => 10,
        2 => 20,
        _ => 0,
    }
}
"""
exit_code = 20

[[case]]
name = "match_int_default"
source = """
fn main() -> i32 {
    match 99 {
        1 => 10,
        2 => 20,
        _ => 0,
    }
}
"""
exit_code = 0

[[case]]
name = "match_single_arm_wildcard"
source = """
fn main() -> i32 {
    match 42 {
        _ => 100,
    }
}
"""
exit_code = 100

# =============================================================================
# Match with Boolean
# =============================================================================

[[case]]
name = "match_bool_true"
source = """
fn main() -> i32 {
    match true {
        true => 1,
        false => 0,
    }
}
"""
exit_code = 1

[[case]]
name = "match_bool_false"
source = """
fn main() -> i32 {
    match false {
        true => 1,
        false => 0,
    }
}
"""
exit_code = 0

[[case]]
name = "match_bool_with_wildcard"
source = """
fn main() -> i32 {
    match true {
        false => 0,
        _ => 1,
    }
}
"""
exit_code = 1

# =============================================================================
# Match with Expressions
# =============================================================================

[[case]]
name = "match_on_expression"
source = """
fn main() -> i32 {
    match 1 + 1 {
        2 => 42,
        _ => 0,
    }
}
"""
exit_code = 42

[[case]]
name = "match_on_variable"
source = """
fn main() -> i32 {
    let x = 3;
    match x {
        1 => 10,
        2 => 20,
        3 => 30,
        _ => 0,
    }
}
"""
exit_code = 30

[[case]]
name = "match_on_comparison"
source = """
fn main() -> i32 {
    let x = 5;
    match x > 3 {
        true => 100,
        false => 0,
    }
}
"""
exit_code = 100

# =============================================================================
# Match with Block Bodies
# =============================================================================

[[case]]
name = "match_block_body"
source = """
fn main() -> i32 {
    match 2 {
        1 => {
            let a = 10;
            a
        },
        2 => {
            let b = 20;
            let c = 5;
            b + c
        },
        _ => 0,
    }
}
"""
exit_code = 25

[[case]]
name = "match_mixed_body_styles"
source = """
fn main() -> i32 {
    match 1 {
        1 => 42,
        2 => {
            let x = 100;
            x
        },
        _ => 0,
    }
}
"""
exit_code = 42

# =============================================================================
# Match as Expression
# =============================================================================

[[case]]
name = "match_assigns_to_variable"
source = """
fn main() -> i32 {
    let result = match 3 {
        1 => 10,
        2 => 20,
        _ => 30,
    };
    result
}
"""
exit_code = 30

[[case]]
name = "match_in_expression"
source = """
fn main() -> i32 {
    1 + match true {
        true => 10,
        false => 0,
    }
}
"""
exit_code = 11

[[case]]
name = "match_in_return"
source = """
fn main() -> i32 {
    return match 5 {
        5 => 50,
        _ => 0,
    };
}
"""
exit_code = 50

# =============================================================================
# Nested Match
# =============================================================================

[[case]]
name = "nested_match"
source = """
fn main() -> i32 {
    match 1 {
        1 => match 2 {
            2 => 12,
            _ => 10,
        },
        _ => 0,
    }
}
"""
exit_code = 12

# =============================================================================
# Match with Zero
# =============================================================================

[[case]]
name = "match_zero"
source = """
fn main() -> i32 {
    match 0 {
        0 => 42,
        1 => 2,
        _ => 99,
    }
}
"""
exit_code = 42

# NOTE: Negative integer patterns are not yet supported in the parser.
# They will be added when negative literals are supported in patterns.

# =============================================================================
# Error Cases: Non-exhaustive Match
# =============================================================================

[[case]]
name = "non_exhaustive_int"
source = """
fn main() -> i32 {
    match 1 {
        1 => 10,
        2 => 20,
    }
}
"""
compile_fail = true
error_contains = "not exhaustive"

[[case]]
name = "non_exhaustive_bool_missing_false"
source = """
fn main() -> i32 {
    match true {
        true => 1,
    }
}
"""
compile_fail = true
error_contains = "not exhaustive"

[[case]]
name = "non_exhaustive_bool_missing_true"
source = """
fn main() -> i32 {
    match false {
        false => 0,
    }
}
"""
compile_fail = true
error_contains = "not exhaustive"

# =============================================================================
# Error Cases: Empty Match
# =============================================================================

[[case]]
name = "empty_match"
source = """
fn main() -> i32 {
    match 1 {
    }
}
"""
compile_fail = true
error_contains = "no arms"

# NOTE: Invalid match type tests (like matching on unit or struct) are not yet
# supported since the parser doesn't handle those scrutinee expressions.

# =============================================================================
# Error Cases: Type Mismatch in Arms
# =============================================================================

[[case]]
name = "arm_type_mismatch"
source = """
fn main() -> i32 {
    match 1 {
        1 => 10,
        _ => true,
    }
}
"""
compile_fail = true
error_contains = "mismatch"

# =============================================================================
# Trailing Comma Handling
# =============================================================================

[[case]]
name = "trailing_comma"
source = """
fn main() -> i32 {
    match 1 {
        1 => 10,
        _ => 0,
    }
}
"""
exit_code = 10

[[case]]
name = "no_trailing_comma"
source = """
fn main() -> i32 {
    match 1 {
        1 => 10,
        _ => 0
    }
}
"""
exit_code = 10
