[section]
id = "15.1"
name = "Compiler Warnings"
description = "Tests for compiler warning messages. Warnings don't prevent compilation but inform the user of potential issues."

# =============================================================================
# Unused Variable Warnings
# =============================================================================

[[case]]
name = "unused_variable"
description = "Unused variable emits warning"
source = """
fn main() -> i32 {
    let x = 42;
    0
}
"""
exit_code = 0
warning_contains = ["unused variable 'x'"]
expected_warning_count = 1

[[case]]
name = "underscore_prefix_no_warning"
description = "Variables starting with underscore don't emit unused warnings"
source = """
fn main() -> i32 {
    let _x = 42;
    0
}
"""
exit_code = 0
no_warnings = true

[[case]]
name = "used_variable_no_warning"
description = "Used variable doesn't emit warning"
source = """
fn main() -> i32 {
    let x = 42;
    x
}
"""
exit_code = 42
no_warnings = true

[[case]]
name = "multiple_unused_variables"
description = "Multiple unused variables emit multiple warnings"
source = """
fn main() -> i32 {
    let a = 1;
    let b = 2;
    let c = 3;
    0
}
"""
exit_code = 0
expected_warning_count = 3

[[case]]
name = "partially_unused_variables"
description = "Mix of used and unused variables"
source = """
fn main() -> i32 {
    let x = 1;
    let y = 2;
    let z = 3;
    x + z
}
"""
exit_code = 4
warning_contains = ["unused variable 'y'"]
expected_warning_count = 1

[[case]]
name = "unused_mutable_variable"
description = "Unused mutable variable emits warning"
source = """
fn main() -> i32 {
    let mut x = 42;
    0
}
"""
exit_code = 0
warning_contains = ["unused variable 'x'"]
expected_warning_count = 1

[[case]]
name = "assigned_but_not_read"
description = "Variable that is assigned but never read still counts as unused"
source = """
fn main() -> i32 {
    let mut x = 0;
    x = 42;
    0
}
"""
exit_code = 0
warning_contains = ["unused variable 'x'"]
expected_warning_count = 1

# =============================================================================
# Block Scoping and Warnings
# =============================================================================

[[case]]
name = "unused_in_nested_block"
description = "Unused variable in nested block emits warning"
source = """
fn main() -> i32 {
    let x = 1;
    {
        let y = 2;
        x
    }
}
"""
exit_code = 1
warning_contains = ["unused variable 'y'"]
expected_warning_count = 1

[[case]]
name = "used_in_same_block"
description = "Variable used in same block doesn't emit warning"
source = """
fn main() -> i32 {
    let x = 1;
    {
        let y = 2;
        y
    }
}
"""
exit_code = 2
warning_contains = ["unused variable 'x'"]
expected_warning_count = 1

# =============================================================================
# Loop Variables and Warnings
# =============================================================================

[[case]]
name = "loop_counter_used"
description = "Loop counter that is used doesn't emit warning"
source = """
fn main() -> i32 {
    let mut i = 0;
    while i < 10 {
        i = i + 1;
    }
    i
}
"""
exit_code = 10
no_warnings = true

[[case]]
name = "unused_loop_result"
description = "Variable used only in loop condition is still used"
source = """
fn main() -> i32 {
    let mut x = 0;
    while x < 5 {
        x = x + 1;
    }
    x
}
"""
exit_code = 5
no_warnings = true

# =============================================================================
# Function Parameters (should not warn - future enhancement)
# =============================================================================

[[case]]
name = "function_with_unused_param"
description = "Function parameters don't emit unused warnings currently"
source = """
fn foo(x: i32) -> i32 {
    42
}

fn main() -> i32 {
    foo(1)
}
"""
exit_code = 42
no_warnings = true

# =============================================================================
# Compilation Still Succeeds with Warnings
# =============================================================================

[[case]]
name = "warnings_dont_prevent_compilation"
description = "Program with warnings still compiles and runs correctly"
source = """
fn main() -> i32 {
    let unused1 = 1;
    let unused2 = 2;
    let used = 42;
    used
}
"""
exit_code = 42
expected_warning_count = 2
