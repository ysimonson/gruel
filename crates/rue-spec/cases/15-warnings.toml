[section]
id = "15.1"
name = "Compiler Warnings"
description = "Tests for compiler warning messages. Warnings don't prevent compilation but inform the user of potential issues."

# =============================================================================
# Unused Variable Warnings
# =============================================================================

[[case]]
name = "unused_variable"
description = "Unused variable emits warning"
source = """
fn main() -> i32 {
    let x = 42;
    0
}
"""
exit_code = 0
warning_contains = ["unused variable 'x'"]
expected_warning_count = 1

[[case]]
name = "underscore_prefix_no_warning"
description = "Variables starting with underscore don't emit unused warnings"
source = """
fn main() -> i32 {
    let _x = 42;
    0
}
"""
exit_code = 0
no_warnings = true

[[case]]
name = "used_variable_no_warning"
description = "Used variable doesn't emit warning"
source = """
fn main() -> i32 {
    let x = 42;
    x
}
"""
exit_code = 42
no_warnings = true

[[case]]
name = "multiple_unused_variables"
description = "Multiple unused variables emit multiple warnings"
source = """
fn main() -> i32 {
    let a = 1;
    let b = 2;
    let c = 3;
    0
}
"""
exit_code = 0
expected_warning_count = 3

[[case]]
name = "partially_unused_variables"
description = "Mix of used and unused variables"
source = """
fn main() -> i32 {
    let x = 1;
    let y = 2;
    let z = 3;
    x + z
}
"""
exit_code = 4
warning_contains = ["unused variable 'y'"]
expected_warning_count = 1

[[case]]
name = "unused_mutable_variable"
description = "Unused mutable variable emits warning"
source = """
fn main() -> i32 {
    let mut x = 42;
    0
}
"""
exit_code = 0
warning_contains = ["unused variable 'x'"]
expected_warning_count = 1

[[case]]
name = "assigned_but_not_read"
description = "Variable that is assigned but never read still counts as unused"
source = """
fn main() -> i32 {
    let mut x = 0;
    x = 42;
    0
}
"""
exit_code = 0
warning_contains = ["unused variable 'x'"]
expected_warning_count = 1

# =============================================================================
# Block Scoping and Warnings
# =============================================================================

[[case]]
name = "unused_in_nested_block"
description = "Unused variable in nested block emits warning"
source = """
fn main() -> i32 {
    let x = 1;
    {
        let y = 2;
        x
    }
}
"""
exit_code = 1
warning_contains = ["unused variable 'y'"]
expected_warning_count = 1

[[case]]
name = "used_in_same_block"
description = "Variable used in same block doesn't emit warning"
source = """
fn main() -> i32 {
    let x = 1;
    {
        let y = 2;
        y
    }
}
"""
exit_code = 2
warning_contains = ["unused variable 'x'"]
expected_warning_count = 1

# =============================================================================
# Loop Variables and Warnings
# =============================================================================

[[case]]
name = "loop_counter_used"
description = "Loop counter that is used doesn't emit warning"
source = """
fn main() -> i32 {
    let mut i = 0;
    while i < 10 {
        i = i + 1;
    }
    i
}
"""
exit_code = 10
no_warnings = true

[[case]]
name = "unused_loop_result"
description = "Variable used only in loop condition is still used"
source = """
fn main() -> i32 {
    let mut x = 0;
    while x < 5 {
        x = x + 1;
    }
    x
}
"""
exit_code = 5
no_warnings = true

# =============================================================================
# Function Parameters (should not warn - future enhancement)
# =============================================================================

[[case]]
name = "function_with_unused_param"
description = "Function parameters don't emit unused warnings currently"
source = """
fn foo(x: i32) -> i32 {
    42
}

fn main() -> i32 {
    foo(1)
}
"""
exit_code = 42
no_warnings = true

# =============================================================================
# Compilation Still Succeeds with Warnings
# =============================================================================

[[case]]
name = "warnings_dont_prevent_compilation"
description = "Program with warnings still compiles and runs correctly"
source = """
fn main() -> i32 {
    let unused1 = 1;
    let unused2 = 2;
    let used = 42;
    used
}
"""
exit_code = 42
expected_warning_count = 2

# =============================================================================
# Unreachable Code Warnings
# =============================================================================

[[case]]
name = "unreachable_after_break_in_loop"
description = "Code after break in a loop block is unreachable"
source = """
fn main() -> i32 {
    let mut result = 0;
    while true {
        result = 42;
        break;
        result = 100;
    }
    result
}
"""
exit_code = 42
warning_contains = ["unreachable code"]
expected_warning_count = 1

[[case]]
name = "unreachable_after_break"
description = "Code after break statement is unreachable"
source = """
fn main() -> i32 {
    let mut i = 0;
    while true {
        i = i + 1;
        if i == 5 {
            break;
            i = 100;
        }
    }
    i
}
"""
exit_code = 5
warning_contains = ["unreachable code"]
expected_warning_count = 1

[[case]]
name = "unreachable_after_continue"
description = "Code after continue statement is unreachable"
source = """
fn main() -> i32 {
    let mut sum = 0;
    let mut i = 0;
    while i < 5 {
        i = i + 1;
        if i == 3 {
            continue;
            sum = sum + 100;
        }
        sum = sum + i;
    }
    sum
}
"""
exit_code = 12
warning_contains = ["unreachable code"]
expected_warning_count = 1

[[case]]
name = "no_warning_when_reachable"
description = "No warning when all code is reachable"
source = """
fn main() -> i32 {
    let x = 1;
    let y = 2;
    x + y
}
"""
exit_code = 3
no_warnings = true

[[case]]
name = "unreachable_value_in_block"
description = "Block value unreachable after break in statements"
source = """
fn main() -> i32 {
    let mut x = 0;
    while true {
        {
            x = 42;
            break;
            x  // This is unreachable - it's the block value after break
        }
    }
    x
}
"""
exit_code = 42
warning_contains = ["unreachable code"]
expected_warning_count = 1

[[case]]
name = "no_warning_implicit_unit_after_break"
description = "No warning for implicit unit value in block ending with break"
source = """
fn main() -> i32 {
    let mut x = 0;
    while true {
        x = 42;
        break;
    }
    x
}
"""
exit_code = 42
no_warnings = true

[[case]]
name = "unreachable_in_nested_block"
description = "Unreachable code in nested blocks is detected"
source = """
fn main() -> i32 {
    let mut _x = 0;
    while true {
        {
            {
                break;
                _x = 100;
            }
        }
    }
    42
}
"""
exit_code = 42
warning_contains = ["unreachable code"]
expected_warning_count = 1

[[case]]
name = "unreachable_after_both_branches_break"
description = "Code after if where both branches break is unreachable"
source = """
fn main() -> i32 {
    let mut x = 0;
    while true {
        if x == 0 {
            break;
        } else {
            break;
        }
        x = 100;
    }
    42
}
"""
exit_code = 42
warning_contains = ["unreachable code"]
expected_warning_count = 1

[[case]]
name = "reachable_when_one_branch_continues"
description = "No warning when only one branch of if breaks"
source = """
fn main() -> i32 {
    let mut x = 0;
    let mut sum = 0;
    while x < 5 {
        x = x + 1;
        if x == 3 {
            continue;
        } else {
            sum = sum + x;
        }
    }
    sum
}
"""
exit_code = 12
no_warnings = true

[[case]]
name = "unreachable_after_nested_divergence"
description = "Code after if with break/continue in both branches is unreachable"
source = """
fn main() -> i32 {
    let mut x = 0;
    while x < 10 {
        x = x + 1;
        if x == 5 {
            break;
        } else {
            continue;
        }
        x = 100;
    }
    x
}
"""
exit_code = 5
warning_contains = ["unreachable code"]
expected_warning_count = 1

[[case]]
name = "multiple_functions_one_unreachable"
description = "Unreachable code warning only in function that has it"
source = """
fn foo() -> i32 {
    let mut _result = 0;
    while true {
        _result = 1;
        break;
        _result = 2;
    }
    _result
}

fn bar() -> i32 {
    let x = 3;
    x
}

fn main() -> i32 {
    foo() + bar()
}
"""
exit_code = 4
warning_contains = ["unreachable code"]
expected_warning_count = 1

[[case]]
name = "multiple_functions_multiple_unreachable"
description = "Each function with unreachable code gets its own warning"
source = """
fn foo() -> i32 {
    let mut _x = 0;
    while true {
        _x = 1;
        break;
        _x = 100;
    }
    _x
}

fn bar() -> i32 {
    let mut _y = 0;
    while true {
        _y = 3;
        break;
        _y = 200;
    }
    _y
}

fn main() -> i32 {
    foo() + bar()
}
"""
exit_code = 4
warning_contains = ["unreachable code"]
expected_warning_count = 2

[[case]]
name = "unreachable_after_return"
description = "Code after return statement is unreachable"
source = """
fn main() -> i32 {
    return 0;
    let x = 1;
    x
}
"""
exit_code = 0
warning_contains = ["unreachable code"]
expected_warning_count = 1

[[case]]
name = "unreachable_after_return_simple"
description = "Simple expression after return is unreachable"
source = """
fn main() -> i32 {
    return 42;
    0
}
"""
exit_code = 42
warning_contains = ["unreachable code"]
expected_warning_count = 1
