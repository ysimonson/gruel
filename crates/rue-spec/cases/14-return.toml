[section]
id = "14.1"
name = "Return Statement"
description = "The return keyword explicitly returns a value from the current function. Return expressions have the never type (!) since they diverge - they don't produce a local value."

# =============================================================================
# Basic Return
# =============================================================================

[[case]]
name = "return_basic"
source = """
fn main() -> i32 {
    return 42;
}
"""
exit_code = 42

[[case]]
name = "return_expression"
source = """
fn main() -> i32 {
    return 1 + 2 + 3;
}
"""
exit_code = 6

[[case]]
name = "return_variable"
source = """
fn main() -> i32 {
    let x = 42;
    return x;
}
"""
exit_code = 42

[[case]]
name = "return_from_helper"
source = """
fn helper() -> i32 {
    return 100;
}

fn main() -> i32 {
    helper()
}
"""
exit_code = 100

[[case]]
name = "return_bool"
source = """
fn is_positive(x: i32) -> bool {
    return x > 0;
}

fn main() -> i32 {
    if is_positive(5) { 1 } else { 0 }
}
"""
exit_code = 1

# =============================================================================
# Early Return
# =============================================================================

[[case]]
name = "return_early_if"
source = """
fn main() -> i32 {
    if true {
        return 10;
    }
    20
}
"""
exit_code = 10

[[case]]
name = "return_early_if_false"
source = """
fn main() -> i32 {
    if false {
        return 10;
    }
    20
}
"""
exit_code = 20

[[case]]
name = "return_early_nested_if"
source = """
fn check(x: i32) -> i32 {
    if x > 10 {
        if x > 20 {
            return 3;
        }
        return 2;
    }
    return 1;
}

fn main() -> i32 {
    check(5) + check(15) + check(25)
}
"""
exit_code = 6

[[case]]
name = "return_from_loop"
source = """
fn find_first_even(start: i32) -> i32 {
    let mut x = start;
    while x < 100 {
        if x % 2 == 0 {
            return x;
        }
        x = x + 1;
    }
    return 0;
}

fn main() -> i32 {
    find_first_even(5)
}
"""
exit_code = 6

[[case]]
name = "return_breaks_loop"
source = """
fn main() -> i32 {
    let mut x = 0;
    while true {
        x = x + 1;
        if x == 10 {
            return x;
        }
    }
    0
}
"""
exit_code = 10

# =============================================================================
# Return as Never Type Expression
# =============================================================================

[[case]]
name = "return_in_if_else_then"
description = "return in then branch coerces to else branch's type"
source = """
fn test(x: i32) -> i32 {
    let y = if x > 5 { return 100 } else { x };
    y * 2
}

fn main() -> i32 {
    test(3) + test(10)
}
"""
exit_code = 106

[[case]]
name = "return_in_if_else_else"
description = "return in else branch coerces to then branch's type"
source = """
fn test(x: i32) -> i32 {
    let y = if x <= 5 { x } else { return 100 };
    y * 2
}

fn main() -> i32 {
    test(3) + test(10)
}
"""
exit_code = 106

[[case]]
name = "return_in_nested_expression"
source = """
fn calculate(x: i32) -> i32 {
    1 + if x == 0 { return 0 } else { x * 2 }
}

fn main() -> i32 {
    calculate(0) + calculate(5)
}
"""
exit_code = 11

[[case]]
name = "return_both_branches"
description = "both branches can return (result is Never)"
source = """
fn absolute(x: i32) -> i32 {
    if x < 0 { return 0 - x } else { return x }
}

fn main() -> i32 {
    absolute(-5) + absolute(3)
}
"""
exit_code = 8

# =============================================================================
# Return with Function Calls
# =============================================================================

[[case]]
name = "return_function_result"
source = """
fn double(x: i32) -> i32 {
    x * 2
}

fn main() -> i32 {
    return double(21);
}
"""
exit_code = 42

[[case]]
name = "return_nested_call"
source = """
fn inc(x: i32) -> i32 { x + 1 }
fn double(x: i32) -> i32 { x * 2 }

fn main() -> i32 {
    return double(inc(20));
}
"""
exit_code = 42

[[case]]
name = "return_conditional_function"
source = """
fn abs(x: i32) -> i32 {
    if x < 0 {
        return 0 - x;
    }
    return x;
}

fn main() -> i32 {
    abs(5) + abs(-5)
}
"""
exit_code = 10

# =============================================================================
# Return and Implicit Return Mixed
# =============================================================================

[[case]]
name = "return_and_implicit_mixed"
source = """
fn test(x: i32) -> i32 {
    if x > 10 {
        return 100;
    }
    x
}

fn main() -> i32 {
    test(5) + test(15)
}
"""
exit_code = 105

[[case]]
name = "all_paths_explicit_return"
source = """
fn classify(x: i32) -> i32 {
    if x < 0 {
        return 0;
    }
    if x == 0 {
        return 1;
    }
    return 2;
}

fn main() -> i32 {
    classify(-5) + classify(0) + classify(5)
}
"""
exit_code = 3

[[case]]
name = "implicit_after_early_return"
source = """
fn process(x: i32) -> i32 {
    if x < 0 {
        return 0;
    }
    let y = x * 2;
    let z = y + 1;
    z
}

fn main() -> i32 {
    process(-1) + process(5)
}
"""
exit_code = 11

# =============================================================================
# Return Type Checking Errors
# =============================================================================

[[case]]
name = "return_type_mismatch_bool_for_i32"
source = """
fn main() -> i32 {
    return true;
}
"""
compile_fail = true
error_contains = "type mismatch"

[[case]]
name = "return_type_mismatch_i32_for_bool"
source = """
fn check() -> bool {
    return 42;
}

fn main() -> i32 {
    if check() { 1 } else { 0 }
}
"""
compile_fail = true
error_contains = "type mismatch"

[[case]]
name = "return_wrong_type_in_helper"
source = """
fn helper() -> i32 {
    return false;
}

fn main() -> i32 {
    helper()
}
"""
compile_fail = true
error_contains = "type mismatch"

# =============================================================================
# Complex Control Flow with Return
# =============================================================================

[[case]]
name = "return_in_nested_loops"
source = """
fn find_sum_greater_than(target: i32) -> i32 {
    let mut sum = 0;
    let mut i = 0;
    while i < 100 {
        let mut j = 0;
        while j < 100 {
            sum = sum + 1;
            if sum > target {
                return sum;
            }
            j = j + 1;
        }
        i = i + 1;
    }
    return sum;
}

fn main() -> i32 {
    find_sum_greater_than(50)
}
"""
exit_code = 51

[[case]]
name = "return_with_break_in_same_function"
source = """
fn count_until(limit: i32) -> i32 {
    let mut count = 0;
    while true {
        count = count + 1;
        if count > 100 {
            return 0;
        }
        if count == limit {
            break;
        }
    }
    return count;
}

fn main() -> i32 {
    count_until(10)
}
"""
exit_code = 10

[[case]]
name = "return_with_continue_in_same_function"
source = """
fn sum_odds(limit: i32) -> i32 {
    let mut sum = 0;
    let mut i = 0;
    while i < limit {
        i = i + 1;
        if i % 2 == 0 {
            continue;
        }
        sum = sum + i;
        if sum > 50 {
            return sum;
        }
    }
    return sum;
}

fn main() -> i32 {
    sum_odds(20)
}
"""
exit_code = 64

# =============================================================================
# Recursion with Return
# =============================================================================

[[case]]
name = "return_in_recursive_function"
source = """
fn factorial(n: i32) -> i32 {
    if n <= 1 {
        return 1;
    }
    return n * factorial(n - 1);
}

fn main() -> i32 {
    factorial(5)
}
"""
exit_code = 120

[[case]]
name = "return_early_in_recursive_function"
source = """
fn fib(n: i32) -> i32 {
    if n <= 0 {
        return 0;
    }
    if n == 1 {
        return 1;
    }
    return fib(n - 1) + fib(n - 2);
}

fn main() -> i32 {
    fib(10)
}
"""
exit_code = 55

