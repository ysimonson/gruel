# =============================================================================
# AIR Golden Tests
# =============================================================================

[[case]]
name = "return_basic_air"
description = "Explicit return has Never type (!), implicit return omitted"
source = "fn main() -> i32 { return 42; }"
expected_air = """
function main:
air (return_type: i32) {
    %0 : i32 = const 42
    %1 : ! = ret %0
}
"""

[[case]]
name = "return_early_if_air"
description = "Early return in if-then, followed by implicit return of else path"
source = "fn main() -> i32 { if true { return 10; } 20 }"
expected_air = """
function main:
air (return_type: i32) {
    %0 : bool = const true
    %1 : i32 = const 10
    %2 : ! = ret %1
    %3 : () = branch %0, %2
    %4 : i32 = const 20
    %5 : i32 = block [%3], %4
    %6 : i32 = ret %5
}
"""

[[case]]
name = "return_in_if_else_air"
description = "Return in then-branch coerces to else-branch type for if-else value"
source = "fn main() -> i32 { let y = if true { return 100 } else { 5 }; y * 2 }"
expected_air = """
function main:
air (return_type: i32) {
    %0 : bool = const true
    %1 : i32 = const 100
    %2 : ! = ret %1
    %3 : i32 = const 5
    %4 : i32 = branch %0, %2, %3
    %5 : () = alloc $0 = %4
    %6 : i32 = load $0
    %7 : i32 = const 2
    %8 : i32 = mul %6, %7
    %9 : i32 = block [%5], %8
    %10 : i32 = ret %9
}
"""
