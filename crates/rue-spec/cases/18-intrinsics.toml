[section]
id = "10.1"
name = "Intrinsics"
description = "Compiler intrinsics with the @ prefix, such as @dbg for debugging output."

# =========================================================================
# @dbg with integers
# =========================================================================

[[case]]
name = "dbg_integer_literal"
description = "@dbg with an integer literal compiles and runs"
source = """
fn main() -> i32 {
    @dbg(42);
    0
}
"""
exit_code = 0

[[case]]
name = "dbg_negative_integer"
description = "@dbg with a negative integer"
source = """
fn main() -> i32 {
    @dbg(-123);
    0
}
"""
exit_code = 0

[[case]]
name = "dbg_zero"
description = "@dbg with zero"
source = """
fn main() -> i32 {
    @dbg(0);
    0
}
"""
exit_code = 0

[[case]]
name = "dbg_variable"
description = "@dbg with a variable"
source = """
fn main() -> i32 {
    let x = 99;
    @dbg(x);
    0
}
"""
exit_code = 0

[[case]]
name = "dbg_expression"
description = "@dbg with an arithmetic expression"
source = """
fn main() -> i32 {
    @dbg(1 + 2 * 3);
    0
}
"""
exit_code = 0

[[case]]
name = "dbg_function_result"
description = "@dbg with a function call result"
source = """
fn double(x: i32) -> i32 { x * 2 }
fn main() -> i32 {
    @dbg(double(21));
    0
}
"""
exit_code = 0

