# =========================================================================
# @dbg with different integer types
# =========================================================================

[[case]]
name = "dbg_i64"
description = "@dbg with i64"
source = """
fn main() -> i32 {
    let x: i64 = 9223372036854775807;
    @dbg(x);
    0
}
"""
exit_code = 0

[[case]]
name = "dbg_i8"
description = "@dbg with i8"
source = """
fn main() -> i32 {
    let x: i8 = 127;
    @dbg(x);
    0
}
"""
exit_code = 0

[[case]]
name = "dbg_negative_i8"
description = "@dbg with negative i8"
source = """
fn main() -> i32 {
    let x: i8 = -128;
    @dbg(x);
    0
}
"""
exit_code = 0

[[case]]
name = "dbg_u64"
description = "@dbg with u64"
source = """
fn main() -> i32 {
    let x: u64 = 1000000000;
    @dbg(x);
    0
}
"""
exit_code = 0

[[case]]
name = "dbg_u8"
description = "@dbg with u8"
source = """
fn main() -> i32 {
    let x: u8 = 255;
    @dbg(x);
    0
}
"""
exit_code = 0

# =========================================================================
# Multiple @dbg calls
# =========================================================================

[[case]]
name = "dbg_multiple"
description = "Multiple @dbg calls in sequence"
source = """
fn main() -> i32 {
    @dbg(1);
    @dbg(2);
    @dbg(3);
    0
}
"""
exit_code = 0

[[case]]
name = "dbg_in_loop"
description = "@dbg inside a loop"
source = """
fn main() -> i32 {
    let mut i = 0;
    while i < 3 {
        @dbg(i);
        i = i + 1;
    }
    0
}
"""
exit_code = 0

[[case]]
name = "dbg_in_conditional"
description = "@dbg inside a conditional"
source = """
fn main() -> i32 {
    if true {
        @dbg(42);
    } else {
        @dbg(0);
    }
    0
}
"""
exit_code = 0

# =========================================================================
# @dbg return type (unit)
# =========================================================================

[[case]]
name = "dbg_returns_unit"
description = "@dbg returns unit and can be assigned to a variable"
source = """
fn main() -> i32 {
    let _unused = @dbg(42);
    0
}
"""
exit_code = 0

[[case]]
name = "dbg_as_statement"
description = "@dbg as a statement (no semicolon needed before final expr)"
source = """
fn main() -> i32 {
    @dbg(1);
    @dbg(2);
    0
}
"""
exit_code = 0

# =========================================================================
# Error cases
# =========================================================================

[[case]]
name = "unknown_intrinsic"
description = "Unknown intrinsic produces an error"
source = """
fn main() -> i32 {
    @unknown(42);
    0
}
"""
compile_fail = true
error_contains = "unknown intrinsic"

[[case]]
name = "dbg_no_args"
description = "@dbg with no arguments"
source = """
fn main() -> i32 {
    @dbg();
    0
}
"""
compile_fail = true
error_contains = "expects 1 argument"

[[case]]
name = "dbg_too_many_args"
description = "@dbg with too many arguments"
source = """
fn main() -> i32 {
    @dbg(1, 2);
    0
}
"""
compile_fail = true
error_contains = "expects 1 argument"

[[case]]
name = "dbg_struct_not_allowed"
description = "@dbg with struct (not yet supported)"
source = """
struct Point { x: i32, y: i32 }
fn main() -> i32 {
    let p = Point { x: 1, y: 2 };
    @dbg(p);
    0
}
"""
compile_fail = true
error_contains = "integer or bool"
