# =============================================================================
# Arithmetic Operators
# =============================================================================

[[case]]
name = "addition_rir"
spec = ["4.2:1"]
source = "fn main() -> i32 { 1 + 2 }"
expected_rir = """
%0 = const 1
%1 = const 2
%2 = add %0, %1
%3 = fn main() -> i32 {
    %2
}
"""

[[case]]
name = "addition_air"
spec = ["4.2:1"]
source = "fn main() -> i32 { 1 + 2 }"
expected_air = """
function main:
air (return_type: i32) {
    %0 : i32 = const 1
    %1 : i32 = const 2
    %2 : i32 = add %0, %1
    %3 : i32 = ret %2
}
"""

[[case]]
name = "addition_mir"
spec = ["4.2:1"]
source = "fn main() -> i32 { 1 + 2 }"
target = "x86-64-linux"
expected_mir = """
function main:
    mov v0, 1
    mov v1, 2
    mov v2, v0
    add v2, v1
    jno .L0
    call __rue_overflow
    .L0:
    mov rdi, v2
    call __rue_exit
"""

[[case]]
name = "addition_mir_aarch64"
spec = ["4.2:1"]
source = "fn main() -> i32 { 1 + 2 }"
target = "aarch64-macos"
expected_mir = """
function main:
    mov v0, #1
    mov v1, #2
    adds v2, v0, v1
    b.vc .L0
    bl __rue_overflow
    .L0:
    mov x0, v2
    bl __rue_exit
"""

[[case]]
name = "subtraction_rir"
spec = ["4.2:1"]
source = "fn main() -> i32 { 5 - 3 }"
expected_rir = """
%0 = const 5
%1 = const 3
%2 = sub %0, %1
%3 = fn main() -> i32 {
    %2
}
"""

[[case]]
name = "subtraction_air"
spec = ["4.2:1"]
source = "fn main() -> i32 { 5 - 3 }"
expected_air = """
function main:
air (return_type: i32) {
    %0 : i32 = const 5
    %1 : i32 = const 3
    %2 : i32 = sub %0, %1
    %3 : i32 = ret %2
}
"""

[[case]]
name = "subtraction_mir"
spec = ["4.2:1"]
source = "fn main() -> i32 { 5 - 3 }"
target = "x86-64-linux"
expected_mir = """
function main:
    mov v0, 5
    mov v1, 3
    mov v2, v0
    sub v2, v1
    jno .L0
    call __rue_overflow
    .L0:
    mov rdi, v2
    call __rue_exit
"""

[[case]]
name = "subtraction_mir_aarch64"
spec = ["4.2:1"]
source = "fn main() -> i32 { 5 - 3 }"
target = "aarch64-macos"
expected_mir = """
function main:
    mov v0, #5
    mov v1, #3
    subs v2, v0, v1
    b.vc .L0
    bl __rue_overflow
    .L0:
    mov x0, v2
    bl __rue_exit
"""

[[case]]
name = "multiplication_rir"
spec = ["4.2:1"]
source = "fn main() -> i32 { 3 * 4 }"
expected_rir = """
%0 = const 3
%1 = const 4
%2 = mul %0, %1
%3 = fn main() -> i32 {
    %2
}
"""

[[case]]
name = "multiplication_air"
spec = ["4.2:1"]
source = "fn main() -> i32 { 3 * 4 }"
expected_air = """
function main:
air (return_type: i32) {
    %0 : i32 = const 3
    %1 : i32 = const 4
    %2 : i32 = mul %0, %1
    %3 : i32 = ret %2
}
"""

[[case]]
name = "multiplication_mir"
spec = ["4.2:1"]
source = "fn main() -> i32 { 3 * 4 }"
target = "x86-64-linux"
expected_mir = """
function main:
    mov v0, 3
    mov v1, 4
    mov v2, v0
    imul v2, v1
    jno .L0
    call __rue_overflow
    .L0:
    mov rdi, v2
    call __rue_exit
"""

[[case]]
name = "multiplication_mir_aarch64"
spec = ["4.2:1"]
source = "fn main() -> i32 { 3 * 4 }"
target = "aarch64-macos"
expected_mir = """
function main:
    mov v0, #3
    mov v1, #4
    smull v3, v0, v1
    mov v2, v3
    sxtw v4, v3
    cmp v3, v4
    b.eq .L0
    bl __rue_overflow
    .L0:
    mov x0, v2
    bl __rue_exit
"""

[[case]]
name = "division_rir"
spec = ["4.2:1"]
source = "fn main() -> i32 { 10 / 3 }"
expected_rir = """
%0 = const 10
%1 = const 3
%2 = div %0, %1
%3 = fn main() -> i32 {
    %2
}
"""

[[case]]
name = "division_air"
spec = ["4.2:1"]
source = "fn main() -> i32 { 10 / 3 }"
expected_air = """
function main:
air (return_type: i32) {
    %0 : i32 = const 10
    %1 : i32 = const 3
    %2 : i32 = div %0, %1
    %3 : i32 = ret %2
}
"""

[[case]]
name = "division_mir"
spec = ["4.2:1"]
source = "fn main() -> i32 { 10 / 3 }"
target = "x86-64-linux"
expected_mir = """
function main:
    mov v0, 10
    mov v1, 3
    test v1, v1
    jnz .L0
    call __rue_div_by_zero
    .L0:
    mov rax, v0
    cdq
    idiv v1
    mov v2, rax
    mov rdi, v2
    call __rue_exit
"""

[[case]]
name = "division_mir_aarch64"
spec = ["4.2:1"]
source = "fn main() -> i32 { 10 / 3 }"
target = "aarch64-macos"
expected_mir = """
function main:
    mov v0, #10
    mov v1, #3
    cbnz v1, .L0
    bl __rue_div_by_zero
    .L0:
    sdiv v2, v0, v1
    mov x0, v2
    bl __rue_exit
"""

[[case]]
name = "modulo_rir"
spec = ["4.2:1"]
source = "fn main() -> i32 { 10 % 3 }"
expected_rir = """
%0 = const 10
%1 = const 3
%2 = mod %0, %1
%3 = fn main() -> i32 {
    %2
}
"""

[[case]]
name = "modulo_air"
spec = ["4.2:1"]
source = "fn main() -> i32 { 10 % 3 }"
expected_air = """
function main:
air (return_type: i32) {
    %0 : i32 = const 10
    %1 : i32 = const 3
    %2 : i32 = mod %0, %1
    %3 : i32 = ret %2
}
"""

[[case]]
name = "modulo_mir"
spec = ["4.2:1"]
source = "fn main() -> i32 { 10 % 3 }"
target = "x86-64-linux"
expected_mir = """
function main:
    mov v0, 10
    mov v1, 3
    test v1, v1
    jnz .L0
    call __rue_div_by_zero
    .L0:
    mov rax, v0
    cdq
    idiv v1
    mov v2, rdx
    mov rdi, v2
    call __rue_exit
"""

[[case]]
name = "modulo_mir_aarch64"
spec = ["4.2:1"]
source = "fn main() -> i32 { 10 % 3 }"
target = "aarch64-macos"
expected_mir = """
function main:
    mov v0, #10
    mov v1, #3
    cbnz v1, .L0
    bl __rue_div_by_zero
    .L0:
    sdiv v3, v0, v1
    msub v2, v3, v1, v0
    mov x0, v2
    bl __rue_exit
"""

[[case]]
name = "precedence_rir"
spec = ["4.2:2"]
source = "fn main() -> i32 { 1 + 2 * 3 }"
expected_rir = """
%0 = const 1
%1 = const 2
%2 = const 3
%3 = mul %1, %2
%4 = add %0, %3
%5 = fn main() -> i32 {
    %4
}
"""

[[case]]
name = "precedence_air"
spec = ["4.2:2"]
source = "fn main() -> i32 { 1 + 2 * 3 }"
expected_air = """
function main:
air (return_type: i32) {
    %0 : i32 = const 1
    %1 : i32 = const 2
    %2 : i32 = const 3
    %3 : i32 = mul %1, %2
    %4 : i32 = add %0, %3
    %5 : i32 = ret %4
}
"""

[[case]]
name = "parens_rir"
spec = ["4.2:2"]
source = "fn main() -> i32 { (1 + 2) * 3 }"
expected_rir = """
%0 = const 1
%1 = const 2
%2 = add %0, %1
%3 = const 3
%4 = mul %2, %3
%5 = fn main() -> i32 {
    %4
}
"""

[[case]]
name = "parens_air"
spec = ["4.2:2"]
source = "fn main() -> i32 { (1 + 2) * 3 }"
expected_air = """
function main:
air (return_type: i32) {
    %0 : i32 = const 1
    %1 : i32 = const 2
    %2 : i32 = add %0, %1
    %3 : i32 = const 3
    %4 : i32 = mul %2, %3
    %5 : i32 = ret %4
}
"""

# =============================================================================
# Unary Negation
# =============================================================================

[[case]]
name = "negation_rir"
spec = ["4.2:3"]
source = "fn main() -> i32 { -42 }"
expected_rir = """
%0 = const 42
%1 = neg %0
%2 = fn main() -> i32 {
    %1
}
"""

[[case]]
name = "negation_air"
spec = ["4.2:3"]
source = "fn main() -> i32 { -42 }"
expected_air = """
function main:
air (return_type: i32) {
    %0 : i32 = const 42
    %1 : i32 = neg %0
    %2 : i32 = ret %1
}
"""

[[case]]
name = "negation_mir"
spec = ["4.2:3"]
source = "fn main() -> i32 { -42 }"
target = "x86-64-linux"
expected_mir = """
function main:
    mov v0, 42
    mov v1, v0
    neg v1
    jno .L0
    call __rue_overflow
    .L0:
    mov rdi, v1
    call __rue_exit
"""

[[case]]
name = "negation_mir_aarch64"
spec = ["4.2:3"]
source = "fn main() -> i32 { -42 }"
target = "aarch64-macos"
expected_mir = """
function main:
    mov v0, #42
    negs32 v1, v0
    b.vc .L0
    bl __rue_overflow
    .L0:
    mov x0, v1
    bl __rue_exit
"""

[[case]]
name = "negation_in_expr_rir"
spec = ["4.2:3"]
source = "fn main() -> i32 { 10 + -3 }"
expected_rir = """
%0 = const 10
%1 = const 3
%2 = neg %1
%3 = add %0, %2
%4 = fn main() -> i32 {
    %3
}
"""

[[case]]
name = "double_negation_rir"
spec = ["4.2:3"]
source = "fn main() -> i32 { --5 }"
expected_rir = """
%0 = const 5
%1 = neg %0
%2 = neg %1
%3 = fn main() -> i32 {
    %2
}
"""
