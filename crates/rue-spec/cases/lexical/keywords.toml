[section]
id = "lexical.keywords"
spec_chapter = "2.4"
name = "Keywords and Reserved Words"
description = "Keywords are reserved words with special meaning and cannot be used as identifiers."

# =============================================================================
# Keywords Cannot Be Used as Identifiers
# =============================================================================

[[case]]
name = "keyword_fn_reserved"
spec = ["2.4:1", "2.4:2"]
source = "fn main() -> i32 { let fn = 1; fn }"
compile_fail = true

