# =============================================================================
# Type Names Are Reserved
# =============================================================================

[[case]]
name = "type_i8_as_variable"
spec = ["2.4:3"]
source = """
fn main() -> i32 {
    let i8 = 42;
    0
}
"""
compile_fail = true

[[case]]
name = "type_i16_as_variable"
spec = ["2.4:3"]
source = """
fn main() -> i32 {
    let i16 = 42;
    0
}
"""
compile_fail = true

[[case]]
name = "type_i32_as_variable"
spec = ["2.4:3"]
source = """
fn main() -> i32 {
    let i32 = 42;
    0
}
"""
compile_fail = true

[[case]]
name = "type_i64_as_variable"
spec = ["2.4:3"]
source = """
fn main() -> i32 {
    let i64 = 42;
    0
}
"""
compile_fail = true

[[case]]
name = "type_u8_as_variable"
spec = ["2.4:3"]
source = """
fn main() -> i32 {
    let u8 = 42;
    0
}
"""
compile_fail = true

[[case]]
name = "type_bool_as_variable"
spec = ["2.4:3"]
source = """
fn main() -> i32 {
    let bool = 42;
    0
}
"""
compile_fail = true

[[case]]
name = "type_i32_as_function_name"
spec = ["2.4:3"]
source = """
fn i32() -> i32 { 0 }
fn main() -> i32 { 0 }
"""
compile_fail = true

[[case]]
name = "type_bool_as_parameter"
spec = ["2.4:3"]
source = """
fn foo(bool: i32) -> i32 { 0 }
fn main() -> i32 { foo(42) }
"""
compile_fail = true

[[case]]
name = "type_i32_as_struct_name"
spec = ["2.4:3"]
source = """
struct i32 { x: i64 }
fn main() -> i32 { 0 }
"""
compile_fail = true

[[case]]
name = "type_bool_as_struct_field"
spec = ["2.4:3"]
source = """
struct Foo { bool: i32 }
fn main() -> i32 { 0 }
"""
compile_fail = true
