[section]
id = "lexical.tokens"
spec_chapter = "2.1"
name = "Tokens"
description = "Tokens are the atomic units of syntax: keywords, identifiers, literals, operators, delimiters."

# =============================================================================
# Integer Literals (syntax)
# =============================================================================

[[case]]
name = "integer_literal_zero"
spec = ["2.1:3", "2.1:4"]
source = "fn main() -> i32 { 0 }"
exit_code = 0

[[case]]
name = "integer_literal_single_digit"
spec = ["2.1:3", "2.1:4"]
source = "fn main() -> i32 { 7 }"
exit_code = 7

[[case]]
name = "integer_literal_multiple_digits"
spec = ["2.1:3", "2.1:4"]
source = "fn main() -> i32 { 42 }"
exit_code = 42

[[case]]
name = "integer_literal_large"
spec = ["2.1:3", "2.1:4"]
source = "fn main() -> i32 { 123456 }"
exit_code = 64  # 123456 % 256

[[case]]
name = "integer_literal_default_i32"
spec = ["2.1:4"]
source = """
fn main() -> i32 {
    let x = 42;
    x
}
"""
exit_code = 42

# =============================================================================
# Identifiers (syntax and legality)
# =============================================================================

[[case]]
name = "identifier_letter_start"
spec = ["2.1:10"]
source = """
fn main() -> i32 {
    let x = 42;
    x
}
"""
exit_code = 42

[[case]]
name = "identifier_underscore_start"
spec = ["2.1:10"]
source = """
fn main() -> i32 {
    let _x = 42;
    _x
}
"""
exit_code = 42

[[case]]
name = "identifier_with_digits"
spec = ["2.1:10"]
source = """
fn main() -> i32 {
    let x1 = 42;
    x1
}
"""
exit_code = 42

[[case]]
name = "identifier_mixed"
spec = ["2.1:10"]
source = """
fn main() -> i32 {
    let my_var_123 = 42;
    my_var_123
}
"""
exit_code = 42

[[case]]
name = "identifier_uppercase"
spec = ["2.1:10"]
source = """
fn main() -> i32 {
    let MyVar = 42;
    MyVar
}
"""
exit_code = 42

[[case]]
name = "identifier_cannot_be_keyword_fn"
spec = ["2.1:11"]
source = "fn main() -> i32 { let fn = 1; fn }"
compile_fail = true

[[case]]
name = "identifier_cannot_be_keyword_let"
spec = ["2.1:11"]
source = "fn main() -> i32 { let let = 1; 0 }"
compile_fail = true

[[case]]
name = "identifier_cannot_be_keyword_if"
spec = ["2.1:11"]
source = "fn main() -> i32 { let if = 1; 0 }"
compile_fail = true

[[case]]
name = "identifier_unused_underscore"
spec = ["2.1:12"]
source = """
fn main() -> i32 {
    let _ = 100;
    42
}
"""
exit_code = 42

[[case]]
name = "underscore_multiple_bindings"
spec = ["2.1:14"]
source = """
fn main() -> i32 {
    let _ = 42;
    let _ = 100;
    let _ = 200;
    0
}
"""
exit_code = 0

[[case]]
name = "underscore_cannot_be_referenced"
spec = ["2.1:13"]
source = """
fn main() -> i32 {
    let _ = 42;
    _
}
"""
compile_fail = true
error_contains = "found '_'"

[[case]]
name = "underscore_prefixed_is_normal_variable"
spec = ["2.1:16"]
source = """
fn main() -> i32 {
    let _unused = 42;
    _unused
}
"""
exit_code = 42

# =============================================================================
# Maximal Munch (lexer longest-match principle)
# =============================================================================

[[case]]
name = "maximal_munch_left_shift"
spec = ["2.0:2"]
source = """
fn main() -> i32 {
    let x = 1 << 2;
    x
}
"""
exit_code = 4

[[case]]
name = "maximal_munch_right_shift"
spec = ["2.0:2"]
source = """
fn main() -> i32 {
    let x = 16 >> 2;
    x
}
"""
exit_code = 4

[[case]]
name = "maximal_munch_less_than_or_equal"
spec = ["2.0:2"]
source = """
fn main() -> i32 {
    if 5 <= 10 { 1 } else { 0 }
}
"""
exit_code = 1

[[case]]
name = "maximal_munch_greater_than_or_equal"
spec = ["2.0:2"]
source = """
fn main() -> i32 {
    if 10 >= 5 { 1 } else { 0 }
}
"""
exit_code = 1

[[case]]
name = "maximal_munch_logical_and"
spec = ["2.0:2"]
source = """
fn main() -> i32 {
    if true && true { 1 } else { 0 }
}
"""
exit_code = 1

[[case]]
name = "maximal_munch_logical_or"
spec = ["2.0:2"]
source = """
fn main() -> i32 {
    if false || true { 1 } else { 0 }
}
"""
exit_code = 1

[[case]]
name = "maximal_munch_equal_equal"
spec = ["2.0:2"]
source = """
fn main() -> i32 {
    if 5 == 5 { 1 } else { 0 }
}
"""
exit_code = 1

[[case]]
name = "maximal_munch_not_equal"
spec = ["2.0:2"]
source = """
fn main() -> i32 {
    if 5 != 10 { 1 } else { 0 }
}
"""
exit_code = 1

[[case]]
name = "maximal_munch_arrow"
spec = ["2.0:2"]
source = """
fn foo() -> i32 { 42 }
fn main() -> i32 { foo() }
"""
exit_code = 42

[[case]]
name = "maximal_munch_fat_arrow"
spec = ["2.0:2"]
source = """
fn main() -> i32 {
    match 1 {
        1 => 42,
        _ => 0,
    }
}
"""
exit_code = 42

[[case]]
name = "maximal_munch_colon_colon"
spec = ["2.0:2"]
source = """
enum Color { Red, Green, Blue }
fn main() -> i32 {
    match Color::Red {
        Color::Red => 1,
        Color::Green => 2,
        Color::Blue => 3,
    }
}
"""
exit_code = 1
