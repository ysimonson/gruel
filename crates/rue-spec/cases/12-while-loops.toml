# =============================================================================
# Stress Tests
# =============================================================================

[[case]]
name = "while_many_iterations"
source = """
fn main() -> i32 {
    let mut x = 0;
    while x < 1000 {
        x = x + 1;
    }
    x
}
"""
exit_code = 232

[[case]]
name = "while_deeply_nested_five_levels"
source = """
fn main() -> i32 {
    let mut count = 0;
    let mut a = 0;
    while a < 2 {
        let mut b = 0;
        while b < 2 {
            let mut c = 0;
            while c < 2 {
                let mut d = 0;
                while d < 2 {
                    let mut e = 0;
                    while e < 2 {
                        count = count + 1;
                        e = e + 1;
                    }
                    d = d + 1;
                }
                c = c + 1;
            }
            b = b + 1;
        }
        a = a + 1;
    }
    count
}
"""
exit_code = 32
