[section]
id = "12.1"
name = "While Loops"
description = "While loops execute a block repeatedly while a condition is true. The condition must be a bool expression. While loops are statements (they produce unit/void), not expressions."

# =============================================================================
# Basic While Loop
# =============================================================================

[[case]]
name = "while_false_never_executes"
source = """
fn main() -> i32 {
    let mut x = 0;
    while false {
        x = 1;
    }
    x
}
"""
exit_code = 0

[[case]]
name = "while_simple_countdown"
source = """
fn main() -> i32 {
    let mut x = 5;
    while x > 0 {
        x = x - 1;
    }
    x
}
"""
exit_code = 0

[[case]]
name = "while_count_up"
source = """
fn main() -> i32 {
    let mut x = 0;
    while x < 10 {
        x = x + 1;
    }
    x
}
"""
exit_code = 10

[[case]]
name = "while_accumulator"
source = """
fn main() -> i32 {
    let mut sum = 0;
    let mut i = 1;
    while i <= 5 {
        sum = sum + i;
        i = i + 1;
    }
    sum
}
"""
exit_code = 15

[[case]]
name = "while_single_iteration"
source = """
fn main() -> i32 {
    let mut x = 0;
    let mut done = false;
    while !done {
        x = 42;
        done = true;
    }
    x
}
"""
exit_code = 42

# =============================================================================
# While with Various Conditions
# =============================================================================

[[case]]
name = "while_with_eq_condition"
source = """
fn main() -> i32 {
    let mut x = 0;
    while x != 5 {
        x = x + 1;
    }
    x
}
"""
exit_code = 5

[[case]]
name = "while_with_ge_condition"
source = """
fn main() -> i32 {
    let mut x = 10;
    while x >= 5 {
        x = x - 1;
    }
    x
}
"""
exit_code = 4

[[case]]
name = "while_with_le_condition"
source = """
fn main() -> i32 {
    let mut x = 0;
    while x <= 3 {
        x = x + 1;
    }
    x
}
"""
exit_code = 4

[[case]]
name = "while_with_boolean_variable"
source = """
fn main() -> i32 {
    let mut running = true;
    let mut count = 0;
    while running {
        count = count + 1;
        if count == 3 {
            running = false;
        }
    }
    count
}
"""
exit_code = 3

# =============================================================================
# Compound Conditions (&&, ||)
# =============================================================================

[[case]]
name = "while_with_and_condition"
source = """
fn main() -> i32 {
    let mut x = 0;
    let mut y = 10;
    while x < 5 && y > 5 {
        x = x + 1;
        y = y - 1;
    }
    x + y
}
"""
exit_code = 10

[[case]]
name = "while_with_or_condition"
source = """
fn main() -> i32 {
    let mut x = 0;
    let mut y = 0;
    while x < 3 || y < 3 {
        x = x + 1;
        y = y + 1;
    }
    x
}
"""
exit_code = 3

[[case]]
name = "while_complex_condition"
source = """
fn main() -> i32 {
    let mut a = 0;
    let mut b = 10;
    while (a < 5 && b > 0) || a == 0 {
        a = a + 1;
        b = b - 2;
    }
    a
}
"""
exit_code = 5

[[case]]
name = "while_with_negated_condition"
source = """
fn main() -> i32 {
    let mut x = 0;
    while !(x == 5) {
        x = x + 1;
    }
    x
}
"""
exit_code = 5

# =============================================================================
# Nested While Loops
# =============================================================================

[[case]]
name = "nested_while"
source = """
fn main() -> i32 {
    let mut outer = 0;
    let mut total = 0;
    while outer < 3 {
        let mut inner = 0;
        while inner < 3 {
            total = total + 1;
            inner = inner + 1;
        }
        outer = outer + 1;
    }
    total
}
"""
exit_code = 9

[[case]]
name = "nested_while_with_outer_var"
source = """
fn main() -> i32 {
    let mut i = 0;
    let mut sum = 0;
    while i < 4 {
        let mut j = 0;
        while j <= i {
            sum = sum + 1;
            j = j + 1;
        }
        i = i + 1;
    }
    sum
}
"""
exit_code = 10

[[case]]
name = "deeply_nested_while"
source = """
fn main() -> i32 {
    let mut a = 0;
    let mut count = 0;
    while a < 2 {
        let mut b = 0;
        while b < 2 {
            let mut c = 0;
            while c < 2 {
                count = count + 1;
                c = c + 1;
            }
            b = b + 1;
        }
        a = a + 1;
    }
    count
}
"""
exit_code = 8

# =============================================================================
# While with If/Else Inside
# =============================================================================

[[case]]
name = "while_with_if"
source = """
fn main() -> i32 {
    let mut i = 0;
    let mut evens = 0;
    while i < 10 {
        if i % 2 == 0 {
            evens = evens + 1;
        }
        i = i + 1;
    }
    evens
}
"""
exit_code = 5

# Trace: i=0 even +0=0, i=1 odd -1=-1, i=2 even +2=1, i=3 odd -3=-2, i=4 even +4=2
[[case]]
name = "while_with_if_else"
source = """
fn main() -> i32 {
    let mut i = 0;
    let mut result = 0;
    while i < 5 {
        if i % 2 == 0 {
            result = result + i;
        } else {
            result = result - i;
        }
        i = i + 1;
    }
    result
}
"""
exit_code = 2

[[case]]
name = "while_with_nested_if"
source = """
fn main() -> i32 {
    let mut i = 0;
    let mut count = 0;
    while i < 20 {
        if i % 2 == 0 {
            if i % 4 == 0 {
                count = count + 1;
            }
        }
        i = i + 1;
    }
    count
}
"""
exit_code = 5

# =============================================================================
# While Inside If
# =============================================================================

[[case]]
name = "if_contains_while"
source = """
fn main() -> i32 {
    let condition = true;
    let mut x = 0;
    if condition {
        while x < 5 {
            x = x + 1;
        }
    }
    x
}
"""
exit_code = 5

[[case]]
name = "if_else_both_contain_while"
source = """
fn main() -> i32 {
    let flag = false;
    let mut x = 0;
    if flag {
        while x < 3 {
            x = x + 1;
        }
    } else {
        while x < 7 {
            x = x + 1;
        }
    }
    x
}
"""
exit_code = 7

# =============================================================================
# While with Function Calls
# =============================================================================

[[case]]
name = "while_calls_function"
source = """
fn double(n: i32) -> i32 {
    n * 2
}

fn main() -> i32 {
    let mut x = 1;
    while x < 100 {
        x = double(x);
    }
    x
}
"""
exit_code = 128

[[case]]
name = "while_with_function_in_condition"
source = """
fn is_small(n: i32) -> bool {
    n < 10
}

fn main() -> i32 {
    let mut x = 0;
    while is_small(x) {
        x = x + 3;
    }
    x
}
"""
exit_code = 12

[[case]]
name = "recursive_and_iterative_combined"
source = """
fn factorial(n: i32) -> i32 {
    if n <= 1 {
        1
    } else {
        n * factorial(n - 1)
    }
}

fn main() -> i32 {
    let mut sum = 0;
    let mut i = 1;
    while i <= 5 {
        sum = sum + factorial(i);
        i = i + 1;
    }
    sum
}
"""
exit_code = 153

# =============================================================================
# Classic Algorithms
# =============================================================================

[[case]]
name = "iterative_factorial"
source = """
fn main() -> i32 {
    let mut n = 5;
    let mut result = 1;
    while n > 0 {
        result = result * n;
        n = n - 1;
    }
    result
}
"""
exit_code = 120

[[case]]
name = "iterative_fibonacci"
source = """
fn main() -> i32 {
    let mut a = 0;
    let mut b = 1;
    let mut i = 0;
    while i < 10 {
        let temp = b;
        b = a + b;
        a = temp;
        i = i + 1;
    }
    a
}
"""
exit_code = 55

[[case]]
name = "iterative_gcd"
source = """
fn main() -> i32 {
    let mut a = 48;
    let mut b = 18;
    while b != 0 {
        let temp = b;
        b = a % b;
        a = temp;
    }
    a
}
"""
exit_code = 6

# Note: 2^8 = 256, but exit codes are only 8 bits (0-255), so 256 mod 256 = 0
[[case]]
name = "iterative_power"
source = """
fn main() -> i32 {
    let base = 2;
    let mut exp = 8;
    let mut result = 1;
    while exp > 0 {
        result = result * base;
        exp = exp - 1;
    }
    result
}
"""
exit_code = 0

[[case]]
name = "sum_of_digits"
source = """
fn main() -> i32 {
    let mut n = 12345;
    let mut sum = 0;
    while n > 0 {
        sum = sum + n % 10;
        n = n / 10;
    }
    sum
}
"""
exit_code = 15

[[case]]
name = "count_digits"
source = """
fn main() -> i32 {
    let mut n = 12345;
    let mut count = 0;
    while n > 0 {
        count = count + 1;
        n = n / 10;
    }
    count
}
"""
exit_code = 5

# Note: reversed number is 321, but exit codes are 8 bits, so 321 mod 256 = 65
[[case]]
name = "reverse_number"
source = """
fn main() -> i32 {
    let mut n = 123;
    let mut reversed = 0;
    while n > 0 {
        reversed = reversed * 10 + n % 10;
        n = n / 10;
    }
    reversed
}
"""
exit_code = 65

# =============================================================================
# Edge Cases
# =============================================================================

[[case]]
name = "while_empty_body"
source = """
fn main() -> i32 {
    let mut x = 5;
    while x > 0 {
        x = x - 1;
    }
    0
}
"""
exit_code = 0

# Note: 100/2=50, 50/2=25, 25/2=12, 12/2=6, 6/2=3, 3/2=1, then x>1 is false
[[case]]
name = "while_modifies_condition_var_in_body"
source = """
fn main() -> i32 {
    let mut x = 100;
    while x > 1 {
        x = x / 2;
    }
    x
}
"""
exit_code = 1

[[case]]
name = "while_with_multiple_statements"
source = """
fn main() -> i32 {
    let mut a = 0;
    let mut b = 0;
    let mut c = 0;
    while a < 5 {
        a = a + 1;
        b = b + 2;
        c = c + 3;
    }
    a + b + c
}
"""
exit_code = 30

[[case]]
name = "while_condition_with_arithmetic"
source = """
fn main() -> i32 {
    let mut x = 0;
    while x * 2 < 20 {
        x = x + 1;
    }
    x
}
"""
exit_code = 10

# Note: This creates an infinite loop because the inner `x` shadows the outer `x`,
# so `x < 3` always evaluates to true. The compiler doesn't currently detect
# infinite loops, so we skip this test. In the future, we might add a lint for this.
