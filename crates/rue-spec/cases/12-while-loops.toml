#         let x = 100;
#         x;
#     }
#     x
# }
# """
# compile_fail = true
# error_contains = "infinite loop"

[[case]]
name = "while_with_block_scoped_var"
source = """
fn main() -> i32 {
    let mut count = 0;
    let mut i = 0;
    while i < 3 {
        let local = i * 10;
        count = count + local;
        i = i + 1;
    }
    count
}
"""
exit_code = 30

