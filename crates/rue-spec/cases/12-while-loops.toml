error_contains = "expected bool"

[[case]]
name = "while_condition_not_bool_arithmetic"
source = """
fn main() -> i32 {
    let mut x = 5;
    while x {
        x = x - 1;
    }
    0
}
"""
compile_fail = true
error_contains = "expected bool"

[[case]]
name = "while_condition_comparison_type_mismatch"
source = """
fn main() -> i32 {
    while true < false {
        0;
    }
    0
}
"""
compile_fail = true
error_contains = "expected integer"

