# While is an Expression (returns Unit)
# =============================================================================

[[case]]
name = "while_expression_in_let"
source = """
fn main() -> i32 {
    let x = while false { };
    0
}
"""
exit_code = 0

[[case]]
name = "while_expression_return_type_mismatch"
source = """
fn main() -> i32 {
    while false { }
}
"""
