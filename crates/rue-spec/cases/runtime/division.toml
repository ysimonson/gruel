[section]
id = "runtime.division"
spec_chapter = "8.3"
name = "Division by Zero"
description = "Division or remainder by zero causes a runtime panic with exit code 101."

# =============================================================================
# Division by Zero Exit Code 101
# =============================================================================

[[case]]
name = "div_by_zero_exit_101"
spec = ["8.3:2", "B.1:3"]
source = """
fn main() -> i32 {
    let x: i32 = 10;
    x / 0
}
"""
exit_code = 101

[[case]]
name = "mod_by_zero_exit_101"
spec = ["8.3:2", "B.1:3"]
source = """
fn main() -> i32 {
    let x: i32 = 10;
    x % 0
}
"""
exit_code = 101

# =============================================================================
# Both Division and Remainder Affected
# =============================================================================

[[case]]
name = "division_by_zero"
spec = ["8.3:3"]
source = """
fn main() -> i32 {
    10 / 0
}
"""
exit_code = 101

[[case]]
name = "remainder_by_zero"
spec = ["8.3:3"]
source = """
fn main() -> i32 {
    10 % 0
}
"""
exit_code = 101

[[case]]
name = "computed_divisor_zero"
spec = ["8.3:3"]
source = """
fn main() -> i32 {
    let x = 5;
    let y = 5;
    10 / (x - y)
}
"""
exit_code = 101
