[section]
id = "runtime.overflow"
spec_chapter = "8.1"
name = "Integer Overflow"
description = "Integer overflow causes a runtime panic with exit code 101."

# =============================================================================
# Overflow Terminates with Exit Code 101
# =============================================================================

[[case]]
name = "overflow_add_exit_101"
spec = ["8.1:2", "B.2:2"]
source = """
fn main() -> i32 {
    let x: i32 = 2147483647;
    x + 1
}
"""
exit_code = 101

[[case]]
name = "overflow_sub_exit_101"
spec = ["8.1:2", "B.2:2"]
source = """
fn main() -> i32 {
    let x: i32 = -2147483648;
    x - 1
}
"""
exit_code = 101

[[case]]
name = "overflow_mul_exit_101"
spec = ["8.1:2", "B.2:2"]
source = """
fn main() -> i32 {
    let x: i32 = 2147483647;
    x * 2
}
"""
exit_code = 101

# =============================================================================
# Operations That Can Overflow
# =============================================================================

[[case]]
name = "overflow_addition"
spec = ["8.1:3"]
source = """
fn main() -> i32 {
    let x: i32 = 2147483647;
    x + 1
}
"""
exit_code = 101

[[case]]
name = "overflow_subtraction"
spec = ["8.1:3"]
source = """
fn main() -> i32 {
    let x: i32 = -2147483648;
    x - 1
}
"""
exit_code = 101

[[case]]
name = "overflow_multiplication"
spec = ["8.1:3"]
source = """
fn main() -> i32 {
    let x: i32 = 1000000;
    x * 10000
}
"""
exit_code = 101

[[case]]
name = "overflow_negation"
spec = ["8.1:3"]
source = """
fn main() -> i32 {
    let x: i32 = -2147483648;
    -x
}
"""
exit_code = 101
