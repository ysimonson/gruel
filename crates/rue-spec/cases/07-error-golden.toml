[section]
id = "5.1"
name = "Error Message Golden Tests"
description = "Golden tests for exact error message formatting."

[[case]]
name = "missing_main_error"
source = "fn foo() -> i32 { 42 }"
compile_fail = true
expected_error = """
error: no main function found
"""

[[case]]
name = "missing_return_type_error"
source = "fn main() { 42 }"
compile_fail = true
expected_error = """
error: expected 'Arrow', found '{'
 --> <source>:1:11
  |
1 | fn main() { 42 }
  |           ^
  |
"""

[[case]]
name = "unexpected_character_at"
source = "fn main() -> i32 { @ }"
compile_fail = true
expected_error = """
error: unexpected character: @
 --> <source>:1:20
  |
1 | fn main() -> i32 { @ }
  |                    ^
  |
"""

[[case]]
name = "empty_file_error"
source = ""
compile_fail = true
expected_error = """
error: no main function found
"""

[[case]]
name = "only_comment_error"
source = "// just a comment"
compile_fail = true
expected_error = """
error: no main function found
"""

# =============================================================================
# Arithmetic Error Messages
# =============================================================================

[[case]]
name = "unclosed_paren_error"
source = "fn main() -> i32 { (1 + 2 }"
compile_fail = true
expected_error = """
error: expected 'Star' or 'Slash' or 'Percent', found '}'
 --> <source>:1:27
  |
1 | fn main() -> i32 { (1 + 2 }
  |                           ^
  |
"""

[[case]]
name = "missing_operand_error"
source = "fn main() -> i32 { 1 + }"
compile_fail = true
expected_error = """
error: expected 'Minus' or 'Bang' or something else, found '}'
 --> <source>:1:24
  |
1 | fn main() -> i32 { 1 + }
  |                        ^
  |
"""

[[case]]
name = "empty_parens_error"
source = "fn main() -> i32 { () }"
compile_fail = true
expected_error = """
error: expected 'Minus' or 'Bang' or something else, found ')'
 --> <source>:1:21
  |
1 | fn main() -> i32 { () }
  |                     ^
  |
"""

# =============================================================================
# Variable Error Messages
# =============================================================================

[[case]]
name = "undefined_variable_error"
source = """
fn main() -> i32 {
    x
}
"""
compile_fail = true
expected_error = """
error: undefined variable 'x'
 --> <source>:2:5
  |
2 |     x
  |     ^
  |
"""

[[case]]
name = "assign_to_immutable_error"
source = """
fn main() -> i32 {
    let x = 10;
    x = 20;
    x
}
"""
compile_fail = true
expected_error = """
error: cannot assign to immutable variable 'x'
 --> <source>:3:5
  |
3 |     x = 20;
  |     ^^^^^^^
  |
"""

[[case]]
name = "let_missing_equals_error"
source = """
fn main() -> i32 {
    let x 42;
    x
}
"""
compile_fail = true
expected_error = """
error: expected 'Colon' or 'Eq', found integer
 --> <source>:2:11
  |
2 |     let x 42;
  |           ^^
  |
"""

[[case]]
name = "let_missing_semicolon_error"
source = """
fn main() -> i32 {
    let x = 42
    x
}
"""
compile_fail = true
expected_error = """
error: expected 'Star' or 'Slash' or 'Percent', found identifier
 --> <source>:3:5
  |
3 |     x
  |     ^
  |
"""
