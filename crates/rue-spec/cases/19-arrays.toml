[section]
id = "8.1"
name = "Arrays"
description = "Fixed-size arrays with value semantics."

# =============================================================================
# Basic Array Declaration and Initialization
# =============================================================================

[[case]]
name = "array_single_element"
description = "Array with a single i32 element"
source = """
fn main() -> i32 {
    let arr: [i32; 1] = [42];
    arr[0]
}
"""
exit_code = 42

[[case]]
name = "array_two_elements"
description = "Array with two i32 elements"
source = """
fn main() -> i32 {
    let arr: [i32; 2] = [10, 32];
    arr[0] + arr[1]
}
"""
exit_code = 42

[[case]]
name = "array_three_elements"
description = "Array with three i32 elements"
source = """
fn main() -> i32 {
    let arr: [i32; 3] = [10, 20, 12];
    arr[0] + arr[1] + arr[2]
}
"""
exit_code = 42

[[case]]
name = "array_multiple_elements"
description = "Array with multiple elements"
source = """
fn main() -> i32 {
    let arr: [i32; 5] = [5, 10, 15, 7, 5];
    arr[0] + arr[1] + arr[2] + arr[3] + arr[4]
}
"""
exit_code = 42

# =============================================================================
# Array Element Access
# =============================================================================

[[case]]
name = "array_access_first"
description = "Access first element of array"
source = """
fn main() -> i32 {
    let arr: [i32; 3] = [42, 100, 200];
    arr[0]
}
"""
exit_code = 42

[[case]]
name = "array_access_last"
description = "Access last element of array"
source = """
fn main() -> i32 {
    let arr: [i32; 3] = [100, 200, 42];
    arr[2]
}
"""
exit_code = 42

[[case]]
name = "array_access_in_expression"
description = "Use array access in arithmetic expressions"
source = """
fn main() -> i32 {
    let arr: [i32; 3] = [10, 5, 3];
    (arr[0] * 4) + (arr[1] - arr[2])
}
"""
exit_code = 42

[[case]]
name = "array_access_multiple_reads"
description = "Read the same element multiple times"
source = """
fn main() -> i32 {
    let arr: [i32; 1] = [14];
    arr[0] + arr[0] + arr[0]
}
"""
exit_code = 42

# =============================================================================
# Array Element Mutation
# =============================================================================

[[case]]
name = "array_mutation_single"
description = "Mutate a single array element"
source = """
fn main() -> i32 {
    let mut arr: [i32; 1] = [0];
    arr[0] = 42;
    arr[0]
}
"""
exit_code = 42

[[case]]
name = "array_mutation_multiple"
description = "Mutate multiple array elements"
source = """
fn main() -> i32 {
    let mut arr: [i32; 2] = [0, 0];
    arr[0] = 20;
    arr[1] = 22;
    arr[0] + arr[1]
}
"""
exit_code = 42

[[case]]
name = "array_mutation_preserve_other"
description = "Mutating one element preserves others"
source = """
fn main() -> i32 {
    let mut arr: [i32; 3] = [10, 20, 12];
    arr[1] = 30;
    arr[0] + arr[2]
}
"""
exit_code = 22

[[case]]
name = "array_mutation_read_after_write"
description = "Read element after writing to it"
source = """
fn main() -> i32 {
    let mut arr: [i32; 1] = [10];
    arr[0] = arr[0] + 32;
    arr[0]
}
"""
exit_code = 42

# =============================================================================
# Bool Arrays
# =============================================================================

[[case]]
name = "array_bool_elements"
description = "Array of bool elements"
source = """
fn main() -> i32 {
    let arr: [bool; 2] = [true, false];
    if arr[0] { 42 } else { 0 }
}
"""
exit_code = 42

[[case]]
name = "array_bool_conditional"
description = "Use bool array in conditional"
source = """
fn main() -> i32 {
    let arr: [bool; 3] = [false, true, false];
    if arr[1] { 42 } else { 0 }
}
"""
exit_code = 42

# =============================================================================
# Variable Indexing
# =============================================================================

[[case]]
name = "array_variable_index"
description = "Array access with variable index"
source = """
fn main() -> i32 {
    let arr: [i32; 3] = [10, 42, 100];
    let idx = 1;
    arr[idx]
}
"""
exit_code = 42

[[case]]
name = "array_computed_index"
description = "Array access with computed index"
source = """
fn main() -> i32 {
    let arr: [i32; 5] = [5, 10, 42, 100, 200];
    let base = 1;
    arr[base + 1]
}
"""
exit_code = 42

# =============================================================================
# Arrays with Expressions
# =============================================================================

[[case]]
name = "array_element_expression"
description = "Array element initialized with expression"
source = """
fn main() -> i32 {
    let arr: [i32; 1] = [20 + 22];
    arr[0]
}
"""
exit_code = 42

[[case]]
name = "array_element_variable"
description = "Array element initialized from variable"
source = """
fn main() -> i32 {
    let x = 42;
    let arr: [i32; 1] = [x];
    arr[0]
}
"""
exit_code = 42

[[case]]
name = "array_element_function_call"
description = "Array element initialized from function call"
source = """
fn double(x: i32) -> i32 {
    x * 2
}

fn main() -> i32 {
    let arr: [i32; 1] = [double(21)];
    arr[0]
}
"""
exit_code = 42

# =============================================================================
# Error Cases
# =============================================================================

[[case]]
name = "array_length_mismatch_fewer"
description = "Array literal with fewer elements than declared"
source = """
fn main() -> i32 {
    let arr: [i32; 3] = [1, 2];
    arr[0]
}
"""
compile_fail = true
error_contains = "expected array of 3 elements"

[[case]]
name = "array_length_mismatch_more"
description = "Array literal with more elements than declared"
source = """
fn main() -> i32 {
    let arr: [i32; 2] = [1, 2, 3];
    arr[0]
}
"""
compile_fail = true
error_contains = "expected array of 2 elements"

[[case]]
name = "array_index_on_non_array"
description = "Index access on non-array type"
source = """
fn main() -> i32 {
    let x = 42;
    x[0]
}
"""
compile_fail = true
error_contains = "non-array"

[[case]]
name = "array_element_wrong_type"
description = "Array element with wrong type"
source = """
fn main() -> i32 {
    let arr: [i32; 2] = [42, true];
    arr[0]
}
"""
compile_fail = true
error_contains = "type mismatch"

[[case]]
name = "array_mutate_immutable"
description = "Mutate element of immutable array"
source = """
fn main() -> i32 {
    let arr: [i32; 1] = [10];
    arr[0] = 42;
    arr[0]
}
"""
compile_fail = true
error_contains = "cannot assign"

[[case]]
name = "array_empty_no_type"
description = "Empty array literal without type annotation"
source = """
fn main() -> i32 {
    let arr = [];
    0
}
"""
compile_fail = true
error_contains = "type annotation required"

# =============================================================================
# Bounds Checking - Compile-Time
# =============================================================================

[[case]]
name = "array_bounds_const_out_of_range"
description = "Compile-time error for constant index out of bounds"
source = """
fn main() -> i32 {
    let arr: [i32; 3] = [1, 2, 3];
    arr[5]
}
"""
compile_fail = true
error_contains = "index out of bounds"

[[case]]
name = "array_bounds_const_negative"
description = "Compile-time error for negative constant index"
source = """
fn main() -> i32 {
    let arr: [i32; 3] = [1, 2, 3];
    arr[-1]
}
"""
compile_fail = true
error_contains = "index out of bounds"

[[case]]
name = "array_bounds_const_exact_length"
description = "Compile-time error for index equal to length"
source = """
fn main() -> i32 {
    let arr: [i32; 3] = [1, 2, 3];
    arr[3]
}
"""
compile_fail = true
error_contains = "index out of bounds"

[[case]]
name = "array_bounds_set_const_out_of_range"
description = "Compile-time error for constant index out of bounds in assignment"
source = """
fn main() -> i32 {
    let mut arr: [i32; 3] = [1, 2, 3];
    arr[5] = 42;
    0
}
"""
compile_fail = true
error_contains = "index out of bounds"

# =============================================================================
# Bounds Checking - Runtime
# =============================================================================

[[case]]
name = "array_bounds_runtime_out_of_range"
description = "Runtime error for variable index out of bounds"
source = """
fn main() -> i32 {
    let arr: [i32; 3] = [1, 2, 3];
    let idx = 5;
    arr[idx]
}
"""
runtime_error = "index out of bounds"
runtime_exit_code = 101

[[case]]
name = "array_bounds_runtime_exact_length"
description = "Runtime error for variable index equal to length"
source = """
fn main() -> i32 {
    let arr: [i32; 3] = [1, 2, 3];
    let idx = 3;
    arr[idx]
}
"""
runtime_error = "index out of bounds"
runtime_exit_code = 101

[[case]]
name = "array_bounds_runtime_negative_cast"
description = "Runtime error for negative value treated as unsigned"
source = """
fn main() -> i32 {
    let arr: [i32; 3] = [1, 2, 3];
    let idx: i64 = -1;
    arr[idx]
}
"""
runtime_error = "index out of bounds"
runtime_exit_code = 101

[[case]]
name = "array_bounds_runtime_set_out_of_range"
description = "Runtime error for variable index out of bounds in assignment"
source = """
fn main() -> i32 {
    let mut arr: [i32; 3] = [1, 2, 3];
    let idx = 5;
    arr[idx] = 42;
    0
}
"""
runtime_error = "index out of bounds"
runtime_exit_code = 101

[[case]]
name = "array_bounds_valid_last_element"
description = "Accessing last valid element should succeed"
source = """
fn main() -> i32 {
    let arr: [i32; 3] = [10, 20, 42];
    let idx = 2;
    arr[idx]
}
"""
exit_code = 42
