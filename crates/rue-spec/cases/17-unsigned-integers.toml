[section]
id = "17.1"
name = "Unsigned Integer Types"
description = "Support for u8, u16, u32, and u64 unsigned integer types."

# =============================================================================
# u8 Type
# =============================================================================

[[case]]
name = "u8_return"
source = "fn main() -> u8 { 42 }"
exit_code = 42

[[case]]
name = "u8_zero"
source = "fn main() -> u8 { 0 }"
exit_code = 0

[[case]]
name = "u8_max_positive"
source = "fn main() -> u8 { 127 }"
exit_code = 127

[[case]]
name = "u8_variable"
source = """
fn main() -> u8 {
    let x: u8 = 50;
    x
}
"""
exit_code = 50

[[case]]
name = "u8_arithmetic"
source = """
fn main() -> u8 {
    let a: u8 = 10;
    let b: u8 = 5;
    a + b
}
"""
exit_code = 15

[[case]]
name = "u8_param"
source = """
fn double(x: u8) -> u8 { x + x }
fn main() -> u8 { double(21) }
"""
exit_code = 42

