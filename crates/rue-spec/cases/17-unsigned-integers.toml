# =============================================================================
# Type Mismatch Errors - Unsigned vs Unsigned (different sizes)
# =============================================================================

[[case]]
name = "type_mismatch_u8_u32"
source = """
fn main() -> u32 {
    let x: u8 = 42;
    x
}
"""
compile_fail = true
error_contains = "type mismatch"

[[case]]
name = "type_mismatch_u32_u64"
source = """
fn main() -> u64 {
    let x: u32 = 42;
    x
}
"""
compile_fail = true
error_contains = "type mismatch"

[[case]]
name = "type_mismatch_arithmetic_u8_u32"
source = """
fn main() -> u32 {
    let a: u8 = 10;
    let b: u32 = 20;
    a + b
}
"""
compile_fail = true
error_contains = "type mismatch"

[[case]]
name = "type_mismatch_arithmetic_u16_u64"
source = """
fn main() -> u64 {
    let a: u16 = 10;
    let b: u64 = 20;
    a + b
}
"""
compile_fail = true
error_contains = "type mismatch"

