# =============================================================================
# Function Argument Type Mismatch Errors
# =============================================================================

[[case]]
name = "type_mismatch_function_arg_u8_u32"
source = """
fn foo(x: u32) -> u32 { x }
fn main() -> u32 {
    let y: u8 = 10;
    foo(y)
}
"""
compile_fail = true
error_contains = "type mismatch"

[[case]]
name = "type_mismatch_function_arg_i32_u32"
source = """
fn foo(x: u32) -> u32 { x }
fn main() -> u32 {
    let y: i32 = 10;
    foo(y)
}
"""
compile_fail = true
error_contains = "type mismatch"
