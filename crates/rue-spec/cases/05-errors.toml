[section]
id = "3.1"
name = "Compilation Errors"
description = "Programs that should fail to compile."

[[case]]
name = "missing_main"
source = "fn foo() -> i32 { 42 }"
compile_fail = true
error_contains = "no main function found"

[[case]]
name = "unexpected_character"
source = "fn main() -> i32 { @ }"
compile_fail = true
error_contains = "unexpected character"

[[case]]
name = "empty_file"
source = ""
compile_fail = true
error_contains = "no main function found"

[[case]]
name = "only_comment"
source = "// just a comment"
compile_fail = true
error_contains = "no main function found"

[[case]]
name = "incomplete_function"
source = "fn main()"
compile_fail = true

# Note: return type annotation is required
# See 04-functions.toml for valid function tests

[[case]]
name = "missing_body"
source = "fn main() -> i32"
compile_fail = true

[[case]]
name = "unclosed_brace"
source = "fn main() -> i32 { 42"
compile_fail = true

[[case]]
name = "extra_close_brace"
source = "fn main() -> i32 { 42 } }"
compile_fail = true

[[case]]
name = "missing_return_type"
source = "fn main() { 42 }"
compile_fail = true
error_contains = "expected '->'"

# =============================================================================
# Arithmetic Errors
# =============================================================================

[[case]]
name = "unclosed_paren"
source = "fn main() -> i32 { (1 + 2 }"
compile_fail = true
error_contains = "expected ')'"

[[case]]
name = "missing_operand_after_plus"
source = "fn main() -> i32 { 1 + }"
compile_fail = true

[[case]]
name = "missing_operand_after_minus"
source = "fn main() -> i32 { 1 - }"
compile_fail = true

[[case]]
name = "missing_operand_after_mul"
source = "fn main() -> i32 { 1 * }"
compile_fail = true

[[case]]
name = "missing_operand_after_div"
source = "fn main() -> i32 { 1 / }"
compile_fail = true

[[case]]
name = "missing_operand_after_mod"
source = "fn main() -> i32 { 1 % }"
compile_fail = true

[[case]]
name = "unary_plus_not_supported"
source = "fn main() -> i32 { +1 }"
compile_fail = true

[[case]]
name = "unary_plus_in_expression"
source = "fn main() -> i32 { 1 + +2 }"
compile_fail = true

[[case]]
name = "empty_parens"
source = "fn main() -> i32 { () }"
compile_fail = true

[[case]]
name = "mismatched_parens"
source = "fn main() -> i32 { (1 + 2)) }"
compile_fail = true

[[case]]
name = "missing_operator"
source = "fn main() -> i32 { 1 2 }"
compile_fail = true

# =============================================================================
# Variable Errors
# =============================================================================

[[case]]
name = "undefined_variable"
source = """
fn main() -> i32 {
    x
}
"""
compile_fail = true
error_contains = "undefined variable"

[[case]]
name = "undefined_variable_in_expr"
source = """
fn main() -> i32 {
    1 + y
}
"""
compile_fail = true
error_contains = "undefined variable"

[[case]]
name = "use_before_definition"
source = """
fn main() -> i32 {
    let y = x;
    let x = 42;
    y
}
"""
compile_fail = true
error_contains = "undefined variable"

[[case]]
name = "let_missing_equals"
source = """
fn main() -> i32 {
    let x 42;
    x
}
"""
compile_fail = true
error_contains = "expected '='"

[[case]]
name = "let_missing_value"
source = """
fn main() -> i32 {
    let x = ;
    x
}
"""
compile_fail = true

[[case]]
name = "let_missing_semicolon"
source = """
fn main() -> i32 {
    let x = 42
    x
}
"""
compile_fail = true
error_contains = "expected ';'"

[[case]]
name = "let_missing_name"
source = """
fn main() -> i32 {
    let = 42;
    0
}
"""
compile_fail = true

[[case]]
name = "assign_to_immutable"
source = """
fn main() -> i32 {
    let x = 10;
    x = 20;
    x
}
"""
compile_fail = true
error_contains = "cannot assign"

[[case]]
name = "assign_to_undefined"
source = """
fn main() -> i32 {
    x = 42;
    x
}
"""
compile_fail = true
error_contains = "undefined variable"

[[case]]
name = "let_keyword_as_name"
source = """
fn main() -> i32 {
    let let = 42;
    0
}
"""
compile_fail = true

[[case]]
name = "fn_keyword_as_name"
source = """
fn main() -> i32 {
    let fn = 42;
    0
}
"""
compile_fail = true

[[case]]
name = "mut_keyword_as_name"
source = """
fn main() -> i32 {
    let mut = 42;
    0
}
"""
compile_fail = true

[[case]]
name = "let_wrong_type_annotation"
source = """
fn main() -> i32 {
    let x: foo = 42;
    x
}
"""
compile_fail = true
error_contains = "unknown type"

[[case]]
name = "let_missing_type_after_colon"
source = """
fn main() -> i32 {
    let x: = 42;
    x
}
"""
compile_fail = true

[[case]]
name = "assignment_missing_semicolon"
source = """
fn main() -> i32 {
    let mut x = 10;
    x = 20
    x
}
"""
compile_fail = true
error_contains = "expected ';'"

# =============================================================================
# Block Scoping Errors
# =============================================================================

[[case]]
name = "variable_out_of_scope"
source = """
fn main() -> i32 {
    let _unused = {
        let x = 42;
        x
    };
    x
}
"""
compile_fail = true
error_contains = "undefined variable"

[[case]]
name = "nested_variable_out_of_scope"
source = """
fn main() -> i32 {
    let y = {
        let inner = 10;
        inner
    };
    inner + y
}
"""
compile_fail = true
error_contains = "undefined variable"

# =============================================================================
# Function Call Errors
# =============================================================================

[[case]]
name = "undefined_function"
source = """
fn main() -> i32 {
    foo(42)
}
"""
compile_fail = true
error_contains = "undefined function"

[[case]]
name = "wrong_argument_count_too_few"
source = """
fn add(x: i32, y: i32) -> i32 { x + y }
fn main() -> i32 { add(1) }
"""
compile_fail = true
error_contains = "expected 2 arguments"

[[case]]
name = "wrong_argument_count_too_many"
source = """
fn add(x: i32, y: i32) -> i32 { x + y }
fn main() -> i32 { add(1, 2, 3) }
"""
compile_fail = true
error_contains = "expected 2 arguments"

[[case]]
name = "wrong_argument_count_zero"
source = """
fn identity(x: i32) -> i32 { x }
fn main() -> i32 { identity() }
"""
compile_fail = true
error_contains = "expected 1 argument"

[[case]]
name = "argument_type_mismatch"
source = """
fn double(x: i32) -> i32 { x + x }
fn main() -> i32 { double(true) }
"""
compile_fail = true
error_contains = "type mismatch"

[[case]]
name = "return_type_mismatch_in_call"
source = """
fn returns_bool() -> bool { true }
fn main() -> i32 { returns_bool() + 1 }
"""
compile_fail = true
error_contains = "type mismatch"

[[case]]
name = "call_missing_close_paren"
source = """
fn foo(x: i32) -> i32 { x }
fn main() -> i32 { foo(42 }
"""
compile_fail = true
error_contains = "expected ')'"

[[case]]
name = "param_missing_type"
source = """
fn foo(x) -> i32 { x }
fn main() -> i32 { foo(42) }
"""
compile_fail = true
error_contains = "expected ':'"

[[case]]
name = "param_missing_colon"
source = """
fn foo(x i32) -> i32 { x }
fn main() -> i32 { foo(42) }
"""
compile_fail = true
error_contains = "expected ':'"

[[case]]
name = "param_unknown_type"
source = """
fn foo(x: bar) -> i32 { 0 }
fn main() -> i32 { foo(42) }
"""
compile_fail = true
error_contains = "expected type"

[[case]]
name = "trailing_comma_in_params"
description = "Trailing commas are not allowed in parameter lists"
source = """
fn foo(x: i32,) -> i32 { x }
fn main() -> i32 { foo(42) }
"""
compile_fail = true

[[case]]
name = "trailing_comma_in_args"
description = "Trailing commas are not allowed in argument lists"
source = """
fn foo(x: i32) -> i32 { x }
fn main() -> i32 { foo(42,) }
"""
compile_fail = true
