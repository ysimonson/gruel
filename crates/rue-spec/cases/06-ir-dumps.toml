source = "fn main() -> i32 { 3 * 4 }"
expected_mir = """
function main:
    mov v0, 3
    mov v1, 4
    mov v2, v0
    imul v2, v1
    jno .Lmul_ok_0
    call __rue_overflow
    .Lmul_ok_0:
    mov rdi, v2
    call __rue_exit
"""

[[case]]
name = "division_rir"
source = "fn main() -> i32 { 10 / 3 }"
expected_rir = """
%0 = const 10
%1 = const 3
%2 = div %0, %1
%3 = fn main() -> i32 {
    %2
