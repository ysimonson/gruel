    %3 : i32 = ret %2
}
"""

[[case]]
name = "subtraction_mir"
source = "fn main() -> i32 { 5 - 3 }"
expected_mir = """
function main:
    mov v0, 5
    mov v1, 3
    mov v2, v0
    sub v2, v1
    jno .Lsub_ok_0
    call __rue_overflow
    .Lsub_ok_0:
    mov rdi, v2
    call __rue_exit
"""

[[case]]
name = "multiplication_rir"
source = "fn main() -> i32 { 3 * 4 }"
expected_rir = """
%0 = const 3
