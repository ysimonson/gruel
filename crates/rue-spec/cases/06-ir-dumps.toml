# =============================================================================
# Unary Negation
# =============================================================================

[[case]]
name = "negation_rir"
source = "fn main() -> i32 { -42 }"
expected_rir = """
%0 = const 42
%1 = neg %0
%2 = fn main() -> i32 {
    %1
}
"""

[[case]]
name = "negation_air"
source = "fn main() -> i32 { -42 }"
expected_air = """
function main:
air (return_type: i32) {
    %0 : i32 = const 42
    %1 : i32 = neg %0
    %2 : i32 = ret %1
}
"""

[[case]]
name = "negation_mir"
source = "fn main() -> i32 { -42 }"
expected_mir = """
function main:
    mov v0, 42
    mov v1, v0
    neg v1
    jno .Lneg_ok_0
    call __rue_overflow
    .Lneg_ok_0:
    mov rdi, v1
    call __rue_exit
"""

[[case]]
name = "negation_in_expr_rir"
source = "fn main() -> i32 { 10 + -3 }"
expected_rir = """
%0 = const 10
%1 = const 3
%2 = neg %1
%3 = add %0, %2
%4 = fn main() -> i32 {
    %3
}
"""

[[case]]
name = "double_negation_rir"
source = "fn main() -> i32 { --5 }"
expected_rir = """
%0 = const 5
%1 = neg %0
%2 = neg %1
%3 = fn main() -> i32 {
    %2
}
"""
