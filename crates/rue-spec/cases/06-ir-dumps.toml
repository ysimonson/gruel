"""

[[case]]
name = "division_air"
source = "fn main() -> i32 { 10 / 3 }"
expected_air = """
function main:
air (return_type: i32) {
    %0 : i32 = const 10
    %1 : i32 = const 3
    %2 : i32 = div %0, %1
    %3 : i32 = ret %2
}
"""

[[case]]
name = "division_mir"
source = "fn main() -> i32 { 10 / 3 }"
expected_mir = """
function main:
    mov v0, 10
    mov v1, 3
    test v1, v1
    jnz .Ldiv_ok_0
    call __rue_div_by_zero
    .Ldiv_ok_0:
    mov rax, v0
    cdq
    idiv v1
    mov v2, rax
    mov rdi, v2
    call __rue_exit
"""

