# =============================================================================
# Arithmetic Operators
# =============================================================================

[[case]]
name = "addition_rir"
source = "fn main() -> i32 { 1 + 2 }"
expected_rir = """
%0 = const 1
%1 = const 2
%2 = add %0, %1
%3 = fn main() -> i32 {
    %2
}
"""

[[case]]
name = "addition_air"
source = "fn main() -> i32 { 1 + 2 }"
expected_air = """
function main:
air (return_type: i32) {
    %0 : i32 = const 1
    %1 : i32 = const 2
    %2 : i32 = add %0, %1
    %3 : i32 = ret %2
}
"""

[[case]]
name = "addition_mir"
source = "fn main() -> i32 { 1 + 2 }"
expected_mir = """
function main:
    mov v0, 1
    mov v1, 2
    mov v2, v0
    add v2, v1
    jno .Ladd_ok_0
    call __rue_overflow
    .Ladd_ok_0:
    mov rdi, v2
    call __rue_exit
"""

[[case]]
name = "subtraction_rir"
source = "fn main() -> i32 { 5 - 3 }"
expected_rir = """
%0 = const 5
%1 = const 3
%2 = sub %0, %1
%3 = fn main() -> i32 {
    %2
}
"""

[[case]]
name = "subtraction_air"
