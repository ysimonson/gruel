[section]
id = "2.2"
name = "Local Variables"
description = "Local variable bindings with let. Variables are immutable by default; use 'let mut' for mutable bindings."

# =============================================================================
# Basic Let Bindings
# =============================================================================

[[case]]
name = "let_simple"
source = """
fn main() -> i32 {
    let x = 42;
    x
}
"""
exit_code = 42

[[case]]
name = "let_with_expression"
source = """
fn main() -> i32 {
    let x = 1 + 2;
    x
}
"""
exit_code = 3

[[case]]
name = "let_multiple"
source = """
fn main() -> i32 {
    let x = 10;
    let y = 20;
    x + y
}
"""
exit_code = 30

[[case]]
name = "let_use_in_expression"
source = """
fn main() -> i32 {
    let a = 5;
    let b = 3;
    a * b + 2
}
"""
exit_code = 17

[[case]]
name = "let_chained"
source = """
fn main() -> i32 {
    let x = 10;
    let y = x + 5;
    let z = y * 2;
    z
}
"""
exit_code = 30

[[case]]
name = "let_shadow"
source = """
fn main() -> i32 {
    let x = 1;
    let x = 2;
    x
}
"""
exit_code = 2

[[case]]
name = "let_shadow_uses_previous"
source = """
fn main() -> i32 {
    let x = 10;
    let x = x + 5;
    x
}
"""
exit_code = 15

[[case]]
name = "let_complex_expression"
source = """
fn main() -> i32 {
    let result = (1 + 2) * (3 + 4);
    result
}
"""
exit_code = 21

[[case]]
name = "let_negation"
source = """
fn main() -> i32 {
    let x = -5;
    let y = -x;
    y
}
"""
exit_code = 5

# =============================================================================
# Type Annotations
# =============================================================================

[[case]]
name = "let_with_type"
source = """
fn main() -> i32 {
    let x: i32 = 42;
    x
}
"""
exit_code = 42

[[case]]
name = "let_with_type_expression"
source = """
fn main() -> i32 {
    let x: i32 = 10 + 20;
    x
}
"""
exit_code = 30

[[case]]
name = "let_multiple_with_types"
source = """
fn main() -> i32 {
    let a: i32 = 5;
    let b: i32 = 7;
    a + b
}
"""
exit_code = 12

# =============================================================================
# Mutable Variables
# =============================================================================

[[case]]
name = "let_mut_simple"
source = """
fn main() -> i32 {
    let mut x = 10;
    x = 20;
    x
}
"""
exit_code = 20

[[case]]
name = "let_mut_increment"
source = """
fn main() -> i32 {
    let mut x = 5;
    x = x + 1;
    x
}
"""
exit_code = 6

[[case]]
name = "let_mut_multiple_assigns"
source = """
fn main() -> i32 {
    let mut x = 1;
    x = 2;
    x = 3;
    x = 4;
    x
}
"""
exit_code = 4

[[case]]
name = "let_mut_with_type"
source = """
fn main() -> i32 {
    let mut x: i32 = 10;
    x = 20;
    x
}
"""
exit_code = 20

[[case]]
name = "let_mut_complex"
source = """
fn main() -> i32 {
    let mut sum = 0;
    let a = 10;
    let b = 20;
    sum = sum + a;
    sum = sum + b;
    sum
}
"""
exit_code = 30

[[case]]
name = "let_mut_and_immutable"
source = """
fn main() -> i32 {
    let x = 10;
    let mut y = 5;
    y = y + x;
    y
}
"""
exit_code = 15

[[case]]
name = "let_mut_shadow"
source = """
fn main() -> i32 {
    let mut x = 1;
    let mut x = 2;
    x = 3;
    x
}
"""
exit_code = 3

[[case]]
name = "let_immutable_shadow_mutable"
source = """
fn main() -> i32 {
    let mut x = 1;
    x = 10;
    let x = 42;
    x
}
"""
exit_code = 42

[[case]]
name = "let_mutable_shadow_immutable"
source = """
fn main() -> i32 {
    let x = 10;
    let mut x = x;
    x = x + 5;
    x
}
"""
exit_code = 15

# =============================================================================
# Statements and Final Expression
# =============================================================================

[[case]]
name = "statements_with_semicolons"
source = """
fn main() -> i32 {
    let x = 10;
    let y = 20;
    x + y
}
"""
exit_code = 30

[[case]]
name = "expression_after_statements"
source = """
fn main() -> i32 {
    let a = 1;
    let b = 2;
    let c = 3;
    a + b + c
}
"""
exit_code = 6

[[case]]
name = "assignment_is_statement"
source = """
fn main() -> i32 {
    let mut x = 5;
    x = 10;
    x
}
"""
exit_code = 10

# =============================================================================
# Whitespace and Formatting
# =============================================================================

[[case]]
name = "let_single_line"
source = "fn main() -> i32 { let x = 42; x }"
exit_code = 42

[[case]]
name = "let_compact"
source = "fn main() -> i32 { let x=1+2; x }"
exit_code = 3

[[case]]
name = "let_extra_whitespace"
source = """
fn main() -> i32 {
    let    x   =   10   ;
    x
}
"""
exit_code = 10

[[case]]
name = "let_with_comments"
source = """
fn main() -> i32 {
    // declare x
    let x = 42;  // the answer
    x  // return it
}
"""
exit_code = 42

# =============================================================================
# Edge Cases
# =============================================================================

[[case]]
name = "let_zero"
source = """
fn main() -> i32 {
    let x = 0;
    x
}
"""
exit_code = 0

[[case]]
name = "let_negative"
source = """
fn main() -> i32 {
    let x = -1;
    x
}
"""
exit_code = 255

[[case]]
name = "let_max_i32"
source = """
fn main() -> i32 {
    let x = 2147483647;
    x
}
"""
exit_code = 255

[[case]]
name = "unused_variable"
source = """
fn main() -> i32 {
    let x = 42;
    0
}
"""
exit_code = 0

[[case]]
name = "many_variables"
source = """
fn main() -> i32 {
    let a = 1;
    let b = 2;
    let c = 3;
    let d = 4;
    let e = 5;
    a + b + c + d + e
}
"""
exit_code = 15

# =============================================================================
# Variable Names
# =============================================================================

[[case]]
name = "underscore_name"
source = """
fn main() -> i32 {
    let _x = 42;
    _x
}
"""
exit_code = 42

[[case]]
name = "underscore_only"
source = """
fn main() -> i32 {
    let _ = 42;
    0
}
"""
exit_code = 0

[[case]]
name = "long_name"
source = """
fn main() -> i32 {
    let my_very_long_variable_name = 42;
    my_very_long_variable_name
}
"""
exit_code = 42

[[case]]
name = "name_with_numbers"
source = """
fn main() -> i32 {
    let x1 = 10;
    let x2 = 20;
    x1 + x2
}
"""
exit_code = 30

[[case]]
name = "mixed_case_name"
source = """
fn main() -> i32 {
    let myVar = 42;
    myVar
}
"""
exit_code = 42

# =============================================================================
# Block Scoping
# =============================================================================

[[case]]
name = "nested_block_simple"
source = """
fn main() -> i32 {
    let x = 10;
    { 20 }
}
"""
exit_code = 20

[[case]]
name = "nested_block_uses_outer"
source = """
fn main() -> i32 {
    let x = 10;
    { x + 5 }
}
"""
exit_code = 15

[[case]]
name = "block_scoped_variable"
source = """
fn main() -> i32 {
    let x = 1;
    let y = {
        let x = 10;
        x + 5
    };
    x + y
}
"""
exit_code = 16

[[case]]
name = "block_scoped_shadow_restored"
source = """
fn main() -> i32 {
    let x = 42;
    let _unused = {
        let x = 100;
        x
    };
    x
}
"""
exit_code = 42

[[case]]
name = "nested_block_with_statements"
source = """
fn main() -> i32 {
    let outer = 10;
    let result = {
        let inner = 20;
        outer + inner
    };
    result
}
"""
exit_code = 30

[[case]]
name = "deeply_nested_blocks"
source = """
fn main() -> i32 {
    let a = 1;
    {
        let b = 2;
        {
            let c = 3;
            a + b + c
        }
    }
}
"""
exit_code = 6

[[case]]
name = "block_as_expression"
source = """
fn main() -> i32 {
    { 42 }
}
"""
exit_code = 42

[[case]]
name = "block_with_arithmetic"
source = """
fn main() -> i32 {
    { 10 + 20 + 12 }
}
"""
exit_code = 42

[[case]]
name = "sequential_blocks"
source = """
fn main() -> i32 {
    let a = { 10 };
    let b = { 20 };
    a + b
}
"""
exit_code = 30

[[case]]
name = "block_in_expression"
source = """
fn main() -> i32 {
    1 + { 2 } + 3
}
"""
exit_code = 6

[[case]]
name = "block_with_mutable_outer"
source = """
fn main() -> i32 {
    let mut x = 0;
    x = {
        let inner = 42;
        inner
    };
    x
}
"""
exit_code = 42
