[section]
id = "items.functions"
spec_chapter = "6.1"
name = "Functions"
description = "Function declarations with the fn keyword, including parameters and function calls. The entry point must be named 'main'."

# =============================================================================
# Basic function declarations (no parameters)
# =============================================================================

[[case]]
name = "simple_main"
spec = ["6.1:1", "6.1:7"]
source = "fn main() -> i32 { 0 }"
exit_code = 0

[[case]]
name = "main_returns_value"
spec = ["6.1:1"]
source = "fn main() -> i32 { 123 }"
exit_code = 123

[[case]]
name = "main_multiline"
spec = ["6.1:1"]
source = """
fn main() -> i32 {
    42
}
"""
exit_code = 42

[[case]]
name = "main_with_comment"
spec = ["6.1:1"]
source = """
// Entry point
fn main() -> i32 { 42 }
"""
exit_code = 42

[[case]]
name = "type_annotation_i32"
spec = ["6.1:2"]
source = "fn main() -> i32 { 99 }"
exit_code = 99

# =============================================================================
# Function parameters
# =============================================================================

[[case]]
name = "function_one_param"
spec = ["6.1:3"]
source = """
fn identity(x: i32) -> i32 { x }
fn main() -> i32 { identity(42) }
"""
exit_code = 42

[[case]]
name = "function_two_params"
spec = ["6.1:3"]
source = """
fn add(x: i32, y: i32) -> i32 { x + y }
fn main() -> i32 { add(40, 2) }
"""
exit_code = 42

[[case]]
name = "function_three_params"
spec = ["6.1:3"]
source = """
fn sum3(a: i32, b: i32, c: i32) -> i32 { a + b + c }
fn main() -> i32 { sum3(10, 20, 12) }
"""
exit_code = 42

[[case]]
name = "function_bool_param"
spec = ["6.1:3"]
source = """
fn choose(cond: bool, x: i32, y: i32) -> i32 {
    if cond { x } else { y }
}
fn main() -> i32 { choose(true, 42, 0) }
"""
exit_code = 42

[[case]]
name = "function_bool_param_false"
spec = ["6.1:3"]
source = """
fn choose(cond: bool, x: i32, y: i32) -> i32 {
    if cond { x } else { y }
}
fn main() -> i32 { choose(false, 0, 42) }
"""
exit_code = 42

[[case]]
name = "function_returns_bool"
spec = ["6.1:2"]
source = """
fn is_positive(x: i32) -> bool { x > 0 }
fn main() -> i32 {
    if is_positive(5) { 42 } else { 0 }
}
"""
exit_code = 42

# =============================================================================
# Multiple functions
# =============================================================================

[[case]]
name = "multiple_functions"
spec = ["6.1:4", "6.1:12"]
source = """
fn double(x: i32) -> i32 { x + x }
fn main() -> i32 { double(21) }
"""
exit_code = 42

[[case]]
name = "function_calls_function"
spec = ["6.1:4", "6.1:12"]
source = """
fn double(x: i32) -> i32 { x + x }
fn quadruple(x: i32) -> i32 { double(double(x)) }
fn main() -> i32 { quadruple(10) }
"""
exit_code = 40

[[case]]
name = "multiple_helper_functions"
spec = ["6.1:4"]
source = """
fn add(x: i32, y: i32) -> i32 { x + y }
fn sub(x: i32, y: i32) -> i32 { x - y }
fn main() -> i32 {
    let a = add(30, 20);
    sub(a, 8)
}
"""
exit_code = 42

[[case]]
name = "function_forward_reference"
spec = ["6.1:12"]
description = "Functions can call other functions regardless of definition order"
source = """
fn main() -> i32 { helper() }
fn helper() -> i32 { 42 }
"""
exit_code = 42

[[case]]
name = "function_mutual_forward_reference"
spec = ["6.1:12"]
description = "Functions can have mutual forward references"
source = """
fn first(x: i32) -> i32 {
    if x <= 0 { 0 }
    else { second(x - 1) + 1 }
}
fn second(x: i32) -> i32 { first(x) }
fn main() -> i32 { first(5) }
"""
exit_code = 5

# =============================================================================
# Recursion
# =============================================================================

[[case]]
name = "recursive_factorial"
spec = ["6.1:5", "6.1:10"]
source = """
fn factorial(n: i32) -> i32 {
    if n <= 1 { 1 }
    else { n * factorial(n - 1) }
}
fn main() -> i32 { factorial(5) }
"""
exit_code = 120

[[case]]
name = "recursive_fibonacci"
spec = ["6.1:5"]
source = """
fn fib(n: i32) -> i32 {
    if n <= 1 { n }
    else { fib(n - 1) + fib(n - 2) }
}
fn main() -> i32 { fib(10) }
"""
exit_code = 55

[[case]]
name = "recursive_countdown"
spec = ["6.1:5"]
source = """
fn countdown(n: i32) -> i32 {
    if n == 0 { 42 }
    else { countdown(n - 1) }
}
fn main() -> i32 { countdown(100) }
"""
exit_code = 42

# =============================================================================
# Call expressions
# =============================================================================

[[case]]
name = "call_with_expression_args"
spec = ["4.10:1"]
source = """
fn add(x: i32, y: i32) -> i32 { x + y }
fn main() -> i32 { add(20 + 10, 6 * 2) }
"""
exit_code = 42

[[case]]
name = "nested_call_expressions"
spec = ["4.10:1"]
source = """
fn add(x: i32, y: i32) -> i32 { x + y }
fn main() -> i32 { add(add(10, 20), add(5, 7)) }
"""
exit_code = 42

[[case]]
name = "call_in_arithmetic"
spec = ["4.10:1"]
source = """
fn square(x: i32) -> i32 { x * x }
fn main() -> i32 { square(5) + square(4) + 1 }
"""
exit_code = 42

[[case]]
name = "call_in_condition"
spec = ["4.10:1"]
source = """
fn is_even(x: i32) -> bool { x % 2 == 0 }
fn main() -> i32 {
    if is_even(4) { 42 } else { 0 }
}
"""
exit_code = 42

[[case]]
name = "call_in_let_binding"
spec = ["4.10:1"]
source = """
fn compute(x: i32) -> i32 { x * 2 + 1 }
fn main() -> i32 {
    let result = compute(20);
    result + 1
}
"""
exit_code = 42

# =============================================================================
# Parameters and local variables interaction
# =============================================================================

[[case]]
name = "param_and_local"
spec = ["6.1:3", "5.1:1"]
source = """
fn process(x: i32) -> i32 {
    let y = x + 10;
    y + 2
}
fn main() -> i32 { process(30) }
"""
exit_code = 42

[[case]]
name = "param_shadows_nothing"
spec = ["6.1:3"]
description = "Parameters are local to the function"
source = """
fn add_ten(x: i32) -> i32 { x + 10 }
fn main() -> i32 {
    let x = 100;
    add_ten(32)
}
"""
exit_code = 42

[[case]]
name = "multiple_params_with_locals"
spec = ["6.1:3", "5.1:1"]
source = """
fn calc(a: i32, b: i32) -> i32 {
    let sum = a + b;
    let diff = a - b;
    sum + diff
}
fn main() -> i32 { calc(25, 4) }
"""
exit_code = 50

# =============================================================================
# Edge cases
# =============================================================================

[[case]]
name = "zero_return"
spec = ["6.1:2"]
source = """
fn zero() -> i32 { 0 }
fn main() -> i32 { zero() }
"""
exit_code = 0

[[case]]
name = "negative_return"
spec = ["6.1:2"]
source = """
fn neg() -> i32 { -1 }
fn main() -> i32 { neg() + 43 }
"""
exit_code = 42

[[case]]
name = "pass_negative_arg"
spec = ["6.1:3"]
source = """
fn abs(x: i32) -> i32 {
    if x < 0 { -x } else { x }
}
fn main() -> i32 { abs(-42) }
"""
exit_code = 42

[[case]]
name = "function_with_six_params"
spec = ["6.1:3"]
description = "Test with six parameters (all fit in registers on System V AMD64)"
source = """
fn sum6(a: i32, b: i32, c: i32, d: i32, e: i32, f: i32) -> i32 {
    a + b + c + d + e + f
}
fn main() -> i32 { sum6(1, 2, 3, 4, 5, 27) }
"""
exit_code = 42

[[case]]
name = "function_with_seven_params"
spec = ["6.1:3"]
description = "Test with seven parameters (7th goes on stack per System V AMD64)"
source = """
fn sum7(a: i32, b: i32, c: i32, d: i32, e: i32, f: i32, g: i32) -> i32 {
    a + b + c + d + e + f + g
}
fn main() -> i32 { sum7(1, 2, 3, 4, 5, 6, 21) }
"""
exit_code = 42

[[case]]
name = "function_with_eight_params"
spec = ["6.1:3"]
description = "Test with eight parameters (7th and 8th go on stack)"
source = """
fn sum8(a: i32, b: i32, c: i32, d: i32, e: i32, f: i32, g: i32, h: i32) -> i32 {
    a + b + c + d + e + f + g + h
}
fn main() -> i32 { sum8(1, 2, 3, 4, 5, 6, 7, 14) }
"""
exit_code = 42

[[case]]
name = "function_with_ten_params"
spec = ["6.1:3"]
description = "Test with ten parameters (last four go on stack)"
source = """
fn sum10(a: i32, b: i32, c: i32, d: i32, e: i32, f: i32, g: i32, h: i32, i: i32, j: i32) -> i32 {
    a + b + c + d + e + f + g + h + i + j
}
fn main() -> i32 { sum10(1, 2, 3, 4, 5, 6, 7, 8, 9, -3) }
"""
exit_code = 42

[[case]]
name = "stack_params_with_expressions"
spec = ["6.1:3", "4.10:1"]
description = "Test stack parameters passed as expressions"
source = """
fn sum7(a: i32, b: i32, c: i32, d: i32, e: i32, f: i32, g: i32) -> i32 {
    a + b + c + d + e + f + g
}
fn main() -> i32 { sum7(1, 2, 3, 4, 5, 6, 10 * 2 + 1) }
"""
exit_code = 42

[[case]]
name = "nested_call_with_many_params"
spec = ["6.1:4", "4.10:1"]
description = "Test calling many-param functions from other functions"
source = """
fn add7(a: i32, b: i32, c: i32, d: i32, e: i32, f: i32, g: i32) -> i32 {
    a + b + c + d + e + f + g
}
fn double(x: i32) -> i32 { x + x }
fn main() -> i32 { double(add7(1, 2, 3, 4, 5, 6, 0)) }
"""
exit_code = 42

# =============================================================================
# Unit-returning functions (implicit return type)
# =============================================================================

[[case]]
name = "implicit_unit_return"
spec = ["6.1:6"]
description = "Function without return type annotation implicitly returns ()"
source = """
fn do_nothing() { }
fn main() -> i32 { do_nothing(); 0 }
"""
exit_code = 0

[[case]]
name = "implicit_unit_with_statements"
spec = ["6.1:6"]
description = "Unit-returning function with statements"
source = """
fn setup() {
    let x = 1;
    let y = 2;
}
fn main() -> i32 { setup(); 0 }
"""
exit_code = 0

[[case]]
name = "explicit_unit_return"
spec = ["6.1:6"]
description = "Explicit -> () return type"
source = """
fn explicit() -> () { }
fn main() -> i32 { explicit(); 0 }
"""
exit_code = 0

[[case]]
name = "unit_main"
spec = ["6.1:6", "6.1:7", "6.1:8"]
description = "Main function can return unit (exits with 0)"
source = "fn main() { }"
exit_code = 0

[[case]]
name = "unit_main_with_statements"
spec = ["6.1:6"]
description = "Main returning unit with statements"
source = """
fn main() {
    let x = 42;
}
"""
exit_code = 0

[[case]]
name = "call_unit_function_in_expression"
spec = ["6.1:6"]
description = "Can call unit-returning function and ignore result"
source = """
fn side_effect() { let x = 1; }
fn main() -> i32 {
    side_effect();
    side_effect();
    42
}
"""
exit_code = 42

# =============================================================================
# Struct parameters
# =============================================================================

[[case]]
name = "struct_param_simple"
spec = ["6.1:3"]
description = "Function taking a struct parameter"
source = """
struct Point { x: i32, y: i32 }
fn get_x(p: Point) -> i32 { p.x }
fn main() -> i32 {
    let p = Point { x: 42, y: 10 };
    get_x(p)
}
"""
exit_code = 42

[[case]]
name = "struct_param_nested_field_access"
spec = ["6.1:3"]
description = "Accessing nested fields of a struct parameter computes correct slot offsets"
source = """
struct Inner { a: i32, b: i32 }
struct Outer { inner: Inner, other: i32 }
fn get_inner_sum(o: Outer) -> i32 { o.inner.a + o.inner.b }
fn main() -> i32 {
    let o = Outer { inner: Inner { a: 10, b: 20 }, other: 100 };
    get_inner_sum(o)
}
"""
exit_code = 30

[[case]]
name = "struct_param_nested_all_slots"
spec = ["6.1:3"]
description = "Accessing all slots of a nested struct parameter uses correct slot counts"
source = """
struct Inner { a: i32, b: i32 }
struct Outer { inner: Inner, other: i32 }
fn sum_all(o: Outer) -> i32 { o.inner.a + o.inner.b + o.other }
fn main() -> i32 {
    let o = Outer { inner: Inner { a: 1, b: 2 }, other: 42 };
    sum_all(o)
}
"""
exit_code = 45

[[case]]
name = "struct_param_nested_later_field"
spec = ["6.1:3"]
description = "Accessing field after nested struct uses correct slot offset"
source = """
struct Inner { a: i32, b: i32 }
struct Outer { inner: Inner, other: i32 }
fn get_other(o: Outer) -> i32 { o.other }
fn main() -> i32 {
    let o = Outer { inner: Inner { a: 10, b: 20 }, other: 42 };
    get_other(o)
}
"""
exit_code = 42

[[case]]
name = "struct_return_nested"
spec = ["6.1:3"]
description = "Returning a struct with nested structs uses correct slot count"
source = """
struct Inner { a: i32, b: i32 }
struct Outer { inner: Inner, other: i32 }
fn make_outer() -> Outer {
    Outer { inner: Inner { a: 1, b: 2 }, other: 42 }
}
fn main() -> i32 {
    let o = make_outer();
    o.inner.a + o.inner.b + o.other
}
"""
exit_code = 45

[[case]]
name = "struct_nested_three_levels"
spec = ["6.1:3"]
description = "Passing deeply nested structs computes correct slot counts"
source = """
struct Level0 { value: i32 }
struct Level1 { inner: Level0, x: i32 }
struct Level2 { inner: Level1, y: i32 }
fn sum_deep(l: Level2) -> i32 { l.inner.inner.value + l.inner.x + l.y }
fn main() -> i32 {
    let l = Level2 { inner: Level1 { inner: Level0 { value: 10 }, x: 20 }, y: 12 };
    sum_deep(l)
}
"""
exit_code = 42

# =============================================================================
# Inout parameters
# =============================================================================

[[case]]
name = "inout_param_increment"
spec = ["6.1:14", "6.1:15", "6.1:16", "6.1:18"]
description = "Basic inout parameter that modifies a variable"
preview = "affine_types"
source = """
fn increment(inout x: i32) {
    x = x + 1;
}
fn main() -> i32 {
    let mut n = 41;
    increment(inout n);
    n
}
"""
exit_code = 42

[[case]]
name = "inout_param_double"
spec = ["6.1:14", "6.1:18"]
description = "Inout parameter that doubles a value"
preview = "affine_types"
source = """
fn double(inout x: i32) {
    x = x * 2;
}
fn main() -> i32 {
    let mut n = 21;
    double(inout n);
    n
}
"""
exit_code = 42

[[case]]
name = "inout_param_swap"
spec = ["6.1:14", "6.1:18"]
description = "Multiple inout parameters for swap"
preview = "affine_types"
source = """
fn swap(inout a: i32, inout b: i32) {
    let tmp = a;
    a = b;
    b = tmp;
}
fn main() -> i32 {
    let mut x = 10;
    let mut y = 42;
    swap(inout x, inout y);
    x
}
"""
exit_code = 42

[[case]]
name = "inout_param_with_regular_param"
spec = ["6.1:14", "6.1:15"]
description = "Mixing inout and regular parameters"
preview = "affine_types"
source = """
fn add_to(inout x: i32, amount: i32) {
    x = x + amount;
}
fn main() -> i32 {
    let mut n = 32;
    add_to(inout n, 10);
    n
}
"""
exit_code = 42

[[case]]
name = "inout_param_multiple_calls"
spec = ["6.1:14", "6.1:18"]
description = "Multiple calls with inout accumulate changes"
preview = "affine_types"
source = """
fn increment(inout x: i32) {
    x = x + 1;
}
fn main() -> i32 {
    let mut n = 39;
    increment(inout n);
    increment(inout n);
    increment(inout n);
    n
}
"""
exit_code = 42

[[case]]
name = "inout_param_return_value"
spec = ["6.1:14", "6.1:18"]
description = "Inout function that also returns a value"
preview = "affine_types"
source = """
fn increment_and_return_old(inout x: i32) -> i32 {
    let old = x;
    x = x + 1;
    old
}
fn main() -> i32 {
    let mut n = 41;
    let old = increment_and_return_old(inout n);
    old + 1
}
"""
exit_code = 42

[[case]]
name = "inout_requires_lvalue"
spec = ["6.1:17"]
description = "Inout argument must be an lvalue (not a literal)"
preview = "affine_types"
source = """
fn increment(inout x: i32) {
    x = x + 1;
}
fn main() -> i32 {
    increment(inout 42);
    0
}
"""
compile_fail = true
error_contains = "lvalue"

[[case]]
name = "inout_exclusive_access"
spec = ["6.1:20"]
description = "Cannot pass same variable to multiple inout parameters"
preview = "affine_types"
source = """
fn swap(inout a: i32, inout b: i32) {
    let tmp = a;
    a = b;
    b = tmp;
}
fn main() -> i32 {
    let mut x = 1;
    swap(inout x, inout x);
    0
}
"""
compile_fail = true
error_contains = "same variable"

[[case]]
name = "inout_exclusive_access_different_vars"
spec = ["6.1:20"]
description = "Different variables can be passed to multiple inout parameters"
preview = "affine_types"
source = """
fn swap(inout a: i32, inout b: i32) {
    let tmp = a;
    a = b;
    b = tmp;
}
fn main() -> i32 {
    let mut x = 1;
    let mut y = 2;
    swap(inout x, inout y);
    x + y * 10
}
"""
exit_code = 12
