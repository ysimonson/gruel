[section]
id = "items.functions"
spec_chapter = "6.1"
name = "Functions"
description = "Function declarations with the fn keyword, including parameters and function calls. The entry point must be named 'main'."

# =============================================================================
# Basic function declarations (no parameters)
# =============================================================================

[[case]]
name = "simple_main"
spec = ["6.1:1", "6.1:7"]
source = "fn main() -> i32 { 0 }"
exit_code = 0

[[case]]
name = "main_returns_value"
spec = ["6.1:1"]
source = "fn main() -> i32 { 123 }"
exit_code = 123

[[case]]
name = "main_multiline"
spec = ["6.1:1"]
source = """
fn main() -> i32 {
    42
}
"""
exit_code = 42

[[case]]
name = "main_with_comment"
spec = ["6.1:1"]
source = """
// Entry point
fn main() -> i32 { 42 }
"""
exit_code = 42

[[case]]
name = "type_annotation_i32"
spec = ["6.1:2"]
source = "fn main() -> i32 { 99 }"
exit_code = 99

# =============================================================================
# Function parameters
# =============================================================================

[[case]]
name = "function_one_param"
spec = ["6.1:3"]
source = """
fn identity(x: i32) -> i32 { x }
fn main() -> i32 { identity(42) }
"""
exit_code = 42

[[case]]
name = "function_two_params"
spec = ["6.1:3"]
source = """
fn add(x: i32, y: i32) -> i32 { x + y }
fn main() -> i32 { add(40, 2) }
"""
exit_code = 42

[[case]]
name = "function_three_params"
spec = ["6.1:3"]
source = """
fn sum3(a: i32, b: i32, c: i32) -> i32 { a + b + c }
fn main() -> i32 { sum3(10, 20, 12) }
"""
exit_code = 42

[[case]]
name = "function_bool_param"
spec = ["6.1:3"]
source = """
fn choose(cond: bool, x: i32, y: i32) -> i32 {
    if cond { x } else { y }
}
fn main() -> i32 { choose(true, 42, 0) }
"""
exit_code = 42

[[case]]
name = "function_bool_param_false"
spec = ["6.1:3"]
source = """
fn choose(cond: bool, x: i32, y: i32) -> i32 {
    if cond { x } else { y }
}
fn main() -> i32 { choose(false, 0, 42) }
"""
exit_code = 42

[[case]]
name = "function_returns_bool"
spec = ["6.1:2"]
source = """
fn is_positive(x: i32) -> bool { x > 0 }
fn main() -> i32 {
    if is_positive(5) { 42 } else { 0 }
}
"""
exit_code = 42

# =============================================================================
# Multiple functions
# =============================================================================

[[case]]
name = "multiple_functions"
spec = ["6.1:4", "6.1:12"]
source = """
fn double(x: i32) -> i32 { x + x }
fn main() -> i32 { double(21) }
"""
exit_code = 42

[[case]]
name = "function_calls_function"
spec = ["6.1:4", "6.1:12"]
source = """
fn double(x: i32) -> i32 { x + x }
fn quadruple(x: i32) -> i32 { double(double(x)) }
fn main() -> i32 { quadruple(10) }
"""
exit_code = 40

[[case]]
name = "multiple_helper_functions"
spec = ["6.1:4"]
source = """
fn add(x: i32, y: i32) -> i32 { x + y }
fn sub(x: i32, y: i32) -> i32 { x - y }
fn main() -> i32 {
    let a = add(30, 20);
    sub(a, 8)
}
"""
exit_code = 42

[[case]]
name = "function_forward_reference"
spec = ["6.1:12"]
description = "Functions can call other functions regardless of definition order"
source = """
fn main() -> i32 { helper() }
fn helper() -> i32 { 42 }
"""
exit_code = 42

[[case]]
name = "function_mutual_forward_reference"
spec = ["6.1:12"]
description = "Functions can have mutual forward references"
source = """
fn first(x: i32) -> i32 {
    if x <= 0 { 0 }
    else { second(x - 1) + 1 }
}
fn second(x: i32) -> i32 { first(x) }
fn main() -> i32 { first(5) }
"""
exit_code = 5

# =============================================================================
# Recursion
# =============================================================================

[[case]]
name = "recursive_factorial"
spec = ["6.1:5", "6.1:10"]
source = """
fn factorial(n: i32) -> i32 {
    if n <= 1 { 1 }
    else { n * factorial(n - 1) }
}
fn main() -> i32 { factorial(5) }
"""
exit_code = 120

[[case]]
name = "recursive_fibonacci"
spec = ["6.1:5"]
source = """
fn fib(n: i32) -> i32 {
    if n <= 1 { n }
    else { fib(n - 1) + fib(n - 2) }
}
fn main() -> i32 { fib(10) }
"""
exit_code = 55

[[case]]
name = "recursive_countdown"
spec = ["6.1:5"]
source = """
fn countdown(n: i32) -> i32 {
    if n == 0 { 42 }
    else { countdown(n - 1) }
}
fn main() -> i32 { countdown(100) }
"""
exit_code = 42

