# Unchecked Code and Raw Pointers - Phase 1: Parser Support
#
# This tests the syntax support for:
# - `unchecked fn` modifier
# - `checked { }` block expressions
# - `ptr const T` and `ptr mut T` type syntax
#
# Note: These tests use the unchecked_code preview feature and are expected
# to pass for Phase 1 (parsing). Later phases will add semantic analysis.

[section]
id = "items.unchecked"
spec_chapter = "9.1"
name = "Unchecked Code"
description = "Unchecked functions, checked blocks, and raw pointer types for low-level memory access."

# =============================================================================
# Unchecked function modifier
# =============================================================================

[[case]]
name = "unchecked_fn_basic"
spec = ["9.1:1", "9.1:2"]
source = """
unchecked fn dangerous_op() -> i32 { 42 }
fn main() -> i32 { 0 }
"""
exit_code = 0

[[case]]
name = "unchecked_fn_with_params"
spec = ["9.1:1"]
source = """
unchecked fn read_memory(addr: i32) -> i32 { addr }
fn main() -> i32 { 0 }
"""
exit_code = 0

[[case]]
name = "pub_unchecked_fn"
spec = ["9.1:1"]
source = """
pub unchecked fn public_dangerous() -> i32 { 0 }
fn main() -> i32 { 0 }
"""
exit_code = 0

# =============================================================================
# Checked block expressions
# =============================================================================

[[case]]
name = "checked_block_basic"
spec = ["9.1:4", "9.1:5", "9.1:6"]
source = """
fn main() -> i32 {
    let x = checked { 42 };
    x
}
"""
exit_code = 42

[[case]]
name = "checked_block_nested"
spec = ["9.1:4"]
source = """
fn main() -> i32 {
    checked {
        let x = 10;
        let y = 32;
        x + y
    }
}
"""
exit_code = 42

[[case]]
name = "checked_block_with_statements"
spec = ["9.1:4"]
source = """
fn main() -> i32 {
    let result = checked {
        let a = 20;
        let b = 22;
        a + b
    };
    result
}
"""
exit_code = 42

# =============================================================================
# Pointer type syntax - Phase 2 adds semantic analysis
# =============================================================================

# These tests verify pointer types are recognized in the type system.
# Phase 2 implemented pointer types (PtrConst, PtrMut).

[[case]]
name = "ptr_const_type_in_param"
spec = ["9.1:8", "9.1:9"]
source = """
fn takes_ptr(p: ptr const i32) -> i32 { 0 }
fn main() -> i32 { 0 }
"""
exit_code = 0

[[case]]
name = "ptr_mut_type_in_param"
spec = ["9.1:8"]
source = """
fn takes_mut_ptr(p: ptr mut i32) -> i32 { 0 }
fn main() -> i32 { 0 }
"""
exit_code = 0

[[case]]
name = "ptr_const_return_type"
spec = ["9.1:8"]
source = """
// Test that ptr const T can be used as a return type
// Pass the pointer through to verify the return type is recognized
fn identity_ptr(p: ptr const i32) -> ptr const i32 { p }
fn main() -> i32 { 0 }
"""
exit_code = 0

[[case]]
name = "ptr_to_struct_type"
spec = ["9.1:8"]
source = """
struct Point { x: i32, y: i32 }
fn takes_point_ptr(p: ptr const Point) -> i32 { 0 }
fn main() -> i32 { 0 }
"""
exit_code = 0
