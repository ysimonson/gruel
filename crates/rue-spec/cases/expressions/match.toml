    match 1 {
        1 => 10,
        _ => 0,
    }
}
"""
exit_code = 10

[[case]]
name = "no_trailing_comma"
spec = ["4.7:2"]
source = """
fn main() -> i32 {
    match 1 {
        1 => 10,
        _ => 0
    }
}
"""
exit_code = 10

