[[case]]
name = "anon_struct_swap_method"
spec = ["4.14:11"]
preview = "anon_struct_methods"
description = "Swap method from spec example"
source = """
fn Pair(comptime T: type) -> type {
    struct {
        first: T,
        second: T,

        fn swap(self) -> Self {
