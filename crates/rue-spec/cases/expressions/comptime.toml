# =============================================================================
# Phase 3: Type Parameters (ADR-0025)
# =============================================================================
# Tests for `type` as a type name and comptime type parameters.
# These tests verify that:
# 1. `type` can be used as a type annotation for comptime parameters
# 2. Type parameters are substituted during specialization
# 3. Generic functions work correctly with different concrete types

[[case]]
name = "type_as_type_name_can_be_resolved"
spec = ["4.14:5"]
description = "The keyword 'type' can be used as a type annotation"
source = """
// Simple test: `type` as a type name is parsed correctly
fn identity(comptime T: type, x: T) -> T {
    x
}
fn main() -> i32 {
    identity(i32, 42)
}
"""
exit_code = 42

[[case]]
name = "generic_function_with_i32"
spec = ["4.14:5"]
description = "Generic identity function specialized for i32"
source = """
fn identity(comptime T: type, x: T) -> T {
    x
}
fn main() -> i32 {
    identity(i32, 42)
}
"""
exit_code = 42

[[case]]
name = "generic_function_with_bool"
spec = ["4.14:5"]
description = "Generic identity function specialized for bool"
source = """
fn identity(comptime T: type, x: T) -> T {
    x
}
fn main() -> i32 {
    if identity(bool, true) { 42 } else { 0 }
}
"""
exit_code = 42

[[case]]
name = "generic_max_function"
spec = ["4.14:5"]
description = "The ADR example: generic max function"
source = """
fn max(comptime T: type, a: T, b: T) -> T {
    if a > b { a } else { b }
}
fn main() -> i32 {
    max(i32, 10, 20)
}
"""
exit_code = 20

[[case]]
name = "generic_function_multiple_calls_same_type"
spec = ["4.14:5"]
description = "Multiple calls to generic function with same type reuse specialization"
source = """
fn identity(comptime T: type, x: T) -> T {
    x
}
fn main() -> i32 {
    let a = identity(i32, 10);
    let b = identity(i32, 32);
    a + b
}
"""
exit_code = 42

[[case]]
name = "generic_function_multiple_types"
spec = ["4.14:5"]
description = "Generic function called with different types creates separate specializations"
source = """
fn identity(comptime T: type, x: T) -> T {
    x
}
fn main() -> i32 {
    let i: i32 = identity(i32, 42);
    let b: bool = identity(bool, true);
    if b { i } else { 0 }
}
"""
exit_code = 42

[[case]]
name = "type_parameter_in_arithmetic"
spec = ["4.14:5"]
description = "Type parameter used with arithmetic operators"
source = """
fn add_one(comptime T: type, x: T) -> T {
    x + 1
}
fn main() -> i32 {
    add_one(i32, 41)
}
"""
exit_code = 42

[[case]]
name = "type_value_cannot_escape_comptime"
spec = ["4.14:6"]
description = "Type values cannot exist at runtime"
source = """
fn main() -> i32 {
    // This should fail because type values can't exist at runtime
    let t = comptime { i32 };
    0
}
"""
compile_fail = true
error_contains = "type values cannot exist at runtime"

# =============================================================================
# Phase 4: Anonymous Struct Types (ADR-0025)
# =============================================================================
# Tests for anonymous struct type construction.
# These tests verify that:
# 1. Anonymous struct syntax `struct { field: Type, ... }` is parsed correctly
# 2. Anonymous structs can be returned from functions returning `type`
# 3. Structural type equality: two structs with same fields are the same type
# 4. Anonymous structs can be instantiated and used

[[case]]
name = "anon_struct_basic"
spec = ["4.14:7"]
description = "Basic anonymous struct type syntax"
source = """
fn make_point() -> type {
    struct { x: i32, y: i32 }
}
fn main() -> i32 {
    let P = make_point();
    let p: P = P { x: 10, y: 32 };
    p.x + p.y
}
"""
exit_code = 42

[[case]]
name = "anon_struct_single_field"
spec = ["4.14:7"]
description = "Anonymous struct with single field"
source = """
fn wrapper() -> type {
    struct { value: i32 }
}
fn main() -> i32 {
    let W = wrapper();
    let w: W = W { value: 42 };
    w.value
}
"""
exit_code = 42

[[case]]
name = "anon_struct_generic_pair"
spec = ["4.14:7"]
description = "Generic Pair type constructor - ADR deliverable example"
source = """
fn Pair(comptime T: type) -> type {
    struct { first: T, second: T }
}
fn main() -> i32 {
    let IntPair = Pair(i32);
    let p: IntPair = IntPair { first: 20, second: 22 };
    p.first + p.second
}
"""
exit_code = 42

[[case]]
name = "anon_struct_structural_equality"
spec = ["4.14:8"]
description = "Two anonymous structs with same fields are structurally equal"
source = """
fn make_point1() -> type {
    struct { x: i32, y: i32 }
}
fn make_point2() -> type {
    struct { x: i32, y: i32 }
}
fn main() -> i32 {
    let P1 = make_point1();
    let P2 = make_point2();
    // P1 and P2 should be the same type due to structural equality
    let p1: P1 = P1 { x: 10, y: 20 };
    let p2: P2 = p1;  // This assignment should work
    p2.x + p2.y
}
"""
exit_code = 30

[[case]]
name = "anon_struct_different_fields_different_types"
spec = ["4.14:8"]
description = "Anonymous structs with different fields are different types"
source = """
fn make_xy() -> type {
    struct { x: i32, y: i32 }
}
fn make_ab() -> type {
    struct { a: i32, b: i32 }
}
fn main() -> i32 {
    let XY = make_xy();
    let AB = make_ab();
    let xy: XY = XY { x: 42, y: 0 };
    // Cannot assign xy to AB type since field names differ
    xy.x
}
"""
exit_code = 42

[[case]]
name = "anon_struct_different_field_types"
spec = ["4.14:8"]
description = "Anonymous structs with different field types are different types"
source = """
fn make_i32_pair() -> type {
    struct { first: i32, second: i32 }
}
fn make_bool_pair() -> type {
    struct { first: bool, second: bool }
}
fn main() -> i32 {
    let I32Pair = make_i32_pair();
    let BoolPair = make_bool_pair();
    let ip: I32Pair = I32Pair { first: 42, second: 0 };
    let bp: BoolPair = BoolPair { first: true, second: false };
    if bp.first { ip.first } else { ip.second }
}
"""
exit_code = 42

[[case]]
name = "anon_struct_nested"
spec = ["4.14:7"]
description = "Anonymous struct containing another struct type"
source = """
fn Point() -> type {
    struct { x: i32, y: i32 }
}
fn Line(comptime P: type) -> type {
    struct { start: P, end: P }
}
fn main() -> i32 {
    let P = Point();
    let L = Line(P);
    let p1: P = P { x: 0, y: 0 };
    let p2: P = P { x: 10, y: 32 };
    let line: L = L { start: p1, end: p2 };
    line.end.x + line.end.y
}
"""
exit_code = 42

[[case]]
name = "anon_struct_empty_error"
spec = ["4.14:9"]
description = "Empty anonymous struct is not allowed"
source = """
fn empty() -> type {
    struct { }
}
fn main() -> i32 {
    0
}
"""
compile_fail = true
error_contains = "empty struct"

[[case]]
name = "anon_struct_specialization_caching"
spec = ["4.14:7"]
description = "Multiple calls with same type reuse the same anonymous struct"
source = """
fn Wrapper(comptime T: type) -> type {
    struct { value: T }
}
fn main() -> i32 {
    let W1 = Wrapper(i32);
    let W2 = Wrapper(i32);
    // W1 and W2 should be identical types
    let w1: W1 = W1 { value: 20 };
    let w2: W2 = W2 { value: 22 };
    w1.value + w2.value
}
"""
exit_code = 42

[[case]]
name = "anon_struct_method_like_function"
spec = ["4.14:7"]
description = "Using anonymous struct with a function that takes it"
source = """
fn Point() -> type {
    struct { x: i32, y: i32 }
}
fn add_points(comptime P: type, a: P, b: P) -> P {
    P { x: a.x + b.x, y: a.y + b.y }
}
fn main() -> i32 {
    let P = Point();
    let p1: P = P { x: 10, y: 20 };
    let p2: P = P { x: 5, y: 7 };
    let sum = add_points(P, p1, p2);
    sum.x + sum.y
}
"""
exit_code = 42

# =============================================================================
# Phase 5: Anonymous Struct Methods (ADR-0029)
# =============================================================================
# Tests for method definitions inside anonymous struct types.
# These tests verify that:
# 1. Methods can be defined inside anonymous struct types
# 2. Self type resolves to the anonymous struct type
# 3. Associated functions (no self) work correctly
# 4. Comptime parameter capture in methods works

[[case]]
name = "anon_struct_method_basic"
spec = ["4.14:10"]
preview = "anon_struct_methods"
description = "Basic method definition in anonymous struct"
source = """
fn Counter() -> type {
    struct {
        value: i32,

        fn get(self) -> i32 {
            self.value
        }
    }
}
fn main() -> i32 {
    let C = Counter();
    let c: C = C { value: 42 };
    c.get()
}
"""
exit_code = 42

[[case]]
name = "anon_struct_method_self_return"
spec = ["4.14:10", "4.14:11"]
preview = "anon_struct_methods"
description = "Method returning Self type"
source = """
fn Counter() -> type {
    struct {
        value: i32,

        fn increment(self) -> Self {
            Self { value: self.value + 1 }
        }
    }
}
fn main() -> i32 {
    let C = Counter();
    let c: C = C { value: 41 };
    let c2 = c.increment();
    c2.value
}
"""
exit_code = 42

[[case]]
name = "anon_struct_method_chain"
spec = ["4.14:10", "4.14:11"]
preview = "anon_struct_methods"
description = "Chaining multiple method calls"
source = """
fn Counter() -> type {
    struct {
        value: i32,

        fn increment(self) -> Self {
            Self { value: self.value + 1 }
        }

        fn get(self) -> i32 {
            self.value
        }
    }
}
fn main() -> i32 {
    let C = Counter();
    let c: C = C { value: 0 };
    c.increment().increment().increment().get()
}
"""
exit_code = 3

[[case]]
name = "anon_struct_method_with_params"
spec = ["4.14:10"]
preview = "anon_struct_methods"
description = "Method with additional parameters"
source = """
fn Counter() -> type {
    struct {
        value: i32,

        fn add(self, n: i32) -> Self {
            Self { value: self.value + n }
        }

        fn get(self) -> i32 {
            self.value
        }
    }
}
fn main() -> i32 {
    let C = Counter();
    let c: C = C { value: 0 };
    c.add(42).get()
}
"""
exit_code = 42

[[case]]
name = "anon_struct_self_type_annotation"
spec = ["4.14:11"]
preview = "anon_struct_methods"
description = "Self used in parameter type annotation"
source = """
fn Pair() -> type {
    struct {
        first: i32,
        second: i32,

        fn combine(self, other: Self) -> Self {
            Self { first: self.first + other.first, second: self.second + other.second }
        }
    }
}
fn main() -> i32 {
    let P = Pair();
    let p1: P = P { first: 10, second: 20 };
    let p2: P = P { first: 5, second: 7 };
    let sum = p1.combine(p2);
    sum.first + sum.second
}
"""
exit_code = 42

[[case]]
name = "anon_struct_generic_method"
spec = ["4.14:10", "4.14:12"]
preview = "anon_struct_methods"
