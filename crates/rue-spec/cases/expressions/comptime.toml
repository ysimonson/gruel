# =============================================================================
# Comptime Evaluation Failures
# =============================================================================

[[case]]
name = "comptime_cannot_use_runtime_variable"
spec = ["4.13:4"]
preview = "comptime"
preview_should_pass = true
source = """
fn main() -> i32 {
    let x = 10;
    comptime { x + 1 }
}
"""
compile_fail = true
error_contains = "cannot be known at compile time"

[[case]]
name = "comptime_cannot_call_function"
spec = ["4.13:4"]
preview = "comptime"
preview_should_pass = true
source = """
fn add(a: i32, b: i32) -> i32 { a + b }
fn main() -> i32 {
    comptime { add(1, 2) }
}
"""
compile_fail = true
error_contains = "cannot be known at compile time"

# =============================================================================
# Comptime Parameters (Phase 2 - ADR-0025)
# =============================================================================

[[case]]
name = "comptime_param_requires_preview_flag"
spec = ["4.13:5"]
source = """
fn repeat(comptime n: i32, value: i32) -> i32 { n + value }
fn main() -> i32 {
    repeat(3, 10)
}
"""
compile_fail = true
error_contains = "requires preview feature"

[[case]]
name = "comptime_param_basic"
spec = ["4.13:5"]
preview = "comptime"
preview_should_pass = true
source = """
fn multiply(comptime n: i32, value: i32) -> i32 {
    n * value
}
fn main() -> i32 {
    multiply(6, 7)
}
"""
exit_code = 42

[[case]]
name = "comptime_param_with_literal"
spec = ["4.13:5"]
preview = "comptime"
preview_should_pass = true
source = """
fn add_constant(comptime c: i32, x: i32) -> i32 {
    c + x
}
fn main() -> i32 {
    add_constant(40, 2)
}
"""
exit_code = 42

[[case]]
name = "comptime_param_multiple"
spec = ["4.13:5"]
preview = "comptime"
preview_should_pass = true
source = """
fn compute(comptime a: i32, comptime b: i32, x: i32) -> i32 {
    a * b + x
}
fn main() -> i32 {
    compute(5, 8, 2)
}
"""
exit_code = 42

[[case]]
name = "comptime_param_runtime_arg_error"
spec = ["4.13:6"]
preview = "comptime"
preview_should_pass = true
source = """
fn double(comptime n: i32) -> i32 { n * 2 }
fn main() -> i32 {
    let x = 21;
    double(x)
}
"""
compile_fail = true
error_contains = "comptime parameter requires a compile-time known value"

[[case]]
name = "comptime_param_function_call_arg_error"
spec = ["4.13:6"]
preview = "comptime"
preview_should_pass = true
source = """
fn get_value() -> i32 { 5 }
fn scale(comptime factor: i32, value: i32) -> i32 { factor * value }
fn main() -> i32 {
    scale(get_value(), 10)
}
"""
compile_fail = true
error_contains = "comptime parameter requires a compile-time known value"

[[case]]
name = "comptime_param_comptime_expr_ok"
spec = ["4.13:5"]
preview = "comptime"
preview_should_pass = true
source = """
fn triple(comptime n: i32) -> i32 { n * 3 }
fn main() -> i32 {
    triple(comptime { 7 * 2 })
}
"""
exit_code = 42

[[case]]
name = "comptime_param_mixed_with_normal"
spec = ["4.13:5"]
preview = "comptime"
preview_should_pass = true
source = """
fn offset(x: i32, comptime delta: i32, y: i32) -> i32 {
    x + delta + y
}
fn main() -> i32 {
    offset(10, 20, 12)
}
"""
exit_code = 42

# =============================================================================
# Phase 3: Type Parameters (ADR-0025)
# =============================================================================
# Tests for `type` as a type name and comptime type parameters.
# These tests verify that:
# 1. `type` can be used as a type annotation for comptime parameters
# 2. Type parameters are substituted during specialization
# 3. Generic functions work correctly with different concrete types

[[case]]
name = "type_as_type_name_can_be_resolved"
spec = ["4.13:5"]
preview = "comptime"
description = "The keyword 'type' can be used as a type annotation"
source = """
// Simple test: `type` as a type name is parsed correctly
// This will fail until comptime parameters are fully implemented
fn identity(comptime T: type, x: T) -> T {
    x
}
fn main() -> i32 {
    identity(i32, 42)
}
"""
exit_code = 42

[[case]]
name = "generic_function_with_i32"
spec = ["4.13:5"]
preview = "comptime"
description = "Generic identity function specialized for i32"
source = """
fn identity(comptime T: type, x: T) -> T {
    x
}
fn main() -> i32 {
    identity(i32, 42)
}
"""
exit_code = 42

[[case]]
name = "generic_function_with_bool"
spec = ["4.13:5"]
preview = "comptime"
description = "Generic identity function specialized for bool"
source = """
fn identity(comptime T: type, x: T) -> T {
    x
}
fn main() -> i32 {
    if identity(bool, true) { 42 } else { 0 }
}
"""
exit_code = 42

[[case]]
name = "generic_max_function"
spec = ["4.13:5"]
preview = "comptime"
description = "The ADR example: generic max function"
source = """
fn max(comptime T: type, a: T, b: T) -> T {
    if a > b { a } else { b }
}
fn main() -> i32 {
    max(i32, 10, 20)
}
"""
exit_code = 20

[[case]]
name = "generic_function_multiple_calls_same_type"
spec = ["4.13:5"]
preview = "comptime"
description = "Multiple calls to generic function with same type reuse specialization"
source = """
fn identity(comptime T: type, x: T) -> T {
    x
}
fn main() -> i32 {
    let a = identity(i32, 10);
    let b = identity(i32, 32);
    a + b
}
"""
exit_code = 42

[[case]]
name = "generic_function_multiple_types"
spec = ["4.13:5"]
preview = "comptime"
description = "Generic function called with different types creates separate specializations"
source = """
fn identity(comptime T: type, x: T) -> T {
    x
}
fn main() -> i32 {
    let i: i32 = identity(i32, 42);
    let b: bool = identity(bool, true);
    if b { i } else { 0 }
}
"""
exit_code = 42

[[case]]
name = "type_parameter_in_arithmetic"
spec = ["4.13:5"]
preview = "comptime"
description = "Type parameter used with arithmetic operators"
source = """
fn add_one(comptime T: type, x: T) -> T {
    x + 1
}
fn main() -> i32 {
    add_one(i32, 41)
}
"""
exit_code = 42

[[case]]
name = "type_value_cannot_escape_comptime"
spec = ["4.13:6"]
preview = "comptime"
# Not preview_should_pass yet - requires type-as-expression parsing which is Phase 4
description = "Type values cannot exist at runtime"
source = """
fn main() -> i32 {
    // This should fail because type values can't exist at runtime
    let t = comptime { i32 };
    0
}
"""
compile_fail = true
error_contains = "type values cannot exist at runtime"
