[section]
id = "expressions.bitwise"
spec_chapter = "4.3a"
name = "Bitwise Operators"
description = "Bitwise operators (&, |, ^, ~, <<, >>) operate on integer values at the bit level."

# =============================================================================
# Binary Bitwise Operators
# =============================================================================

[[case]]
name = "bitwise_{op}_basic"
spec = ["4.3a:1"]
source = """
fn main() -> i32 {
    let a: i32 = 12;  // 0b1100
    let b: i32 = 10;  // 0b1010
    a {oper} b
}
"""
params = [
  { op = "and", oper = "&", exit_code = 8 },
  { op = "or", oper = "|", exit_code = 14 },
  { op = "xor", oper = "^", exit_code = 6 },
]

[[case]]
name = "bitwise_{op}_identity"
spec = ["4.3a:1"]
source = """
fn main() -> i32 {
    let a: i32 = {value};
    a {oper}
}
"""
params = [
  { op = "and_zero", value = "255", oper = "& 0", exit_code = 0 },
  { op = "or_zero", value = "42", oper = "| 0", exit_code = 42 },
  { op = "xor_self", value = "42", oper = "^ a", exit_code = 0 },
]

# =============================================================================
# Bitwise NOT
# =============================================================================

[[case]]
name = "bitwise_not_{variant}"
spec = ["4.3a:3", "4.3a:4"]
source = """
fn main() -> i32 {
    let a: i32 = {value};
    {expr}
}
"""
params = [
  { variant = "zero", value = "0", expr = "~a", exit_code = 255 },
  { variant = "negative_one", value = "0 - 1", expr = "~a", exit_code = 0 },
  { variant = "double", value = "42", expr = "~~a", exit_code = 42 },
]

# =============================================================================
# Shift Operators
# =============================================================================

[[case]]
name = "shift_{variant}"
spec = ["4.3a:6"]
source = """
fn main() -> i32 {
    let x: i32 = {value};
    x {oper}
}
"""
params = [
  { variant = "left_basic", value = "1", oper = "<< 4", exit_code = 16, spec_extra = ["4.3a:7"] },
  { variant = "right_basic", value = "16", oper = ">> 2", exit_code = 4, spec_extra = ["4.3a:8"] },
  { variant = "left_zero", value = "42", oper = "<< 0", exit_code = 42, spec_extra = ["4.3a:7"] },
  { variant = "right_zero", value = "42", oper = ">> 0", exit_code = 42, spec_extra = ["4.3a:8"] },
  { variant = "left_multiple", value = "3", oper = "<< 3", exit_code = 24, spec_extra = ["4.3a:7"] },
]

[[case]]
name = "shift_left_right_identity"
spec = ["4.3a:6", "4.3a:7", "4.3a:8"]
source = """
fn main() -> i32 {
    let x: i32 = 42;
    (x << 2) >> 2
}
"""
exit_code = 42

[[case]]
name = "shift_type_same"
spec = ["4.3a:9"]
source = """
fn main() -> i32 {
    let x: i32 = 1;
    let shift: i32 = 3;
    x << shift
}
"""
exit_code = 8

[[case]]
name = "shift_large_amount"
spec = ["4.3a:10"]
source = """
fn main() -> i32 {
    let x: i32 = 1;
    // Shifting by 33 on i32 (32-bit) is equivalent to shifting by 1
    x << 33
}
"""
exit_code = 2

# =============================================================================
# Operator Precedence
# =============================================================================

[[case]]
name = "precedence_{variant}"
spec = ["4.3a:12", "4.3a:13"]
source = "fn main() -> i32 { {expr} }"
params = [
  { variant = "and_or", expr = "1 | 2 & 3", exit_code = 3 },
  { variant = "xor_and", expr = "1 ^ 3 & 2", exit_code = 3 },
  { variant = "or_xor", expr = "1 | 2 ^ 3", exit_code = 1 },
]

[[case]]
name = "precedence_shift_and"
spec = ["4.3a:12", "4.3a:13"]
source = """
fn main() -> i32 {
    let a: i32 = 1 << 2 & 7;  // = (1 << 2) & 7 = 4 & 7 = 4
    a
}
"""
exit_code = 4

[[case]]
name = "precedence_parentheses"
spec = ["4.3a:14"]
source = """
fn main() -> i32 {
    (1 | 2) & 3  // = 3 & 3 = 3
}
"""
exit_code = 3

# =============================================================================
# Associativity
# =============================================================================

[[case]]
name = "associativity_{op}"
spec = ["4.3a:16"]
source = "fn main() -> i32 { {expr} }"
params = [
  { op = "shift_left", expr = "let x: i32 = 1 << 2 << 1; x", exit_code = 8 },
  { op = "and", expr = "15 & 7 & 3", exit_code = 3 },
  { op = "or", expr = "1 | 2 | 4", exit_code = 7 },
  { op = "xor", expr = "7 ^ 3 ^ 1", exit_code = 5 },
]

# =============================================================================
# Type Checking (Integer Types)
# =============================================================================

[[case]]
name = "bitwise_{type}"
spec = ["4.3a:18"]
source = "{source}"
params = [
  { type = "i32", source = "fn main() -> i32 {\n    let a: i32 = 5;\n    let b: i32 = 3;\n    a & b\n}", exit_code = 1 },
  { type = "i8", source = "fn main() -> i32 {\n    let a: i8 = 5;\n    let b: i8 = 3;\n    let result: i8 = a | b;\n    5 | 3\n}", exit_code = 7 },
  { type = "u8", source = "fn main() -> i32 {\n    let a: u8 = 5;\n    let b: u8 = 3;\n    let result: u8 = a ^ b;\n    5 ^ 3\n}", exit_code = 6 },
]

# =============================================================================
# Type Checking Errors
# =============================================================================

[[case]]
name = "bitwise_{op}_bool_error"
spec = ["4.3a:19"]
source = "{source}"
compile_fail = true
error_contains = "type"
params = [
  { op = "and", source = "fn main() -> i32 {\n    let a = true;\n    let b = false;\n    a & b;\n    0\n}" },
  { op = "not", source = "fn main() -> i32 {\n    let a = true;\n    ~a;\n    0\n}" },
  { op = "shift", source = "fn main() -> i32 {\n    let a = true;\n    let b: i32 = 1;\n    a << b;\n    0\n}" },
]

# =============================================================================
# Large Shift Amounts (Modulo Bit Width)
# =============================================================================

[[case]]
name = "shift_{type}_large_amount"
spec = ["4.3a:10"]
source = """
fn main() -> i32 {
    let x: {type} = 1;
    // Shifting by 65 on 64-bit type is equivalent to shifting by 1
    let result: {type} = x << 65;
    if result == 2 { 1 } else { 0 }
}
"""
exit_code = 1
params = [
  { type = "i64" },
  { type = "u64" },
]

[[case]]
name = "shift_right_u8"
spec = ["4.3a:8", "4.3a:18"]
source = """
fn main() -> i32 {
    let x: u8 = 128;
    let result: u8 = x >> 4;  // Logical shift: 8
    if result == 8 { 8 } else { 0 }
}
"""
exit_code = 8

[[case]]
name = "shift_left_u16"
spec = ["4.3a:7", "4.3a:18"]
source = """
fn main() -> i32 {
    let x: u16 = 1;
    let result: u16 = x << 8;  // 256
    if result == 256 { 1 } else { 0 }
}
"""
exit_code = 1

[[case]]
name = "shift_right_signed_preserves_sign"
spec = ["4.3a:8"]
source = """
fn main() -> i32 {
    let x: i32 = 0 - 8;  // -8
    // Arithmetic shift right by 2 should preserve sign
    let result: i32 = x >> 2;
    result
}
"""
exit_code = 254

# Test signed right shift for narrow types (i8, i16) to ensure sign extension
# is handled correctly during constant folding
[[case]]
name = "shift_right_i8_negative_one"
spec = ["4.3a:8"]
source = """
fn main() -> i32 {
    let tmp: i32 = -1;
    let x: i8 = @intCast(tmp);
    // Arithmetic right shift of -1 by any amount should remain -1
    let result: i8 = x >> 1;
    @intCast(result)
}
"""
exit_code = 255

[[case]]
name = "shift_right_i8_negative"
spec = ["4.3a:8"]
source = """
fn main() -> i32 {
    let tmp: i32 = -8;
    let x: i8 = @intCast(tmp);
    // Arithmetic right shift by 2: 0xF8 >> 2 = 0xFE = -2
    let result: i8 = x >> 2;
    @intCast(result)
}
"""
exit_code = 254

[[case]]
name = "shift_right_i16_negative_one"
spec = ["4.3a:8"]
source = """
fn main() -> i32 {
    let tmp: i32 = -1;
    let x: i16 = @intCast(tmp);
    // Arithmetic right shift of -1 by any amount should remain -1
    let result: i16 = x >> 4;
    @intCast(result)
}
"""
exit_code = 255

[[case]]
name = "shift_right_i16_negative"
spec = ["4.3a:8"]
source = """
fn main() -> i32 {
    let tmp: i32 = -256;
    let x: i16 = @intCast(tmp);
    // Arithmetic right shift by 4: 0xFF00 >> 4 = 0xFFF0 = -16
    let result: i16 = x >> 4;
    @intCast(result)
}
"""
exit_code = 240

[[case]]
name = "shift_right_unsigned_fills_zeros"
spec = ["4.3a:8"]
source = """
fn main() -> i32 {
    let x: u32 = 4294967288;  // 0xFFFFFFF8
    let result: u32 = x >> 4;
    if result == 268435455 { 1 } else { 0 }
}
"""
exit_code = 1

# =============================================================================
# Negative Shift Amounts
# =============================================================================

[[case]]
name = "shift_negative_amount"
spec = ["4.3a:10"]
source = """
fn main() -> i32 {
    let x: i32 = 16;
    let shift: i32 = 0 - 2;  // -2
    let result: i32 = x << shift;
    if result != 16 { 1 } else { 0 }
}
"""
exit_code = 1

# =============================================================================
# Unsigned Bitwise Operations
# =============================================================================

[[case]]
name = "bitwise_u32_and"
spec = ["4.3a:1", "4.3a:18"]
source = """
fn main() -> i32 {
    let a: u32 = 4278255360;  // 0xFF00FF00
    let b: u32 = 252645135;   // 0x0F0F0F0F
    let result: u32 = a & b;
    if result == 251662080 { 1 } else { 0 }
}
"""
exit_code = 1

[[case]]
name = "bitwise_u64_or"
spec = ["4.3a:1", "4.3a:18"]
source = """
fn main() -> i32 {
    let a: u64 = 1;
    let b: u64 = 2;
    let result: u64 = a | b;
    if result == 3 { 1 } else { 0 }
}
"""
exit_code = 1

[[case]]
name = "bitwise_not_u8"
spec = ["4.3a:3", "4.3a:18"]
source = """
fn main() -> i32 {
    let a: u8 = 5;
    let c: u8 = ~~a;  // Should be back to original
    if c == 5 { 1 } else { 0 }
}
"""
exit_code = 1
