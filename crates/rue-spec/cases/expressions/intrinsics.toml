# =============================================================================
# @size_of Intrinsic
# =============================================================================

[[case]]
name = "size_of_returns_size"
spec = ["4.13:12", "4.13:13"]
source = """
fn main() -> i32 {
    @size_of(i32)
}
"""
exit_code = 8

[[case]]
name = "size_of_returns_i32"
spec = ["4.13:14"]
source = """
fn takes_i32(x: i32) -> i32 { x }
fn main() -> i32 {
    takes_i32(@size_of(i32))
}
"""
exit_code = 8

[[case]]
name = "size_of_compile_time"
spec = ["4.13:15"]
source = """
fn main() -> i32 {
    // Can be used in constant context
    let size: i32 = @size_of(i32);
    size
}
"""
exit_code = 8

[[case]]
name = "size_of_struct"
spec = ["4.13:12", "4.13:13"]
source = """
