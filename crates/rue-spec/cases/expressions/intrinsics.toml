[[case]]
name = "align_of_compile_time"
spec = ["4.13:21"]
source = """
fn main() -> i32 {
    // Can be used in constant context
    let align: i32 = @align_of(i32);
    align
}
"""
exit_code = 8

[[case]]
name = "align_of_all_types_8"
spec = ["4.13:22"]
source = """
struct Point { x: i32, y: i32 }
fn main() -> i32 {
    // All types currently have 8-byte alignment
    if @align_of(i8) != 8 { return 1; }
    if @align_of(i64) != 8 { return 2; }
    if @align_of(bool) != 8 { return 3; }
    if @align_of(Point) != 8 { return 4; }
    0
}
"""
exit_code = 0

# =============================================================================
# @intCast Intrinsic
# =============================================================================

[[case]]
name = "intcast_i32_to_u8"
spec = ["4.13:24", "4.13:25", "4.13:26"]
source = """
fn main() -> i32 {
    let x: i32 = 100;
    let y: u8 = @intCast(x);
    @intCast(y)
}
"""
exit_code = 100

[[case]]
name = "intcast_u8_to_i32"
spec = ["4.13:24", "4.13:25", "4.13:26"]
source = """
fn main() -> i32 {
    let x: u8 = 255;
    let y: i32 = @intCast(x);
    y
}
"""
exit_code = 255

[[case]]
name = "intcast_i64_to_i32"
spec = ["4.13:24", "4.13:25"]
source = """
fn main() -> i32 {
    let x: i64 = 42;
    let y: i32 = @intCast(x);
    y
}
"""
exit_code = 42

[[case]]
name = "intcast_inferred_from_function_param"
spec = ["4.13:26"]
source = """
fn takes_u8(x: u8) -> i32 {
    @intCast(x)
}
fn main() -> i32 {
    let x: i32 = 50;
    takes_u8(@intCast(x))
}
"""
exit_code = 50

[[case]]
name = "intcast_inferred_from_return"
spec = ["4.13:26"]
source = """
fn cast_to_u8(x: i32) -> u8 {
    @intCast(x)
}
fn main() -> i32 {
    let y: u8 = cast_to_u8(77);
    @intCast(y)
}
"""
exit_code = 77

[[case]]
name = "intcast_type_not_inferred"
spec = ["4.13:27"]
source = """
fn main() -> i32 {
    let x: i32 = 100;
    // No context to infer target type
    @intCast(x);
    0
}
"""
compile_fail = true
error_contains = "type annotation required"

[[case]]
name = "intcast_non_integer_argument"
