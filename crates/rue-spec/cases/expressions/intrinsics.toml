[section]
id = "expressions.intrinsics"
spec_chapter = "4.13"
name = "Intrinsic Expressions"
description = "Compiler-provided intrinsic operations."

# =============================================================================
# Basic Intrinsic Syntax
# =============================================================================

[[case]]
name = "intrinsic_syntax"
spec = ["4.13:1", "4.13:2", "4.13:3"]
source = """
fn main() -> i32 {
    @dbg(42);
    0
}
"""
exit_code = 0

[[case]]
name = "intrinsic_type_argument"
spec = ["4.13:2a"]
source = """
fn main() -> i32 {
    // Intrinsics can take type arguments
    @size_of(i32)
}
"""
exit_code = 8

[[case]]
name = "unknown_intrinsic"
spec = ["4.13:5"]
source = """
fn main() -> i32 {
    @unknown(42);
    0
}
"""
compile_fail = true
error_contains = "unknown intrinsic"

