# =============================================================================
# If/Else as Expression
# =============================================================================

[[case]]
name = "if_else_returns_value"
source = """
fn main() -> i32 {
    let x = if true { 42 } else { 0 };
    x
}
"""
exit_code = 42

[[case]]
name = "if_else_in_expression"
source = """
fn main() -> i32 {
    1 + if true { 10 } else { 20 }
}
"""
exit_code = 11

[[case]]
name = "if_else_complex_condition"
source = """
fn main() -> i32 {
    let x = 5;
    if x > 3 { 100 } else { 200 }
}
"""
exit_code = 100

# =============================================================================
# Nested If/Else
# =============================================================================

[[case]]
name = "nested_if_else_outer_true"
source = "fn main() -> i32 { if true { if false { 1 } else { 2 } } else { 3 } }"
exit_code = 2

[[case]]
name = "nested_if_else_outer_false"
source = "fn main() -> i32 { if false { if true { 1 } else { 2 } } else { 3 } }"
exit_code = 3

[[case]]
name = "nested_if_else_all_true"
source = "fn main() -> i32 { if true { if true { 1 } else { 2 } } else { 3 } }"
exit_code = 1

[[case]]
name = "chained_conditions"
source = """
fn main() -> i32 {
    let x = 5;
    if x < 3 { 1 }
    else { if x < 7 { 2 }
    else { 3 } }
}
"""
exit_code = 2

# =============================================================================
# Variables and If/Else
# =============================================================================

[[case]]
name = "if_uses_variable"
source = """
fn main() -> i32 {
    let flag = true;
    if flag { 42 } else { 0 }
}
"""
exit_code = 42

[[case]]
name = "if_with_mutable"
source = """
fn main() -> i32 {
    let mut x = 10;
    x = if true { 20 } else { 30 };
    x
}
"""
exit_code = 20

[[case]]
name = "complex_condition_with_vars"
source = """
fn main() -> i32 {
    let a = 10;
    let b = 20;
    if a < b { a + b } else { a - b }
}
"""
exit_code = 30

# =============================================================================
# Edge Cases
# =============================================================================

[[case]]
name = "compare_zero"
source = "fn main() -> i32 { if 0 == 0 { 1 } else { 0 } }"
exit_code = 1

[[case]]
name = "compare_max_i32"
source = "fn main() -> i32 { if 2147483647 == 2147483647 { 1 } else { 0 } }"
exit_code = 1

[[case]]
name = "compare_min_i32"
source = "fn main() -> i32 { if -2147483648 < 0 { 1 } else { 0 } }"
exit_code = 1

[[case]]
name = "blocks_in_branches"
source = """
fn main() -> i32 {
    if true {
        let x = 10;
        let y = 20;
        x + y
    } else {
        let z = 5;
        z
    }
}
"""
exit_code = 30

[[case]]
name = "if_else_with_statements"
source = """
fn main() -> i32 {
    if true {
        let a = 1;
        let b = 2;
        a + b
    } else {
        let c = 100;
        c
    }
}
"""
exit_code = 3
