[section]
id = "10.1"
name = "Conditionals"
description = "If/else expressions and comparison operators. If/else returns a value; comparisons return bool."

# =============================================================================
# Boolean Literals
# =============================================================================

[[case]]
name = "bool_true"
source = "fn main() -> i32 { if true { 1 } else { 0 } }"
exit_code = 1

[[case]]
name = "bool_false"
source = "fn main() -> i32 { if false { 1 } else { 0 } }"
exit_code = 0

# =============================================================================
# Comparison Operators - Equality
# =============================================================================

[[case]]
name = "eq_equal"
source = "fn main() -> i32 { if 1 == 1 { 10 } else { 20 } }"
exit_code = 10

[[case]]
name = "eq_not_equal"
source = "fn main() -> i32 { if 1 == 2 { 10 } else { 20 } }"
exit_code = 20

[[case]]
name = "ne_not_equal"
source = "fn main() -> i32 { if 1 != 2 { 10 } else { 20 } }"
exit_code = 10

[[case]]
name = "ne_equal"
source = "fn main() -> i32 { if 1 != 1 { 10 } else { 20 } }"
exit_code = 20

