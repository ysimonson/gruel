# =============================================================================

[[case]]
name = "break_outside_loop"
source = """
fn main() -> i32 {
    break;
    0
}
"""
compile_fail = true
error_contains = "outside of loop"

[[case]]
name = "continue_outside_loop"
source = """
fn main() -> i32 {
    continue;
    0
}
"""
compile_fail = true
error_contains = "outside of loop"

[[case]]
name = "break_in_if_outside_loop"
source = """
fn main() -> i32 {
    if true {
        break;
    }
    0
}
"""
compile_fail = true
error_contains = "outside of loop"

[[case]]
name = "continue_in_if_outside_loop"
source = """
fn main() -> i32 {
    if true {
        continue;
    }
    0
}
"""
compile_fail = true
error_contains = "outside of loop"

[[case]]
name = "break_in_nested_function"
source = """
fn helper() -> i32 {
    break;
    0
}

fn main() -> i32 {
