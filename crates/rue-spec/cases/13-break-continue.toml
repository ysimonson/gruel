[section]
id = "13.1"
name = "Break and Continue"
description = "Break exits a loop early, continue skips to the next iteration. Both can only be used inside loops. Break and continue are statements that produce unit type."

# =============================================================================
# Basic Break
# =============================================================================

[[case]]
name = "break_exits_loop"
source = """
fn main() -> i32 {
    let mut x = 0;
    while true {
        x = x + 1;
        if x == 5 {
            break;
        }
    }
    x
}
"""
exit_code = 5

[[case]]
name = "break_immediate"
source = """
fn main() -> i32 {
    let mut x = 0;
    while true {
        break;
        x = 100;
    }
    x
}
"""
exit_code = 0

[[case]]
name = "break_with_condition"
source = """
fn main() -> i32 {
    let mut sum = 0;
    let mut i = 1;
    while i <= 100 {
        sum = sum + i;
        if sum > 50 {
            break;
        }
        i = i + 1;
    }
    sum
}
"""
exit_code = 55

[[case]]
name = "break_in_nested_if"
source = """
fn main() -> i32 {
    let mut x = 0;
    while x < 100 {
        x = x + 1;
        if x > 5 {
            if x > 10 {
                break;
            }
        }
    }
    x
}
"""
exit_code = 11

# =============================================================================
# Basic Continue
# =============================================================================

[[case]]
name = "continue_skips_iteration"
source = """
fn main() -> i32 {
    let mut sum = 0;
    let mut i = 0;
    while i < 10 {
        i = i + 1;
        if i % 2 == 0 {
            continue;
        }
        sum = sum + i;
    }
    sum
}
"""
exit_code = 25

[[case]]
name = "continue_at_start"
source = """
fn main() -> i32 {
    let mut count = 0;
    let mut i = 0;
    while i < 5 {
        i = i + 1;
        continue;
        count = count + 100;
    }
    count
}
"""
exit_code = 0

[[case]]
name = "continue_with_condition"
source = """
fn main() -> i32 {
    let mut sum = 0;
    let mut i = 0;
    while i < 20 {
        i = i + 1;
        if i % 3 == 0 {
            continue;
        }
        if i % 5 == 0 {
            continue;
        }
        sum = sum + 1;
    }
    sum
}
"""
exit_code = 11

[[case]]
name = "continue_in_nested_if"
source = """
fn main() -> i32 {
    let mut sum = 0;
    let mut i = 0;
    while i < 10 {
        i = i + 1;
        if i > 3 {
            if i < 8 {
                continue;
            }
        }
        sum = sum + i;
    }
    sum
}
"""
exit_code = 33

# =============================================================================
# Break and Continue Together
# =============================================================================

[[case]]
name = "break_and_continue_combined"
source = """
fn main() -> i32 {
    let mut sum = 0;
    let mut i = 0;
    while true {
        i = i + 1;
        if i > 20 {
            break;
        }
        if i % 2 == 0 {
            continue;
        }
        sum = sum + i;
    }
    sum
}
"""
exit_code = 100

[[case]]
name = "multiple_continues_same_loop"
source = """
fn main() -> i32 {
    let mut sum = 0;
    let mut i = 0;
    while i < 15 {
        i = i + 1;
        if i % 2 == 0 {
            continue;
        }
        if i % 3 == 0 {
            continue;
        }
        sum = sum + i;
    }
    sum
}
"""
exit_code = 37

[[case]]
name = "multiple_breaks_different_paths"
source = """
fn main() -> i32 {
    let mut x = 0;
    let flag = true;
    while true {
        x = x + 1;
        if flag {
            if x == 5 {
                break;
            }
        } else {
            if x == 10 {
                break;
            }
        }
    }
    x
}
"""
exit_code = 5

# =============================================================================
# Nested Loops - Break Affects Innermost
# =============================================================================

[[case]]
name = "break_inner_loop_only"
source = """
fn main() -> i32 {
    let mut outer_count = 0;
    let mut total = 0;
    while outer_count < 3 {
        let mut inner = 0;
        while true {
            inner = inner + 1;
            total = total + 1;
            if inner == 2 {
                break;
            }
        }
        outer_count = outer_count + 1;
    }
    total
}
"""
exit_code = 6

[[case]]
name = "continue_inner_loop_only"
source = """
fn main() -> i32 {
    let mut outer = 0;
    let mut sum = 0;
    while outer < 3 {
        let mut inner = 0;
        while inner < 5 {
            inner = inner + 1;
            if inner % 2 == 0 {
                continue;
            }
            sum = sum + 1;
        }
        outer = outer + 1;
    }
    sum
}
"""
exit_code = 9

[[case]]
name = "break_deeply_nested"
source = """
fn main() -> i32 {
    let mut count = 0;
    let mut a = 0;
    while a < 10 {
        let mut b = 0;
        while b < 10 {
            let mut c = 0;
            while c < 10 {
                count = count + 1;
                if count == 50 {
                    break;
                }
                c = c + 1;
            }
            b = b + 1;
            if count == 50 {
                break;
            }
        }
        a = a + 1;
        if count == 50 {
            break;
        }
    }
    count
}
"""
exit_code = 50

[[case]]
name = "nested_with_both_break_continue"
source = """
fn main() -> i32 {
    let mut outer = 0;
    let mut result = 0;
    while outer < 5 {
        let mut inner = 0;
        while inner < 10 {
            inner = inner + 1;
            if inner % 2 == 0 {
                continue;
            }
            if inner > 5 {
                break;
            }
            result = result + 1;
        }
        outer = outer + 1;
    }
    result
}
"""
exit_code = 15

# =============================================================================
# Classic Algorithms with Break/Continue
# =============================================================================

[[case]]
name = "find_first_divisible"
source = """
fn main() -> i32 {
    let mut n = 100;
    while n < 200 {
        if n % 7 == 0 {
            break;
        }
        n = n + 1;
    }
    n
}
"""
exit_code = 105

[[case]]
name = "skip_multiples"
source = """
fn main() -> i32 {
    let mut sum = 0;
    let mut i = 1;
    while i <= 20 {
        if i % 4 == 0 {
            i = i + 1;
            continue;
        }
        sum = sum + i;
        i = i + 1;
    }
    sum
}
"""
exit_code = 150

[[case]]
name = "search_with_early_exit"
source = """
fn main() -> i32 {
    let target = 42;
    let mut found = 0;
    let mut i = 0;
    while i < 100 {
        i = i + 1;
        if i * i > 2000 {
            break;
        }
        if i == target {
            found = 1;
            break;
        }
    }
    found
}
"""
exit_code = 1

[[case]]
name = "count_with_filter"
source = """
fn main() -> i32 {
    let mut count = 0;
    let mut i = 0;
    while i < 50 {
        i = i + 1;
        if i % 2 == 0 {
            continue;
        }
        if i % 5 == 0 {
            continue;
        }
        count = count + 1;
    }
    count
}
"""
exit_code = 20

# =============================================================================
# Break/Continue with Function Calls
# =============================================================================

[[case]]
name = "break_with_function_condition"
source = """
fn should_stop(x: i32) -> bool {
    x > 10
}

fn main() -> i32 {
    let mut x = 0;
    while true {
        x = x + 1;
        if should_stop(x) {
            break;
        }
    }
    x
}
"""
exit_code = 11

[[case]]
name = "continue_with_function_condition"
source = """
fn is_even(x: i32) -> bool {
    x % 2 == 0
}

fn main() -> i32 {
    let mut sum = 0;
    let mut i = 0;
    while i < 10 {
        i = i + 1;
        if is_even(i) {
            continue;
        }
        sum = sum + i;
    }
    sum
}
"""
exit_code = 25

[[case]]
name = "break_in_helper_loop"
source = """
fn count_until(limit: i32) -> i32 {
    let mut i = 0;
    while true {
        i = i + 1;
        if i >= limit {
            break;
        }
    }
    i
}

fn main() -> i32 {
    count_until(7)
}
"""
exit_code = 7

