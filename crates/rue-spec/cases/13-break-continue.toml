# Edge Cases
# =============================================================================

[[case]]
name = "break_first_iteration"
source = """
fn main() -> i32 {
    let mut x = 0;
    while x < 100 {
        break;
        x = x + 1;
    }
    x
}
"""
exit_code = 0

[[case]]
name = "continue_does_not_skip_condition"
source = """
fn main() -> i32 {
    let mut i = 0;
    let mut iterations = 0;
    while i < 5 {
        i = i + 1;
        iterations = iterations + 1;
        continue;
    }
    iterations
}
"""
exit_code = 5

[[case]]
name = "break_after_side_effect"
source = """
fn main() -> i32 {
    let mut x = 0;
    while true {
        x = x + 10;
        break;
    }
    x
}
"""
exit_code = 10

[[case]]
name = "continue_preserves_mutation"
source = """
fn main() -> i32 {
    let mut x = 0;
    let mut i = 0;
    while i < 5 {
        i = i + 1;
        x = x + 1;
        continue;
    }
    x
}
"""
exit_code = 5

[[case]]
name = "break_from_while_false_never_reached"
source = """
fn main() -> i32 {
