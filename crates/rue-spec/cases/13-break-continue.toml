# =============================================================================
# Complex Control Flow
# =============================================================================

[[case]]
name = "break_continue_alternating"
source = """
fn main() -> i32 {
    let mut result = 0;
    let mut i = 0;
    while i < 100 {
        i = i + 1;
        if i % 3 == 0 {
            if i > 15 {
                break;
            }
            continue;
        }
        result = result + 1;
    }
    result
}
"""
exit_code = 12

[[case]]
name = "nested_breaks_pattern"
source = """
fn main() -> i32 {
    let mut total = 0;
    let mut outer = 0;
    while outer < 5 {
        outer = outer + 1;
        let mut inner = 0;
        while inner < 5 {
            inner = inner + 1;
            total = total + 1;
            if inner == outer {
                break;
            }
        }
    }
    total
}
"""
exit_code = 15

[[case]]
name = "continue_with_complex_condition"
source = """
fn main() -> i32 {
    let mut sum = 0;
    let mut i = 0;
    while i < 30 {
        i = i + 1;
        if (i % 2 == 0) && (i % 3 == 0) {
            continue;
        }
        if i > 20 {
            break;
        }
        sum = sum + 1;
    }
    sum
}
"""
exit_code = 17
