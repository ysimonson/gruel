[section]
id = "1.3"
name = "Whitespace"
description = "Whitespace (spaces, tabs, newlines) is ignored between tokens."

[[case]]
name = "minimal_whitespace"
source = "fn main()->i32{42}"
exit_code = 42

[[case]]
name = "extra_spaces"
source = "fn   main()   ->   i32   {   42   }"
exit_code = 42

[[case]]
name = "tabs"
source = "fn\tmain()\t->\ti32\t{\t42\t}"
exit_code = 42

[[case]]
name = "newlines"
source = """
fn
main
(
)
->
i32
{
42
}
"""
exit_code = 42

[[case]]
name = "mixed_whitespace"
source = """
fn 	main()
	-> i32 {
		42
	}
"""
exit_code = 42

[[case]]
name = "leading_whitespace"
source = """

   fn main() -> i32 { 42 }
"""
exit_code = 42

[[case]]
name = "trailing_whitespace"
source = """
fn main() -> i32 { 42 }

"""
exit_code = 42
