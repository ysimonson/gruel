[section]
id = "1.1"
name = "Integer Literals"
description = "Integer literals evaluate to themselves. When returned from main, the value is truncated to 8 bits for the exit code."

[[case]]
name = "zero"
source = "fn main() -> i32 { 0 }"
exit_code = 0

[[case]]
name = "positive_small"
source = "fn main() -> i32 { 42 }"
exit_code = 42

[[case]]
name = "one"
source = "fn main() -> i32 { 1 }"
exit_code = 1

[[case]]
name = "max_exit_code"
source = "fn main() -> i32 { 255 }"
exit_code = 255

[[case]]
name = "exit_code_wraps_256"
source = "fn main() -> i32 { 256 }"
exit_code = 0

[[case]]
name = "exit_code_wraps_257"
source = "fn main() -> i32 { 257 }"
exit_code = 1

[[case]]
name = "large_number"
source = "fn main() -> i32 { 1000 }"
exit_code = 232

[[case]]
name = "boundary_127"
source = "fn main() -> i32 { 127 }"
exit_code = 127

[[case]]
name = "boundary_128"
source = "fn main() -> i32 { 128 }"
exit_code = 128
