[section]
id = "14.1"
name = "Never Type"
description = "The never type (!) represents computations that never produce a value - they diverge. This includes infinite loops, break, continue, and (future) panic. The never type can coerce to any other type, enabling patterns like `if cond { break } else { 42 }` where one branch diverges."

# =============================================================================
# Break as Expression with Never Type
# =============================================================================

[[case]]
name = "break_in_if_else_then_branch"
description = "break in then branch coerces to else branch's type"
source = """
fn main() -> i32 {
    let mut x = 0;
    while x < 10 {
        x = x + 1;
        let y = if x == 5 { break } else { x };
        x = y;
    }
    x
}
"""
exit_code = 5

[[case]]
name = "break_in_if_else_else_branch"
description = "break in else branch coerces to then branch's type"
source = """
fn main() -> i32 {
    let mut x = 0;
    while x < 10 {
        x = x + 1;
        let y = if x != 5 { x } else { break };
        x = y;
    }
    x
}
"""
exit_code = 5

[[case]]
name = "continue_in_if_else_then_branch"
description = "continue in then branch coerces to else branch's type"
source = """
fn main() -> i32 {
    let mut sum = 0;
    let mut i = 0;
    while i < 10 {
        i = i + 1;
        let contribution = if i % 2 == 0 { continue } else { i };
        sum = sum + contribution;
    }
    sum
}
"""
exit_code = 25

[[case]]
name = "continue_in_if_else_else_branch"
description = "continue in else branch coerces to then branch's type"
source = """
fn main() -> i32 {
    let mut sum = 0;
    let mut i = 0;
    while i < 10 {
        i = i + 1;
        let contribution = if i % 2 != 0 { i } else { continue };
        sum = sum + contribution;
    }
    sum
}
"""
exit_code = 25

# =============================================================================
# Break/Continue in Nested If Expressions
# =============================================================================

[[case]]
name = "break_in_nested_if_then"
description = "break deeply nested in then path"
source = """
fn main() -> i32 {
    let mut x = 0;
    while x < 100 {
        x = x + 1;
        let val = if x > 5 {
            if x > 10 { break } else { x * 2 }
        } else {
            x
        };
        x = val;
    }
    x
}
"""
exit_code = 13

[[case]]
name = "continue_in_nested_if_else"
description = "continue deeply nested in else path"
source = """
fn main() -> i32 {
    let mut sum = 0;
    let mut i = 0;
    while i < 20 {
        i = i + 1;
        let add = if i <= 10 {
            if i % 2 == 0 { i } else { continue }
        } else {
            0
        };
        sum = sum + add;
    }
    sum
}
"""
exit_code = 30

# =============================================================================
# Both Branches Diverge
# =============================================================================

[[case]]
name = "both_branches_break"
description = "if/else where both branches break produces never type"
source = """
fn main() -> i32 {
    let mut x = 0;
    while true {
        x = x + 1;
        if x > 5 { break } else { break };
    }
    x
}
"""
exit_code = 1

[[case]]
name = "break_and_continue_branches"
description = "one branch breaks, other continues - both diverge"
source = """
fn main() -> i32 {
    let mut x = 0;
    let mut iterations = 0;
    while x < 100 {
        iterations = iterations + 1;
        x = x + 1;
        if x == 10 { break } else { continue };
    }
    iterations
}
"""
exit_code = 10

# =============================================================================
# Never Type in Arithmetic Expressions
# =============================================================================

[[case]]
name = "break_in_addition"
description = "break can appear in arithmetic expression context"
source = """
fn main() -> i32 {
    let mut x = 0;
    while x < 20 {
        x = x + 1;
        let result = 1 + if x == 5 { break } else { x };
        x = result;
    }
    x
}
"""
exit_code = 5

[[case]]
name = "continue_in_multiplication"
description = "continue can appear in multiplication context"
source = """
fn main() -> i32 {
    let mut product = 1;
    let mut i = 0;
    while i < 5 {
        i = i + 1;
        let factor = 2 * if i == 3 { continue } else { 1 };
        product = product * factor;
    }
    product
}
"""
exit_code = 16

# =============================================================================
# Never Type in Function Arguments
# =============================================================================

[[case]]
name = "break_in_function_arg"
description = "break in function argument position"
source = """
fn add(a: i32, b: i32) -> i32 {
    a + b
}

fn main() -> i32 {
    let mut sum = 0;
    let mut i = 0;
    while i < 10 {
        i = i + 1;
        sum = add(sum, if i > 5 { break } else { i });
    }
    sum
}
"""
exit_code = 15

[[case]]
name = "continue_in_function_arg"
description = "continue in function argument position"
source = """
fn double(x: i32) -> i32 {
    x * 2
}

fn main() -> i32 {
    let mut sum = 0;
    let mut i = 0;
    while i < 10 {
        i = i + 1;
        sum = sum + double(if i % 2 == 0 { continue } else { i });
    }
    sum
}
"""
exit_code = 50

# =============================================================================
# Never Type with Variables
# =============================================================================

[[case]]
name = "assign_break_to_variable"
description = "break can be assigned when in a value context"
source = """
fn main() -> i32 {
    let mut x = 0;
    while x < 10 {
        x = x + 1;
        let y: i32 = if x == 5 { break } else { x };
        x = y;
    }
    x
}
"""
exit_code = 5

[[case]]
name = "infer_type_from_non_diverging_branch"
description = "type inference uses the non-diverging branch"
source = """
fn main() -> i32 {
    let mut x = 0;
    while x < 10 {
        x = x + 1;
        let y = if x == 5 { break } else { x };
        x = y;
    }
    x
}
"""
exit_code = 5

# =============================================================================
# Chained If-Else with Mixed Divergence
# =============================================================================

[[case]]
name = "chained_if_else_first_diverges"
description = "chained if-else where first condition leads to break"
source = """
fn main() -> i32 {
    let mut x = 0;
    while x < 100 {
        x = x + 1;
        let val = if x > 10 { break }
                  else { if x > 5 { x * 2 } else { x } };
        x = val;
    }
    x
}
"""
exit_code = 13

[[case]]
name = "chained_if_else_middle_diverges"
description = "chained if-else where middle condition leads to continue"
source = """
fn main() -> i32 {
    let mut sum = 0;
    let mut i = 0;
    while i < 15 {
        i = i + 1;
        let val = if i < 5 { i }
                  else { if i < 10 { continue } else { i } };
        sum = sum + val;
    }
    sum
}
"""
exit_code = 85

[[case]]
name = "chained_if_else_last_diverges"
description = "chained if-else where final else leads to break"
source = """
fn main() -> i32 {
    let mut x = 0;
    while true {
        x = x + 1;
        let val = if x < 5 { x }
                  else { if x < 10 { x * 2 } else { break } };
        x = val;
    }
    x
}
"""
exit_code = 11

# =============================================================================
# Return Type Coercion
# =============================================================================

[[case]]
name = "break_as_function_return"
description = "break doesn't directly affect function return type"
source = """
fn main() -> i32 {
    let mut result = 0;
    while true {
        result = result + 1;
        if result > 5 {
            break;
        }
    }
    result
}
"""
exit_code = 6

# =============================================================================
# Complex Control Flow
# =============================================================================

[[case]]
name = "break_continue_in_same_expression"
description = "break and continue in different branches of same if"
source = """
fn main() -> i32 {
    let mut x = 0;
    let mut sum = 0;
    while x < 100 {
        x = x + 1;
        let contribution = if x > 10 {
            break
        } else {
            if x % 2 == 0 { continue } else { x }
        };
        sum = sum + contribution;
    }
    sum
}
"""
exit_code = 25

[[case]]
name = "nested_loops_break_in_expression"
description = "break as expression in nested loops"
source = """
fn main() -> i32 {
    let mut outer = 0;
    let mut total = 0;
    while outer < 3 {
        outer = outer + 1;
        let mut inner = 0;
        while inner < 10 {
            inner = inner + 1;
            let val = if inner > 5 { break } else { inner };
            total = total + val;
        }
    }
    total
}
"""
exit_code = 45

[[case]]
name = "continue_preserves_outer_value"
description = "continue in inner expression doesn't affect outer assignment"
source = """
fn main() -> i32 {
    let mut sum = 0;
    let mut i = 0;
    while i < 10 {
        i = i + 1;
        let x = if i % 3 == 0 { continue } else { i };
        let doubled = x * 2;
        sum = sum + doubled;
    }
    sum
}
"""
exit_code = 74

# =============================================================================
# While Loop with Never Type (Infinite Loop Detection - Future)
# =============================================================================
# Note: These test the semantics, not whether the compiler detects infinite loops.
# Infinite loop detection is a separate feature.

[[case]]
name = "while_true_with_break"
description = "while true loop that always breaks has deterministic exit"
source = """
fn main() -> i32 {
    let mut x = 0;
    while true {
        x = x + 1;
        if x == 10 {
            break;
        }
    }
    x
}
"""
exit_code = 10

# =============================================================================
# Error Cases - Type Mismatches Still Caught
# =============================================================================

[[case]]
name = "never_doesnt_unify_with_wrong_expected"
description = "break/continue can't make incompatible types match"
source = """
fn main() -> i32 {
    let mut x = 0;
    while x < 10 {
        x = x + 1;
        let y: bool = if x == 5 { break } else { x };
        x = 1;
    }
    x
}
"""
compile_fail = true
error_contains = "type mismatch"

[[case]]
name = "break_outside_loop_still_error"
description = "break outside loop is still an error even with never type"
source = """
fn main() -> i32 {
    let x = if true { break } else { 42 };
    x
}
"""
compile_fail = true
error_contains = "outside of loop"

[[case]]
name = "continue_outside_loop_still_error"
description = "continue outside loop is still an error even with never type"
source = """
fn main() -> i32 {
    let x = if true { continue } else { 42 };
    x
}
"""
compile_fail = true
error_contains = "outside of loop"

# =============================================================================
# Edge Cases
# =============================================================================

[[case]]
name = "deeply_nested_break_expression"
description = "break several levels deep in expressions"
source = """
fn main() -> i32 {
    let mut x = 0;
    while x < 100 {
        x = x + 1;
        let a = if x > 20 {
            break
        } else {
            if x > 10 {
                x * 3
            } else {
                x
            }
        };
        x = a;
    }
    x
}
"""
exit_code = 34

[[case]]
name = "break_with_zero_iterations"
description = "break in expression but condition never true"
source = """
fn main() -> i32 {
    let mut x = 0;
    while x < 5 {
        x = x + 1;
        let y = if false { break } else { x };
        x = y;
    }
    x
}
"""
exit_code = 5

[[case]]
name = "continue_with_zero_skips"
description = "continue in expression but condition never true"
source = """
fn main() -> i32 {
    let mut sum = 0;
    let mut i = 0;
    while i < 5 {
        i = i + 1;
        let contribution = if false { continue } else { i };
        sum = sum + contribution;
    }
    sum
}
"""
exit_code = 15

[[case]]
name = "multiple_breaks_same_if_chain"
description = "multiple breaks in different branches of if-else chain"
source = """
fn main() -> i32 {
    let mut x = 0;
    while true {
        x = x + 1;
        let y = if x > 10 { break }
                else { if x > 5 { break } else { x } };
        x = y;
    }
    x
}
"""
exit_code = 6

# =============================================================================
# Explicit Never Type in Function Return Position
# =============================================================================

[[case]]
name = "never_return_type_with_loop"
description = "function with explicit ! return type and loop {}"
source = """
fn diverge() -> ! {
    loop { }
}

fn main() -> i32 {
    0
}
"""
compile_only = true

[[case]]
name = "never_return_type_called"
description = "calling a function that returns ! - compile only since it would loop forever"
source = """
fn abort() -> ! {
    loop { }
}

fn main() -> i32 {
    let x = if false { abort() } else { 42 };
    x
}
"""
exit_code = 42

[[case]]
name = "never_return_type_in_if_branch"
description = "function returning ! can be used in if branch where other branch has value"
source = """
fn diverge() -> ! {
    loop { }
}

fn main() -> i32 {
    let x = if false { diverge() } else { 42 };
    x
}
"""
exit_code = 42

[[case]]
name = "never_return_type_coerces_to_any_type"
description = "never-returning function result coerces to any expected type"
source = """
fn diverge() -> ! {
    loop { }
}

fn takes_i32(x: i32) -> i32 {
    x
}

fn main() -> i32 {
    let result = if false {
        takes_i32(diverge())
    } else {
        42
    };
    result
}
"""
exit_code = 42

[[case]]
name = "never_return_type_error_non_diverging_body"
description = "error if function with ! return type has non-diverging body"
source = """
fn not_divergent() -> ! {
    42
}

fn main() -> i32 {
    0
}
"""
compile_fail = true
error_contains = "type mismatch"

[[case]]
name = "never_return_type_error_unit_body"
description = "error if function with ! return type has unit body"
source = """
fn not_divergent() -> ! {
}

fn main() -> i32 {
    0
}
"""
compile_fail = true
error_contains = "type mismatch"

[[case]]
name = "never_return_type_error_while_true_is_unit"
description = "while true {} produces () not !, matching Rust's semantics"
source = """
fn diverge() -> ! {
    while true { }
}

fn main() -> i32 {
    0
}
"""
compile_fail = true
error_contains = "type mismatch"

# =============================================================================
# Loop Expression
# =============================================================================

[[case]]
name = "loop_basic"
description = "basic loop with break"
source = """
fn main() -> i32 {
    let mut x = 0;
    loop {
        x = x + 1;
        if x == 10 {
            break;
        }
    }
    x
}
"""
exit_code = 10

[[case]]
name = "loop_with_continue"
description = "loop with continue skips to next iteration"
source = """
fn main() -> i32 {
    let mut x = 0;
    let mut sum = 0;
    loop {
        x = x + 1;
        if x > 10 {
            break;
        }
        if x % 2 == 0 {
            continue;
        }
        sum = sum + x;
    }
    sum
}
"""
exit_code = 25

[[case]]
name = "loop_nested"
description = "nested loops with break"
source = """
fn main() -> i32 {
    let mut total = 0;
    let mut outer = 0;
    loop {
        outer = outer + 1;
        if outer > 3 {
            break;
        }
        let mut inner = 0;
        loop {
            inner = inner + 1;
            if inner > 4 {
                break;
            }
            total = total + 1;
        }
    }
    total
}
"""
exit_code = 12

[[case]]
name = "loop_infinite_compile_only"
description = "infinite loop that never breaks - compile only test"
source = """
fn main() -> i32 {
    loop { }
}
"""
compile_only = true

[[case]]
name = "loop_produces_never_type"
description = "loop {} has never type, can be used where never is expected"
source = """
fn diverge() -> ! {
    loop { }
}

fn main() -> i32 {
    let x = if false { loop { } } else { 42 };
    x
}
"""
exit_code = 42

[[case]]
name = "loop_break_outside_error"
description = "break outside loop is an error"
source = """
fn main() -> i32 {
    break;
    0
}
"""
compile_fail = true
error_contains = "outside of loop"

[[case]]
name = "loop_continue_outside_error"
description = "continue outside loop is an error"
source = """
fn main() -> i32 {
    continue;
    0
}
"""
compile_fail = true
error_contains = "outside of loop"
