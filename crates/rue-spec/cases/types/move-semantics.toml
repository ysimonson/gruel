[[case]]
name = "linear_copy_reverse_order_error"
spec = ["3.8:37"]
description = "Linear and @copy in reverse order is also an error"
source = """
linear struct Invalid { value: i32 }

fn main() -> i32 { 0 }
"""
compile_fail = false
exit_code = 0

[[case]]
name = "linear_struct_chain_consumed"
spec = ["3.8:32", "3.8:33"]
description = "Linear value can be chained through functions"
source = """
linear struct MustUse { value: i32 }

fn transform(m: MustUse) -> MustUse {
    MustUse { value: m.value * 2 }
}
fn consume(m: MustUse) -> i32 { m.value }

fn main() -> i32 {
    let m = MustUse { value: 21 };
    let m2 = transform(m);
    consume(m2)
}
"""
exit_code = 42

[[case]]
name = "linear_in_branch_consumed"
spec = ["3.8:32"]
description = "Linear value must be consumed in all branches"
source = """
linear struct MustUse { value: i32 }

fn consume(m: MustUse) -> i32 { m.value }

fn main() -> i32 {
    let m = MustUse { value: 42 };
    let cond = true;
    if cond {
        consume(m)
    } else {
        consume(m)
    }
}
"""
exit_code = 42

[[case]]
name = "affine_in_branch_consumed"
spec = ["3.8:5", "3.8:7"]
description = "Affine value consumed in both branches is considered moved after"
source = """
struct Point { x: i32, y: i32 }

fn consume(p: Point) -> i32 { p.x }

fn main() -> i32 {
    let p = Point { x: 1, y: 2 };
    let cond = true;
    let result = if cond {
        consume(p)
    } else {
        consume(p)
    };
    result
}
"""
exit_code = 1

[[case]]
name = "affine_in_branch_use_after_both_moves"
spec = ["3.8:5", "3.8:7"]
description = "Using affine value after consuming in both branches is an error"
source = """
struct Point { x: i32, y: i32 }

fn consume(p: Point) -> i32 { p.x }

fn main() -> i32 {
    let p = Point { x: 1, y: 2 };
    let cond = true;
    if cond {
        consume(p);
    } else {
        consume(p);
    }
    p.x
}
"""
compile_fail = true
error_contains = "use of moved value"

[[case]]
name = "affine_in_one_branch_use_after"
spec = ["3.8:5", "3.8:7"]
description = "Using affine value after consuming in only one branch is an error"
source = """
struct Point { x: i32, y: i32 }

fn consume(p: Point) -> i32 { p.x }

fn main() -> i32 {
    let p = Point { x: 1, y: 2 };
    let cond = true;
    if cond {
        consume(p);
    }
    p.x
}
"""
compile_fail = true
error_contains = "use of moved value"

[[case]]
name = "linear_field_access"
spec = ["3.8:32", "3.8:33"]
description = "Field access on linear struct counts as move (consuming)"
source = """
linear struct MustUse { value: i32 }

fn main() -> i32 {
    let m = MustUse { value: 42 };
    m.value
}
"""
exit_code = 42

# =============================================================================
# @handle Directive
# =============================================================================

[[case]]
name = "handle_struct_basic"
spec = ["3.8:40", "3.8:42", "3.8:44", "3.8:45"]
description = "@handle struct with valid .handle() method"
source = """
@handle
struct Counter { count: i32 }

impl Counter {
    fn handle(self) -> Counter {
        Counter { count: self.count }
    }
}

fn main() -> i32 {
    let a = Counter { count: 42 };
    let b = a.handle();
    b.count
}
"""
exit_code = 42

[[case]]
name = "handle_struct_explicit_duplication"
spec = ["3.8:40", "3.8:45"]
description = "@handle struct can be explicitly duplicated via .handle()"
source = """
@handle
struct Value { n: i32 }

impl Value {
    fn handle(self) -> Value {
        Value { n: self.n }
    }
}

fn main() -> i32 {
    let a = Value { n: 10 };
    let b = a.handle();  // explicit duplication
    b.n
}
"""
exit_code = 10

