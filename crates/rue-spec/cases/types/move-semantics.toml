[[case]]
name = "field_access_after_move_error"
spec = ["3.8:5"]
source = """
struct Point { x: i32, y: i32 }
fn main() -> i32 {
    let p = Point { x: 1, y: 2 };
    let q = p;
    p.x
}
"""
