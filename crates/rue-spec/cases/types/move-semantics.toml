# =============================================================================
# Shadowing and Moves
# =============================================================================

[[case]]
name = "shadowing_creates_new_binding"
spec = ["3.8:12"]
description = "Shadowing creates a new binding, doesn't affect original move state"
source = """
struct Data { value: i32 }
fn main() -> i32 {
    let d = Data { value: 1 };
    let _x = d;  // d is moved
    let d = Data { value: 2 };  // New 'd' shadows the moved one
    d.value  // This is the new 'd', which is valid
}
"""
exit_code = 2

[[case]]
name = "shadowing_then_use_original_error"
spec = ["3.8:12"]
description = "After shadowing a moved variable, accessing original is still error"
source = """
struct Data { value: i32 }
fn main() -> i32 {
    let d = Data { value: 1 };
    let original = d;  // d is moved
    let d = Data { value: 2 };  // Shadows with new binding
    let _y = d;  // Use new d
    original.value  // The original value was moved into 'original'
}
"""
exit_code = 1

# =============================================================================
# Return Moves
# =============================================================================

[[case]]
name = "struct_returned_from_function"
spec = ["3.8:7"]
description = "Returning a struct from a function transfers ownership to the caller"
source = """
struct Point { x: i32, y: i32 }
fn make_point() -> Point { Point { x: 1, y: 2 } }
fn main() -> i32 {
    let p = make_point();
    p.x + p.y
}
"""
exit_code = 3

[[case]]
name = "struct_returned_then_moved"
spec = ["3.8:7"]
description = "Struct returned from function can be moved like any other owned value"
source = """
struct Data { value: i32 }
fn create() -> Data { Data { value: 42 } }
fn consume(d: Data) -> i32 { d.value }
fn main() -> i32 {
    let d = create();
    consume(d)
}
"""
exit_code = 42

[[case]]
name = "struct_returned_use_after_move_error"
spec = ["3.8:5", "3.8:7"]
description = "Struct returned from function follows normal move rules"
source = """
struct Data { value: i32 }
fn create() -> Data { Data { value: 42 } }
fn main() -> i32 {
    let d = create();
    let e = d;
    d.value
}
"""
compile_fail = true
error_contains = "use of moved value"

[[case]]
name = "return_moves_local_variable"
spec = ["3.8:7"]
description = "Returning a local variable moves it out of the function"
source = """
struct Point { x: i32, y: i32 }
fn make_point() -> Point {
    let p = Point { x: 10, y: 20 };
    p
}
fn main() -> i32 {
    let result = make_point();
    result.x + result.y
}
"""
exit_code = 30

[[case]]
name = "return_expression_creates_value"
spec = ["3.8:7"]
description = "Struct literal in return position transfers ownership directly"
source = """
struct Pair { a: i32, b: i32 }
fn make_pair(x: i32, y: i32) -> Pair {
    Pair { a: x, b: y }
}
fn main() -> i32 {
    let p = make_pair(3, 4);
    p.a * p.b
}
"""
exit_code = 12

[[case]]
name = "chained_returns"
spec = ["3.8:7"]
description = "Ownership can transfer through multiple function returns"
source = """
struct Value { n: i32 }
fn inner() -> Value { Value { n: 5 } }
fn outer() -> Value { inner() }
fn main() -> i32 {
    let v = outer();
    v.n
}
"""
exit_code = 5

[[case]]
name = "return_parameter"
spec = ["3.8:7", "3.8:11"]
description = "Function can return its parameter, transferring ownership back"
source = """
struct Data { value: i32 }
fn identity(d: Data) -> Data { d }
fn main() -> i32 {
    let d = Data { value: 100 };
    let e = identity(d);
    e.value
}
"""
exit_code = 100

[[case]]
name = "return_parameter_original_invalid"
spec = ["3.8:5", "3.8:7", "3.8:11"]
description = "After passing to function that returns it, original binding is still moved"
source = """
struct Data { value: i32 }
fn identity(d: Data) -> Data { d }
fn main() -> i32 {
    let d = Data { value: 100 };
    let _e = identity(d);
    d.value
}
"""
compile_fail = true
error_contains = "use of moved value"

# =============================================================================
# @copy Directive
# =============================================================================

[[case]]
name = "copy_struct_multiple_uses"
spec = ["3.8:14", "3.8:15", "3.8:16", "3.8:17"]
description = "@copy struct can be used multiple times without moving"
source = """
@copy
struct Point { x: i32, y: i32 }
fn main() -> i32 {
    let p = Point { x: 1, y: 2 };
    let q = p;
    let r = p;
    p.x + q.x + r.x
}
"""
exit_code = 3

[[case]]
name = "copy_struct_pass_to_function"
spec = ["3.8:16"]
description = "@copy struct can be passed to function and still used"
source = """
@copy
struct Point { x: i32, y: i32 }
fn sum(p: Point) -> i32 { p.x + p.y }
fn main() -> i32 {
    let p = Point { x: 10, y: 20 };
    let a = sum(p);
    let b = sum(p);
    a + b
}
"""
exit_code = 60

[[case]]
name = "copy_struct_all_primitive_fields"
spec = ["3.8:20"]
description = "@copy struct with all primitive Copy fields"
source = """
@copy
struct Data { a: i32, b: bool, c: i64 }
fn main() -> i32 {
    let d = Data { a: 42, b: true, c: 100 };
    let e = d;
    let f = d;
    d.a + if e.b { 1 } else { 0 }
}
"""
exit_code = 43

[[case]]
name = "copy_struct_nested_copy"
spec = ["3.8:20", "3.8:21"]
description = "@copy struct containing other @copy structs"
source = """
@copy
struct Point { x: i32, y: i32 }

@copy
struct Rect { top_left: Point, bottom_right: Point }

fn main() -> i32 {
    let r = Rect {
        top_left: Point { x: 0, y: 0 },
        bottom_right: Point { x: 10, y: 10 }
    };
    let r2 = r;
    r.top_left.x + r2.bottom_right.x
}
"""
exit_code = 10

[[case]]
name = "copy_struct_deeply_nested"
spec = ["3.8:20", "3.8:21"]
description = "@copy struct with 3+ levels of nesting"
source = """
@copy
struct Level0 { value: i32 }

@copy
struct Level1 { inner: Level0, x: i32 }

@copy
struct Level2 { inner: Level1, y: i32 }

fn main() -> i32 {
    let l = Level2 { inner: Level1 { inner: Level0 { value: 1 }, x: 2 }, y: 3 };
    let l2 = l;
    l.inner.inner.value + l2.inner.x + l.y
}
"""
exit_code = 6

[[case]]
name = "copy_struct_non_copy_field_error"
spec = ["3.8:18", "3.8:19"]
description = "@copy struct with non-Copy field is a compile error"
source = """
struct Inner { value: i32 }

@copy
struct Outer { inner: Inner }

fn main() -> i32 { 0 }
"""
compile_fail = true
error_contains = "non-Copy type"

[[case]]
name = "copy_struct_enum_field"
spec = ["3.8:20"]
description = "@copy struct with enum field (enums are Copy)"
source = """
enum Status { Active, Inactive }

@copy
struct Data { status: Status, value: i32 }

fn main() -> i32 {
    let d = Data { status: Status::Active, value: 10 };
    let e = d;
    match d.status {
        Status::Active => d.value + e.value,
        Status::Inactive => 0,
    }
}
"""
exit_code = 20

[[case]]
name = "non_copy_struct_still_moves"
spec = ["3.8:3"]
description = "Struct without @copy still has move semantics"
source = """
struct Point { x: i32, y: i32 }
fn main() -> i32 {
    let p = Point { x: 1, y: 2 };
    let q = p;
    let r = p;
    0
}
"""
compile_fail = true
error_contains = "use of moved value"

# =============================================================================
# Partial Moves (Field-Level Moves)
# =============================================================================

[[case]]
name = "partial_move_different_fields"
spec = ["3.8:22", "3.8:23"]
description = "Moving one field leaves other fields accessible"
source = """
struct Inner { x: i32 }
struct S { a: Inner, b: Inner }

fn main() -> i32 {
    let s = S { a: Inner { x: 1 }, b: Inner { x: 2 } };
    let x = s.a;   // Only s.a is moved
    let y = s.b;   // s.b is still valid
    x.x + y.x
}
"""
exit_code = 3

[[case]]
name = "partial_move_use_after_field_move"
spec = ["3.8:24", "3.8:25"]
description = "Accessing a field that has been moved is an error"
source = """
struct Inner { x: i32 }
struct S { a: Inner, b: Inner }

fn main() -> i32 {
    let s = S { a: Inner { x: 1 }, b: Inner { x: 2 } };
    let x = s.a;
    let z = s.a;
    0
}
"""
compile_fail = true
error_contains = "use of moved value"

[[case]]
name = "partial_move_use_whole_struct"
spec = ["3.8:26", "3.8:27"]
description = "Using whole struct after partial move is an error"
source = """
struct Inner { x: i32 }
struct S { a: Inner, b: Inner }

fn consume(s: S) -> i32 { s.a.x + s.b.x }

fn main() -> i32 {
    let s = S { a: Inner { x: 1 }, b: Inner { x: 2 } };
    let x = s.a;
    consume(s)
}
"""
compile_fail = true
error_contains = "use of moved value"

[[case]]
name = "copy_fields_no_partial_move"
spec = ["3.8:28", "3.8:29"]
description = "Copy-type fields can be accessed multiple times"
source = """
struct S { a: i32, b: i32 }

fn main() -> i32 {
    let s = S { a: 1, b: 2 };
    let x = s.a;
    let y = s.a;
    let z = s.b;
    x + y + z
}
"""
exit_code = 4

[[case]]
name = "nested_partial_move"
spec = ["3.8:22"]
description = "Partial moves work with nested structs"
source = """
struct Inner { x: i32 }
struct Middle { a: Inner, b: Inner }
struct Outer { m: Middle }

fn main() -> i32 {
    let o = Outer { m: Middle { a: Inner { x: 1 }, b: Inner { x: 2 } } };
    let x = o.m.a;   // Move o.m.a
    let y = o.m.b;   // o.m.b is still valid
    x.x + y.x
}
"""
exit_code = 3

[[case]]
name = "partial_move_assign_after"
spec = ["3.8:26"]
description = "Assigning to whole struct after partial move is an error"
source = """
struct Inner { x: i32 }
struct S { a: Inner, b: Inner }

fn main() -> i32 {
    let mut s = S { a: Inner { x: 1 }, b: Inner { x: 2 } };
    let x = s.a;
    let s2 = s;
    0
}
"""
compile_fail = true
error_contains = "use of moved value"

