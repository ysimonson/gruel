[[case]]
name = "field_access_no_move"
spec = ["3.8:3"]
source = """
struct Point { x: i32, y: i32 }
fn main() -> i32 {
    let p = Point { x: 10, y: 20 };
    p.x + p.y
}
"""
exit_code = 30

[[case]]
name = "field_access_then_move"
spec = ["3.8:3", "3.8:7"]
source = """
struct Point { x: i32, y: i32 }
fn main() -> i32 {
    let p = Point { x: 1, y: 2 };
    let x = p.x;
    let q = p;
    x + q.y
}
"""
