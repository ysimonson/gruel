[section]
id = "types.never"
spec_chapter = "3.4"
name = "Never Type"
description = "The never type ! is the type of expressions that never produce a value."

# =============================================================================
# Never Type Definition
# =============================================================================

[[case]]
name = "never_return_expression"
spec = ["3.4:1", "3.4:2"]
source = """
fn test(x: i32) -> i32 {
    if x > 0 { return 42 }
    0
}
fn main() -> i32 { test(1) }
"""
exit_code = 42

[[case]]
name = "never_break_expression"
spec = ["3.4:1", "3.4:2"]
source = """
fn main() -> i32 {
    let mut i = 0;
    while true {
        i = i + 1;
        if i == 5 { break }
    }
    i
}
"""
exit_code = 5

[[case]]
name = "never_continue_expression"
spec = ["3.4:1", "3.4:2"]
source = """
fn main() -> i32 {
    let mut sum = 0;
    let mut i = 0;
    while i < 5 {
        i = i + 1;
        if i == 3 { continue }
        sum = sum + i;
    }
    sum
}
"""
exit_code = 12

# =============================================================================
# Never Type Coercion
# =============================================================================

[[case]]
name = "never_coerces_to_i32"
spec = ["3.4:3"]
source = """
fn main() -> i32 {
    let x: i32 = if false { return 0 } else { 42 };
    x
}
"""
exit_code = 42

[[case]]
name = "never_coerces_in_match_arm"
spec = ["3.4:3"]
source = """
fn main() -> i32 {
    let x = 2;
    match x {
        1 => 10,
        2 => 20,
        _ => return 0,
    }
}
"""
exit_code = 20

[[case]]
name = "never_in_if_branch"
spec = ["3.4:3"]
source = """
fn test(x: i32) -> i32 {
    let y = if x > 5 { return 100 } else { x };
    y * 2
}
fn main() -> i32 { test(3) }
"""
exit_code = 6

# =============================================================================
# Never-Returning Function
# =============================================================================

[[case]]
name = "never_returning_function"
spec = ["3.4:5"]
source = """
fn diverge(x: i32) -> i32 {
    if x < 10 { return x }
    return 10
}
fn main() -> i32 { diverge(5) }
"""
exit_code = 5
