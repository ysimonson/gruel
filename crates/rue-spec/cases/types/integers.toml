# =============================================================================
# Bidirectional Type Inference for Literals (literal on left side)
# =============================================================================
# These tests verify that integer literals on the LEFT side of binary operators
# correctly infer their type from the RIGHT operand. This enables code like
# `100 == x` where x: i64 to work (literal adopts i64 type from x).

# --- Comparison operators with literal on left ---

[[case]]
name = "literal_left_comparison_i64_eq"
spec = ["3.1:15"]
source = """
fn main() -> i32 {
    let x: i64 = 100;
    if 100 == x { 1 } else { 0 }
}
"""
exit_code = 1

[[case]]
name = "literal_left_comparison_i64_ne"
spec = ["3.1:15"]
source = """
fn main() -> i32 {
    let x: i64 = 100;
    if 50 != x { 1 } else { 0 }
}
"""
exit_code = 1

[[case]]
name = "literal_left_comparison_i64_lt"
spec = ["3.1:15"]
source = """
fn main() -> i32 {
    let x: i64 = 100;
    if 50 < x { 1 } else { 0 }
}
"""
exit_code = 1

[[case]]
name = "literal_left_comparison_i64_gt"
spec = ["3.1:15"]
source = """
fn main() -> i32 {
    let x: i64 = 50;
    if 100 > x { 1 } else { 0 }
}
"""
exit_code = 1

[[case]]
name = "literal_left_comparison_i64_le"
spec = ["3.1:15"]
source = """
fn main() -> i32 {
    let x: i64 = 100;
    if 100 <= x { 1 } else { 0 }
}
"""
exit_code = 1

[[case]]
name = "literal_left_comparison_i64_ge"
spec = ["3.1:15"]
source = """
fn main() -> i32 {
    let x: i64 = 100;
    if 100 >= x { 1 } else { 0 }
}
"""
exit_code = 1

[[case]]
name = "literal_left_comparison_i8"
spec = ["3.1:15"]
source = """
fn main() -> i32 {
    let x: i8 = 42;
    if 42 == x { 1 } else { 0 }
}
"""
exit_code = 1

[[case]]
name = "literal_left_comparison_u64"
spec = ["3.1:15"]
source = """
fn main() -> i32 {
    let x: u64 = 1000;
    if 500 < x { 1 } else { 0 }
}
"""
exit_code = 1

[[case]]
name = "literal_left_comparison_u8"
spec = ["3.1:15"]
source = """
fn main() -> i32 {
    let x: u8 = 200;
    if 100 < x { 1 } else { 0 }
}
"""
exit_code = 1

