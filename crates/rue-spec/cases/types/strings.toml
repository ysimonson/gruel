[section]
id = "types.strings"
spec_chapter = "3.7"
name = "String Type"
description = "The String type represents immutable UTF-8 encoded string literals."

# =============================================================================
# String Type Definition
# =============================================================================

[[case]]
name = "string_literal_basic"
spec = ["3.7:1", "3.7:2", "3.7:3", "3.7:5", "4.1:10", "2.1:6"]
source = """
fn main() -> i32 {
    let s = "hello";
    0
}
"""
exit_code = 0

[[case]]
name = "string_literal_empty"
spec = ["3.7:1", "3.7:5", "4.1:10"]
source = """
fn main() -> i32 {
    let s = "";
    0
}
"""
exit_code = 0

[[case]]
name = "string_literal_spaces"
spec = ["3.7:1", "3.7:5", "4.1:10"]
source = """
fn main() -> i32 {
    let s = "hello world";
    0
}
"""
exit_code = 0

