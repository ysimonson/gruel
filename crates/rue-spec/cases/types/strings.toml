# =============================================================================
# String Debugging with @dbg
# =============================================================================

[[case]]
name = "string_dbg_literal"
spec = ["3.7:12"]
source = """
fn main() -> i32 {
    @dbg("hello");
    0
}
"""
exit_code = 0
stdout = "hello\n"

[[case]]
name = "string_dbg_variable"
spec = ["3.7:12"]
source = """
fn main() -> i32 {
    let msg = "world";
    @dbg(msg);
    0
}
"""
exit_code = 0
stdout = "world\n"

[[case]]
name = "string_dbg_empty"
spec = ["3.7:12"]
source = """
fn main() -> i32 {
    @dbg("");
    0
}
"""
exit_code = 0
stdout = "\n"

[[case]]
name = "string_dbg_with_spaces"
spec = ["3.7:12"]
source = """
fn main() -> i32 {
    let msg = "Hello, world!";
    @dbg(msg);
    0
}
"""
exit_code = 0
stdout = "Hello, world!\n"

# =============================================================================
# String in Complex Expressions
# =============================================================================

[[case]]
name = "string_multiple_comparisons"
spec = ["3.7:9", "3.7:10"]
source = """
fn main() -> i32 {
    let a = "hello";
    let b = "hello";
    let c = "world";
    if a == b && a != c {
        1
    } else {
        0
    }
}
"""
exit_code = 1

