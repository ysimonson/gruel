preview = "mutable_strings"
source = """
fn main() -> i32 {
    let mut s = String::new();
    s.push_str("hi");
    s.reserve(100);
    if s.capacity() >= 102 { 0 } else { 1 }
}
"""
exit_code = 0

[[case]]
name = "string_mutation_requires_let mut"
spec = ["3.10:19"]
description = "Mutation methods require let mut binding"
preview = "mutable_strings"
source = """
fn main() -> i32 {
    let s = String::new();
    s.push_str("hello");
    0
}
"""
compile_fail = true
