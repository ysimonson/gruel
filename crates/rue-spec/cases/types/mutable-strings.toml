    if s.len() == 5 { 0 } else { 1 }
}
"""
exit_code = 0

[[case]]
name = "string_push_str_multiple"
spec = ["3.10:15", "3.10:20"]
description = "Multiple push_str() calls accumulate"
preview = "mutable_strings"
source = """
fn main() -> i32 {
    let mut s = String::new();
    s.push_str("hello");
    s.push_str(" world");
    if s.len() == 11 { 0 } else { 1 }
