[[case]]
name = "string_push_byte"
spec = ["3.10:16", "3.10:19"]
description = "push() appends a single byte"
preview = "mutable_strings"
source = """
fn main() -> i32 {
    let mut s = String::new();
    s.push_str("hello");
    s.push(33);  // '!'
