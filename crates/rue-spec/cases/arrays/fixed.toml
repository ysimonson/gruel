[[case]]
name = "array_nested_copy_element_read"
spec = ["7.1:26"]
description = "Nested array with Copy elements allows multiple reads"
source = """
fn main() -> i32 {
    let matrix: [[i32; 2]; 2] = [[10, 20], [12, 0]];
    let a = matrix[0][0];
    let b = matrix[0][0];
    a + b + matrix[1][0]
}
"""
exit_code = 32

