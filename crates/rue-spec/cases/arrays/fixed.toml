# Arrays in structs

[[case]]
name = "struct_array_field_basic"
spec = ["7.1:19", "7.1:20"]
source = """
struct Container { values: [i32; 3] }

fn main() -> i32 {
    let c = Container { values: [10, 20, 30] };
    c.values[1]
}
"""
exit_code = 20

[[case]]
name = "struct_array_field_sum"
spec = ["7.1:19", "7.1:20"]
source = """
struct Container { values: [i32; 3] }

fn main() -> i32 {
    let c = Container { values: [10, 20, 30] };
    c.values[0] + c.values[1] + c.values[2]
}
"""
exit_code = 60

[[case]]
name = "struct_with_scalar_and_array"
spec = ["7.1:19", "7.1:20"]
source = """
struct Data { x: i32, arr: [i32; 2] }

fn main() -> i32 {
    let d = Data { x: 5, arr: [10, 20] };
    d.x + d.arr[0] + d.arr[1]
}
"""
exit_code = 35

[[case]]
name = "struct_multiple_array_fields"
spec = ["7.1:19", "7.1:20"]
source = """
struct Multi { a: [i32; 2], b: [i32; 2] }

fn main() -> i32 {
    let m = Multi { a: [1, 2], b: [10, 20] };
    m.a[0] + m.a[1] + m.b[0] + m.b[1]
}
"""
exit_code = 33

[[case]]
name = "struct_array_all_indices"
spec = ["7.1:19", "7.1:20"]
source = """
struct Holder { data: [i32; 5] }

fn main() -> i32 {
    let h = Holder { data: [1, 2, 3, 4, 5] };
    h.data[0] + h.data[1] + h.data[2] + h.data[3] + h.data[4]
}
"""
exit_code = 15

# =============================================================================
# Array Projection Semantics
# =============================================================================

[[case]]
name = "array_index_projection_basic"
spec = ["7.1:25"]
description = "Array indexing is a projection - reading does not move the array"
source = """
fn main() -> i32 {
    let arr: [i32; 3] = [10, 20, 30];
    let x = arr[0];
    let y = arr[1];
    let z = arr[2];
    x + y + z
}
"""
exit_code = 60

[[case]]
name = "array_copy_element_read_multiple"
spec = ["7.1:25", "7.1:26"]
description = "Copy elements can be read multiple times from same index"
source = """
fn main() -> i32 {
    let arr: [i32; 2] = [21, 10];
    let x = arr[0];
    let y = arr[0];
    x + y
}
"""
exit_code = 42

[[case]]
name = "array_projection_after_read"
spec = ["7.1:25", "7.1:26"]
description = "Array can still be used after reading elements"
source = """
fn sum(arr: [i32; 3]) -> i32 { arr[0] + arr[1] + arr[2] }

fn main() -> i32 {
    let arr: [i32; 3] = [10, 20, 12];
    let first = arr[0];
    sum(arr)
}
"""
exit_code = 42

[[case]]
name = "array_non_copy_element_move_error"
spec = ["7.1:28"]
description = "Cannot move non-Copy element out of array index"
preview = "affine_mvs"
source = """
struct BigThing { value: i32 }

fn main() -> i32 {
    let arr: [BigThing; 2] = [BigThing { value: 1 }, BigThing { value: 2 }];
    let x = arr[0];
    x.value
}
"""
compile_fail = true
error_contains = "cannot move out of"

[[case]]
name = "array_non_copy_field_access_ok"
spec = ["7.1:25", "7.1:28"]
description = "Accessing Copy field of non-Copy element is OK (projection chain)"
preview = "affine_mvs"
source = """
struct BigThing { value: i32 }

fn main() -> i32 {
    let arr: [BigThing; 2] = [BigThing { value: 10 }, BigThing { value: 32 }];
    arr[0].value + arr[1].value
}
"""
exit_code = 42

[[case]]
name = "array_mutable_element_assign"
spec = ["7.1:30"]
description = "Mutable array element assignment is in-place mutation"
source = """
fn main() -> i32 {
    let mut arr: [i32; 3] = [0, 0, 0];
    arr[0] = 10;
    arr[1] = 20;
    arr[2] = 12;
    arr[0] + arr[1] + arr[2]
}
"""
exit_code = 42

