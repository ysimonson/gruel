[section]
id = "arrays.fixed"
spec_chapter = "7.1"
name = "Fixed-Size Arrays"
description = "Fixed-size arrays with bracket syntax for literals and indexing."

# =============================================================================
# Array Literal
# =============================================================================

[[case]]
name = "array_literal_simple"
spec = ["7.1:1", "7.1:2"]
source = """
fn main() -> i32 {
    let arr: [i32; 3] = [10, 20, 30];
    arr[0]
}
"""
exit_code = 10

[[case]]
name = "array_literal_single"
spec = ["7.1:2"]
source = """
fn main() -> i32 {
    let arr: [i32; 1] = [42];
    arr[0]
}
"""
exit_code = 42

# =============================================================================
# All Elements Same Type
# =============================================================================

[[case]]
name = "array_elements_same_type"
spec = ["7.1:3"]
source = """
fn main() -> i32 {
    let arr: [i32; 3] = [1, 2, 3];
    arr[0] + arr[1] + arr[2]
}
"""
exit_code = 6

[[case]]
name = "array_elements_type_mismatch"
spec = ["7.1:3"]
source = """
fn main() -> i32 {
    let arr: [i32; 3] = [1, true, 3];
    arr[0]
}
"""
compile_fail = true

# =============================================================================
# Element Count Must Match Size
# =============================================================================

[[case]]
name = "array_size_matches"
spec = ["7.1:4"]
source = """
fn main() -> i32 {
    let arr: [i32; 3] = [10, 20, 30];
    arr[2]
}
"""
exit_code = 30

[[case]]
name = "array_too_few_elements"
spec = ["7.1:4"]
source = """
fn main() -> i32 {
    let arr: [i32; 3] = [10, 20];
    arr[0]
}
"""
compile_fail = true

[[case]]
name = "array_too_many_elements"
spec = ["7.1:4"]
source = """
fn main() -> i32 {
    let arr: [i32; 2] = [10, 20, 30];
    arr[0]
}
"""
compile_fail = true

