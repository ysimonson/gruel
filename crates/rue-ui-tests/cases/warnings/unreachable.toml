[section]
id = "warnings.unreachable"
name = "Unreachable Code Warnings"
description = "Tests for unreachable code detection and warnings."

# =============================================================================
# Unreachable after return
# =============================================================================

[[case]]
name = "unreachable_after_return"
source = """
fn main() -> i32 {
    return 42;
    0
}
"""
exit_code = 42
warning_contains = ["unreachable"]
expected_warning_count = 1

[[case]]
name = "unreachable_statement_after_return"
source = """
fn main() -> i32 {
    return 42;
    let x = 10;
    x
}
"""
exit_code = 42
warning_contains = ["unreachable"]
expected_warning_count = 1

[[case]]
name = "no_warning_without_unreachable_code"
source = """
fn main() -> i32 {
    let x = 42;
    x
}
"""
exit_code = 42
no_warnings = true

# =============================================================================
# Unreachable in control flow
# =============================================================================

[[case]]
name = "unreachable_after_return_in_if"
source = """
fn test() -> i32 {
    if true {
        return 1;
        42
    } else {
        2
    }
}
fn main() -> i32 { test() }
"""
exit_code = 1
warning_contains = ["unreachable"]
expected_warning_count = 1

[[case]]
name = "no_warning_when_both_branches_return"
source = """
fn test(x: bool) -> i32 {
    if x {
        return 1;
    } else {
        return 2;
    }
}
fn main() -> i32 { test(true) }
"""
exit_code = 1
no_warnings = true

# =============================================================================
# Unreachable in loops
# =============================================================================

[[case]]
name = "unreachable_after_return_in_loop"
source = """
fn main() -> i32 {
    while true {
        return 42;
        0
    }
    0
}
"""
exit_code = 42
warning_contains = ["unreachable"]

# =============================================================================
# Match with unreachable
# =============================================================================

[[case]]
name = "unreachable_after_return_in_match_arm"
source = """
fn test(x: i32) -> i32 {
    match x {
        1 => {
            return 10;
            20
        },
        _ => 0,
    }
}
fn main() -> i32 { test(1) }
"""
exit_code = 10
warning_contains = ["unreachable"]
expected_warning_count = 1

# =============================================================================
# Unreachable patterns in match expressions
# =============================================================================

[[case]]
name = "duplicate_integer_pattern"
source = """
fn main() -> i32 {
    match 1 {
        1 => 10,
        1 => 20,
        _ => 0,
    }
}
"""
exit_code = 10
warning_contains = ["unreachable pattern", "'1'"]
expected_warning_count = 1

[[case]]
name = "duplicate_boolean_pattern_true"
source = """
fn main() -> i32 {
    match true {
        true => 10,
        true => 20,
        false => 0,
    }
}
"""
exit_code = 10
warning_contains = ["unreachable pattern", "'true'"]
expected_warning_count = 1

[[case]]
name = "duplicate_boolean_pattern_false"
source = """
fn main() -> i32 {
    match false {
        true => 10,
        false => 20,
        false => 30,
    }
}
"""
exit_code = 20
warning_contains = ["unreachable pattern", "'false'"]
expected_warning_count = 1

[[case]]
name = "pattern_after_wildcard"
source = """
fn main() -> i32 {
    match 5 {
        _ => 10,
        1 => 20,
    }
}
"""
exit_code = 10
warning_contains = ["unreachable pattern", "'1'"]
expected_warning_count = 1

[[case]]
name = "multiple_patterns_after_wildcard"
source = """
fn main() -> i32 {
    match 5 {
        _ => 10,
        1 => 20,
        2 => 30,
    }
}
"""
exit_code = 10
warning_contains = ["unreachable pattern"]
expected_warning_count = 2

[[case]]
name = "duplicate_wildcard"
source = """
fn main() -> i32 {
    match 5 {
        _ => 10,
        _ => 20,
    }
}
"""
exit_code = 10
warning_contains = ["unreachable pattern", "'_'"]
expected_warning_count = 1

[[case]]
name = "multiple_duplicate_integers"
source = """
fn main() -> i32 {
    match 1 {
        1 => 10,
        2 => 20,
        1 => 30,
        2 => 40,
        _ => 0,
    }
}
"""
exit_code = 10
warning_contains = ["unreachable pattern"]
expected_warning_count = 2

[[case]]
name = "no_warning_distinct_patterns"
source = """
fn main() -> i32 {
    match 2 {
        1 => 10,
        2 => 20,
        3 => 30,
        _ => 0,
    }
}
"""
exit_code = 20
no_warnings = true

[[case]]
name = "no_warning_bool_exhaustive"
source = """
fn main() -> i32 {
    match true {
        true => 10,
        false => 20,
    }
}
"""
exit_code = 10
no_warnings = true
