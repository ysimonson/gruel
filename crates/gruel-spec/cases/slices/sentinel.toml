# Sentinel-checked slice subscripts (ADR-0064 phase 7)

[section]
id = "slices.sentinel"
spec_chapter = "7.2"
name = "Sentinel Subscripts"

[[case]]
name = "sentinel_basic"
spec = ["7.2:16", "7.2:17"]
source = """
fn main() -> i32 {
    let bytes: [u8; 6] = [104, 105, 0, 0, 0, 0];
    let s: Slice(u8) = &bytes[..2 :0];
    @cast(s.len(), i32)
}
"""
exit_code = 2

[[case]]
name = "sentinel_runtime_mismatch_panics"
spec = ["7.2:18"]
source = """
fn main() -> i32 {
    let bytes: [u8; 6] = [104, 105, 99, 0, 0, 0];
    let s: Slice(u8) = &bytes[..2 :0];
    @cast(s.len(), i32)
}
"""
exit_code = 101

[[case]]
name = "sentinel_compile_time_empty_rejected"
spec = ["7.2:17"]
source = """
fn main() -> i32 {
    let bytes: [u8; 6] = [0, 0, 0, 0, 0, 0];
    let s: Slice(u8) = &bytes[1..1 :0];
    0
}
"""
compile_fail = true
error_contains = "index out of bounds"

[[case]]
name = "sentinel_compile_time_oob_rejected"
spec = ["7.2:17"]
source = """
fn main() -> i32 {
    let bytes: [u8; 3] = [104, 105, 0];
    let s: Slice(u8) = &bytes[..3 :0];
    0
}
"""
compile_fail = true
error_contains = "index out of bounds"

[[case]]
name = "terminated_ptr_in_checked"
spec = ["7.2:20"]
source = """
fn main() -> i32 {
    let bytes: [u8; 6] = [104, 105, 0, 0, 0, 0];
    let s: Slice(u8) = &bytes[..2 :0];
    checked {
        let p: Ptr(u8) = s.terminated_ptr();
        @cast(p.read(), i32)
    }
}
"""
exit_code = 104
