[[case]]
name = "bare_range_rejected"
spec = ["7.2:9"]
preview = "slices"
preview_should_pass = true
source = """
fn main() -> i32 {
    let arr: [i32; 5] = [1, 2, 3, 4, 5];
    let s = arr[1..3];
    0
}
"""
compile_fail = true
error_contains = "must be borrowed"

[[case]]
name = "runtime_oob_panics"
spec = ["7.2:7"]
preview = "slices"
preview_should_pass = true
source = """
fn pick_hi() -> usize {
    10
}

fn main() -> i32 {
    let arr: [i32; 5] = [1, 2, 3, 4, 5];
    let hi: usize = pick_hi();
    let s: Slice(i32) = &arr[0..hi];
    @cast(s.len(), i32)
}
"""
exit_code = 101

[[case]]
name = "mut_slice_immut_array_rejected"
