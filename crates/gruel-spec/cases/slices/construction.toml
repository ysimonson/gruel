# Slice Construction (ADR-0064 phase 4)
#
# Tests for `&arr[range]` and `&mut arr[range]` borrow forms.

[section]
id = "slices.construction"
spec_chapter = "7.2"
name = "Slice Construction via Range Subscripts"

[[case]]
name = "whole_slice_immut"
spec = ["7.2:5", "7.2:8"]
preview = "slices"
preview_should_pass = true
source = """
fn main() -> i32 {
    let arr: [i32; 5] = [10, 20, 30, 40, 50];
    let s: Slice(i32) = &arr[..];
    @cast(s.len(), i32)
}
"""
exit_code = 5

[[case]]
name = "whole_slice_mut"
spec = ["7.2:5", "7.2:8"]
preview = "slices"
preview_should_pass = true
source = """
fn main() -> i32 {
    let mut arr: [i32; 5] = [1, 2, 3, 4, 5];
    let m: MutSlice(i32) = &mut arr[..];
    @cast(m.len(), i32)
}
"""
exit_code = 5

[[case]]
name = "subrange_immut"
spec = ["7.2:5", "7.2:8"]
preview = "slices"
preview_should_pass = true
source = """
fn main() -> i32 {
    let arr: [i32; 5] = [10, 20, 30, 40, 50];
    let mid: Slice(i32) = &arr[1..4];
    @cast(mid.len(), i32)
}
"""
exit_code = 3

