[[case]]
name = "compile_time_oob_high"
spec = ["7.2:6"]
preview = "slices"
preview_should_pass = true
source = """
fn main() -> i32 {
    let arr: [i32; 5] = [1, 2, 3, 4, 5];
    let s: Slice(i32) = &arr[0..10];
    @cast(s.len(), i32)
}
"""
compile_fail = true
error_contains = "index out of bounds"

[[case]]
name = "compile_time_oob_inverted"
spec = ["7.2:6"]
preview = "slices"
preview_should_pass = true
source = """
fn main() -> i32 {
    let arr: [i32; 5] = [1, 2, 3, 4, 5];
