# Slice Indexing (ADR-0064 phase 5)
#
# Tests for `s[i]` read on Slice / MutSlice and `m[i] = v` write on
# MutSlice.

[section]
id = "slices.indexing"
spec_chapter = "7.2"
name = "Slice Indexing"

[[case]]
name = "slice_read_subrange"
spec = ["7.2:10"]
source = """
fn main() -> i32 {
    let arr: [i32; 5] = [10, 20, 30, 40, 50];
    let s: Slice(i32) = &arr[1..4];
    s[1]
}
"""
exit_code = 30

[[case]]
name = "mut_slice_write"
spec = ["7.2:13"]
source = """
fn main() -> i32 {
    let mut arr: [i32; 5] = [1, 2, 3, 4, 5];
    let m: MutSlice(i32) = &mut arr[..];
    m[2] = 42;
    arr[2]
}
"""
exit_code = 42

[[case]]
name = "slice_oob_panics"
spec = ["7.2:11"]
source = """
fn pick_idx() -> usize {
    7
}

fn main() -> i32 {
    let arr: [i32; 5] = [1, 2, 3, 4, 5];
    let s: Slice(i32) = &arr[..];
    let i: usize = pick_idx();
    s[i]
}
"""
exit_code = 101

[[case]]
name = "non_copy_element_move_rejected"
spec = ["7.2:12"]
source = """
struct Heavy {
    value: i32,

    fn drop(self) {}
}

fn main() -> i32 {
    let arr: [Heavy; 2] = [Heavy { value: 1 }, Heavy { value: 2 }];
    let s: Slice(Heavy) = &arr[..];
    let h: Heavy = s[0];
    h.value
}
"""
compile_fail = true
error_contains = "move out of"

[[case]]
name = "immut_slice_write_rejected"
spec = ["7.2:13"]
source = """
fn main() -> i32 {
    let arr: [i32; 5] = [1, 2, 3, 4, 5];
    let s: Slice(i32) = &arr[..];
    s[1] = 99;
    0
}
"""
compile_fail = true
error_contains = "immutable"
