# Slice Types (ADR-0064)
#
# Tests for the `Slice(T)` and `MutSlice(T)` type-position forms.

[section]
id = "slices.types"
spec_chapter = "7.2"
name = "Slice Types"
description = "Tests for ADR-0064 Slice(T) / MutSlice(T) names in type position."

[[case]]
name = "slice_type_in_param"
spec = ["7.2:1", "7.2:2"]
source = """
fn take(s: Slice(i32)) -> i32 {
    7
}

fn main() -> i32 {
    7
}
"""
exit_code = 7

[[case]]
name = "mut_slice_type_in_param"
spec = ["7.2:1", "7.2:2"]
source = """
fn take(s: MutSlice(i32)) -> i32 {
    7
}

fn main() -> i32 {
    7
}
"""
exit_code = 7
