# Slice iteration (ADR-0064 phase 8)

[section]
id = "slices.iteration"
spec_chapter = "7.2"
name = "Slice Iteration"

[[case]]
name = "for_each_immut_slice"
spec = ["7.2:16"]
source = """
fn main() -> i32 {
    let arr: [i32; 4] = [1, 2, 3, 4];
    let s: Slice(i32) = &arr[..];
    let mut total: i32 = 0;
    for x in s {
        total = total + x;
    }
    total
}
"""
exit_code = 10

[[case]]
name = "for_each_subrange_slice"
spec = ["7.2:16"]
source = """
fn main() -> i32 {
    let arr: [i32; 5] = [10, 20, 30, 40, 50];
    let s: Slice(i32) = &arr[1..4];
    let mut total: i32 = 0;
    for x in s {
        total = total + x;
    }
    total
}
"""
exit_code = 90
