[section]
id = "lexical.builtins"
spec_chapter = "2.5"
name = "Builtins"
description = "Builtins are compiler-provided constructs prefixed with @."

# =============================================================================
# Builtin Syntax
# =============================================================================

[[case]]
name = "builtin_at_prefix"
spec = ["2.5:1", "2.5:3"]
source = """
fn main() -> i32 {
    @dbg(42);
    0
}
"""
exit_code = 0

[[case]]
name = "builtin_kinds_intrinsic"
spec = ["2.5:5", "2.5:6"]
source = """
fn main() -> i32 {
    let n: usize = @size_of(i32);
    @cast(n)
}
"""
exit_code = 8

[[case]]
name = "builtin_kinds_directive"
spec = ["2.5:5", "2.5:7", "2.5:8"]
source = """
fn main() -> i32 {
    @allow(unused_variable)
    let x = 42;
    0
}
"""
exit_code = 0
no_warnings = true

[[case]]
name = "unknown_builtin_error"
spec = ["2.5:4"]
source = """
fn main() -> i32 {
    @unknown_builtin(42);
    0
}
"""
compile_fail = true
error_contains = "unknown intrinsic"

# =============================================================================
# Directive Syntax
# =============================================================================

[[case]]
name = "directive_grammar"
spec = ["2.5:2", "2.5:9"]
source = """
fn main() -> i32 {
    @allow(unused_variable)
    let x = 42;
    0
}
"""
exit_code = 0
no_warnings = true

[[case]]
name = "directive_must_precede_item"
spec = ["2.5:10"]
skip = true  # TODO: This error isn't implemented yet
source = """
fn main() -> i32 {
    @allow(unused_variable)
}
"""
compile_fail = true
error_contains = "directive must precede"

# =============================================================================
# @allow Directive
# =============================================================================

[[case]]
name = "allow_suppresses_warnings"
spec = ["2.5:11"]
source = """
fn main() -> i32 {
    @allow(unused_variable)
    let x = 42;
    0
}
"""
exit_code = 0
no_warnings = true

[[case]]
name = "allow_accepts_warning_names"
spec = ["2.5:12", "2.5:13"]
source = """
fn main() -> i32 {
    @allow(unused_variable)
    let x = 42;
    0
}
"""
exit_code = 0
no_warnings = true

[[case]]
name = "allow_unknown_warning_error"
spec = ["2.5:14"]
skip = true  # TODO: This error isn't implemented yet
source = """
fn main() -> i32 {
    @allow(nonexistent_warning)
    let x = 42;
    0
}
"""
compile_fail = true
error_contains = "unrecognized warning"

[[case]]
name = "allow_unused_variable_on_let"
spec = ["2.5:15"]
source = """
fn main() -> i32 {
    @allow(unused_variable)
    let x = 42;
    0
}
"""
exit_code = 0
no_warnings = true

[[case]]
name = "allow_unused_variable_on_function"
spec = ["2.5:17"]
skip = true  # TODO: Function-level @allow not yet implemented
source = """
@allow(unused_variable)
fn example() -> i32 {
    let a = 1;
    let b = 2;
    0
}

fn main() -> i32 {
    example()
}
"""
exit_code = 0
no_warnings = true

[[case]]
name = "allow_unused_function"
spec = ["2.5:19"]
skip = true  # TODO: Unused function warnings not yet implemented
source = """
@allow(unused_function)
fn helper() -> i32 { 42 }

fn main() -> i32 {
    0
}
"""
exit_code = 0
no_warnings = true

[[case]]
name = "allow_unreachable_code"
spec = ["2.5:21"]
skip = true  # TODO: Need to propagate directives to CFG
source = """
@allow(unreachable_code)
fn example() -> i32 {
    return 0;
    let x = 42;
    x
}

fn main() -> i32 {
    example()
}
"""
exit_code = 0
no_warnings = true

[[case]]
name = "allow_multiple_warnings"
spec = ["2.5:23"]
source = """
fn main() -> i32 {
    @allow(unused_variable, unreachable_code)
    let x = 42;
    0
}
"""
exit_code = 0
no_warnings = true

[[case]]
name = "allow_vs_underscore_prefix"
spec = ["2.5:25"]
source = """
fn main() -> i32 {
    let _x = 42;
    @allow(unused_variable)
    let y = 10;
    0
}
"""
exit_code = 0
no_warnings = true

# =============================================================================
# @derive(Copy) Directive
# =============================================================================

[[case]]
name = "copy_directive_on_struct"
spec = ["2.5:27", "2.5:28"]
description = "@derive(Copy) directive marks a struct as Copy type"
source = """
@derive(Copy)
struct Point { x: i32, y: i32 }

fn main() -> i32 {
    let p = Point { x: 1, y: 2 };
    let q = p;
    p.x + q.x
}
"""
exit_code = 2

[[case]]
name = "copy_directive_no_args"
spec = ["2.5:29"]
description = "@derive(Copy) takes one argument"
source = """
@derive(Copy)
struct Point { x: i32, y: i32 }

fn main() -> i32 {
    let p = Point { x: 5, y: 10 };
    let q = p;
    p.y
}
"""
exit_code = 10

# =============================================================================
# Unrecognized directives (ADR-0075)
# =============================================================================

[[case]]
name = "unknown_directive_rejected"
spec = ["2.5:32"]
description = "Unrecognized directive names error at the directive site"
source = """
@xyzzy
struct Foo { x: i32 }

fn main() -> i32 { 0 }
"""
compile_fail = true
error_contains = "unknown directive `@xyzzy`"

[[case]]
name = "unknown_directive_typo_suggests_allow"
spec = ["2.5:32"]
description = "Edit-distance near-match suggests the recognized name"
source = """
@allwo(unused_variable)
fn main() -> i32 {
    let x = 0;
    0
}
"""
compile_fail = true
error_contains = "did you mean `@allow`?"

[[case]]
name = "unknown_directive_typo_suggests_derive"
spec = ["2.5:32"]
description = "Edit-distance near-match suggests @derive"
source = """
@dervie(Copy)
struct P { x: i32 }

fn main() -> i32 { 0 }
"""
compile_fail = true
error_contains = "did you mean `@derive`?"

[[case]]
name = "retired_handle_directive_points_to_adr_0075"
spec = ["2.5:33"]
description = "Retired @handle directive errors with retirement note"
source = """
@handle
struct Counter {
    count: i32,
    fn handle(borrow self) -> Counter { Counter { count: self.count } }
}

fn main() -> i32 { 0 }
"""
compile_fail = true
error_contains = "ADR-0075"

[[case]]
name = "retired_copy_directive_points_to_adr_0059"
spec = ["2.5:33"]
description = "Retired @copy directive errors with retirement note"
source = """
@copy
struct Point { x: i32 }

fn main() -> i32 { 0 }
"""
compile_fail = true
error_contains = "ADR-0059"

