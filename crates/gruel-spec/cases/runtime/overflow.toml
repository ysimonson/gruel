[section]
id = "runtime.overflow"
spec_chapter = "8.1"
name = "Integer Overflow Wraps"
description = "Integer arithmetic that overflows wraps modulo 2^N, where N is the type's bit width."

# =============================================================================
# Wrapping Behavior on Overflow
# =============================================================================

[[case]]
name = "wrap_add_i32"
spec = ["8.1:1", "8.1:2", "B.2:2"]
source = """
fn main() -> i32 {
    let x: i32 = 2147483647;
    let y: i32 = x + 1;
    if y == -2147483648 { 0 } else { 1 }
}
"""
exit_code = 0

[[case]]
name = "wrap_sub_i32"
spec = ["8.1:1", "8.1:2", "B.2:2"]
source = """
fn main() -> i32 {
    let x: i32 = -2147483648;
    let y: i32 = x - 1;
    if y == 2147483647 { 0 } else { 1 }
}
"""
exit_code = 0

[[case]]
name = "wrap_mul_i32"
spec = ["8.1:1", "8.1:2", "B.2:2"]
source = """
fn main() -> i32 {
    let x: i32 = 2147483647;
    let y: i32 = x * 2;
    if y == -2 { 0 } else { 1 }
}
"""
exit_code = 0

# =============================================================================
# Operations That Wrap
# =============================================================================

[[case]]
name = "wrap_addition"
spec = ["8.1:3"]
source = """
fn main() -> i32 {
    let x: i32 = 2147483647;
    let y: i32 = x + 1;
    if y == -2147483648 { 0 } else { 1 }
}
"""
exit_code = 0

[[case]]
name = "wrap_subtraction"
spec = ["8.1:3"]
source = """
fn main() -> i32 {
    let x: i32 = -2147483648;
    let y: i32 = x - 1;
    if y == 2147483647 { 0 } else { 1 }
}
"""
exit_code = 0

[[case]]
name = "wrap_multiplication"
spec = ["8.1:3"]
source = """
fn main() -> i32 {
    let x: i32 = 1000000;
    let y: i32 = x * 10000;
    if y == 1410065408 { 0 } else { 1 }
}
"""
exit_code = 0

[[case]]
name = "wrap_negation"
spec = ["8.1:3"]
source = """
fn main() -> i32 {
    let x: i32 = -2147483648;
    let y: i32 = -x;
    if y == -2147483648 { 0 } else { 1 }
}
"""
exit_code = 0
