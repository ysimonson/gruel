# =============================================================================
# `p.offset(n)` returns same pointer type
# =============================================================================

[[case]]
name = "ptr_offset_method"
spec = ["9.2:14", "9.2:15"]
source = """
fn main() -> i32 {
    let arr: [i32; 3] = [10, 20, 12];
    checked {
        let p = Ptr(i32)::from(&arr[0]);
        let n: i64 = 2;
        let q: Ptr(i32) = p.offset(n);
        q.read() + 30
    }
}
"""
exit_code = 42

