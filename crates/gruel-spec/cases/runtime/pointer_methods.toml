# Pointer Methods (ADR-0063)
#
# Tests for the method / associated-fn surface form on `Ptr(T)` /
# `MutPtr(T)`. After ADR-0063 phase 6 stabilisation this is the only
# spelling — the legacy `@ptr_*` / `@raw` / `@null_ptr` intrinsics are
# gone.

[section]
id = "runtime.pointer_methods"
spec_chapter = "9.2"
name = "Pointer Methods"
description = "Tests for ADR-0063 method-call and associated-fn dispatch on Ptr/MutPtr."

# =============================================================================
# `p.read()` on a Ptr(T)
# =============================================================================

[[case]]
name = "ptr_read_method"
spec = ["9.2:14", "9.2:15"]
source = """
fn main() -> i32 {
    let x: i32 = 42;
    checked {
        let p = Ptr(i32)::from(&x);
        p.read()
    }
}
"""
exit_code = 42

# =============================================================================
# `p.write(v)` on a MutPtr(T)
# =============================================================================

[[case]]
name = "mut_ptr_write_method"
spec = ["9.2:14", "9.2:15"]
source = """
fn main() -> i32 {
    let mut x: i32 = 0;
    checked {
        let p = MutPtr(i32)::from(&mut x);
        p.write(42);
    };
    x
}
"""
exit_code = 42

# =============================================================================
# `p.write(...)` on Ptr(T) is rejected.
# =============================================================================

[[case]]
name = "ptr_write_on_const_rejected"
spec = ["9.2:14", "9.2:15"]
source = """
fn main() -> i32 {
    let x: i32 = 0;
    checked {
        let p = Ptr(i32)::from(&x);
        p.write(1);
    };
    0
}
"""
compile_fail = true
error_contains = "no method"

