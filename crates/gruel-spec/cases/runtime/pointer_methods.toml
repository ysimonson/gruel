# =============================================================================
# `p.write_volatile(v)` on a MutPtr(T) — value round-trip via volatile read.
# =============================================================================

[[case]]
name = "mut_ptr_write_volatile_method"
spec = ["9.2:17", "9.2:18"]
source = """
fn main() -> i32 {
    let mut x: i32 = 0;
