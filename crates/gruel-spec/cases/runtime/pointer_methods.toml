# =============================================================================
# `Ptr(T)::from_int(addr)` — replacement for `@int_to_ptr(addr)`.
# =============================================================================

[[case]]
name = "ptr_from_int_path_call"
spec = ["9.2:14", "9.2:15"]
source = """
fn main() -> i32 {
    let mut x: i32 = 42;
    checked {
        let addr: u64 = MutPtr(i32)::from(&mut x).to_int();
        let p2 = MutPtr(i32)::from_int(addr);
        p2.read()
    }
}
"""
exit_code = 42

