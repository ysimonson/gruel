# =============================================================================
# `p.write_volatile(...)` on Ptr(T) is rejected (mirrors `p.write`).
# =============================================================================

[[case]]
name = "ptr_write_volatile_on_const_rejected"
spec = ["9.2:17"]
source = """
fn main() -> i32 {
    let x: i32 = 0;
    checked {
        let p = Ptr(i32)::from(&x);
        p.write_volatile(1);
    };
    0
}
"""
compile_fail = true
error_contains = "no method"

# =============================================================================
# `dst.copy_from(src, n)` — replacement for `@ptr_copy(dst, src, n)`.
# =============================================================================

[[case]]
name = "mut_ptr_copy_from_method"
spec = ["9.2:14", "9.2:15"]
source = """
fn main() -> i32 {
    let src: [i32; 3] = [10, 20, 12];
    let mut dst: [i32; 3] = [0, 0, 0];
    checked {
        let s = Ptr(i32)::from(&src[0]);
        let d = MutPtr(i32)::from(&mut dst[0]);
        let n: usize = 3;
        d.copy_from(s, n);
    };
    dst[0] + dst[1] + dst[2]
}
"""
exit_code = 42

