# Generic Pointer Type Tests (ADR-0061)
#
# Tests for the `Ptr(T)` / `MutPtr(T)` surface syntax.

[section]
id = "runtime.generic_pointer_types"
spec_chapter = "9.1"
name = "Generic Pointer Types"
description = "Tests for ADR-0061 Ptr(T) / MutPtr(T) generic pointer surface syntax."

# =============================================================================
# Ptr(T) basic round-trip via Ptr(T)::from / .read()
# =============================================================================

[[case]]
name = "ptr_generic_raw_read"
spec = ["9.1:10"]
source = """
fn main() -> i32 {
    let x: i32 = 42;
    let p = checked { Ptr(i32)::from(&x) };
    let val: i32 = checked { p.read() };
    val
}
"""
exit_code = 42

# =============================================================================
# MutPtr(T) basic round-trip via MutPtr(T)::from / .write() / .read()
# =============================================================================

[[case]]
name = "mut_ptr_generic_round_trip"
spec = ["9.1:10"]
source = """
fn main() -> i32 {
    let mut x: i32 = 0;
    checked {
        let p = MutPtr(i32)::from(&mut x);
        p.write(42);
    };
    x
}
"""
exit_code = 42

# =============================================================================
# Ptr(T) in a function parameter position
# =============================================================================

[[case]]
name = "ptr_generic_param"
spec = ["9.1:12"]
preview = "unchecked_fn_extensions"
preview_should_pass = true
source = """
@mark(unchecked)
fn deref(p: Ptr(i32)) -> i32 {
    checked { p.read() }
}

fn main() -> i32 {
    let x: i32 = 42;
    let p = checked { Ptr(i32)::from(&x) };
    checked { deref(p) }
}
"""
exit_code = 42
