# Generic Pointer Type Tests (ADR-0061)
#
# Tests for the `Ptr(T)` / `MutPtr(T)` surface syntax. These are
# preview-gated tests; once the feature stabilizes (ADR-0061 phase 6),
# the `preview = "..."` and `preview_should_pass = true` fields will be
# removed and these tests will run unconditionally.

[section]
id = "runtime.generic_pointer_types"
spec_chapter = "9.1"
name = "Generic Pointer Types"
description = "Tests for ADR-0061 Ptr(T) / MutPtr(T) generic pointer surface syntax."

# =============================================================================
# Ptr(T) basic round-trip via @raw / @ptr_read
# =============================================================================

[[case]]
name = "ptr_generic_raw_read"
spec = ["9.1:10"]
preview = "generic_pointer_types"
preview_should_pass = true
source = """
fn main() -> i32 {
    let x: i32 = 42;
    let p: Ptr(i32) = checked { @raw(x) };
    let val: i32 = checked { @ptr_read(p) };
    val
}
"""
exit_code = 42

# =============================================================================
# MutPtr(T) basic round-trip via @raw_mut / @ptr_write / @ptr_read
# =============================================================================

[[case]]
name = "mut_ptr_generic_round_trip"
spec = ["9.1:10"]
preview = "generic_pointer_types"
preview_should_pass = true
source = """
fn main() -> i32 {
    let mut x: i32 = 0;
    checked {
        let p: MutPtr(i32) = @raw_mut(x);
        @ptr_write(p, 42);
    };
    x
}
"""
exit_code = 42

# =============================================================================
# Ptr(T) in a function parameter position
# =============================================================================

[[case]]
name = "ptr_generic_param"
spec = ["9.1:12"]
preview = "generic_pointer_types"
preview_should_pass = true
source = """
unchecked fn deref(p: Ptr(i32)) -> i32 {
    checked { @ptr_read(p) }
}

fn main() -> i32 {
    let x: i32 = 42;
    let p: Ptr(i32) = checked { @raw(x) };
    checked { deref(p) }
}
"""
exit_code = 42

# =============================================================================
# Without --preview, Ptr(T) is rejected with the gating error.
# =============================================================================

[[case]]
name = "ptr_generic_requires_preview"
spec = ["9.1:10"]
source = """
fn main() -> i32 {
    let x: i32 = 42;
    let p: Ptr(i32) = checked { @raw(x) };
    let val: i32 = checked { @ptr_read(p) };
    val
}
"""
compile_fail = true
error_contains = "generic_pointer_types"
