# =============================================================================
# @ptr_to_int converts pointer to u64
# =============================================================================

[[case]]
name = "ptr_to_int_basic"
spec = ["9.2:1"]
source = """
fn main() -> i32 {
    let x: i32 = 42;
    let p = checked { Ptr(i32)::from(&x) };
    let addr: u64 = checked { p.to_int() };
    // Stack addresses are high values, should be > 1000
    let threshold: u64 = 1000;
    if addr > threshold { 42 } else { 1 }
}
"""
exit_code = 42

# =============================================================================
# @ptr_write and @ptr_read work together
# =============================================================================

[[case]]
name = "ptr_write_and_read"
spec = ["9.2:1"]
source = """
fn main() -> i32 {
    let mut x: i32 = 10;
    checked {
        let p = MutPtr(i32)::from(&mut x);
        p.write(99);
    };
    x
}
"""
exit_code = 99

[[case]]
name = "ptr_write_array_element"
spec = ["9.2:1"]
source = """
fn main() -> i32 {
    let mut arr: [i32; 3] = [10, 20, 30];
    checked {
        let p = MutPtr(i32)::from(&mut arr[1]);
        p.write(77);
    };
    arr[1]
}
"""
exit_code = 77

# =============================================================================
# @int_to_ptr converts u64 address to pointer with explicit type annotation
# =============================================================================

[[case]]
name = "int_to_ptr_with_type_annotation"
spec = ["9.2:1"]
source = """
fn main() -> i32 {
    let x: i32 = 42;
    let p1 = checked { Ptr(i32)::from(&x) };
    let addr: u64 = checked { p1.to_int() };
    // Convert address back to pointer with explicit type annotation
    let p2 = checked { MutPtr(i32)::from_int(addr) };
    let val: i32 = checked { p2.read() };
    val
}
"""
exit_code = 42

[[case]]
name = "int_to_ptr_mutable_pointer"
spec = ["9.2:1"]
source = """
fn main() -> i32 {
    let x: i32 = 99;
    let p1 = checked { Ptr(i32)::from(&x) };
    let addr: u64 = checked { p1.to_int() };
    // Convert to MutPtr (even from a const pointer address)
    // This is allowed because int_to_ptr assumes you know what you're doing
    let p2 = checked { MutPtr(i32)::from_int(addr) };
    let val: i32 = checked { p2.read() };
    val
}
"""
exit_code = 99

[[case]]
name = "int_to_ptr_u64_pointer"
spec = ["9.2:1"]
source = """
fn main() -> i32 {
    let x: u64 = 12345;
    let p1 = checked { Ptr(u64)::from(&x) };
    let addr: u64 = checked { p1.to_int() };
    // Convert to MutPtr(u64)
    let p2 = checked { MutPtr(u64)::from_int(addr) };
    let val: u64 = checked { p2.read() };
    // Return i32 conversion for exit code
    @cast(val)
}
"""
exit_code = 57  # 12345 % 256 = 57

