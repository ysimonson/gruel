# =============================================================================
# @ptr_to_int converts pointer to u64
# =============================================================================

[[case]]
name = "ptr_to_int_basic"
spec = ["9.2:1"]
source = """
fn main() -> i32 {
    let x: i32 = 42;
    let p: ptr const i32 = checked { @raw(x) };
    let addr: u64 = checked { @ptr_to_int(p) };
    // Stack addresses are high values, should be > 1000
    let threshold: u64 = 1000;
    if addr > threshold { 42 } else { 1 }
}
"""
exit_code = 42

# =============================================================================
# @ptr_write and @ptr_read work together
# =============================================================================

[[case]]
name = "ptr_write_and_read"
spec = ["9.2:1"]
source = """
fn main() -> i32 {
    let mut x: i32 = 10;
    checked {
        let p: ptr mut i32 = @raw_mut(x);
        @ptr_write(p, 99);
    };
    x
}
"""
exit_code = 99

[[case]]
name = "ptr_write_array_element"
spec = ["9.2:1"]
source = """
fn main() -> i32 {
    let mut arr: [i32; 3] = [10, 20, 30];
    checked {
        let p: ptr mut i32 = @raw_mut(arr[1]);
        @ptr_write(p, 77);
    };
    arr[1]
}
"""
exit_code = 77

# =============================================================================
# @int_to_ptr converts u64 address to pointer with explicit type annotation
# =============================================================================

[[case]]
name = "int_to_ptr_with_type_annotation"
spec = ["9.2:1"]
source = """
fn main() -> i32 {
    let x: i32 = 42;
    let p1: ptr const i32 = checked { @raw(x) };
    let addr: u64 = checked { @ptr_to_int(p1) };
    // Convert address back to pointer with explicit type annotation
    let p2: ptr mut i32 = checked { @int_to_ptr(addr) };
    let val: i32 = checked { @ptr_read(p2) };
    val
}
"""
exit_code = 42

[[case]]
name = "int_to_ptr_mutable_pointer"
spec = ["9.2:1"]
source = """
fn main() -> i32 {
    let x: i32 = 99;
    let p1: ptr const i32 = checked { @raw(x) };
    let addr: u64 = checked { @ptr_to_int(p1) };
    // Convert to ptr mut (even from a const pointer address)
    // This is allowed because int_to_ptr assumes you know what you're doing
    let p2: ptr mut i32 = checked { @int_to_ptr(addr) };
    let val: i32 = checked { @ptr_read(p2) };
    val
}
"""
exit_code = 99

[[case]]
name = "int_to_ptr_u64_pointer"
spec = ["9.2:1"]
source = """
fn main() -> i32 {
    let x: u64 = 12345;
    let p1: ptr const u64 = checked { @raw(x) };
    let addr: u64 = checked { @ptr_to_int(p1) };
    // Convert to ptr mut u64
    let p2: ptr mut u64 = checked { @int_to_ptr(addr) };
    let val: u64 = checked { @ptr_read(p2) };
    // Return i32 conversion for exit code
    @cast(val)
}
"""
exit_code = 57  # 12345 % 256 = 57

