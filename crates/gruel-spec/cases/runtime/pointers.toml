[[case]]
name = "null_ptr_const"
spec = ["9.2:7"]
source = """
fn main() -> i32 {
    let p: ptr const i32 = checked { @null_ptr() };
    if checked { @is_null(p) } { 1 } else { 0 }
}
"""
exit_code = 1

