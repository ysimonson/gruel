# Pointer Intrinsic Tests
#
# Tests for pointer intrinsics that operate on raw pointers for low-level memory access.
# These intrinsics must be used within `checked` blocks.

[section]
id = "runtime.pointers"
spec_chapter = "9.2"
name = "Pointer Intrinsics"
description = "Tests for pointer operations (Ptr(T)::from, .read(), .write(), etc.)"

# =============================================================================
# @raw with simple local variable
# =============================================================================

[[case]]
name = "raw_simple_local"
spec = ["9.2:1"]
source = """
fn main() -> i32 {
    let x: i32 = 42;
    let p = checked { Ptr(i32)::from(&x) };
    let val: i32 = checked { p.read() };
    val
}
"""
exit_code = 42

# =============================================================================
# @raw with array element (the bug fix this was added for)
# =============================================================================

[[case]]
name = "raw_array_element"
spec = ["9.2:1"]
source = """
fn main() -> i32 {
    let arr: [i32; 3] = [10, 20, 30];
    let first: i32 = checked {
        let p = Ptr(i32)::from(&arr[0]);
        p.read()
    };
    first
}
"""
exit_code = 10

