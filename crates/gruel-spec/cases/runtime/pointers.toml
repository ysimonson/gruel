# =============================================================================
# @ptr_copy copies elements between pointers
# =============================================================================

[[case]]
name = "ptr_copy_basic"
spec = ["9.2:11", "9.2:12"]
source = """
fn main() -> i32 {
    let src: [i32; 3] = [10, 20, 30];
    let mut dst: [i32; 3] = [0, 0, 0];
    let count: usize = 3;
    let s = checked { Ptr(i32)::from(&src[0]) };
    let d = checked { MutPtr(i32)::from(&mut dst[0]) };
    checked { d.copy_from(s, count) };
    dst[0] + dst[1] + dst[2]
}
"""
exit_code = 60

[[case]]
name = "ptr_copy_partial"
spec = ["9.2:11"]
source = """
fn main() -> i32 {
    let src: [i32; 4] = [5, 10, 15, 20];
    let mut dst: [i32; 4] = [0, 0, 0, 0];
    let count: usize = 2;
    let s = checked { Ptr(i32)::from(&src[0]) };
    let d = checked { MutPtr(i32)::from(&mut dst[0]) };
    checked { d.copy_from(s, count) };
    dst[0] + dst[1] + dst[2]
}
"""
exit_code = 15

[[case]]
name = "ptr_copy_zero_count"
spec = ["9.2:11"]
source = """
fn main() -> i32 {
    let src: [i32; 2] = [10, 20];
    let mut dst: [i32; 2] = [1, 2];
    let count: usize = 0;
    let s = checked { Ptr(i32)::from(&src[0]) };
    let d = checked { MutPtr(i32)::from(&mut dst[0]) };
    checked { d.copy_from(s, count) };
    dst[0] + dst[1]
}
"""
exit_code = 3
