  { variant = "single_line", source = "fn main() -> i32 { let x = 42; x }", exit_code = 42 },
  { variant = "compact", source = "fn main() -> i32 { let x=1+2; x }", exit_code = 3 },
]

[[case]]
name = "let_extra_whitespace"
spec = ["5.1:1"]
source = """
fn main() -> i32 {
    let    x   =   10   ;
    x
}
"""
exit_code = 10

[[case]]
name = "let_with_comments"
spec = ["5.1:1"]
source = """
fn main() -> i32 {
    // declare x
    let x = 42;  // the answer
    x  // return it
}
"""
exit_code = 42

# =============================================================================
# Edge Cases
# =============================================================================

[[case]]
name = "let_edge_{variant}"
spec = ["5.1:1"]
source = """
fn main() -> i32 {
    let x = {value};
    {expr}
}
"""
params = [
  { variant = "zero", value = "0", expr = "x", exit_code = 0 },
  { variant = "negative", value = "-1", expr = "x", exit_code = 255 },
  { variant = "max_i32", value = "2147483647", expr = "x", exit_code = 255 },
  { variant = "unused", value = "42", expr = "0", exit_code = 0 },
]

[[case]]
name = "many_variables"
spec = ["5.1:1"]
source = """
fn main() -> i32 {
    let a = 1;
    let b = 2;
    let c = 3;
    let d = 4;
    let e = 5;
    a + b + c + d + e
}
"""
exit_code = 15

# =============================================================================
# Variable Names
# =============================================================================

[[case]]
name = "variable_name_{variant}"
spec = ["5.1:1"]
source = """
fn main() -> i32 {
    {body}
}
"""
params = [
  { variant = "underscore_prefix", body = "let _x = 42; _x", exit_code = 42 },
  { variant = "underscore_only", body = "let _ = 42; 0", exit_code = 0, spec_extra = ["2.1:12"] },
  { variant = "long", body = "let my_very_long_variable_name = 42; my_very_long_variable_name", exit_code = 42 },
  { variant = "with_numbers", body = "let x1 = 10; let x2 = 20; x1 + x2", exit_code = 30 },
  { variant = "mixed_case", body = "let myVar = 42; myVar", exit_code = 42 },
]

# =============================================================================
# Block Scoping
# =============================================================================

[[case]]
name = "nested_block_{variant}"
spec = ["4.5:1"]
source = """
fn main() -> i32 {
    {body}
}
"""
params = [
  { variant = "simple", body = "let x = 10; { 20 }", exit_code = 20 },
  { variant = "uses_outer", body = "let x = 10; { x + 5 }", exit_code = 15 },
  { variant = "as_expression", body = "{ 42 }", exit_code = 42 },
  { variant = "with_arithmetic", body = "{ 10 + 20 + 12 }", exit_code = 42 },
  { variant = "in_expression", body = "1 + { 2 } + 3", exit_code = 6 },
]

[[case]]
name = "block_scoped_variable"
spec = ["4.5:1", "5.1:2"]
source = """
fn main() -> i32 {
    let x = 1;
    let y = {
        let x = 10;
        x + 5
    };
    x + y
}
"""
exit_code = 16

[[case]]
name = "block_scoped_shadow_restored"
spec = ["4.5:1", "5.1:2"]
source = """
fn main() -> i32 {
    let x = 42;
    let _unused = {
        let x = 100;
        x
    };
    x
}
"""
exit_code = 42

[[case]]
name = "nested_block_with_statements"
spec = ["4.5:1"]
source = """
fn main() -> i32 {
    let outer = 10;
    let result = {
        let inner = 20;
        outer + inner
    };
    result
}
"""
exit_code = 30

[[case]]
name = "deeply_nested_blocks"
spec = ["4.5:1"]
source = """
fn main() -> i32 {
    let a = 1;
    {
        let b = 2;
        {
            let c = 3;
            a + b + c
        }
    }
}
"""
exit_code = 6

[[case]]
name = "sequential_blocks"
spec = ["4.5:1"]
source = """
fn main() -> i32 {
    let a = { 10 };
    let b = { 20 };
    a + b
}
"""
exit_code = 30

[[case]]
name = "block_with_mutable_outer"
spec = ["4.5:1", "5.1:4"]
source = """
fn main() -> i32 {
    let mut x = 0;
    x = {
        let inner = 42;
        inner
    };
    x
}
"""
exit_code = 42

# =============================================================================
# Struct Destructuring
# =============================================================================

[[case]]
name = "destructure_basic"
spec = ["5.1:14", "5.1:16", "5.1:19"]
preview = "destructuring"
preview_should_pass = true
description = "Basic struct destructuring binds fields"
source = """
struct Point { x: i32, y: i32 }

fn main() -> i32 {
    let p = Point { x: 10, y: 32 };
    let Point { x, y } = p;
    x + y
}
"""
exit_code = 42

[[case]]
name = "destructure_rename"
spec = ["5.1:14", "5.1:18", "5.1:20"]
preview = "destructuring"
preview_should_pass = true
description = "Struct destructuring with renamed bindings"
source = """
struct Pair { a: i32, b: i32 }

fn main() -> i32 {
    let p = Pair { a: 10, b: 32 };
    let Pair { a: first, b: second } = p;
    first + second
}
"""
exit_code = 42

[[case]]
name = "destructure_wildcard"
spec = ["5.1:14", "5.1:18"]
preview = "destructuring"
preview_should_pass = true
description = "Struct destructuring with wildcard drops the field"
source = """
struct Inner { value: i32 }

drop fn Inner(self) {
    @dbg(self.value);
}

struct Pair { a: Inner, b: Inner }

fn consume(i: Inner) -> i32 { i.value }

fn main() -> i32 {
    let p = Pair { a: Inner { value: 10 }, b: Inner { value: 32 } };
    let Pair { a, b: _ } = p;
    consume(a)
}
"""
exit_code = 10
expected_stdout = "10\n32\n"

[[case]]
name = "destructure_missing_field"
spec = ["5.1:17"]
preview = "destructuring"
preview_should_pass = true
description = "Omitting a field in destructuring is an error"
source = """
struct Point { x: i32, y: i32 }

fn main() -> i32 {
    let p = Point { x: 10, y: 32 };
    let Point { x } = p;
    x
}
"""
compile_fail = true
error_contains = "missing field"

[[case]]
name = "destructure_consumes_struct"
spec = ["5.1:16"]
preview = "destructuring"
preview_should_pass = true
description = "Destructured struct cannot be used afterwards"
source = """
struct Point { x: i32, y: i32 }

fn main() -> i32 {
    let p = Point { x: 10, y: 32 };
    let Point { x, y } = p;
    p.x
}
"""
compile_fail = true
error_contains = "moved value"

[[case]]
name = "destructure_no_double_drop"
spec = ["5.1:14", "5.1:16"]
preview = "destructuring"
preview_should_pass = true
description = "Destructured struct fields are dropped exactly once"
source = """
struct Inner { value: i32 }

drop fn Inner(self) {
    @dbg(self.value);
}

struct Pair { a: Inner, b: Inner }

fn main() -> i32 {
    let p = Pair { a: Inner { value: 1 }, b: Inner { value: 2 } };
    let Pair { a, b } = p;
    a.value + b.value
}
"""
exit_code = 3
expected_stdout = "2\n1\n"

[[case]]
name = "destructure_requires_preview"
spec = ["5.1:15"]
preview = "destructuring"
preview_should_pass = true
description = "Struct destructuring syntax parses with preview"
source = """
struct Point { x: i32, y: i32 }

fn main() -> i32 {
    let Point { x, y } = Point { x: 1, y: 2 };
    x + y
}
"""
exit_code = 3

[[case]]
name = "destructure_mut_binding"
spec = ["5.1:14", "5.1:18"]
preview = "destructuring"
preview_should_pass = true
description = "Individual fields in destructuring can be mutable"
source = """
struct Point { x: i32, y: i32 }

fn main() -> i32 {
    let Point { mut x, y } = Point { x: 10, y: 32 };
    x = x + 1;
    x + y
}
"""
exit_code = 43
