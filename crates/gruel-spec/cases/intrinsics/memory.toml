# ADR-0087 Phase 4 retired the `@alloc` / `@realloc` / `@free`
# intrinsics. The user-facing surface is now the prelude fns
# `mem_alloc(size, align) -> MutPtr(u8)`,
# `mem_realloc(p, old, new, align) -> MutPtr(u8)`, and
# `mem_free(p, size, align)`. Callers wrap with `@ptr_cast` to
# recover the typed pointer (the pointee-type inference that the
# old intrinsics carried inline now lives caller-side). The
# behaviour roundtrips below verify the prelude wrappers; they
# don't cite normative spec paragraphs because the surface is
# library code, not a language intrinsic.

[section]
id = "intrinsics.memory"
spec_chapter = "8.4"
name = "Heap (ADR-0087)"
description = "Roundtrip mem_alloc + write + read + mem_free, plus the prelude Vec dispatch flip."

# =============================================================================
# Roundtrip: alloc + write + read + free
# =============================================================================

[[case]]
name = "alloc_write_read_free"
source = """
fn main() -> i32 {
    let n: usize = 4;
    let size: usize = n * @size_of(i32);
    let align: usize = @align_of(i32);
    let p: MutPtr(i32) = checked { @ptr_cast(mem_alloc(size, align)) };
    checked {
        p.offset(0).write(10);
        p.offset(1).write(20);
        p.offset(2).write(30);
        p.offset(3).write(42);
    };
    let last: i32 = checked { p.offset(3).read() };
    checked {
        let raw: MutPtr(u8) = @ptr_cast(p);
        mem_free(raw, size, align)
    };
    last
}
"""
exit_code = 42

# =============================================================================
# realloc preserves contents
# =============================================================================

[[case]]
name = "realloc_grows_buffer"
source = """
fn main() -> i32 {
    let align: usize = @align_of(i32);
    let two: usize = 2;
    let four: usize = 4;
    let old_bytes: usize = two * @size_of(i32);
    let new_bytes: usize = four * @size_of(i32);
    let p: MutPtr(i32) = checked { @ptr_cast(mem_alloc(old_bytes, align)) };
    checked {
        p.offset(0).write(7);
        p.offset(1).write(35);
    };
    let p2: MutPtr(i32) = checked {
        let raw: MutPtr(u8) = @ptr_cast(p);
        @ptr_cast(mem_realloc(raw, old_bytes, new_bytes, align))
    };
    checked {
        p2.offset(2).write(0);
        p2.offset(3).write(0);
    };
    let total: i32 = checked {
        p2.offset(0).read() + p2.offset(1).read()
    };
    checked {
        let raw: MutPtr(u8) = @ptr_cast(p2);
        mem_free(raw, new_bytes, align)
    };
    total
}
"""
exit_code = 42

# =============================================================================
# @ptr_cast retypes a pointer (identity at LLVM level)
# =============================================================================

[[case]]
name = "ptr_cast_retypes_pointer"
source = """
fn main() -> i32 {
    let n: usize = 1;
    let size: usize = n * @size_of(i32);
    let align: usize = @align_of(i32);
    let p: MutPtr(i32) = checked { @ptr_cast(mem_alloc(size, align)) };
    checked { p.offset(0).write(42) };
    // Cast MutPtr(i32) → Ptr(i32) (read-only view).
    let pc: Ptr(i32) = checked { @ptr_cast(p) };
    let v: i32 = checked { pc.offset(0).read() };
    checked {
        let raw: MutPtr(u8) = @ptr_cast(p);
        mem_free(raw, size, align)
    };
    v
}
"""
exit_code = 42

# =============================================================================
# @ptr_cast still requires `checked` (ADR-0028)
# =============================================================================

[[case]]
name = "ptr_cast_outside_checked_rejected"
source = """
fn main() -> i32 {
    let raw: MutPtr(u8) = mem_alloc(4, 4);
    let p: MutPtr(i32) = @ptr_cast(raw);
    0
}
"""
compile_fail = true
error_contains = "checked"

# =============================================================================
# Vec dispatch flip: method calls, indexing, and static calls all route
# through the prelude `@lang("vec")` declaration's instantiated struct
# methods (rather than codegen-inline `vec_*` intrinsics). ADR-0082
# stabilized this in Phase 5.
# =============================================================================

[[case]]
name = "prelude_vec_file_does_not_break_build"
source = """
fn main() -> i32 {
    42
}
"""
exit_code = 42

[[case]]
name = "vec_flip_push_pop_indexing"
source = """
fn main() -> i32 {
    let mut v: Vec(i32) = Vec(i32)::new();
    v.push(10);
    v.push(20);
    v.push(12);
    let total: i32 = v[0] + v[1] + v[2];
    v.clear();
    v.dispose();
    total
}
"""
exit_code = 42

[[case]]
name = "vec_flip_dispose_panics_when_nonempty"
source = """
fn main() -> i32 {
    let mut v: Vec(i32) = Vec(i32)::new();
    v.push(7);
    v.dispose();
    0
}
"""
exit_code = 101

[[case]]
name = "vec_flip_with_capacity_len"
source = """
fn main() -> i32 {
    let v: Vec(i32) = Vec(i32)::with_capacity(8);
    let n: usize = v.capacity();
    v.dispose();
    if n >= 8 { 42 } else { 0 }
}
"""
exit_code = 42
