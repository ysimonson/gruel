[section]
id = "items.impl-blocks"
spec_chapter = "6.4"
name = "Methods"
description = "Methods defined inline in struct blocks."

# =============================================================================
# Basic Method Syntax
# =============================================================================

[[case]]
name = "impl_block_basic"
spec = ["6.4:1", "6.4:2", "6.4:3", "6.4:4", "6.4:5"]
source = """
struct Point {
    x: i32,
    y: i32,

    fn get_x(self) -> i32 {
        self.x
    }
}

fn main() -> i32 {
    let p = Point { x: 42, y: 10 };
    p.get_x()
}
"""
exit_code = 42

# =============================================================================
# Method Calls
# =============================================================================

[[case]]
name = "method_call_with_args"
spec = ["6.4:6", "6.4:7", "6.4:8", "6.4:9"]
source = """
struct Point {
    x: i32,
    y: i32,

    fn add(self, dx: i32, dy: i32) -> Point {
        Point { x: self.x + dx, y: self.y + dy }
    }
}

fn main() -> i32 {
    let p = Point { x: 10, y: 20 };
    let p2 = p.add(32, 0);
    p2.x
}
"""
exit_code = 42

# =============================================================================
# Method Chaining
# =============================================================================

[[case]]
name = "method_call_chain"
spec = ["6.4:10", "6.4:11"]
source = """
struct Counter {
    value: i32,

    fn inc(self) -> Counter {
        Counter { value: self.value + 1 }
    }
}

fn main() -> i32 {
    let c = Counter { value: 39 };
    c.inc().inc().inc().value
}
"""
exit_code = 42

# =============================================================================
# Associated Functions
# =============================================================================

[[case]]
name = "associated_function_basic"
spec = ["6.4:12", "6.4:13", "6.4:14"]
source = """
struct Point {
    x: i32,
    y: i32,

    fn origin() -> Point {
        Point { x: 0, y: 0 }
    }
}

fn main() -> i32 {
    let p = Point::origin();
    p.x
}
"""
exit_code = 0

[[case]]
name = "associated_function_with_args"
spec = ["6.4:12", "6.4:13"]
source = """
struct Point {
    x: i32,
    y: i32,

    fn new(x: i32, y: i32) -> Point {
        Point { x: x, y: y }
    }
}

fn main() -> i32 {
    let p = Point::new(42, 10);
    p.x
}
"""
exit_code = 42

# =============================================================================
# Multiple Methods
# =============================================================================

[[case]]
name = "multiple_impl_blocks"
spec = ["6.4:15", "6.4:17"]
source = """
struct Point {
    x: i32,
    y: i32,

    fn get_x(self) -> i32 {
        self.x
    }

    fn get_y(self) -> i32 {
        self.y
    }
}

fn main() -> i32 {
    let p = Point { x: 42, y: 10 };
    p.get_x()
}
"""
exit_code = 42

[[case]]
name = "multiple_impl_blocks_use_both"
spec = ["6.4:15"]
source = """
struct Point {
    x: i32,
    y: i32,

    fn get_x(self) -> i32 {
        self.x
    }

    fn get_y(self) -> i32 {
        self.y
    }
}

fn main() -> i32 {
    let p1 = Point { x: 10, y: 32 };
    let p2 = Point { x: 10, y: 32 };
    p1.get_x() + p2.get_y()
}
"""
exit_code = 42

# =============================================================================
# Method and Associated Function Together
# =============================================================================

[[case]]
name = "method_and_associated_function"
spec = ["6.4:3", "6.4:12"]
source = """
struct Counter {
    value: i32,

    fn new(start: i32) -> Counter {
        Counter { value: start }
    }

    fn get(self) -> i32 {
        self.value
    }
}

fn main() -> i32 {
    let c = Counter::new(42);
    c.get()
}
"""
exit_code = 42

# =============================================================================
# Self Field Access
# =============================================================================

[[case]]
name = "self_field_access"
spec = ["6.4:4"]
source = """
struct Rectangle {
    width: i32,
    height: i32,

    fn area(self) -> i32 {
        self.width * self.height
    }
}

fn main() -> i32 {
    let r = Rectangle { width: 6, height: 7 };
    r.area()
}
"""
exit_code = 42

# =============================================================================
# Error Cases
# =============================================================================

[[case]]
name = "method_on_non_struct_error"
spec = ["6.4:20"]
source = """
fn main() -> i32 {
    let x: i32 = 42;
    x.foo()
}
"""
compile_fail = true
error_contains = "no method named"

[[case]]
name = "undefined_method_error"
spec = ["6.4:21"]
source = """
struct Point { x: i32, y: i32 }

fn main() -> i32 {
    let p = Point { x: 42, y: 10 };
    p.undefined_method()
}
"""
compile_fail = true
error_contains = "undefined"

[[case]]
name = "assoc_fn_called_as_method_error"
spec = ["6.4:22"]
source = """
struct Point {
    x: i32,
    y: i32,

    fn origin() -> Point {
        Point { x: 0, y: 0 }
    }
}

fn main() -> i32 {
    let p = Point { x: 1, y: 2 };
    let q = p.origin();
    q.x
}
"""
compile_fail = true
error_contains = "associated function"

[[case]]
name = "method_called_as_assoc_fn_error"
spec = ["6.4:23"]
source = """
struct Point {
    x: i32,
    y: i32,

    fn get_x(self) -> i32 {
        self.x
    }
}

fn main() -> i32 {
    Point::get_x()
}
"""
compile_fail = true
error_contains = "method"

[[case]]
name = "duplicate_method_name_error"
spec = ["6.4:16"]
source = """
struct Point {
    x: i32,
    y: i32,

    fn get_x(self) -> i32 { self.x }

    fn get_x(self) -> i32 { self.x }
}

fn main() -> i32 { 0 }
"""
compile_fail = true
error_contains = "duplicate"

# =============================================================================
# Pervasive `Self` (ADR-0076)
# =============================================================================

[[case]]
name = "self_in_associated_fn_return"
spec = ["6.4:27", "6.4:29"]
description = "`Self` resolves to the host struct in an associated function's return type and body"
source = """
struct Pair {
    a: i32,
    b: i32,

    fn new(a: i32, b: i32) -> Self {
        Self { a: a, b: b }
    }
}

fn main() -> i32 {
    let p = Pair::new(20, 22);
    p.a + p.b
}
"""
exit_code = 42

[[case]]
name = "self_in_method_param_type"
spec = ["6.4:27", "6.4:28"]
description = "`Self` resolves to the host struct in a method parameter type"
source = """
struct Pair {
    a: i32,
    b: i32,

    fn new(a: i32, b: i32) -> Self { Self { a: a, b: b } }

    fn combine(self, other: Self) -> i32 {
        self.a + self.b + other.a + other.b
    }
}

fn main() -> i32 {
    let p = Pair::new(1, 2);
    let q = Pair::new(10, 29);
    p.combine(q)
}
"""
exit_code = 42

[[case]]
name = "ref_self_param"
spec = ["6.4:28"]
description = "`Ref(Self)` resolves at depth inside the type-call constructor"
source = """
struct Box {
    value: i32,

    fn new(v: i32) -> Self { Self { value: v } }

    fn add(&self, other: Ref(Self)) -> i32 {
        self.value + other.value
    }
}

fn main() -> i32 {
    let a = Box::new(10);
    let b = Box::new(32);
    a.add(&b)
}
"""
exit_code = 42

[[case]]
name = "mut_ref_self_param"
spec = ["6.4:28"]
description = "`MutRef(Self)` resolves at depth inside the type-call constructor"
source = """
struct Box {
    value: i32,

    fn new(v: i32) -> Self { Self { value: v } }

    fn assign(other: MutRef(Self), v: i32) {
        other.value = v;
    }
}

fn main() -> i32 {
    let mut a = Box::new(0);
    Box::assign(&mut a, 42);
    a.value
}
"""
exit_code = 42

[[case]]
name = "self_array_param"
spec = ["6.4:28"]
description = "`[Self; N]` resolves at depth inside an array type"
source = """
struct Pair {
    a: i32,
    b: i32,

    fn new(a: i32, b: i32) -> Self { Self { a: a, b: b } }

    fn sum_pair(arr: [Self; 2]) -> i32 {
        arr[0].a + arr[0].b + arr[1].a + arr[1].b
    }
}

fn main() -> i32 {
    let p = Pair::new(10, 20);
    let q = Pair::new(5, 7);
    let arr = [p, q];
    Pair::sum_pair(arr)
}
"""
exit_code = 42

[[case]]
name = "self_in_enum_method"
spec = ["6.4:27", "6.4:28"]
description = "`Self` resolves inside an enum method"
source = """
enum Shape {
    Square(i32),
    Circle(i32),

    fn area(self) -> i32 {
        match self {
            Self::Square(s) => s * s,
            Self::Circle(r) => r * r * 3,
        }
    }
}

fn main() -> i32 {
    let s = Shape::Square(6);
    s.area() + 6
}
"""
exit_code = 42

[[case]]
name = "self_outside_struct_rejected"
spec = ["6.4:31"]
description = "`Self` in a free top-level function is rejected"
source = """
fn make() -> Self {
    0
}

fn main() -> i32 { 0 }
"""
compile_fail = true
error_contains = "Self"
