# Derive Item Tests (ADR-0058)
#
# User-defined derives via `derive` items.

[section]
id = "items.derives"
spec_chapter = "4.14"
name = "Derive Items"
description = "User-defined derives via `derive` items (ADR-0058)."

# A `derive` item with a single method body parses cleanly.
[[case]]
name = "derive_parses_single_method"
spec = ["4.14:100", "4.14:101"]
source = """
derive Marker {
    fn marker(self) {}
}

fn main() -> i32 {
    42
}
"""
exit_code = 42

# An empty derive body parses cleanly.
[[case]]
name = "derive_parses_empty"
spec = ["4.14:100"]
source = """
derive Marker {
}

fn main() -> i32 {
    7
}
"""
exit_code = 7

# Two `derive` items with the same name are rejected.
[[case]]
name = "derive_duplicate_name"
spec = ["4.14:104"]
source = """
derive Marker {
}

derive Marker {
}

fn main() -> i32 {
    0
}
"""
compile_fail = true
error_contains = "duplicate"

# A `derive` cannot share a name with a struct.
[[case]]
name = "derive_collides_with_struct"
spec = ["4.14:104"]
source = """
struct Drop {}

derive Drop {
}

fn main() -> i32 {
    0
}
"""
compile_fail = true
error_contains = "duplicate"

# Two methods with the same name inside one derive are rejected.
[[case]]
name = "derive_duplicate_method"
spec = ["4.14:104"]
source = """
derive MyDrop {
    fn drop(self) {}
    fn drop(self) {}
}

fn main() -> i32 {
    0
}
"""
compile_fail = true
error_contains = "duplicate"

# Direct field projection on `self` inside a derive body is rejected —
# the host type is not known yet, so users must go through `@field`.
[[case]]
name = "derive_self_dot_field_rejected"
spec = ["4.14:104"]
source = """
derive MyDrop {
    fn drop(self) {
        let _ = self.x;
    }
}

fn main() -> i32 {
    0
}
"""
compile_fail = true
error_contains = "direct field access on `self`"

# A struct with `@derive(D)` where `D` is a known derive item is
# accepted by the directive resolver.
[[case]]
name = "derive_directive_resolves"
spec = ["4.14:101", "4.14:105"]
source = """
derive Marker {
}

@derive(Marker)
struct Buffer {
    capacity: i32,
}

fn main() -> i32 {
    9
}
"""
exit_code = 9

# `@derive(X)` where `X` is not a `derive` item is rejected with a
# clear diagnostic.
[[case]]
name = "derive_directive_unknown_name_rejected"
spec = ["4.14:106"]
source = """
@derive(NotADerive)
struct Buffer {
    capacity: i32,
}

fn main() -> i32 {
    0
}
"""
compile_fail = true
error_contains = "expected a `derive`"

# `@derive(X)` where `X` resolves to a struct is rejected.
[[case]]
name = "derive_directive_struct_rejected"
spec = ["4.14:106"]
source = """
struct Other {}

@derive(Other)
struct Buffer {
    capacity: i32,
}

fn main() -> i32 {
    0
}
"""
compile_fail = true
error_contains = "found struct"

# A one-method derive on a named struct lands as a callable method on
# the host. The derive method body is not copied — it is spliced
# verbatim into the host's method list.
[[case]]
name = "derive_splice_struct_method"
spec = ["4.14:103", "4.14:105"]
source = """
derive Tagger {
    fn tag(self) -> i32 { 7 }
}

@derive(Tagger)
struct Buffer {
    capacity: i32,
}

fn main() -> i32 {
    let b = Buffer { capacity: 0 };
    b.tag()
}
"""
exit_code = 7

# An empty derive is a clean no-op — the host type still compiles
# and runs.
[[case]]
name = "derive_splice_empty"
spec = ["4.14:100"]
source = """
derive Marker {
}

@derive(Marker)
struct Buffer {
    capacity: i32,
}

fn main() -> i32 {
    let b = Buffer { capacity: 0 };
    b.capacity
}
"""
exit_code = 0

# A derive that attaches a method conflicting with a hand-written
# inline method on the host is rejected.
[[case]]
name = "derive_conflicts_with_inline_method"
spec = ["4.14:106"]
source = """
derive Tagger {
    fn tag(self) -> i32 { 7 }
}

@derive(Tagger)
struct Buffer {
    capacity: i32,

    fn tag(self) -> i32 { 1 }
}

fn main() -> i32 {
    0
}
"""
compile_fail = true
error_contains = "duplicate method"

# Two derives attaching the same method name to one host are rejected.
[[case]]
name = "derive_two_derives_same_method"
spec = ["4.14:106", "4.14:107"]
source = """
derive A {
    fn shared(self) -> i32 { 1 }
}

derive B {
    fn shared(self) -> i32 { 2 }
}

@derive(A)
@derive(B)
struct Buffer {
    capacity: i32,
}

fn main() -> i32 {
    0
}
"""
compile_fail = true
error_contains = "duplicate method"

# A derive with multiple methods on a host. Each method is
# independently callable through normal method-call resolution.
[[case]]
name = "derive_multi_method_dispatch"
spec = ["4.14:105"]
source = """
derive Counter {
    fn one(self) -> i32 { 1 }
    fn two(self) -> i32 { 2 }
    fn three(self) -> i32 { 3 }
}

@derive(Counter)
struct Box {
    inner: i32,
}

fn main() -> i32 {
    let b = Box { inner: 0 };
    b.one() + b.two() + b.three()
}
"""
exit_code = 6

# The same derive applied to two different hosts attaches a distinct
# callable method on each. Exercises the splicing routine across two
# independent host types.
[[case]]
name = "derive_same_derive_on_two_hosts"
spec = ["4.14:105"]
source = """
derive Tagger {
    fn tag(self) -> i32 { 11 }
}

@derive(Tagger)
struct A {
    inner: i32,
}

@derive(Tagger)
struct B {
    inner: i32,
}

fn main() -> i32 {
    let a = A { inner: 0 };
    let b = B { inner: 0 };
    a.tag() + b.tag()
}
"""
exit_code = 22

# A derive method with a parameter is callable. The body parameters
# work like any other method.
[[case]]
name = "derive_method_with_param"
spec = ["4.14:105"]
source = """
derive Doubler {
    fn doubled(self, x: i32) -> i32 { x + x }
}

@derive(Doubler)
struct Box {
    inner: i32,
}

fn main() -> i32 {
    let b = Box { inner: 0 };
    b.doubled(21)
}
"""
exit_code = 42

# A derive applied to an anonymous struct returned from a comptime
# function lands as a callable method on the host.
[[case]]
name = "derive_splice_anon_struct"
spec = ["4.14:105"]
source = """
derive Tagger {
    fn tag(self) -> i32 { 7 }
}

fn Pair(comptime T: type) -> type {
    @derive(Tagger)
    struct {
        first: T,
        second: T,
    }
}

fn main() -> i32 {
    let IntPair = Pair(i32);
    let p: IntPair = IntPair { first: 0, second: 0 };
    p.tag()
}
"""
exit_code = 7

# Each parameterization of an anonymous-host type gets its own
# monomorphized splice; the derive is independent on each fresh
# `StructId`.
[[case]]
name = "derive_splice_anon_struct_per_instantiation"
spec = ["4.14:105"]
source = """
derive Tagger {
    fn tag(self) -> i32 { 11 }
}

fn FixedBuffer(comptime N: i32) -> type {
    @derive(Tagger)
    struct {
        capacity: i32,
    }
}

fn main() -> i32 {
    let A = FixedBuffer(8);
    let B = FixedBuffer(16);
    let a: A = A { capacity: 0 };
    let b: B = B { capacity: 0 };
    a.tag() + b.tag()
}
"""
exit_code = 22

# An unknown derive on an anonymous struct surfaces the same
# diagnostic as the named-host case.
[[case]]
name = "derive_anon_unknown_name_rejected"
spec = ["4.14:106"]
source = """
fn Buffer(comptime N: i32) -> type {
    @derive(NotADerive)
    struct {
        capacity: i32,
    }
}

fn main() -> i32 {
    let B = Buffer(8);
    let b: B = B { capacity: 0 };
    b.capacity
}
"""
compile_fail = true
error_contains = "expected a `derive`"

# ADR-0079 Phase 3: hand-written user derive that uses
# `comptime_unroll for v in @type_info(Self).variants` as a match arm
# to clone each variant of an enum, exercising @variant_uninit /
# @variant_field / match-arm unroll together.
[[case]]
name = "derive_user_enum_match_unroll_clone"
spec = ["4.14:104"]
description = "user-defined derive uses comptime_unroll for in match-arm to clone enum variants"
source = """
derive MyDup {
    fn dup(self: Ref(Self)) -> Self {
        match self {
            comptime_unroll for v in (@type_info(Self).variants) {
                let mut h = @variant_uninit(Self, v.name);
                comptime_unroll for f in v.fields {
                    @field_set(h, f.name, @variant_field(self, v.name, f.name));
                }
                @finalize(h)
            }
        }
    }
}

@derive(MyDup)
enum Foo {
    A,
    B(i32),
}

fn main() -> i32 {
    let f = Foo::B(42);
    let g = f.dup();
    match g {
        Foo::A => 0,
        Foo::B(n) => n,
    }
}
"""
exit_code = 42

# ADR-0079: the prelude `derive Clone` body uses `comptime if` to
# dispatch on `@type_info(Self).kind`, so a single derive splices
# correctly onto both struct and enum hosts. Verifies the enum branch
# is selected and the struct branch (which would type-fail on enum
# Self) is fully elided.
[[case]]
name = "derive_clone_enum_via_comptime_if"
spec = ["4.14:104"]
description = "@derive(Clone) on an enum dispatches through the prelude derive's comptime if"
source = """
@derive(Clone)
enum Foo {
    A,
    B(i32),
}

fn main() -> i32 {
    let f = Foo::B(42);
    let g = f.clone();
    match g {
        Foo::A => 0,
        Foo::B(n) => n,
    }
}
"""
exit_code = 42

# ADR-0080 retired the prelude `derive Copy` body, so the
# `derive_copy_enum_via_comptime_if` test that exercised its enum-vs-struct
# `comptime if` dispatch is obsolete — `copy enum` is now a posture
# keyword on the declaration, not a synthesized method body.

# `comptime if` standalone: the discarded branch can reference shapes
# that don't apply to the surrounding type. Here the false branch
# uses `@variant_uninit(B, "A")` against an enum, but cond is
# statically true, so the branch is never analyzed.
[[case]]
name = "comptime_if_elides_discarded_branch"
spec = ["4.6:1"]
description = "`comptime if` evaluates cond at sema time and elides the discarded branch"
source = """
struct A { x: i32 }

fn make_a() -> A {
    comptime if (true) {
        A { x: 7 }
    } else {
        A { x: 9 }
    }
}

fn main() -> i32 {
    let a = make_a();
    a.x
}
"""
exit_code = 7

# `comptime if` rejects a non-comptime condition with a clear error.
[[case]]
name = "comptime_if_rejects_runtime_cond"
spec = ["4.6:1"]
description = "`comptime if` rejects a condition that isn't comptime-evaluable"
source = """
fn main() -> i32 {
    let n: i32 = 7;
    comptime if (n == 0) { 1 } else { 2 }
}
"""
compile_fail = true
error_contains = "comptime"
