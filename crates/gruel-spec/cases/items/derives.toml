# Derive Item Tests (ADR-0058)
#
# User-defined derives via `derive` items. Gated behind the
# `comptime_derives` preview feature.

[section]
id = "items.derives"
spec_chapter = "4.14"
name = "Derive Items"
description = "User-defined derives via `derive` items (ADR-0058)."

# Phase 1: a `derive` item with a single method body parses without crashing
# the frontend. With the preview gate enabled, sema accepts the declaration
# even before splice-on-host expansion is wired up.
[[case]]
name = "derive_parses_single_method"
spec = ["4.14:100", "4.14:101", "4.14:102"]
preview = "comptime_derives"
preview_should_pass = true
source = """
derive Marker {
    fn marker(self) {}
}

fn main() -> i32 {
    42
}
"""
exit_code = 42

# Phase 1: an empty derive body parses cleanly.
[[case]]
name = "derive_parses_empty"
spec = ["4.14:100", "4.14:102"]
preview = "comptime_derives"
preview_should_pass = true
source = """
derive Marker {
}

fn main() -> i32 {
    7
}
"""
exit_code = 7

# Without the preview flag, a `derive` item is rejected with a clear
# diagnostic citing the feature name.
[[case]]
name = "derive_requires_preview"
spec = ["4.14:102"]
source = """
derive Marker {
    fn marker(self) {}
}

fn main() -> i32 {
    0
}
"""
compile_fail = true
error_contains = "comptime_derives"

# Phase 2: two `derive` items with the same name are rejected.
[[case]]
name = "derive_duplicate_name"
spec = ["4.14:104"]
preview = "comptime_derives"
preview_should_pass = true
source = """
derive Marker {
}

derive Marker {
}

fn main() -> i32 {
    0
}
"""
compile_fail = true
error_contains = "duplicate"

# Phase 2: a `derive` cannot share a name with a struct.
[[case]]
name = "derive_collides_with_struct"
spec = ["4.14:104"]
preview = "comptime_derives"
preview_should_pass = true
source = """
struct Drop {}

derive Drop {
}

fn main() -> i32 {
    0
}
"""
compile_fail = true
error_contains = "duplicate"

# Phase 2: two methods with the same name inside one derive are rejected.
[[case]]
name = "derive_duplicate_method"
spec = ["4.14:104"]
preview = "comptime_derives"
preview_should_pass = true
source = """
derive Drop {
    fn drop(self) {}
    fn drop(self) {}
}

fn main() -> i32 {
    0
}
"""
compile_fail = true
error_contains = "duplicate"

# Phase 2: direct field projection on `self` inside a derive body is
# rejected — the host type is not known yet, so users must go through
# `@field`.
[[case]]
name = "derive_self_dot_field_rejected"
spec = ["4.14:104"]
preview = "comptime_derives"
preview_should_pass = true
source = """
derive Drop {
    fn drop(self) {
        let _ = self.x;
    }
}

fn main() -> i32 {
    0
}
"""
compile_fail = true
error_contains = "direct field access on `self`"

# Phase 3: a struct with `@derive(D)` where `D` is a known derive item
# is accepted by the directive resolver. (The methods are not yet
# spliced — that lands in phase 4.)
[[case]]
name = "derive_directive_resolves"
spec = ["4.14:101", "4.14:102", "4.14:105"]
preview = "comptime_derives"
preview_should_pass = true
source = """
derive Marker {
}

@derive(Marker)
struct Buffer {
    capacity: i32,
}

fn main() -> i32 {
    9
}
"""
exit_code = 9

# Phase 3: `@derive(X)` where `X` is not a `derive` item is rejected
# with a clear diagnostic.
[[case]]
name = "derive_directive_unknown_name_rejected"
spec = ["4.14:106"]
preview = "comptime_derives"
preview_should_pass = true
source = """
@derive(NotADerive)
struct Buffer {
    capacity: i32,
}

fn main() -> i32 {
    0
}
"""
compile_fail = true
error_contains = "expected a `derive`"

# Phase 3: `@derive(X)` where `X` resolves to a struct is rejected.
[[case]]
name = "derive_directive_struct_rejected"
spec = ["4.14:106"]
preview = "comptime_derives"
preview_should_pass = true
source = """
struct Other {}

@derive(Other)
struct Buffer {
    capacity: i32,
}

fn main() -> i32 {
    0
}
"""
compile_fail = true
error_contains = "found struct"

# Phase 3: `@derive(D)` requires the preview feature even when the
# derive item itself isn't present.
[[case]]
name = "derive_directive_requires_preview"
spec = ["4.14:102"]
source = """
@derive(Marker)
struct Buffer {
    capacity: i32,
}

fn main() -> i32 {
    0
}
"""
compile_fail = true
error_contains = "comptime_derives"

# Phase 4: a one-method derive on a named struct lands as a callable
# method on the host. The derive method body is not copied — it is
# spliced verbatim into the host's method list.
[[case]]
name = "derive_splice_struct_method"
spec = ["4.14:103", "4.14:105"]
preview = "comptime_derives"
preview_should_pass = true
source = """
derive Tagger {
    fn tag(self) -> i32 { 7 }
}

@derive(Tagger)
struct Buffer {
    capacity: i32,
}

fn main() -> i32 {
    let b = Buffer { capacity: 0 };
    b.tag()
}
"""
exit_code = 7

# Phase 4: an empty derive is a clean no-op — the host type still
# compiles and runs.
[[case]]
name = "derive_splice_empty"
spec = ["4.14:100"]
preview = "comptime_derives"
preview_should_pass = true
source = """
derive Marker {
}

@derive(Marker)
struct Buffer {
    capacity: i32,
}

fn main() -> i32 {
    let b = Buffer { capacity: 0 };
    b.capacity
}
"""
exit_code = 0

# Phase 4: a derive that attaches a method conflicting with a hand-
# written inline method on the host is rejected.
[[case]]
name = "derive_conflicts_with_inline_method"
spec = ["4.14:106"]
preview = "comptime_derives"
preview_should_pass = true
source = """
derive Tagger {
    fn tag(self) -> i32 { 7 }
}

@derive(Tagger)
struct Buffer {
    capacity: i32,

    fn tag(self) -> i32 { 1 }
}

fn main() -> i32 {
    0
}
"""
compile_fail = true
error_contains = "duplicate method"

# Phase 4: two derives attaching the same method name to one host are
# rejected.
[[case]]
name = "derive_two_derives_same_method"
spec = ["4.14:106", "4.14:107"]
preview = "comptime_derives"
preview_should_pass = true
source = """
derive A {
    fn shared(self) -> i32 { 1 }
}

derive B {
    fn shared(self) -> i32 { 2 }
}

@derive(A)
@derive(B)
struct Buffer {
    capacity: i32,
}

fn main() -> i32 {
    0
}
"""
compile_fail = true
error_contains = "duplicate method"

# Phase 5: a derive with multiple methods on a host. Each method is
# independently callable through normal method-call resolution.
[[case]]
name = "derive_multi_method_dispatch"
spec = ["4.14:105"]
preview = "comptime_derives"
preview_should_pass = true
source = """
derive Counter {
    fn one(self) -> i32 { 1 }
    fn two(self) -> i32 { 2 }
    fn three(self) -> i32 { 3 }
}

@copy
@derive(Counter)
struct Box {
    inner: i32,
}

fn main() -> i32 {
    let b = Box { inner: 0 };
    b.one() + b.two() + b.three()
}
"""
exit_code = 6

# Phase 5: the same derive applied to two different hosts attaches a
# distinct callable method on each. This exercises the splicing
# routine across two independent host types.
[[case]]
name = "derive_same_derive_on_two_hosts"
spec = ["4.14:105"]
preview = "comptime_derives"
preview_should_pass = true
source = """
derive Tagger {
    fn tag(self) -> i32 { 11 }
}

@derive(Tagger)
struct A {
    inner: i32,
}

@derive(Tagger)
struct B {
    inner: i32,
}

fn main() -> i32 {
    let a = A { inner: 0 };
    let b = B { inner: 0 };
    a.tag() + b.tag()
}
"""
exit_code = 22

# Phase 5: a derive method with a parameter is callable. The body
# parameters work like any other method.
[[case]]
name = "derive_method_with_param"
spec = ["4.14:105"]
preview = "comptime_derives"
preview_should_pass = true
source = """
derive Doubler {
    fn doubled(self, x: i32) -> i32 { x + x }
}

@derive(Doubler)
struct Box {
    inner: i32,
}

fn main() -> i32 {
    let b = Box { inner: 0 };
    b.doubled(21)
}
"""
exit_code = 42
