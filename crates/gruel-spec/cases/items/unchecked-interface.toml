# =============================================================================
# Runtime dispatch through Ref(I) when interface method is unchecked
# =============================================================================

[[case]]
name = "unchecked_iface_dyn_dispatch"
spec = ["6.5:4"]
preview = "unchecked_fn_extensions"
preview_should_pass = true
source = """
interface UnsafeReader {
    @mark(unchecked) fn read(self) -> i32;
}

struct Foo {
    val: i32,

    @mark(unchecked)
    pub fn read(self) -> i32 { self.val }
}

fn dyn_call(r: Ref(UnsafeReader)) -> i32 {
    checked { r.read() }
}

fn main() -> i32 {
    let f = Foo { val: 42 };
    dyn_call(&f)
}
"""
exit_code = 42

[[case]]
name = "unchecked_iface_dyn_dispatch_no_checked"
spec = ["6.5:4"]
preview = "unchecked_fn_extensions"
preview_should_pass = true
source = """
interface UnsafeReader {
    @mark(unchecked) fn read(self) -> i32;
}

struct Foo {
    val: i32,

    @mark(unchecked)
    pub fn read(self) -> i32 { self.val }
}

fn dyn_call(r: Ref(UnsafeReader)) -> i32 {
    r.read()
}

fn main() -> i32 {
    let f = Foo { val: 42 };
    dyn_call(&f)
}
"""
compile_fail = true
error_contains = "can only be used inside a `checked` block"

