# Interface Declaration Tests (ADR-0056, Phase 1)
#
# Interfaces are gated behind the `interfaces` preview feature. Phase 1
# covers parsing, RIR shape, duplicate-method detection, and the preview
# gate. Conformance and dispatch land in later phases.

[section]
id = "items.interfaces"
spec_chapter = "6.5"
name = "Interfaces"
description = "Structurally typed interface declarations (ADR-0056)."

# An interface declaration with no methods compiles when the preview feature
# is enabled. main returns 42 to confirm the rest of the pipeline still runs.
[[case]]
name = "interface_empty"
spec = ["6.5:1", "6.5:2"]
preview = "interfaces"
preview_should_pass = true
source = """
interface Marker {
}

fn main() -> i32 {
    42
}
"""
exit_code = 42

# A single-method interface parses and compiles end-to-end.
[[case]]
name = "interface_single_method"
spec = ["6.5:1", "6.5:2", "6.5:6"]
preview = "interfaces"
preview_should_pass = true
source = """
interface Drop {
    fn drop(self);
}

fn main() -> i32 {
    7
}
"""
exit_code = 7

# Multiple methods with various return types.
[[case]]
name = "interface_multi_method"
spec = ["6.5:1", "6.5:2"]
preview = "interfaces"
preview_should_pass = true
source = """
interface Shape {
    fn area(self) -> i32;
    fn perimeter(self) -> i32;
    fn name(self);
}

fn main() -> i32 {
    1
}
"""
exit_code = 1

# Without --preview interfaces the declaration is rejected.
[[case]]
name = "interface_requires_preview"
spec = ["6.5:5"]
source = """
interface Drop {
    fn drop(self);
}

fn main() -> i32 {
    0
}
"""
compile_fail = true
error_contains = "interfaces"

# The rejection error mentions the --preview help text.
[[case]]
name = "interface_preview_error_help"
spec = ["6.5:5"]
source = """
interface Drop {
    fn drop(self);
}

fn main() -> i32 {
    0
}
"""
compile_fail = true
error_contains = "--preview interfaces"

# Method signatures with a block body are rejected.
[[case]]
name = "interface_method_body_rejected"
spec = ["6.5:3"]
preview = "interfaces"
preview_should_pass = true
source = """
interface Bad {
    fn whatever(self) { 0 }
}

fn main() -> i32 {
    0
}
"""
compile_fail = true

# =============================================================================
# Comptime constraint usage (Phase 3)
# =============================================================================

# `comptime T: I` accepts a conforming concrete type and monomorphizes.
[[case]]
name = "interface_comptime_bound_basic"
spec = ["6.5:7", "6.5:8", "6.5:9", "6.5:10"]
preview = "interfaces"
preview_should_pass = true
source = """
interface Greeter {
    fn greet(self);
}

struct Foo {
    fn greet(self) {}
}

fn use_greeter(comptime T: Greeter, t: T) {
    t.greet();
}

fn main() -> i32 {
    use_greeter(Foo, Foo {});
    13
}
"""
exit_code = 13

# A type missing the required method is rejected at the call site, even if
# the generic body never calls the method.
[[case]]
name = "interface_comptime_missing_method"
spec = ["6.5:8"]
preview = "interfaces"
preview_should_pass = true
source = """
interface Greeter {
    fn greet(self);
}

struct Foo {}

fn use_greeter(comptime T: Greeter, t: T) {
}

fn main() -> i32 {
    use_greeter(Foo, Foo {});
    0
}
"""
compile_fail = true
error_contains = "does not conform"

# Wrong return type is rejected.
[[case]]
name = "interface_comptime_wrong_return"
spec = ["6.5:8"]
preview = "interfaces"
preview_should_pass = true
source = """
interface Reader {
    fn read(self, n: i32) -> i32;
}

struct Buf {
    fn read(self, n: i32) -> i64 { 0 }
}

fn use_reader(comptime T: Reader, t: T) {
}

fn main() -> i32 {
    use_reader(Buf, Buf {});
    0
}
"""
compile_fail = true
error_contains = "wrong signature"

# =============================================================================
# Runtime dispatch (Phase 4)
# =============================================================================

# Phase 4d: a function with `borrow t: I` parameter compiles end-to-end
# when called with a concrete value that conforms to the interface.
[[case]]
name = "interface_runtime_borrow_empty"
spec = ["6.5:11", "6.5:12", "6.5:13", "6.5:14", "6.5:15"]
preview = "interfaces"
preview_should_pass = true
source = """
interface Marker {}

struct Foo {}

fn ignore(borrow t: Marker) {
}

fn main() -> i32 {
    let f = Foo {};
    ignore(borrow f);
    77
}
"""
exit_code = 77

# Same path with a non-empty struct (real data behind the fat pointer).
[[case]]
name = "interface_runtime_borrow_nonempty_struct"
spec = ["6.5:11", "6.5:14"]
preview = "interfaces"
preview_should_pass = true
source = """
interface Marker {}

struct Point {
    x: i32,
    y: i32,
}

fn ignore(borrow t: Marker) {
}

fn main() -> i32 {
    let p = Point { x: 10, y: 20 };
    ignore(borrow p);
    p.x + p.y
}
"""
exit_code = 30

# By-value `t: I` is rejected with a tailored message.
[[case]]
name = "interface_runtime_by_value_rejected"
spec = ["6.5:12"]
preview = "interfaces"
preview_should_pass = true
source = """
interface Marker {}

fn ignore(t: Marker) {
}

fn main() -> i32 {
    0
}
"""
compile_fail = true
error_contains = ["borrow t: Marker"]

# Two distinct concrete types both flowing through the same generic
# function each get their own specialization.
[[case]]
name = "interface_comptime_two_types"
spec = ["6.5:9"]
preview = "interfaces"
preview_should_pass = true
source = """
interface Counter {
    fn count(self) -> i32;
}

struct One {
    fn count(self) -> i32 { 1 }
}

struct Ten {
    fn count(self) -> i32 { 10 }
}

fn pick(comptime T: Counter, t: T) -> i32 {
    t.count()
}

fn main() -> i32 {
    pick(One, One {}) + pick(Ten, Ten {})
}
"""
exit_code = 11

# Duplicate method names within one interface are rejected.
[[case]]
name = "interface_duplicate_method"
spec = ["6.5:4"]
preview = "interfaces"
preview_should_pass = true
source = """
interface Bad {
    fn foo(self);
    fn foo(self) -> i32;
}

fn main() -> i32 {
    0
}
"""
compile_fail = true
error_contains = "duplicate method"
