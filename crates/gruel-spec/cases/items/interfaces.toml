# Interface Declaration Tests (ADR-0056)
#
# Stable interfaces: structural conformance, comptime constraints, and
# runtime dispatch via fat-pointer vtables.

[section]
id = "items.interfaces"
spec_chapter = "6.5"
name = "Interfaces"
description = "Structurally typed interface declarations (ADR-0056)."

# An interface declaration with no methods compiles. main returns 42 to
# confirm the rest of the pipeline still runs.
[[case]]
name = "interface_empty"
spec = ["6.5:1", "6.5:2"]
source = """
interface Marker {
}

fn main() -> i32 {
    42
}
"""
exit_code = 42

# A single-method interface parses and compiles end-to-end.
[[case]]
name = "interface_single_method"
spec = ["6.5:1", "6.5:2", "6.5:5"]
source = """
interface Greeter {
    fn greet(self);
}

fn main() -> i32 {
    7
}
"""
exit_code = 7

# Multiple methods with various return types.
[[case]]
name = "interface_multi_method"
spec = ["6.5:1", "6.5:2"]
source = """
interface Shape {
    fn area(self) -> i32;
    fn perimeter(self) -> i32;
    fn name(self);
}

fn main() -> i32 {
    1
}
"""
exit_code = 1

# Method signatures with a block body are rejected.
[[case]]
name = "interface_method_body_rejected"
spec = ["6.5:3"]
source = """
interface Bad {
    fn whatever(self) { 0 }
}

fn main() -> i32 {
    0
}
"""
compile_fail = true

# =============================================================================
# Comptime constraint usage (Phase 3)
# =============================================================================

# `comptime T: I` accepts a conforming concrete type and monomorphizes.
[[case]]
name = "interface_comptime_bound_basic"
spec = ["6.5:7", "6.5:8", "6.5:9", "6.5:10"]
source = """
interface Greeter {
    fn greet(self);
}

struct Foo {
    fn greet(self) {}
}

fn use_greeter(comptime T: Greeter, t: T) {
    t.greet();
}

fn main() -> i32 {
    use_greeter(Foo, Foo {});
    13
}
"""
exit_code = 13

# A type missing the required method is rejected at the call site, even if
# the generic body never calls the method.
[[case]]
name = "interface_comptime_missing_method"
spec = ["6.5:8"]
source = """
interface Greeter {
    fn greet(self);
}

struct Foo {}

fn use_greeter(comptime T: Greeter, t: T) {
}

fn main() -> i32 {
    use_greeter(Foo, Foo {});
    0
}
"""
compile_fail = true
error_contains = "does not conform"

# Wrong return type is rejected.
[[case]]
name = "interface_comptime_wrong_return"
spec = ["6.5:8"]
source = """
interface Reader {
    fn read(self, n: i32) -> i32;
}

struct Buf {
    fn read(self, n: i32) -> i64 { 0 }
}

fn use_reader(comptime T: Reader, t: T) {
}

fn main() -> i32 {
    use_reader(Buf, Buf {});
    0
}
"""
compile_fail = true
error_contains = "wrong signature"

# =============================================================================
# Runtime dispatch (Phase 4)
# =============================================================================

# Phase 4d: a function with `t: Ref(I)` parameter compiles end-to-end
# when called with a concrete value that conforms to the interface.
[[case]]
name = "interface_runtime_borrow_empty"
spec = ["6.5:11", "6.5:12", "6.5:13", "6.5:14", "6.5:15"]
source = """
interface Marker {}

struct Foo {}

fn ignore(t: Ref(Marker)) {
}

fn main() -> i32 {
    let f = Foo {};
    ignore(&f);
    77
}
"""
exit_code = 77

# Same path with a non-empty struct (real data behind the fat pointer).
[[case]]
name = "interface_runtime_borrow_nonempty_struct"
spec = ["6.5:11", "6.5:14"]
source = """
interface Marker {}

struct Point {
    x: i32,
    y: i32,
}

fn ignore(t: Ref(Marker)) {
}

fn main() -> i32 {
    let p = Point { x: 10, y: 20 };
    ignore(&p);
    p.x + p.y
}
"""
exit_code = 30

# Phase 4d-extended: dynamic dispatch end-to-end. `t.greet()` where t is an
# interface receiver dispatches through the vtable to the conforming type's
# method.
[[case]]
name = "interface_runtime_dispatch_basic"
spec = ["6.5:16", "6.5:17"]
source = """
interface Greeter {
    fn greet(self);
}

struct Foo {
    fn greet(self) {}
}

fn invoke(t: Ref(Greeter)) {
    t.greet();
}

fn main() -> i32 {
    let f = Foo {};
    invoke(&f);
    99
}
"""
exit_code = 99

# Phase 4e polish: the same (StructId, InterfaceId) coercion appearing
# multiple times must work — codegen deduplicates the vtable global. This
# test exercises that path indirectly: if dedup fails, build_module's
# add_global call would attempt to insert a duplicate symbol and the LLVM
# verifier would reject the module.
[[case]]
name = "interface_runtime_vtable_dedup"
spec = ["6.5:14"]
source = """
interface Counter {
    fn count(self) -> i32;
}

struct One {
    fn count(self) -> i32 { 1 }
}

fn invoke(t: Ref(Counter)) -> i32 {
    t.count()
}

fn main() -> i32 {
    let a = One {};
    let b = One {};
    let c = One {};
    invoke(&a) + invoke(&b) + invoke(&c)
}
"""
exit_code = 3

# Two distinct conforming types, dispatched dynamically. Result confirms each
# call routes to the right concrete method.
[[case]]
name = "interface_runtime_dispatch_two_types"
spec = ["6.5:16"]
source = """
interface Counter {
    fn count(self) -> i32;
}

struct One {
    fn count(self) -> i32 { 1 }
}

struct Five {
    fn count(self) -> i32 { 5 }
}

fn invoke(t: Ref(Counter)) -> i32 {
    t.count()
}

fn main() -> i32 {
    let a = One {};
    let b = Five {};
    invoke(&a) + invoke(&b)
}
"""
exit_code = 6

# By-value `t: I` is rejected with a tailored message.
[[case]]
name = "interface_runtime_by_value_rejected"
spec = ["6.5:12"]
source = """
interface Marker {}

fn ignore(t: Marker) {
}

fn main() -> i32 {
    0
}
"""
compile_fail = true
error_contains = ["Ref(Marker)"]

# =============================================================================
# Ref(I) / MutRef(I) — ADR-0076 Phase 2
# =============================================================================

# `Ref(I)` is the new-form spelling of `t: Ref(I)`. Same fat-pointer ABI.
[[case]]
name = "interface_ref_new_form_empty"
spec = ["6.5:11", "6.5:12"]
description = "Ref(I) parameter accepts &x of conforming concrete type"
source = """
interface Marker {}

struct Foo {}

fn ignore(t: Ref(Marker)) {
}

fn main() -> i32 {
    let f = Foo {};
    ignore(&f);
    77
}
"""
exit_code = 77

# `Ref(I)` with a non-empty conforming struct, dispatching a method that
# reads a field through self: Ref(Self).
[[case]]
name = "interface_ref_new_form_dispatch"
spec = ["6.5:11", "6.5:14", "6.5:16"]
description = "Ref(I) param dispatches through the vtable on a non-empty conformer"
source = """
interface Counter {
    fn count(self: Ref(Self)) -> i32;
}

struct Box {
    n: i32,

    fn count(self: Ref(Self)) -> i32 { self.n }
}

fn invoke(t: Ref(Counter)) -> i32 {
    t.count()
}

fn main() -> i32 {
    let b = Box { n: 42 };
    invoke(&b)
}
"""
exit_code = 42

# `MutRef(I)` mirrors `t: MutRef(I)`.
[[case]]
name = "interface_mut_ref_new_form"
spec = ["6.5:11", "6.5:14"]
description = "MutRef(I) parameter accepts &mut x of conforming concrete type"
source = """
interface Marker {}

struct Foo {}

fn ignore(t: MutRef(Marker)) {
}

fn main() -> i32 {
    let mut f = Foo {};
    ignore(&mut f);
    9
}
"""
exit_code = 9

# Two distinct concrete types both flowing through the same generic
# function each get their own specialization.
[[case]]
name = "interface_comptime_two_types"
spec = ["6.5:9"]
source = """
interface Counter {
    fn count(self) -> i32;
}

struct One {
    fn count(self) -> i32 { 1 }
}

struct Ten {
    fn count(self) -> i32 { 10 }
}

fn pick(comptime T: Counter, t: T) -> i32 {
    t.count()
}

fn main() -> i32 {
    pick(One, One {}) + pick(Ten, Ten {})
}
"""
exit_code = 11

# Duplicate method names within one interface are rejected.
[[case]]
name = "interface_duplicate_method"
spec = ["6.5:4"]
source = """
interface Bad {
    fn foo(self);
    fn foo(self) -> i32;
}

fn main() -> i32 {
    0
}
"""
compile_fail = true
error_contains = "duplicate method"

# =============================================================================
# `Self` in interface signatures (ADR-0060)
# =============================================================================

# A candidate whose return type matches the candidate type itself satisfies
# `-> Self`.
[[case]]
name = "interface_self_return_conforms"
spec = ["6.5:18", "6.5:21"]
source = """
interface Cloner {
    fn clone(self) -> Self;
}

struct Foo {
    fn clone(self) -> Foo { Foo {} }
}

fn use_cloner(comptime T: Cloner, t: T) {
}

fn main() -> i32 {
    use_cloner(Foo, Foo {});
    7
}
"""
exit_code = 7

# A candidate whose return type is anything other than the candidate type
# fails to satisfy `-> Self`.
[[case]]
name = "interface_self_return_mismatch_rejected"
spec = ["6.5:18", "6.5:22"]
source = """
interface Cloner {
    fn clone(self) -> Self;
}

struct Foo {
    fn clone(self) -> i32 { 0 }
}

fn use_cloner(comptime T: Cloner, t: T) {
}

fn main() -> i32 {
    use_cloner(Foo, Foo {});
    0
}
"""
compile_fail = true
error_contains = "wrong signature"

# `Self` works in non-receiver parameter position too: must substitute to the
# candidate type.
[[case]]
name = "interface_self_param_conforms"
spec = ["6.5:18"]
source = """
interface Combiner {
    fn combine(self, other: Self) -> Self;
}

struct Foo {
    fn combine(self, other: Foo) -> Foo { other }
}

fn use_combiner(comptime T: Combiner, t: T) {
}

fn main() -> i32 {
    use_combiner(Foo, Foo {});
    0
}
"""
exit_code = 0

# =============================================================================
# Receiver modes on interface methods (ADR-0060)
# =============================================================================

# `self: Ref(Self)` on the interface requires `self: Ref(Self)` on the candidate.
[[case]]
name = "interface_borrow_self_conforms"
spec = ["6.5:19"]
source = """
interface Reader {
    fn read(self: Ref(Self)) -> i32;
}

struct Buf {
    n: i32,

    fn read(self: Ref(Self)) -> i32 { self.n }
}

fn use_reader(comptime T: Reader, t: T) {
}

fn main() -> i32 {
    use_reader(Buf, Buf { n: 0 });
    0
}
"""
exit_code = 0

# A by-value `self` on the candidate does not satisfy `self: Ref(Self)`.
[[case]]
name = "interface_receiver_mode_mismatch_rejected"
spec = ["6.5:19", "6.5:23"]
source = """
interface Reader {
    fn read(self: Ref(Self)) -> i32;
}

struct Buf {
    n: i32,

    fn read(self) -> i32 { self.n }
}

fn use_reader(comptime T: Reader, t: T) {
}

fn main() -> i32 {
    use_reader(Buf, Buf { n: 0 });
    0
}
"""
compile_fail = true
error_contains = "wrong signature"

# `Self` outside of an interface body is not a recognized type — using it as a
# function parameter type is an unknown-type error.
[[case]]
name = "self_outside_interface_rejected"
spec = ["6.5:20"]
source = """
fn id(x: Self) -> Self { x }

fn main() -> i32 {
    0
}
"""
compile_fail = true
error_contains = "Self"
