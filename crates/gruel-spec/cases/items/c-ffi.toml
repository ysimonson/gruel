# ADR-0085: C foreign function interface via `@mark(c)` and `link_extern` blocks.
#
# Phase 1 spec tests cover parsing surface and preview gating.

[section]
id = "items.c_ffi"
spec_chapter = "10"
name = "C foreign function interface (ADR-0085)"
description = "C ABI marker, `link_extern` blocks, and `@link_name`."

# -----------------------------------------------------------------------------
# Preview gating
# -----------------------------------------------------------------------------

[[case]]
name = "link_extern_requires_preview"
spec = ["10.2:9"]
description = "Using `link_extern` without `--preview c_ffi` is rejected."
source = """
link_extern("c") {
    fn abs(x: i32) -> i32;
}

fn main() -> i32 {
    abs(-5)
}
"""
compile_fail = true
error_contains = "requires preview feature"

[[case]]
name = "mark_c_struct_requires_preview"
spec = ["10.1:5"]
description = "Using `@mark(c)` on a struct without `--preview c_ffi` is rejected."
source = """
@mark(c) struct Point { x: i32, y: i32 }

fn main() -> i32 { 0 }
"""
compile_fail = true
error_contains = "requires preview feature"

# -----------------------------------------------------------------------------
# `link_extern` block: positive cases
# -----------------------------------------------------------------------------

[[case]]
name = "link_extern_single_fn"
spec = ["10.2:1", "10.2:2", "10.2:7"]
preview = "c_ffi"
preview_should_pass = true
description = "A `link_extern` block with one fn declaration; the fn is implicitly extern (10.2:2)."
source = """
link_extern("c") {
    fn abs(x: i32) -> i32;
}

fn main() -> i32 {
    abs(-5)
}
"""
exit_code = 5

[[case]]
name = "link_extern_multiple_fns"
spec = ["10.2:7"]
preview = "c_ffi"
preview_should_pass = true
description = "A `link_extern` block with multiple fn declarations."
source = """
link_extern("c") {
    fn abs(x: i32) -> i32;
    fn labs(x: i64) -> i64;
}

fn main() -> i32 {
    abs(-3) + abs(-4)
}
"""
exit_code = 7

[[case]]
name = "link_extern_empty_block"
spec = ["10.2:1"]
preview = "c_ffi"
preview_should_pass = true
description = "An empty `link_extern` block is permitted; it adds the `-l` flag without declaring any symbols."
source = """
link_extern("c") {}

fn main() -> i32 { 42 }
"""
exit_code = 42

[[case]]
name = "link_extern_link_name_override"
spec = ["10.2:8"]
preview = "c_ffi"
preview_should_pass = true
description = "`@link_name(\"…\")` overrides the linker symbol."
source = """
link_extern("c") {
    @link_name("abs") fn my_abs(x: i32) -> i32;
}

fn main() -> i32 {
    my_abs(-12)
}
"""
exit_code = 12

# -----------------------------------------------------------------------------
# `link_extern` block: rejection cases
# -----------------------------------------------------------------------------

[[case]]
name = "body_less_fn_outside_link_extern"
spec = ["10.2:3"]
preview = "c_ffi"
preview_should_pass = true
description = "Body-less fn declarations at top level are rejected."
source = """
fn abs(x: i32) -> i32;

fn main() -> i32 { 0 }
"""
compile_fail = true
error_contains = "expected"

[[case]]
name = "link_extern_item_with_body"
spec = ["10.2:4"]
preview = "c_ffi"
preview_should_pass = true
description = "A fn with a body inside `link_extern` is a parse error."
source = """
link_extern("c") {
    fn abs(x: i32) -> i32 { x }
}

fn main() -> i32 { 0 }
"""
compile_fail = true
error_contains = "expected"

[[case]]
name = "link_extern_nested_rejected"
spec = ["10.2:6"]
preview = "c_ffi"
preview_should_pass = true
description = "Nested `link_extern` blocks are not part of the grammar."
source = """
link_extern("c") {
    link_extern("m") {
        fn sin(x: f64) -> f64;
    }
}

fn main() -> i32 { 0 }
"""
compile_fail = true
error_contains = "expected"

[[case]]
name = "link_extern_empty_library_name_rejected"
spec = ["10.2:5"]
preview = "c_ffi"
preview_should_pass = true
description = "Empty library name `link_extern(\"\")` is rejected."
source = """
link_extern("") {
    fn abs(x: i32) -> i32;
}

fn main() -> i32 { 0 }
"""
compile_fail = true
error_contains = "library name"

# -----------------------------------------------------------------------------
# `@mark(c)` on enum is rejected
# -----------------------------------------------------------------------------

[[case]]
name = "mark_c_on_enum_rejected"
spec = ["10.1:1"]
preview = "c_ffi"
preview_should_pass = true
description = "`@mark(c)` is not yet valid on enums; the diagnostic points to the future enum-FFI ADR."
source = """
@mark(c) enum FileKind { Unknown, Regular, Directory }

fn main() -> i32 { 0 }
"""
compile_fail = true
error_contains = "applicable"

# -----------------------------------------------------------------------------
# `@mark(c)` on struct
# -----------------------------------------------------------------------------

[[case]]
name = "mark_c_struct_basic"
spec = ["10.1:3", "10.1:4"]
preview = "c_ffi"
preview_should_pass = true
description = "`@mark(c)` on a struct is accepted under the preview gate."
source = """
@mark(c) struct Point { x: i32, y: i32 }

fn main() -> i32 {
    let p = Point { x: 3, y: 4 };
    p.x + p.y
}
"""
exit_code = 7

[[case]]
name = "mark_c_fn_basic"
spec = ["10.1:2", "10.1:4"]
preview = "c_ffi"
preview_should_pass = true
description = "`@mark(c)` on a top-level fn (export) is accepted under the preview gate."
source = """
@mark(c) fn my_callback(x: i32) -> i32 { x + 1 }

fn main() -> i32 {
    my_callback(41)
}
"""
exit_code = 42
