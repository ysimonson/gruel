# ADR-0085: C foreign function interface via `@mark(c)` and `link_extern` blocks.
#
# Stable as of ADR-0085 Phase 5; tests no longer require `--preview c_ffi`.

[section]
id = "items.c_ffi"
spec_chapter = "10"
name = "C foreign function interface (ADR-0085)"
description = "C ABI marker, `link_extern` blocks, and `@link_name`."

# -----------------------------------------------------------------------------
# `link_extern` block: positive cases
# -----------------------------------------------------------------------------

[[case]]
name = "link_extern_single_fn"
spec = ["10.2:1", "10.2:2", "10.2:7"]
description = "A `link_extern` block with one fn declaration; the fn is implicitly extern (10.2:2)."
source = """
link_extern("c") {
    fn abs(x: i32) -> i32;
}

fn main() -> i32 {
    abs(-5)
}
"""
exit_code = 5

[[case]]
name = "link_extern_multiple_fns"
spec = ["10.2:7"]
description = "A `link_extern` block with multiple fn declarations."
source = """
link_extern("c") {
    fn abs(x: i32) -> i32;
    fn labs(x: i64) -> i64;
}

fn main() -> i32 {
    abs(-3) + abs(-4)
}
"""
exit_code = 7

[[case]]
name = "link_extern_empty_block"
spec = ["10.2:1"]
description = "An empty `link_extern` block is permitted; it adds the `-l` flag without declaring any symbols."
source = """
link_extern("c") {}

fn main() -> i32 { 42 }
"""
exit_code = 42

[[case]]
name = "link_extern_link_name_override"
spec = ["10.2:8"]
description = "`@link_name(\"…\")` overrides the linker symbol."
source = """
link_extern("c") {
    @link_name("abs") fn my_abs(x: i32) -> i32;
}

fn main() -> i32 {
    my_abs(-12)
}
"""
exit_code = 12

# -----------------------------------------------------------------------------
# `link_extern` block: rejection cases
# -----------------------------------------------------------------------------

[[case]]
name = "body_less_fn_outside_link_extern"
spec = ["10.2:3"]
description = "Body-less fn declarations at top level are rejected."
source = """
fn abs(x: i32) -> i32;

fn main() -> i32 { 0 }
"""
compile_fail = true
error_contains = "expected"

[[case]]
name = "link_extern_item_with_body"
spec = ["10.2:4"]
description = "A fn with a body inside `link_extern` is a parse error."
source = """
link_extern("c") {
    fn abs(x: i32) -> i32 { x }
}

fn main() -> i32 { 0 }
"""
compile_fail = true
error_contains = "expected"

[[case]]
name = "link_extern_nested_rejected"
spec = ["10.2:6"]
description = "Nested `link_extern` blocks are not part of the grammar."
source = """
link_extern("c") {
    link_extern("m") {
        fn sin(x: f64) -> f64;
    }
}

fn main() -> i32 { 0 }
"""
compile_fail = true
error_contains = "expected"

[[case]]
name = "link_extern_empty_library_name_rejected"
spec = ["10.2:5"]
description = "Empty library name `link_extern(\"\")` is rejected."
source = """
link_extern("") {
    fn abs(x: i32) -> i32;
}

fn main() -> i32 { 0 }
"""
compile_fail = true
error_contains = "library name"

# -----------------------------------------------------------------------------
# `@mark(c)` on enum is rejected
# -----------------------------------------------------------------------------

[[case]]
name = "mark_c_on_enum_rejected"
spec = ["10.1:1"]
description = "`@mark(c)` is not yet valid on enums; the diagnostic points to the future enum-FFI ADR."
source = """
@mark(c) enum FileKind { Unknown, Regular, Directory }

fn main() -> i32 { 0 }
"""
compile_fail = true
error_contains = "applicable"

# -----------------------------------------------------------------------------
# `@mark(c)` on struct
# -----------------------------------------------------------------------------

[[case]]
name = "mark_c_struct_basic"
spec = ["10.1:3", "10.1:4"]
description = "`@mark(c)` on a struct is accepted under the preview gate."
source = """
@mark(c) struct Point { x: i32, y: i32 }

fn main() -> i32 {
    let p = Point { x: 3, y: 4 };
    p.x + p.y
}
"""
exit_code = 7

[[case]]
name = "mark_c_fn_basic"
spec = ["10.1:2", "10.1:4"]
description = "`@mark(c)` on a top-level fn (export) is accepted under the preview gate."
source = """
@mark(c) fn my_callback(x: i32) -> i32 { x + 1 }

fn main() -> i32 {
    my_callback(41)
}
"""
exit_code = 42

# -----------------------------------------------------------------------------
# FFI type validation
# -----------------------------------------------------------------------------

[[case]]
name = "link_extern_struct_param_rejected"
spec = ["10.2:2"]
description = "Non-`@mark(c)` struct passed by value to an extern fn is rejected."
source = """
struct Plain { x: i32 }
link_extern("c") {
    fn takes_plain(p: Plain) -> i32;
}

fn main() -> i32 { 0 }
"""
compile_fail = true
error_contains = "FFI"

[[case]]
name = "mark_c_struct_with_non_c_field_rejected"
spec = ["10.1:3"]
description = "Field whose type is not C-compatible disqualifies the host struct."
source = """
struct Plain { x: i32 }
@mark(c) struct Outer { inner: Plain }

fn main() -> i32 { 0 }
"""
compile_fail = true
error_contains = "FFI"

[[case]]
name = "mark_c_struct_nested_c_struct_ok"
spec = ["10.1:3"]
description = "Nested `@mark(c) struct` field is permitted."
source = """
@mark(c) struct Inner { x: i32, y: i32 }
@mark(c) struct Outer { p: Inner, scale: i32 }

fn main() -> i32 {
    let inner = Inner { x: 3, y: 4 };
    let o = Outer { p: inner, scale: 2 };
    o.p.x + o.p.y + o.scale
}
"""
exit_code = 9

[[case]]
name = "link_name_without_c_abi_rejected"
spec = ["10.2:8"]
description = "`@link_name` on a non-C-ABI function is rejected."
source = """
@link_name("renamed") fn ordinary() -> i32 { 0 }

fn main() -> i32 { ordinary() }
"""
compile_fail = true
error_contains = "link_name"

[[case]]
name = "ffi_struct_roundtrip_gruel"
spec = ["10.1:3"]
description = "Gruel ↔ Gruel `@mark(c) struct` round-trip through a `@mark(c)` export fn."
source = """
@mark(c) struct Point { x: i32, y: i32 }
@mark(c) fn translate(p: Point, dx: i32, dy: i32) -> Point {
    Point { x: p.x + dx, y: p.y + dy }
}

fn main() -> i32 {
    let p = Point { x: 10, y: 20 };
    let q = translate(p, 1, 2);
    q.x + q.y
}
"""
exit_code = 33

[[case]]
name = "link_extern_libm_sqrt"
spec = ["10.2:7", "10.2:9"]
description = "End-to-end: link against libm, call `sqrt`, verify the `-lm` flag reaches the linker."
source = """
link_extern("m") {
    fn sqrt(x: f64) -> f64;
}

fn main() -> i32 {
    let r = sqrt(16.0);
    let i: i32 = @cast(r);
    i
}
"""
exit_code = 4

[[case]]
name = "mark_c_struct_drop_rejected"
spec = ["10.1:5"]
description = "`@mark(c) struct` cannot declare `fn __drop` in v1."
source = """
@mark(c) struct Resource {
    handle: i32,

    fn __drop(self) {}
}

fn main() -> i32 { 0 }
"""
compile_fail = true
error_contains = "cannot declare"

[[case]]
name = "link_extern_duplicate_import_rejected"
spec = ["10.2:1"]
description = "Declaring the same extern symbol twice is a compile error."
source = """
link_extern("c") {
    fn abs(x: i32) -> i32;
    fn abs(x: i32) -> i32;
}

fn main() -> i32 { 0 }
"""
compile_fail = true
error_contains = "abs"
