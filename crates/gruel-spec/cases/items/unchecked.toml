# Unchecked Code and Raw Pointers
#
# This tests the syntax support for:
# - `unchecked fn` modifier
# - `checked { }` block expressions
# - `Ptr(T)` and `MutPtr(T)` type syntax
#
# These features are now part of the language and do not require a preview feature.

[section]
id = "items.unchecked"
spec_chapter = "9.1"
name = "Unchecked Code"
description = "Unchecked functions, checked blocks, and raw pointer types for low-level memory access."

# =============================================================================
# Unchecked function modifier
# =============================================================================

[[case]]
name = "unchecked_fn_basic"
spec = ["9.1:1", "9.1:2"]
source = """
@mark(unchecked)
fn dangerous_op() -> i32 { 42 }
fn main() -> i32 { 0 }
"""
exit_code = 0

[[case]]
name = "unchecked_fn_with_params"
spec = ["9.1:1"]
source = """
@mark(unchecked)
fn read_memory(addr: i32) -> i32 { addr }
fn main() -> i32 { 0 }
"""
exit_code = 0

[[case]]
name = "pub_unchecked_fn"
spec = ["9.1:1"]
source = """
@mark(unchecked)
pub fn public_dangerous() -> i32 { 0 }
fn main() -> i32 { 0 }
"""
exit_code = 0

# =============================================================================
# Unchecked function call requires checked block (9.1:3)
# =============================================================================

[[case]]
name = "unchecked_fn_call_in_checked"
spec = ["9.1:3", "9.1:5"]
source = """
@mark(unchecked)
fn dangerous_op() -> i32 { 42 }
fn main() -> i32 {
    checked { dangerous_op() }
}
"""
exit_code = 42

[[case]]
name = "unchecked_fn_call_outside_checked"
spec = ["9.1:3"]
source = """
@mark(unchecked)
fn dangerous_op() -> i32 { 42 }
fn main() -> i32 {
    dangerous_op()
}
"""
compile_fail = true
error_contains = "can only be used inside a `checked` block"

[[case]]
name = "unchecked_fn_call_nested_checked"
spec = ["9.1:3", "9.1:5"]
source = """
@mark(unchecked)
fn inner() -> i32 { 10 }
@mark(unchecked)
fn outer() -> i32 {
    checked { inner() }
}
fn main() -> i32 {
    checked { outer() }
}
"""
exit_code = 10

# =============================================================================
# Checked block expressions
# =============================================================================

[[case]]
name = "checked_block_basic"
spec = ["9.1:5", "9.1:6", "9.1:7"]
source = """
fn main() -> i32 {
    let x = checked { 42 };
    x
}
"""
exit_code = 42

[[case]]
name = "checked_block_nested"
spec = ["9.1:5"]
source = """
fn main() -> i32 {
    checked {
        let x = 10;
        let y = 32;
        x + y
    }
}
"""
exit_code = 42

[[case]]
name = "checked_block_with_statements"
spec = ["9.1:5"]
source = """
fn main() -> i32 {
    let result = checked {
        let a = 20;
        let b = 22;
        a + b
    };
    result
}
"""
exit_code = 42

# =============================================================================
# Pointer intrinsics require checked block (9.1:8)
# =============================================================================

[[case]]
name = "raw_outside_checked_block_now_accepted"
spec = ["9.1:8"]
description = """
ADR-0088 reclassified `Ptr(T)::from(&x)`: the constructor itself
no longer requires `checked { }`. Subsequent dereferences (`p.read()`,
`p.write()`, `p.offset()`) still do.
"""
source = """
fn main() -> i32 {
    let x: i32 = 42;
    let _p = Ptr(i32)::from(&x);
    0
}
"""
exit_code = 0

[[case]]
name = "ptr_read_outside_checked_block"
spec = ["9.1:8"]
source = """
fn main() -> i32 {
    let x: i32 = 42;
    let p = checked { Ptr(i32)::from(&x) };
    p.read()
}
"""
compile_fail = true
error_contains = "can only be used inside a `checked` block"

[[case]]
name = "syscall_outside_checked_block"
spec = ["9.1:8"]
source = """
fn main() -> i32 {
    let n: u64 = 0;
    let result: i64 = @syscall(n);
    0
}
"""
compile_fail = true
error_contains = "can only be used inside a `checked` block"

# =============================================================================
# Pointer type syntax
# =============================================================================

[[case]]
name = "ptr_const_type_in_param"
spec = ["9.1:10", "9.1:11"]
source = """
fn takes_ptr(p: Ptr(i32)) -> i32 { 0 }
fn main() -> i32 { 0 }
"""
exit_code = 0

[[case]]
name = "ptr_mut_type_in_param"
spec = ["9.1:10"]
source = """
fn takes_mut_ptr(p: MutPtr(i32)) -> i32 { 0 }
fn main() -> i32 { 0 }
"""
exit_code = 0

[[case]]
name = "ptr_const_return_type"
spec = ["9.1:10"]
source = """
// Test that Ptr(T) can be used as a return type
// Pass the pointer through to verify the return type is recognized
fn identity_ptr(p: Ptr(i32)) -> Ptr(i32) { p }
fn main() -> i32 { 0 }
"""
exit_code = 0

[[case]]
name = "ptr_to_struct_type"
spec = ["9.1:10"]
source = """
struct Point { x: i32, y: i32 }
fn takes_point_ptr(p: Ptr(Point)) -> i32 { 0 }
fn main() -> i32 { 0 }
"""
exit_code = 0
