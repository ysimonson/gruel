[section]
id = "items.c_ffi_enum"
spec_chapter = "10.4"
name = "Field-less @mark(c) enum"
description = "ADR-0086 Phase 2: @mark(c) enum on field-less enums lowers to a c_int discriminant."

# =============================================================================
# Field-less @mark(c) enum: declaration + FFI roundtrip
# =============================================================================

[[case]]
name = "field_less_enum_compiles"
spec = ["10.1:1", "10.4:1", "10.4:2", "10.4:3"]
source = """
@mark(c) enum Color {
    Red,
    Green,
    Blue,
}

fn main() -> i32 {
    let c: Color = Color::Red;
    0
}
"""
exit_code = 0

[[case]]
name = "field_less_enum_ffi_roundtrip"
spec = ["10.4:4"]
source = """
@mark(c) enum Color {
    Red,
    Green,
    Blue,
}

@mark(c) fn first() -> Color {
    Color::Red
}

fn main() -> i32 {
    let c: Color = first();
    0
}
"""
exit_code = 0

# =============================================================================
# Data-carrying enums (Phase 3)
# =============================================================================

[[case]]
name = "data_carrying_mark_c_enum_accepted_at_ffi"
spec = ["10.4:5"]
source = """
@mark(c) enum Event {
    Quit,
    KeyPress(c_int),
}

@mark(c) fn pick() -> Event {
    Event::Quit
}

fn main() -> i32 {
    let e: Event = pick();
    0
}
"""
exit_code = 0

[[case]]
name = "data_carrying_mark_c_enum_non_ffi_payload_rejected"
spec = ["10.4:5"]
source = """
struct NonC {
    x: i32,
}

@mark(c) enum Bad {
    Quit,
    Has(NonC),
}

link_extern("foo") {
    @mark(unchecked) fn bad() -> Bad;
}

fn main() -> i32 { 0 }
"""
compile_fail = true
error_contains = "non-FFI type"

# =============================================================================
# Non-@mark(c) enum is still rejected at the FFI boundary
# =============================================================================

[[case]]
name = "plain_enum_rejected_at_ffi"
spec = ["10.4:6"]
source = """
enum Color {
    Red,
    Green,
    Blue,
}

link_extern("foo") {
    @mark(unchecked) fn pick() -> Color;
}

fn main() -> i32 { 0 }
"""
compile_fail = true
error_contains = "non-`@mark(c)` enum"
