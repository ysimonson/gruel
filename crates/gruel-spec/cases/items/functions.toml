[[case]]
name = "inout_param_{variant}"
spec = ["6.1:14", "6.1:15", "6.1:16", "6.1:18"]
description = "Basic inout parameter operations"
source = """
fn {fn_name}(inout x: i32{extra_params}) {
    {body}
}
fn main() -> i32 {
    let mut n = {init};
    {calls};
    n
}
"""
params = [
  { variant = "increment", fn_name = "increment", extra_params = "", body = "x = x + 1;", init = "41", calls = "increment(inout n)", exit_code = 42 },
  { variant = "double", fn_name = "double", extra_params = "", body = "x = x * 2;", init = "21", calls = "double(inout n)", exit_code = 42 },
  { variant = "multiple_calls", fn_name = "increment", extra_params = "", body = "x = x + 1;", init = "39", calls = "increment(inout n); increment(inout n); increment(inout n)", exit_code = 42 },
  { variant = "with_regular", fn_name = "add_to", extra_params = ", amount: i32", body = "x = x + amount;", init = "32", calls = "add_to(inout n, 10)", exit_code = 42, spec_extra = ["6.1:15"] },
]

[[case]]
name = "inout_param_swap"
spec = ["6.1:14", "6.1:18"]
description = "Multiple inout parameters for swap"
source = """
fn swap(inout a: i32, inout b: i32) {
    let tmp = a;
    a = b;
    b = tmp;
}
fn main() -> i32 {
    let mut x = 10;
    let mut y = 42;
    swap(inout x, inout y);
    x
}
"""
exit_code = 42

# ADR-0062 phase 6: passing `&mut x` to a `MutRef(T)` parameter works at
# the call site. Mutation through a typed reference requires deref syntax,
# which is future work; for now the test only exercises the call shape.
[[case]]
name = "mut_ref_param_call"
spec = ["6.1:34", "6.1:37"]
preview = "reference_types"
preview_should_pass = true
source = """
fn touch(a: MutRef(i32), b: MutRef(i32)) -> i32 {
    42
}
fn main() -> i32 {
    let mut x = 10;
    let mut y = 1;
    touch(&mut x, &mut y)
}
"""
exit_code = 42

[[case]]
name = "inout_param_return_value"
spec = ["6.1:14", "6.1:18"]
description = "Inout function that also returns a value"
source = """
fn increment_and_return_old(inout x: i32) -> i32 {
    let old = x;
    x = x + 1;
    old
}
fn main() -> i32 {
    let mut n = 41;
    let old = increment_and_return_old(inout n);
    old + 1
}
"""
exit_code = 42

[[case]]
name = "inout_value_valid_after_call"
spec = ["6.1:18"]
description = "Variable is still valid after inout call (no ownership transfer)"
source = """
fn double(inout x: i32) {
    x = x * 2;
}
fn main() -> i32 {
    let mut n = 10;
