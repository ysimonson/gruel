# =============================================================================
# Enum Data Variant Construction
# =============================================================================

[[case]]
name = "enum_data_variant_construct_basic"
spec = ["6.3:14", "6.3:15"]
source = """
enum IntOption { Some(i32), None }
fn main() -> i32 {
    let _x = IntOption::Some(42);
    0
}
"""
exit_code = 0

[[case]]
name = "enum_data_variant_construct_none"
spec = ["6.3:14"]
source = """
enum IntOption { Some(i32), None }
fn main() -> i32 {
    let _x = IntOption::None;
    0
}
"""
exit_code = 0

[[case]]
name = "enum_data_variant_construct_and_match"
spec = ["6.3:14"]
source = """
enum IntOption { Some(i32), None }
fn main() -> i32 {
    let x = IntOption::Some(42);
    match x {
        IntOption::Some => 42,
        IntOption::None => 0,
    }
}
"""
exit_code = 42

[[case]]
name = "enum_data_variant_wrong_arg_count_error"
spec = ["6.3:14"]
source = """
enum IntOption { Some(i32), None }
fn main() -> i32 {
    let _x = IntOption::Some(1, 2);
    0
}
"""
compile_fail = true
error_contains = "expected 1 argument"

[[case]]
name = "enum_data_variant_type_mismatch_error"
spec = ["6.3:14"]
source = """
enum IntOption { Some(i32), None }
fn main() -> i32 {
    let _x = IntOption::Some(true);
    0
}
"""
compile_fail = true
error_contains = "type mismatch"

# =============================================================================
# Data Variant Pattern Matching
# =============================================================================

[[case]]
name = "enum_data_variant_pattern_basic"
spec = ["6.3:16", "6.3:17", "6.3:18"]
source = """
enum IntOption { Some(i32), None }
fn main() -> i32 {
    let x = IntOption::Some(42);
    match x {
        IntOption::Some(v) => v,
        IntOption::None => 0,
    }
}
"""
exit_code = 42

[[case]]
name = "enum_data_variant_pattern_none_arm"
spec = ["6.3:16", "6.3:18"]
source = """
enum IntOption { Some(i32), None }
fn main() -> i32 {
    let x = IntOption::None;
    match x {
        IntOption::Some(v) => v,
        IntOption::None => 99,
    }
}
"""
exit_code = 99

[[case]]
name = "enum_data_variant_pattern_multi_field"
spec = ["6.3:16", "6.3:17"]
source = """
enum Pair { Data(i32, i32), Empty }
fn main() -> i32 {
    let x = Pair::Data(10, 32);
    match x {
        Pair::Data(a, b) => a + b,
        Pair::Empty => 0,
    }
}
"""
exit_code = 42

[[case]]
name = "enum_data_variant_pattern_wildcard_binding"
spec = ["6.3:16"]
source = """
enum Pair { Data(i32, i32), Empty }
fn main() -> i32 {
    let x = Pair::Data(42, 99);
    match x {
        Pair::Data(v, _) => v,
        Pair::Empty => 0,
    }
}
"""
exit_code = 42

[[case]]
name = "enum_data_variant_pattern_wrong_count_error"
spec = ["6.3:17"]
source = """
enum IntOption { Some(i32), None }
fn main() -> i32 {
    let x = IntOption::Some(42);
    match x {
        IntOption::Some(a, b) => a + b,
        IntOption::None => 0,
    }
}
"""
compile_fail = true
error_contains = "expected 1 argument"

# =============================================================================
# Drop Dispatch for Data Enums
# =============================================================================

[[case]]
name = "enum_data_variant_drop_some"
spec = ["6.3:19"]
source = """
struct Tracker { value: i32 }

drop fn Tracker(self) {
    @dbg(self.value);
}

enum MaybeTracker { Some(Tracker), None }

fn main() -> i32 {
    let _t = MaybeTracker::Some(Tracker { value: 42 });
    0
}
"""
exit_code = 0
stdout = "42\n"

[[case]]
name = "enum_data_variant_drop_none_no_destructor"
spec = ["6.3:19"]
source = """
struct Tracker { value: i32 }

drop fn Tracker(self) {
    @dbg(self.value);
}

enum MaybeTracker { Some(Tracker), None }

fn main() -> i32 {
    let _t = MaybeTracker::None;
    0
}
"""
exit_code = 0
stdout = ""

# =============================================================================
# Layout Correctness
# =============================================================================

[[case]]
name = "enum_data_variant_i64_field"
spec = ["6.3:20"]
source = """
enum BigOption { Some(i64), None }
fn get(x: BigOption) -> i32 {
    match x {
        BigOption::Some(v) => @intCast(v),
        BigOption::None => 0,
    }
}
fn main() -> i32 {
    let v: i64 = 42;
    get(BigOption::Some(v))
}
"""
exit_code = 42

[[case]]
name = "enum_data_variant_mixed_i8_i32_fields"
spec = ["6.3:20"]
source = """
enum Tagged { AB(i8, i32), C }
fn get(x: Tagged) -> i32 {
    match x {
        Tagged::AB(a, b) => @intCast(a) + b,
        Tagged::C => 0,
    }
}
fn main() -> i32 {
    let a: i8 = 1;
    get(Tagged::AB(a, 41))
}
"""
exit_code = 42

[[case]]
name = "enum_data_variant_i64_then_i8_offsets"
spec = ["6.3:20"]
source = """
enum Pair { Data(i64, i8), Empty }
fn get(x: Pair) -> i32 {
    match x {
        Pair::Data(a, b) => @intCast(a) + @intCast(b),
        Pair::Empty => 0,
    }
}
fn main() -> i32 {
    let a: i64 = 38;
    let b: i8 = 4;
    get(Pair::Data(a, b))
}
"""
exit_code = 42
