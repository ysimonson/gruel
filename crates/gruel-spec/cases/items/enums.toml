# =============================================================================
# Match on Enum
# =============================================================================

[[case]]
name = "match_enum_exhaustive"
spec = ["4.7:7", "4.7:10", "6.3:7", "6.3:8"]
source = """
enum Color { Red, Green, Blue }
fn main() -> i32 {
    let c = Color::Green;
    match c {
        Color::Red => 1,
        Color::Green => 2,
        Color::Blue => 3,
    }
}
"""
exit_code = 2

[[case]]
name = "match_enum_with_wildcard"
spec = ["4.7:4", "4.7:7", "4.7:10", "6.3:7", "6.3:8"]
source = """
enum Color { Red, Green, Blue }
fn main() -> i32 {
    let c = Color::Blue;
    match c {
        Color::Red => 1,
        _ => 99,
    }
}
"""
exit_code = 99

[[case]]
name = "match_enum_non_exhaustive_error"
spec = ["4.7:9", "4.7:10", "6.3:8"]
source = """
enum Color { Red, Green, Blue }
fn main() -> i32 {
    let c = Color::Red;
    match c {
        Color::Red => 1,
        Color::Green => 2,
    }
}
"""
compile_fail = true
error_contains = "exhaustive"

[[case]]
name = "match_enum_first_variant"
spec = ["4.7:7", "4.7:10", "6.3:7"]
source = """
enum Color { Red, Green, Blue }
fn main() -> i32 {
    let c = Color::Red;
    match c {
        Color::Red => 42,
        Color::Green => 0,
        Color::Blue => 0,
    }
}
"""
exit_code = 42

[[case]]
name = "match_enum_last_variant"
spec = ["4.7:7", "4.7:10", "6.3:7"]
source = """
enum Color { Red, Green, Blue }
fn main() -> i32 {
    let c = Color::Blue;
    match c {
        Color::Red => 0,
        Color::Green => 0,
        Color::Blue => 42,
    }
}
"""
exit_code = 42

# =============================================================================
# Enum in Function Parameters and Return Types
# =============================================================================

[[case]]
name = "enum_as_parameter"
spec = ["6.3:10"]
source = """
enum Color { Red, Green, Blue }
fn color_value(c: Color) -> i32 {
    match c {
        Color::Red => 1,
        Color::Green => 2,
        Color::Blue => 3,
    }
}
fn main() -> i32 {
    color_value(Color::Green)
}
"""
exit_code = 2

[[case]]
name = "enum_as_return"
spec = ["6.3:10"]
source = """
enum Color { Red, Green, Blue }
fn get_color() -> Color {
    Color::Blue
}
fn main() -> i32 {
    match get_color() {
        Color::Red => 1,
        Color::Green => 2,
        Color::Blue => 42,
    }
}
"""
exit_code = 42

# =============================================================================
# Enum in Struct Fields
# =============================================================================

[[case]]
name = "enum_in_struct"
spec = ["6.3:10"]
source = """
enum Color { Red, Green, Blue }
struct Pixel { color: Color, x: i32 }
fn main() -> i32 {
    let p = Pixel { color: Color::Red, x: 42 };
    p.x
}
"""
exit_code = 42

