[section]
id = "items.enums"
spec_chapter = "6.3"
name = "Enums"
description = "Enum definitions and enum variants."

# =============================================================================
# Enum Definition
# =============================================================================

[[case]]
name = "enum_basic"
spec = ["6.3:1", "6.3:2"]
source = """
enum Color { Red, Green, Blue }
fn main() -> i32 {
    let c = Color::Red;
    0
}
"""
exit_code = 0

[[case]]
name = "enum_single_variant"
spec = ["6.3:1"]
source = """
enum Single { Only }
fn main() -> i32 {
    let s = Single::Only;
    0
}
"""
exit_code = 0

[[case]]
name = "enum_many_variants"
spec = ["6.3:1"]
source = """
enum Direction { North, East, South, West }
fn main() -> i32 {
    let d = Direction::South;
    0
}
"""
exit_code = 0

[[case]]
name = "enum_zero_variants"
spec = ["6.3:1", "6.3:12"]
source = """
enum Void {}
fn main() -> i32 {
    0
}
"""
exit_code = 0

[[case]]
name = "enum_zero_variants_as_param"
spec = ["6.3:10", "6.3:12"]
source = """
enum Void {}
fn takes_void(v: Void) -> i32 {
    0
}
fn main() -> i32 {
    0
}
"""
exit_code = 0

