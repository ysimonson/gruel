# Reference Types (ADR-0062)
#
# Tests for the `Ref(T)` / `MutRef(T)` types and the `&x` / `&mut x`
# construction expressions.

[section]
id = "items.reference_types"
spec_chapter = "6.1"
name = "Reference Types"
description = "Tests for ADR-0062 Ref(T) / MutRef(T) and & / &mut prefix expressions."

# =============================================================================
# Basic Ref(T) construction and pass-through
# =============================================================================

[[case]]
name = "ref_pass_to_function"
spec = ["6.1:34", "6.1:37", "6.1:38"]
source = """
fn read(r: Ref(i32)) -> i32 {
    42
}

fn main() -> i32 {
    let x: i32 = 7;
    read(&x)
}
"""
exit_code = 42

# =============================================================================
# MutRef(T) construction
# =============================================================================

[[case]]
name = "mut_ref_pass_to_function"
spec = ["6.1:34", "6.1:35", "6.1:37"]
source = """
fn write_42(r: MutRef(i32)) {
}

fn main() -> i32 {
    let mut x: i32 = 0;
    write_42(&mut x);
    42
}
"""
exit_code = 42

# =============================================================================
# Ref(T) bound by `let`, then passed
# =============================================================================

[[case]]
name = "ref_let_binding"
spec = ["6.1:34", "6.1:37"]
source = """
fn read(r: Ref(i32)) -> i32 {
    42
}

fn main() -> i32 {
    let x: i32 = 7;
    let r: Ref(i32) = &x;
    read(r)
}
"""
exit_code = 42

# =============================================================================
# `&` of a non-lvalue is rejected
# =============================================================================

[[case]]
name = "ref_of_literal_rejected"
spec = ["6.1:36"]
source = """
fn read(r: Ref(i32)) -> i32 {
    0
}

fn main() -> i32 {
    read(&42)
}
"""
compile_fail = true
error_contains = "must be a variable, field, or array element"

# =============================================================================
# `&mut x` requires `x` to be mutable
# =============================================================================

[[case]]
name = "mut_ref_of_immutable_rejected"
spec = ["6.1:34", "6.1:40"]
source = """
fn write_42(r: MutRef(i32)) {
}

fn main() -> i32 {
    let x: i32 = 0;
    write_42(&mut x);
    0
}
"""
compile_fail = true
error_contains = "immutable"

# =============================================================================
# `&x` does not move x — exclusivity / unmove semantics carry over from
# ADR-0013, just triggered by the type instead of the param mode.
# =============================================================================

[[case]]
name = "ref_does_not_move"
spec = ["6.1:34"]
source = """
struct Point { x: i32, y: i32 }

fn read(r: Ref(Point)) -> i32 {
    21
}

fn main() -> i32 {
    let p = Point { x: 1, y: 2 };
    let a = read(&p);
    let b = read(&p);
    a + b
}
"""
exit_code = 42

# =============================================================================
# Two `&mut x` to the same variable in one call → exclusivity error
# =============================================================================

[[case]]
name = "two_mut_refs_same_var_rejected"
spec = ["6.1:34", "6.1:39"]
source = """
fn swap(a: MutRef(i32), b: MutRef(i32)) {
}

fn main() -> i32 {
    let mut x: i32 = 0;
    swap(&mut x, &mut x);
    0
}
"""
compile_fail = true
error_contains = "multiple inout"

# =============================================================================
# Method receivers (ADR-0062 phase 4): `&self` is sugar for `borrow self`.
# =============================================================================

[[case]]
name = "ref_self_method_receiver"
spec = ["6.1:34", "6.1:42"]
source = """
struct Counter {
    n: i32,

    fn read(&self) -> i32 { self.n }
}

fn main() -> i32 {
    let c = Counter { n: 42 };
    c.read()
}
"""
exit_code = 42

# `&mut self` lowers to a mutable receiver: the method body can write
# through `self.field`, and the receiver isn't consumed at the call site.
[[case]]
name = "mut_ref_self_method_mutates"
spec = ["6.1:34", "6.1:42"]
source = """
struct Counter {
    n: i32,

    fn bump(&mut self) {
        self.n = self.n + 1;
    }
}

fn main() -> i32 {
    let mut c = Counter { n: 0 };
    c.bump();
    c.bump();
    c.bump();
    c.n
}
"""
exit_code = 3

# `&self` borrows the receiver: a method can be called many times in a row
# on the same non-Copy value without consuming it.
[[case]]
name = "ref_self_method_does_not_consume"
spec = ["6.1:34", "6.1:42"]
source = """
struct R {
    n: i32,

    fn get(&self) -> i32 { self.n }
}

fn main() -> i32 {
    let r = R { n: 21 };
    let a = r.get();
    let b = r.get();
    a + b
}
"""
exit_code = 42

# Through-read of a struct via `Ref(T)` parameter: field projection works.
[[case]]
name = "ref_param_field_projection"
spec = ["6.1:34", "6.1:38"]
source = """
struct Point { x: i32, y: i32 }

fn add_xy(p: Ref(Point)) -> i32 {
    p.x + p.y
}

fn main() -> i32 {
    let p = Point { x: 10, y: 32 };
    add_xy(&p)
}
"""
exit_code = 42

# Through-write of an array via `MutRef(T)` parameter: writing through the
# reference modifies the caller's value.
[[case]]
name = "mut_ref_param_writes_through"
spec = ["6.1:34", "6.1:35"]
source = """
fn double_all(arr: MutRef([i32; 3])) {
    let mut i: usize = 0;
    while i < 3 {
        arr[i] = arr[i] * 2;
        i = i + 1;
    }
}

fn main() -> i32 {
    let mut values = [10, 20, 12];
    double_all(&mut values);
    values[0] + values[1] + values[2]
}
"""
exit_code = 84

# Through-read of a scalar via `Ref(i32)`: the parameter behaves like a
# value of the referent type at use sites.
[[case]]
name = "ref_param_scalar_read"
spec = ["6.1:34"]
source = """
fn double_int(r: Ref(i32)) -> i32 {
    r * 2
}

fn main() -> i32 {
    let x: i32 = 21;
    double_int(&x)
}
"""
exit_code = 42

# =============================================================================
# Returning a `Ref(T)` from a function is rejected (non-escape rule).
# =============================================================================

[[case]]
name = "ref_cannot_escape_function"
spec = ["6.1:34", "6.1:41"]
source = """
fn make_ref() -> Ref(i32) {
    let x: i32 = 7;
    return &x;
}

fn main() -> i32 {
    0
}
"""
compile_fail = true
error_contains = "cannot escape"

# =============================================================================
# Bare-name write-through (ADR-0076 Phase 3)
# =============================================================================

# Scalar `MutRef(T)` parameter: bare-name `r = v` writes through.
[[case]]
name = "mut_ref_scalar_param_write_through"
spec = ["6.1:43", "6.1:45"]
description = "Bare-name assignment writes through a MutRef(i32) parameter"
source = """
fn set(r: MutRef(i32), v: i32) {
    r = v;
}

fn main() -> i32 {
    let mut x: i32 = 0;
    set(&mut x, 42);
    x
}
"""
exit_code = 42

# Scalar `MutRef(T)` local binding: same rule.
[[case]]
name = "mut_ref_scalar_local_write_through"
spec = ["6.1:43", "6.1:45", "6.1:46"]
description = "Bare-name assignment writes through a MutRef(i32) local"
source = """
fn main() -> i32 {
    let mut x: i32 = 0;
    let r: MutRef(i32) = &mut x;
    r = 42;
    x
}
"""
exit_code = 42

# `Ref(T)` is read-only: bare-name assign through a local Ref binding is
# rejected.
[[case]]
name = "ref_local_bare_assign_rejected"
spec = ["6.1:44"]
description = "`r = v` on a Ref(T) local is a compile-time error"
source = """
fn main() -> i32 {
    let x: i32 = 7;
    let r: Ref(i32) = &x;
    r = 5;
    0
}
"""
compile_fail = true
error_contains = "borrow"
