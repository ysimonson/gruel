# Reference Types (ADR-0062)
#
# Tests for the `Ref(T)` / `MutRef(T)` types and the `&x` / `&mut x`
# construction expressions. Preview-gated until ADR-0062 phase 8.

[section]
id = "items.reference_types"
spec_chapter = "6.1"
name = "Reference Types"
description = "Tests for ADR-0062 Ref(T) / MutRef(T) and & / &mut prefix expressions."

# =============================================================================
# Basic Ref(T) construction and pass-through
# =============================================================================

[[case]]
name = "ref_pass_to_function"
spec = ["6.1:34", "6.1:37", "6.1:38"]
preview = "reference_types"
preview_should_pass = true
source = """
fn read(r: Ref(i32)) -> i32 {
    42
}

fn main() -> i32 {
    let x: i32 = 7;
    read(&x)
}
"""
exit_code = 42

# =============================================================================
# MutRef(T) construction
# =============================================================================

[[case]]
name = "mut_ref_pass_to_function"
spec = ["6.1:34", "6.1:35", "6.1:37"]
preview = "reference_types"
preview_should_pass = true
source = """
fn write_42(r: MutRef(i32)) {
}

fn main() -> i32 {
    let mut x: i32 = 0;
    write_42(&mut x);
    42
}
"""
exit_code = 42

# =============================================================================
# Ref(T) bound by `let`, then passed
# =============================================================================

[[case]]
name = "ref_let_binding"
spec = ["6.1:34", "6.1:37"]
preview = "reference_types"
preview_should_pass = true
source = """
fn read(r: Ref(i32)) -> i32 {
    42
}

fn main() -> i32 {
    let x: i32 = 7;
    let r: Ref(i32) = &x;
    read(r)
}
"""
exit_code = 42

# =============================================================================
# `&` requires preview gate
# =============================================================================

[[case]]
name = "ref_requires_preview"
spec = ["6.1:34"]
source = """
fn read(r: Ref(i32)) -> i32 {
    42
}

fn main() -> i32 {
    let x: i32 = 7;
    read(&x)
}
"""
compile_fail = true
error_contains = "reference_types"

# =============================================================================
# `&mut` requires preview gate
# =============================================================================

[[case]]
name = "mut_ref_requires_preview"
spec = ["6.1:34"]
source = """
fn write_42(r: MutRef(i32)) {
}

fn main() -> i32 {
    let mut x: i32 = 0;
    write_42(&mut x);
    42
}
"""
compile_fail = true
error_contains = "reference_types"

# =============================================================================
# `&` of a non-lvalue is rejected
# =============================================================================

[[case]]
name = "ref_of_literal_rejected"
spec = ["6.1:36"]
preview = "reference_types"
preview_should_pass = true
source = """
fn read(r: Ref(i32)) -> i32 {
    0
}

fn main() -> i32 {
    read(&42)
}
"""
compile_fail = true
error_contains = "must be a variable, field, or array element"

# =============================================================================
# `&mut x` requires `x` to be mutable
# =============================================================================

[[case]]
name = "mut_ref_of_immutable_rejected"
spec = ["6.1:34"]
preview = "reference_types"
preview_should_pass = true
source = """
fn write_42(r: MutRef(i32)) {
}

fn main() -> i32 {
    let x: i32 = 0;
    write_42(&mut x);
    0
}
"""
compile_fail = true
error_contains = "immutable"

# =============================================================================
# `&x` does not move x — exclusivity / unmove semantics carry over from
# ADR-0013, just triggered by the type instead of the param mode.
# =============================================================================

[[case]]
name = "ref_does_not_move"
spec = ["6.1:34"]
preview = "reference_types"
preview_should_pass = true
source = """
struct Point { x: i32, y: i32 }

fn read(r: Ref(Point)) -> i32 {
    21
}

fn main() -> i32 {
    let p = Point { x: 1, y: 2 };
    let a = read(&p);
    let b = read(&p);
    a + b
}
"""
exit_code = 42

# =============================================================================
# Two `&mut x` to the same variable in one call → exclusivity error
# =============================================================================

[[case]]
name = "two_mut_refs_same_var_rejected"
spec = ["6.1:34"]
preview = "reference_types"
preview_should_pass = true
source = """
fn swap(a: MutRef(i32), b: MutRef(i32)) {
}

fn main() -> i32 {
    let mut x: i32 = 0;
    swap(&mut x, &mut x);
    0
}
"""
compile_fail = true
error_contains = "multiple inout"

# =============================================================================
# Method receivers (ADR-0062 phase 4): `&self` is sugar for `borrow self`.
# =============================================================================

[[case]]
name = "ref_self_method_receiver"
spec = ["6.1:34"]
preview = "reference_types"
preview_should_pass = true
source = """
struct Counter {
    n: i32,

    fn read(&self) -> i32 { self.n }
}

fn main() -> i32 {
    let c = Counter { n: 42 };
    c.read()
}
"""
exit_code = 42

# `&mut self` parses and lowers to `inout self`. Mutation inside a struct
# method body is a separate (pre-existing) restriction shared with the
# legacy `inout self` form, so this test only exercises a method whose
# body does not modify `self`.
[[case]]
name = "mut_ref_self_method_receiver_parses"
spec = ["6.1:34"]
preview = "reference_types"
preview_should_pass = true
source = """
struct Counter {
    n: i32,

    fn touch(&mut self) -> i32 { 42 }
}

fn main() -> i32 {
    let mut c = Counter { n: 0 };
    c.touch()
}
"""
exit_code = 42

# =============================================================================
# Returning a `Ref(T)` from a function is rejected (non-escape rule).
# =============================================================================

[[case]]
name = "ref_cannot_escape_function"
spec = ["6.1:34"]
preview = "reference_types"
preview_should_pass = true
source = """
fn make_ref() -> Ref(i32) {
    let x: i32 = 7;
    return &x;
}

fn main() -> i32 {
    0
}
"""
compile_fail = true
error_contains = "cannot escape"
