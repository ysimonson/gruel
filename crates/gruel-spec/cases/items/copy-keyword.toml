# ADR-0083: posture-consistency, mutual exclusion, and drop interaction
#
# This file used to host ADR-0080's `copy`/`linear` keyword tests. After
# ADR-0083 Phase 4 retired the keyword path, the tests here exercise the
# same posture rules through the `@mark(...)` directive form. The new
# directive-only assertions live in `mark-directive.toml`; this file
# keeps the consistency and drop-interaction coverage that was already
# in place.

[section]
id = "items.copy_keyword"
spec_chapter = "3.8"
name = "Posture consistency under `@mark(...)` (ADR-0083)"
description = "Posture-consistency, mutual-exclusion, and drop-interaction tests originally written for ADR-0080's keyword form, kept under the directive form after ADR-0083 Phase 4."

# =============================================================================
# Parse-only acceptance
# =============================================================================

[[case]]
name = "copy_struct_parses"
preview = "mark_directive"
preview_should_pass = true
spec = ["3.8:14"]
source = """
@mark(copy) struct Point { x: i32, y: i32 }
fn main() -> i32 {
    let p = Point { x: 1, y: 2 };
    p.x + p.y
}
"""
exit_code = 3

[[case]]
name = "copy_enum_parses"
preview = "mark_directive"
preview_should_pass = true
spec = ["3.8:14"]
source = """
@mark(copy) enum Color { Red, Green, Blue }
fn main() -> i32 {
    let c = Color::Red;
    match c {
        Color::Red => 1,
        Color::Green => 2,
        Color::Blue => 3,
    }
}
"""
exit_code = 1

[[case]]
name = "linear_enum_parses"
preview = "mark_directive"
preview_should_pass = true
spec = ["3.8:30"]
source = """
@mark(linear) enum Resource { Open, Closed }
fn consume(r: Resource) -> i32 {
    match r {
        Resource::Open => 1,
        Resource::Closed => 0,
    }
}
fn main() -> i32 {
    let r = Resource::Open;
    consume(r)
}
"""
exit_code = 1

# =============================================================================
# `copy` remains a valid identifier
# =============================================================================

[[case]]
name = "copy_method_name_still_works"
spec = ["3.8:14"]
source = """
struct Counter {
    value: i32,

    fn copy(self: Ref(Self)) -> Counter {
        Counter { value: self.value }
    }
}
fn main() -> i32 {
    let c = Counter { value: 42 };
    let d = c.copy();
    d.value
}
"""
exit_code = 42

[[case]]
name = "copy_local_variable_still_works"
spec = ["3.8:14"]
source = """
fn main() -> i32 {
    let copy = 42;
    copy
}
"""
exit_code = 42

# =============================================================================
# Mutual exclusion with `linear`
# =============================================================================

[[case]]
name = "linear_copy_struct_rejected"
preview = "mark_directive"
preview_should_pass = true
spec = ["3.8:62"]
source = """
linear @mark(copy) struct Bad { x: i32 }
fn main() -> i32 { 0 }
"""
compile_fail = true

[[case]]
name = "copy_linear_struct_rejected"
preview = "mark_directive"
preview_should_pass = true
spec = ["3.8:62"]
source = """
copy @mark(linear) struct Bad { x: i32 }
fn main() -> i32 { 0 }
"""
compile_fail = true

# =============================================================================
# Declared posture flows into is_type_copy / is_type_linear
# =============================================================================

[[case]]
name = "copy_struct_is_copy_by_assignment"
preview = "mark_directive"
preview_should_pass = true
spec = ["3.8:14", "3.8:16"]
description = "ADR-0080: a `copy struct` is implicitly duplicated on `let b = a`."
source = """
@mark(copy) struct Point { x: i32, y: i32 }
fn main() -> i32 {
    let p = Point { x: 1, y: 2 };
    let q = p;
    p.x + p.y + q.x + q.y
}
"""
exit_code = 6

[[case]]
name = "copy_enum_is_copy_by_assignment"
preview = "mark_directive"
preview_should_pass = true
spec = ["3.8:14", "3.8:16"]
description = "ADR-0080: a `copy enum` is implicitly duplicated on `let b = a`, even with no payloads."
source = """
@mark(copy) enum Color { Red, Green, Blue }
fn main() -> i32 {
    let c = Color::Red;
    let d = c;
    match c {
        Color::Red => 1,
        Color::Green => 2,
        Color::Blue => 3,
    }
}
"""
exit_code = 1

[[case]]
name = "linear_enum_dropped_without_consume_error"
preview = "mark_directive"
preview_should_pass = true
spec = ["3.8:30", "3.8:32"]
description = "ADR-0080: a `linear enum` value must be explicitly consumed."
source = """
@mark(linear) enum Resource { Open, Closed }
fn main() -> i32 {
    let r = Resource::Open;
    0
}
"""
compile_fail = true
error_contains = "linear value"

[[case]]
name = "linear_enum_consumed_by_function"
preview = "mark_directive"
preview_should_pass = true
spec = ["3.8:30", "3.8:33"]
description = "ADR-0080: a `linear enum` is consumed by passing to a function."
source = """
@mark(linear) enum Resource { Open, Closed }
fn consume(r: Resource) -> i32 {
    match r {
        Resource::Open => 1,
        Resource::Closed => 0,
    }
}
fn main() -> i32 {
    let r = Resource::Open;
    consume(r)
}
"""
exit_code = 1

[[case]]
name = "array_is_not_copy"
spec = ["3.8:2"]
description = "ADR-0083 (Open Question 1): arrays of Copy elements are themselves Copy and may be aliased — reverts ADR-0080's container/value-type stance."
source = """
fn main() -> i32 {
    let arr: [i32; 3] = [1, 2, 3];
    let arr2 = arr;
    let arr3 = arr;
    arr2[0] + arr3[1]
}
"""
exit_code = 3

[[case]]
name = "copy_struct_with_copy_fields_ok"
preview = "mark_directive"
preview_should_pass = true
spec = ["3.8:14"]
description = "ADR-0080: a `copy struct` whose fields are all Copy is itself Copy and may be aliased."
source = """
@mark(copy) struct Pair { x: i32, y: i32 }
@mark(copy) struct Rect { tl: Pair, br: Pair }
fn main() -> i32 {
    let r = Rect { tl: Pair { x: 1, y: 2 }, br: Pair { x: 10, y: 20 } };
    let r2 = r;
    r.tl.x + r.br.y + r2.tl.y + r2.br.x
}
"""
exit_code = 33

# =============================================================================
# Posture-consistency walker
# =============================================================================

[[case]]
name = "copy_struct_with_affine_field_rejected"
preview = "mark_directive"
preview_should_pass = true
spec = ["3.8:18"]
description = "ADR-0080: a `copy struct` may not contain a non-Copy field."
source = """
@mark(copy) struct Bad { s: String }
fn main() -> i32 { 0 }
"""
compile_fail = true
error_contains = "affine"

[[case]]
name = "copy_enum_with_affine_payload_rejected"
preview = "mark_directive"
preview_should_pass = true
spec = ["3.8:18"]
description = "ADR-0080: a `copy enum` may not have a non-Copy payload."
source = """
@mark(copy) enum Bad { A(String) }
fn main() -> i32 { 0 }
"""
compile_fail = true
error_contains = "affine"

[[case]]
name = "affine_struct_with_linear_field_rejected"
preview = "mark_directive"
preview_should_pass = true
spec = ["3.8:30"]
description = "ADR-0083: under uniform structural inference, an unmarked struct with a linear field propagates linear upward — the host becomes Linear automatically rather than producing an error."
source = """
@mark(linear) struct Resource { value: i32 }
struct Held { r: Resource }
fn consume(h: Held) -> i32 { h.r.value }
fn main() -> i32 {
    let h = Held { r: Resource { value: 7 } };
    consume(h)
}
"""
exit_code = 7

[[case]]
name = "affine_enum_with_linear_payload_rejected"
preview = "mark_directive"
preview_should_pass = true
spec = ["3.8:30"]
description = "ADR-0083: under uniform structural inference, an unmarked enum with a linear payload becomes Linear automatically."
source = """
@mark(linear) struct Resource { value: i32 }
enum Held { Empty, Some(Resource) }
fn consume(h: Held) -> i32 {
    match h {
        Held::Empty => 0,
        Held::Some(r) => r.value,
    }
}
fn main() -> i32 {
    let h = Held::Some(Resource { value: 9 });
    consume(h)
}
"""
exit_code = 9

[[case]]
name = "linear_enum_with_linear_payload_ok"
preview = "mark_directive"
preview_should_pass = true
spec = ["3.8:30"]
description = "ADR-0080: a `linear enum` accepts linear payloads (linear absorbs)."
source = """
@mark(linear) struct Resource { value: i32 }
@mark(linear) enum Maybe { Empty, Held(Resource) }
fn drain(m: Maybe) -> i32 {
    match m {
        Maybe::Empty => 0,
        Maybe::Held(r) => r.value,
    }
}
fn main() -> i32 {
    let m = Maybe::Held(Resource { value: 7 });
    drain(m)
}
"""
exit_code = 7

[[case]]
name = "copy_struct_with_drop_rejected"
preview = "mark_directive"
preview_should_pass = true
spec = ["3.8:62"]
description = "ADR-0080: `copy` and `Drop` remain mutually exclusive."
source = """
@mark(copy) struct Bad {
    value: i32,

    fn drop(self) {
        @ignore_unused(self);
    }
}
fn main() -> i32 { 0 }
"""
compile_fail = true
