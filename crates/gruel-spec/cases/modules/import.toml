[section]
id = "modules.import"
spec_chapter = "4.13"
name = "Import Expressions"
description = "The @import builtin for importing modules."

# =============================================================================
# @import Syntax Verification
# =============================================================================

# These tests verify that @import accepts valid syntax and resolves modules
# correctly per ADR-0026.

[[case]]
name = "import_basic_syntax"
spec = ["4.13:79", "4.13:80", "4.13:82"]
description = "@import with string argument is accepted"
source = """
fn main() -> i32 {
    let m = @import("foo");
    0
}
"""
aux_files = { "foo.gruel" = "fn f() -> i32 { 1 }" }
exit_code = 0

[[case]]
name = "import_used_in_const"
spec = ["4.13:79", "4.13:80"]
description = "@import can be used in a const binding (typical pattern)"
source = """
fn main() -> i32 {
    let math = @import("math");
    0
}
"""
aux_files = { "math.gruel" = "fn add(a: i32, b: i32) -> i32 { a + b }" }
exit_code = 0

[[case]]
name = "import_multiple_files"
spec = ["4.13:79"]
description = "Multiple @import calls in same file"
source = """
fn main() -> i32 {
    let a = @import("a");
    let b = @import("b");
    0
}
"""
aux_files = { "a.gruel" = "fn a_fn() -> i32 { 1 }", "b.gruel" = "fn b_fn() -> i32 { 2 }" }
exit_code = 0

[[case]]
name = "import_nested_path"
spec = ["4.13:79", "4.13:82"]
description = "@import with nested path"
source = """
fn main() -> i32 {
    let utils = @import("utils/strings");
    0
}
"""
aux_files = { "utils/strings.gruel" = "fn format(x: i32) -> i32 { x }" }
exit_code = 0

# =============================================================================
# @import Argument Validation Errors
# =============================================================================

[[case]]
name = "import_no_args_error"
spec = ["4.13:80"]
description = "@import with no arguments is an error"
source = """
fn main() -> i32 {
    let m = @import();
    0
}
"""
compile_fail = true
error_contains = "expects 1 argument"

[[case]]
name = "import_integer_arg_error"
spec = ["4.13:84"]
description = "@import with integer argument should fail"
source = """
fn main() -> i32 {
    let m = @import(42);
    0
}
"""
compile_fail = true
error_contains = "requires a string literal"

[[case]]
name = "import_multiple_args_error"
spec = ["4.13:80"]
description = "@import with multiple arguments should fail"
source = """
fn main() -> i32 {
    let m = @import("a.gruel", "b.gruel");
    0
}
"""
compile_fail = true
error_contains = "expects 1 argument"

[[case]]
name = "import_module_not_found_error"
spec = ["4.13:83"]
description = "@import with nonexistent module produces error"
source = """
fn main() -> i32 {
    let m = @import("nonexistent");
    0
}
"""
compile_fail = true
error_contains = "cannot find module"

# =============================================================================
# @import with comptime_str arguments
# =============================================================================

[[case]]
name = "import_comptime_block_literal"
spec = ["4.13:80", "4.13:100"]
description = "@import accepts a comptime block producing a string"
source = """
fn main() -> i32 {
    let _m = @import(comptime { "foo" });
    0
}
"""
aux_files = { "foo.gruel" = "pub fn f() -> i32 { 1 }" }
exit_code = 0

[[case]]
name = "import_platform_conditional"
spec = ["4.13:80", "4.13:100"]
description = "@import with a platform-conditional comptime block picks one of two modules based on @target_os()"
source = """
fn main() -> i32 {
    let _sys = @import(comptime {
        if @target_os() == Os::Linux {
            "sys_linux"
        } else {
            "sys_macos"
        }
    });
    0
}
"""
aux_files = { "sys_linux.gruel" = "pub fn f() -> i32 { 1 }", "sys_macos.gruel" = "pub fn f() -> i32 { 2 }" }
exit_code = 0

[[case]]
name = "import_comptime_block_non_string_error"
spec = ["4.13:84"]
description = "@import rejects a comptime block that does not produce a string"
source = """
fn main() -> i32 {
    let _m = @import(comptime { 42 });
    0
}
"""
compile_fail = true
error_contains = "string literal"

[[case]]
name = "import_runtime_value_error"
spec = ["4.13:84"]
description = "@import rejects a runtime-only value; the path must be resolvable at compile time"
source = """
fn use_path(s: String) -> i32 {
    let _m = @import(s);
    0
}
fn main() -> i32 {
    use_path(String::new())
}
"""
compile_fail = true
error_contains = "compile time"
