[section]
id = "expressions.literals"
spec_chapter = "4.1"
name = "Literal Expressions"
description = "Integer literals evaluate to themselves. When returned from main, the value is truncated to 8 bits for the exit code."

# =============================================================================
# Integer Literals
# =============================================================================

[[case]]
name = "zero"
spec = ["1.3:1", "4.1:1", "4.1:2"]
source = "fn main() -> i32 { 0 }"
exit_code = 0

[[case]]
name = "positive_small"
spec = ["4.1:1", "4.1:2"]
source = "fn main() -> i32 { 42 }"
exit_code = 42

[[case]]
name = "one"
spec = ["4.1:1", "4.1:2"]
source = "fn main() -> i32 { 1 }"
exit_code = 1

[[case]]
name = "max_exit_code"
spec = ["4.1:1", "4.1:2"]
source = "fn main() -> i32 { 255 }"
exit_code = 255

[[case]]
name = "exit_code_wraps_256"
spec = ["4.1:1", "8.1:1"]
source = "fn main() -> i32 { 256 }"
exit_code = 0

[[case]]
name = "exit_code_wraps_257"
spec = ["4.1:1", "8.1:1"]
source = "fn main() -> i32 { 257 }"
exit_code = 1

[[case]]
name = "large_number"
spec = ["4.1:1"]
source = "fn main() -> i32 { 1000 }"
exit_code = 232

[[case]]
name = "boundary_127"
spec = ["4.1:1"]
source = "fn main() -> i32 { 127 }"
exit_code = 127

[[case]]
name = "boundary_128"
spec = ["4.1:1"]
source = "fn main() -> i32 { 128 }"
exit_code = 128

# =============================================================================
# Integer Literal Default Type
# =============================================================================

[[case]]
name = "literal_defaults_to_i32"
spec = ["4.1:3"]
source = """
fn main() -> i32 {
    let x = 42;
    x
}
"""
exit_code = 42

[[case]]
name = "literal_inferred_i64"
spec = ["4.1:3"]
source = """
fn main() -> i64 {
    let x: i64 = 42;
    x
}
"""
exit_code = 42

# =============================================================================
# Boolean Literals
# =============================================================================

[[case]]
name = "bool_true"
spec = ["4.1:5"]
source = """
fn main() -> i32 {
    let x = true;
    if x { 1 } else { 0 }
}
"""
exit_code = 1

[[case]]
name = "bool_false"
spec = ["4.1:5"]
source = """
fn main() -> i32 {
    let x = false;
    if x { 1 } else { 0 }
}
"""
exit_code = 0

# =============================================================================
# Unit Literal
# =============================================================================

[[case]]
name = "unit_literal"
spec = ["4.1:7", "4.1:8"]
source = """
fn returns_unit() -> () {
    ()
}
fn main() -> i32 {
    returns_unit();
    0
}
"""
exit_code = 0

[[case]]
name = "unit_literal_binding"
spec = ["4.1:7", "4.1:8"]
source = """
fn main() -> i32 {
    let _u = ();
    0
}
"""
exit_code = 0
