[section]
id = "expressions.arithmetic"
spec_chapter = "4.2"
name = "Arithmetic Operators"
description = "Arithmetic operators with standard precedence. Unary negation binds tightest, then multiplication/division/modulo, then addition/subtraction. Parentheses can override precedence."

# =============================================================================
# Basic Operations (Parameterized)
# =============================================================================

[[case]]
name = "{op}_simple"
spec = ["4.2:1"]
source = "fn main() -> i32 { {expr} }"
params = [
  { op = "addition", expr = "1 + 2", exit_code = 3 },
  { op = "subtraction", expr = "5 - 3", exit_code = 2 },
  { op = "multiplication", expr = "3 * 4", exit_code = 12 },
  { op = "division", expr = "10 / 3", exit_code = 3 },
  { op = "modulo", expr = "10 % 3", exit_code = 1 },
]

# =============================================================================
# Operator Precedence
# =============================================================================

[[case]]
name = "precedence_{variant}"
spec = ["4.2:2"]
source = "fn main() -> i32 { {expr} }"
params = [
  { variant = "mul_over_add", expr = "1 + 2 * 3", exit_code = 7 },
  { variant = "mul_over_sub", expr = "10 - 2 * 3", exit_code = 4 },
  { variant = "div_over_add", expr = "1 + 6 / 2", exit_code = 4 },
  { variant = "mod_over_add", expr = "1 + 7 % 3", exit_code = 2 },
  { variant = "complex", expr = "2 + 3 * 4 - 10 / 2", exit_code = 9 },
]

# =============================================================================
# Parentheses
# =============================================================================

[[case]]
name = "parens_{variant}"
spec = ["4.2:3"]
source = "fn main() -> i32 { {expr} }"
params = [
  { variant = "override_precedence", expr = "(1 + 2) * 3", exit_code = 9 },
  { variant = "nested", expr = "((1 + 2) * (3 + 4))", exit_code = 21 },
  { variant = "around_single", expr = "(42)", exit_code = 42 },
  { variant = "complex", expr = "(10 - 2) * (3 + 1) / 4", exit_code = 8 },
]

# =============================================================================
# Associativity (left-to-right)
# =============================================================================

[[case]]
name = "left_associative_{op}"
spec = ["4.2:4"]
source = "fn main() -> i32 { {expr} }"
params = [
  { op = "sub", expr = "10 - 3 - 2", exit_code = 5 },
  { op = "div", expr = "24 / 4 / 2", exit_code = 3 },
  { op = "mod", expr = "17 % 10 % 3", exit_code = 1 },
  { op = "mixed", expr = "100 - 50 + 20 - 10", exit_code = 60 },
]

# =============================================================================
# Edge Cases
# =============================================================================

[[case]]
name = "edge_{variant}"
spec = ["4.2:1"]
source = "fn main() -> i32 { {expr} }"
params = [
  { variant = "add_zero", expr = "0 + 42", exit_code = 42 },
  { variant = "mul_zero", expr = "42 * 0", exit_code = 0 },
  { variant = "mul_one", expr = "42 * 1", exit_code = 42 },
  { variant = "div_one", expr = "42 / 1", exit_code = 42 },
  { variant = "mod_larger", expr = "5 % 10", exit_code = 5 },
  { variant = "mod_exact", expr = "10 % 5", exit_code = 0 },
  { variant = "zero_div", expr = "0 / 5", exit_code = 0 },
  { variant = "zero_mod", expr = "0 % 5", exit_code = 0 },
]

# =============================================================================
# Exit Code Wrapping (result mod 256)
# =============================================================================

[[case]]
name = "result_wraps"
spec = ["4.2:1"]
source = "fn main() -> i32 { 200 + 100 }"
exit_code = 44

# =============================================================================
# Whitespace Flexibility
# =============================================================================

[[case]]
name = "whitespace_{variant}"
spec = ["4.2:1"]
source = "{source}"
params = [
  { variant = "no_spaces", source = "fn main() -> i32 { 1+2 }", exit_code = 3 },
  { variant = "extra_spaces", source = "fn main() -> i32 { 1  +  2 }", exit_code = 3 },
]

[[case]]
name = "multiline_expr"
spec = ["4.2:1"]
source = """
fn main() -> i32 {
    1
    + 2
    * 3
}
"""
exit_code = 7

# =============================================================================
# Chained Operations
# =============================================================================

[[case]]
name = "chain_mixed"
spec = ["4.2:1", "4.2:2"]
source = "fn main() -> i32 { 1 + 2 * 3 + 4 * 5 - 6 }"
exit_code = 21

# =============================================================================
# Unary Negation
# =============================================================================

[[case]]
name = "negation_{variant}"
spec = ["4.2:5", "4.2:6"]
source = "fn main() -> i32 { {expr} }"
params = [
  { variant = "simple", expr = "-1", exit_code = 255 },
  { variant = "larger", expr = "-42", exit_code = 214 },
  { variant = "zero", expr = "-0", exit_code = 0 },
  { variant = "in_expr", expr = "10 + -3", exit_code = 7 },
  { variant = "of_expr", expr = "-(1 + 2)", exit_code = 253 },
  { variant = "double", expr = "--5", exit_code = 5 },
  { variant = "triple", expr = "---5", exit_code = 251 },
  { variant = "with_parens", expr = "(-10) + 15", exit_code = 5 },
  { variant = "subtract_neg", expr = "10 - -5", exit_code = 15, spec_extra = ["4.2:1"] },
  { variant = "mul_negatives", expr = "-3 * -4", exit_code = 12, spec_extra = ["4.2:1"] },
]

[[case]]
name = "negation_binds_tighter_than_mul"
spec = ["4.2:5", "4.2:2", "4.2:7"]
source = "fn main() -> i32 { -2 * 3 }"
exit_code = 250

[[case]]
name = "divide_negative"
spec = ["4.2:1", "4.2:5"]
source = "fn main() -> i32 { -10 / 3 }"
exit_code = 253

[[case]]
name = "mod_negative"
spec = ["4.2:1", "4.2:5"]
source = "fn main() -> i32 { -10 % 3 }"
exit_code = 255

# =============================================================================
# Negated MIN Literals (Compile-Time Constant)
# =============================================================================

[[case]]
name = "negated_min_literal_{type}"
spec = ["4.2:15"]
description = "Negated MIN literal is a compile-time constant"
source = """
fn main() -> i32 {
    let x: {type} = {value};
    if x < 0 { 1 } else { 0 }
}
"""
exit_code = 1
params = [
  { type = "i8", value = "-128" },
  { type = "i32", value = "-2147483648" },
]

# =============================================================================
# Runtime Negation of MIN Value (Wraps)
# =============================================================================

[[case]]
name = "runtime_negation_min_{type}"
spec = ["4.2:16"]
description = "Negating MIN at runtime wraps back to MIN (since -MIN = MIN mod 2^N)"
source = """
fn main() -> i32 {
    let x: {type} = {value};
    let y: {type} = -x;
    if y == {value} { 0 } else { 1 }
}
"""
exit_code = 0
params = [
  { type = "i32", value = "-2147483648" },
  { type = "i8", value = "-128" },
]

# =============================================================================
# Unsigned Negation is an Error
# =============================================================================

[[case]]
name = "negation_unsigned_{type}_error"
spec = ["4.2:14"]
source = """
fn main() -> i32 {
    let x: {type} = 5;
    let y: {type} = -x;
    0
}
"""
compile_fail = true
error_contains = "cannot apply unary operator"
params = [
  { type = "u32" },
  { type = "u8" },
  { type = "u64" },
]

[[case]]
name = "negation_unsigned_literal_error"
spec = ["4.2:14"]
description = "Even negating a literal with unsigned type annotation is an error"
source = """
fn main() -> i32 {
    let x: u32 = -5;
    0
}
"""
compile_fail = true
error_contains = "cannot apply unary operator"

# =============================================================================
# Runtime Errors
# =============================================================================

[[case]]
name = "division_by_zero_{variant}"
spec = ["8.3:1", "4.2:11"]
source = "fn main() -> i32 { {expr} }"
runtime_error = "division by zero"
params = [
  { variant = "literal", expr = "10 / 0" },
  { variant = "modulo", expr = "10 % 0" },
  { variant = "computed", expr = "10 / (5 - 5)" },
]

[[case]]
name = "wrap_{op}"
spec = ["8.1:1", "4.2:9"]
source = """
fn main() -> i32 {
    let x: i32 = {lhs};
    let y: i32 = x {oper} {rhs};
    if y == {expected} { 0 } else { 1 }
}
"""
exit_code = 0
params = [
  { op = "add", lhs = "2147483647", oper = "+", rhs = "1", expected = "-2147483648" },
  { op = "sub", lhs = "-2147483648", oper = "-", rhs = "1", expected = "2147483647" },
  { op = "mul", lhs = "2147483647", oper = "*", rhs = "2", expected = "-2" },
]

[[case]]
name = "wrap_neg_min"
spec = ["8.1:1", "4.2:9"]
source = """
fn main() -> i32 {
    let x: i32 = -2147483648;
    let y: i32 = -x;
    if y == -2147483648 { 0 } else { 1 }
}
"""
exit_code = 0

# =============================================================================
# Unsigned Division/Modulo
# =============================================================================
# These tests verify that unsigned division/modulo work correctly with values
# that would be negative if treated as signed. This catches bugs where the
# compiler incorrectly uses signed division for unsigned types.

[[case]]
name = "unsigned_division_large_value"
spec = ["4.2:10"]
source = """
fn main() -> i32 {
    // 0x80000000 = 2147483648 (would be -2147483648 if signed)
    let x: u32 = 2147483648;
    // Unsigned: 2147483648 / 100 = 21474836
    // If incorrectly using signed: -2147483648 / 100 = -21474836
    let result: u32 = x / 100;
    // 21474836 % 256 = 20
    let low_byte: u32 = result % 256;
    @cast(low_byte)
}
"""
exit_code = 20

[[case]]
name = "unsigned_modulo_large_value"
spec = ["4.2:10"]
source = """
fn main() -> i32 {
    // 0x80000000 = 2147483648 (would be -2147483648 if signed)
    let x: u32 = 2147483648;
    // Unsigned: 2147483648 % 100 = 48
    // If incorrectly using signed: -2147483648 % 100 = -48 (or something wrong)
    let result: u32 = x % 100;
    @cast(result)
}
"""
exit_code = 48

[[case]]
name = "unsigned_division_max_value"
spec = ["4.2:10"]
source = """
fn main() -> i32 {
    // 0xFFFFFFFF = 4294967295 (would be -1 if signed)
    let x: u32 = 4294967295;
    // Unsigned: 4294967295 / 1000 = 4294967
    // If incorrectly using signed: -1 / 1000 = 0
    let result: u32 = x / 1000;
    // 4294967 % 256 = 55
    let low_byte: u32 = result % 256;
    @cast(low_byte)
}
"""
exit_code = 55

[[case]]
name = "unsigned_modulo_max_value"
spec = ["4.2:10"]
source = """
fn main() -> i32 {
    // 0xFFFFFFFF = 4294967295 (would be -1 if signed)
    let x: u32 = 4294967295;
    // Unsigned: 4294967295 % 100 = 95
    // If incorrectly using signed: -1 % 100 = -1
    let result: u32 = x % 100;
    @cast(result)
}
"""
exit_code = 95
