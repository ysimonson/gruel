# =============================================================================

[[case]]
name = "cast_negative_zero"
spec = ["4.13:102"]
source = """
fn main() -> i32 {
    // -0.0 truncates to 0
    let nz: f64 = -0.0;
    let n: i32 = @cast(nz);
    n
}
"""
exit_code = 0
