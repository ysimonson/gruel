# Type validation errors
# =============================================================================

[[case]]
name = "cast_bool_source_rejected"
spec = ["4.13:96"]
source = """
fn main() -> i32 {
    let b = true;
    let _n: i32 = @cast(b);
    0
}
"""
compile_fail = true
error_contains = "numeric type"

[[case]]
name = "cast_bool_target_rejected"
spec = ["4.13:98"]
source = """
fn main() -> i32 {
    let n: i32 = 1;
    let _b: bool = @cast(n);
    0
}
"""
compile_fail = true
error_contains = "numeric"

# =============================================================================
# Same-type cast is identity
# =============================================================================

[[case]]
name = "cast_same_type_noop"
spec = ["4.13:95"]
source = """
fn main() -> i32 {
    let f: f64 = 3.14;
    let g: f64 = @cast(f);
    if f == g { 0 } else { 1 }
}
"""
exit_code = 0

# =============================================================================
# f16 range limits
# =============================================================================

[[case]]
name = "cast_f16_max_value"
spec = ["3.11:2", "4.13:100"]
source = """
fn main() -> i32 {
    // f16 max is ~65504
    let big: f64 = 65504.0;
    let h: f16 = @cast(big);
    let back: f64 = @cast(h);
    let diff: f64 = back - 65504.0;
    // Should be close to zero
    if diff > -1.0 {
        if diff < 1.0 {
            0
        } else {
            1
        }
    } else {
        2
    }
}
"""
exit_code = 0

[[case]]
name = "cast_f16_overflow_to_infinity"
spec = ["3.11:2", "4.13:100"]
source = """
fn main() -> i32 {
    // Value way beyond f16 range becomes infinity
    let huge: f64 = 1000000.0;
    let h: f16 = @cast(huge);
    let back: f64 = @cast(h);
    // Infinity compared to anything finite is > it
    if back > 999999.0 { 0 } else { 1 }
}
"""
exit_code = 0

# =============================================================================
