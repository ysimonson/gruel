[section]
id = "expressions.cast"
spec_chapter = "4.13"
name = "Cast Intrinsic"
description = "Tests for @cast numeric type conversions: int↔int, int↔float, float↔float, float→int."

# =============================================================================
# Integer to Integer (same as @cast)
# =============================================================================

[[case]]
name = "cast_int_to_int_widening"
spec = ["4.13:95", "4.13:96", "4.13:97", "4.13:99"]
source = """
fn main() -> i32 {
    let x: i32 = 100;
    let y: u8 = @cast(x);
    @cast(y)
}
"""
exit_code = 100

[[case]]
name = "cast_int_to_int_narrowing_panic"
spec = ["4.13:99"]
source = """
fn main() -> i32 {
    let x: i32 = 256;
    let _y: u8 = @cast(x);
    0
}
"""
exit_code = 101
stderr_contains = "integer cast overflow"

