# =============================================================================
# Float to Integer — edge cases (panics)
# =============================================================================

[[case]]
name = "cast_nan_to_i32_panics"
spec = ["4.13:102"]
source = """
fn main() -> i32 {
    let nan: f64 = 0.0 / 0.0;
    let _n: i32 = @cast(nan);
    0
}
"""
exit_code = 101
stderr_contains = "float-to-integer cast overflow"

[[case]]
name = "cast_overflow_f64_to_i32_panics"
spec = ["4.13:102"]
source = """
