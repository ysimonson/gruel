# =============================================================================
# Float to Float
# =============================================================================

[[case]]
name = "cast_f64_to_f32"
spec = ["4.13:95", "4.13:100"]
source = """
fn main() -> i32 {
    let a: f64 = 3.14;
    let b: f32 = @cast(a);
    let c: f64 = @cast(b);
    // c should be close to 3.14 (some precision loss from f32)
    if c > 3.0 {
        if c < 4.0 {
            0
        } else {
            1
        }
    } else {
        2
    }
}
"""
exit_code = 0

[[case]]
name = "cast_f32_to_f64"
spec = ["4.13:100"]
source = """
fn main() -> i32 {
    let a: f32 = 2.5;
    let b: f64 = @cast(a);
    let c: i32 = @cast(b);
    c
}
"""
exit_code = 2

