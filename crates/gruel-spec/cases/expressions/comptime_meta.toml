source = """
struct Point { x: i32, y: i32 }

fn sum_fields(comptime T: type, val: T) -> i32 {
    let mut total: i32 = 0;
    comptime_unroll for field in comptime { @typeInfo(T).fields } {
        total = total + @field(val, field.name);
    }
    total
}

fn main() -> i32 {
    let p = Point { x: 10, y: 32 };
    sum_fields(Point, p)
}
"""
