[[case]]
name = "comptime_str_push_str_error"
spec = ["4.14:59a"]
preview = "comptime_meta"
preview_should_pass = true
source = """
fn main() -> i32 {
    comptime {
        let s = "hello";
        s.push_str(" world");
    };
    0
}
"""
compile_fail = true
error_contains = "cannot call .push_str() on a compile-time string"

[[case]]
