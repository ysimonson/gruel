name = "refutable_nested_struct_variant_merge"
spec = ["4.7:23", "4.7:24"]
description = "Merging arms of a struct variant with refutable subs (ADR-0049 Phase 5b)"
source = """
enum Shape {
    Rect { w: i32, h: i32 },
    Empty,
}

fn check(s: Shape) -> i32 {
    match s {
        Shape::Rect { w: 0, h } => h,
        Shape::Rect { w, h } => w + h,
        _ => -1,
    }
}

fn main() -> i32 {
    let a = check(Shape::Rect { w: 0, h: 42 });
    let b = check(Shape::Rect { w: 10, h: 20 });
    let c = check(Shape::Empty);
    a + b + c - 29
}
"""
exit_code = 42

