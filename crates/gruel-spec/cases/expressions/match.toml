[section]
id = "expressions.match"
spec_chapter = "4.7"
name = "Match Expressions"
description = "Match expressions provide multi-way branching on values. Currently supports integer and boolean patterns with wildcard (_)."

# =============================================================================
# Basic Match with Integers
# =============================================================================

[[case]]
name = "match_int_first"
spec = ["4.7:1", "4.7:5"]
source = """
fn main() -> i32 {
    match 1 {
        1 => 10,
        2 => 20,
        _ => 0,
    }
}
"""
exit_code = 10

[[case]]
name = "match_int_second"
spec = ["4.7:1", "4.7:5"]
source = """
fn main() -> i32 {
    match 2 {
        1 => 10,
        2 => 20,
        _ => 0,
    }
}
"""
exit_code = 20

[[case]]
name = "match_int_default"
spec = ["4.7:1", "4.7:4", "4.7:5", "4.7:10"]
source = """
fn main() -> i32 {
    match 99 {
        1 => 10,
        2 => 20,
        _ => 0,
    }
}
"""
exit_code = 0

[[case]]
name = "match_single_arm_wildcard"
spec = ["4.7:4", "4.7:10"]
source = """
fn main() -> i32 {
    match 42 {
        _ => 100,
    }
}
"""
exit_code = 100

