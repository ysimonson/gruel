# =============================================================================
# Refutable nested patterns (ADR-0049 Phase 5b)
# =============================================================================

[[case]]
name = "refutable_nested_single_arm_catchall"
spec = ["4.7:23", "4.7:24"]
description = "Nested refutable variant pattern with a wildcard fallback (ADR-0049 Phase 5b)"
source = """
enum IntOpt { Some(i32), None }
enum IntOptOpt { Some(IntOpt), None }

fn main() -> i32 {
    let outer = IntOptOpt::Some(IntOpt::Some(42));
    match outer {
        IntOptOpt::Some(IntOpt::Some(v)) => v,
        _ => 0,
    }
}
"""
exit_code = 42

[[case]]
name = "refutable_nested_shared_outer_merge"
spec = ["4.7:23", "4.7:24"]
description = "Multiple arms sharing an outer variant merge into one nested match (ADR-0049 Phase 5b)"
source = """
enum IntOpt { Some(i32), None }

fn check(o: IntOpt) -> i32 {
    match o {
        IntOpt::Some(0) => 100,
        IntOpt::Some(42) => 42,
        _ => -1,
    }
}

fn main() -> i32 {
    check(IntOpt::Some(42))
}
"""
exit_code = 42

[[case]]
name = "refutable_nested_exhaustive_no_catchall"
spec = ["4.7:23", "4.7:24"]
description = "Exhaustive nested variants without a wildcard catch-all (ADR-0049 Phase 5b)"
source = """
enum IntOpt { Some(i32), None }
enum IntOptOpt { Some(IntOpt), None }

fn check(o: IntOptOpt) -> i32 {
    match o {
        IntOptOpt::Some(IntOpt::Some(v)) => v,
        IntOptOpt::Some(IntOpt::None) => -1,
        IntOptOpt::None => -2,
    }
}

fn main() -> i32 {
    check(IntOptOpt::Some(IntOpt::Some(42)))
}
"""
exit_code = 42

[[case]]
name = "refutable_nested_multi_field_data_variant"
spec = ["4.7:23", "4.7:24"]
description = "Merging arms of a multi-field data variant with refutable subs (ADR-0049 Phase 5b)"
source = """
enum Pair {
    Data(i32, i32),
    Empty,
}

fn check(p: Pair) -> i32 {
    match p {
        Pair::Data(0, y) => y,
        Pair::Data(1, y) => y + 100,
        _ => -1,
    }
}

fn main() -> i32 {
    let a = check(Pair::Data(0, 42));
    let b = check(Pair::Data(1, 5));
    let c = check(Pair::Empty);
    a + b + c - 104
}
"""
exit_code = 42

