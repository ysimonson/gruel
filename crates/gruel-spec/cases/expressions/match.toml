name = "refutable_nested_multi_field_all_refutable"
spec = ["4.7:23", "4.7:24"]
description = "Multi-field variant arms with refutable subs at every position (ADR-0049 Phase 5b)"
source = """
enum Pair {
    Data(i32, i32),
    Empty,
}

fn check(p: Pair) -> i32 {
    match p {
        Pair::Data(0, 0) => 100,
        Pair::Data(0, _) => 10,
        Pair::Data(_, 0) => 20,
        _ => -1,
    }
}

fn main() -> i32 {
    let a = check(Pair::Data(0, 0));
    let b = check(Pair::Data(0, 5));
    let c = check(Pair::Data(5, 0));
    let d = check(Pair::Data(5, 5));
    let e = check(Pair::Empty);
    a + b + c + d + e - 86
}
"""
exit_code = 42

