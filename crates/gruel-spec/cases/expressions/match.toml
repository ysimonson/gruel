    Rect { w: i32, h: i32, tag: i32 },
    None,
}

fn main() -> i32 {
    let s = Shape::Rect { w: 10, h: 20, tag: 12 };
    match s {
        Shape::Rect { w, .. } => w + 32,
        Shape::None => 0,
    }
}
"""
exit_code = 42

[[case]]
name = "match_tuple_root_trailing_rest"
spec = ["4.7:23", "4.7:24"]
description = "Trailing `..` in tuple-root match drops unlisted positions (ADR-0049 Phase 6)"
source = """
