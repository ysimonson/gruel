# =============================================================================
# Error Cases: Non-exhaustive Match
# =============================================================================

[[case]]
name = "non_exhaustive_int"
spec = ["4.7:9", "4.7:10"]
source = """
fn main() -> i32 {
    match 1 {
        1 => 10,
        2 => 20,
    }
}
"""
compile_fail = true
error_contains = "pattern `_` not covered"

[[case]]
name = "non_exhaustive_bool_missing_false"
spec = ["4.7:9", "4.7:10"]
source = """
fn main() -> i32 {
    match true {
        true => 1,
    }
}
"""
compile_fail = true
error_contains = "pattern `false` not covered"

[[case]]
name = "non_exhaustive_bool_missing_true"
spec = ["4.7:9", "4.7:10"]
source = """
fn main() -> i32 {
    match false {
        false => 0,
    }
}
"""
compile_fail = true
error_contains = "pattern `true` not covered"

[[case]]
name = "non_exhaustive_enum_lists_missing_variants"
spec = ["4.7:9", "4.7:10"]
description = "Non-exhaustive enum match lists the specific missing variants (ADR-0049 Phase 8)"
source = """
enum Color { Red, Green, Blue }

fn main() -> i32 {
    let c = Color::Red;
    match c {
        Color::Red => 0,
    }
}
"""
compile_fail = true
error_contains = "patterns `Color::Green`, `Color::Blue` not covered"

