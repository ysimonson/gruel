# =============================================================================
# Nested Patterns (ADR-0049)
# =============================================================================

[[case]]
name = "nested_match_struct_in_data_variant"
spec = ["4.7:23", "4.7:24"]
description = "Irrefutable struct sub-pattern inside a data-variant field (ADR-0049)"
source = """
struct Point { x: i32, y: i32 }

enum PointOpt {
    Some(Point),
    None,
}

fn main() -> i32 {
    let o = PointOpt::Some(Point { x: 10, y: 32 });
    match o {
        PointOpt::Some(Point { x, y }) => x + y,
        PointOpt::None => 0,
    }
}
"""
exit_code = 42

[[case]]
name = "nested_match_struct_in_struct_variant"
spec = ["4.7:23", "4.7:24"]
description = "Irrefutable struct sub-pattern inside a struct-variant field (ADR-0049)"
source = """
struct Inner { a: i32, b: i32 }

enum Shape {
    Rect { inner: Inner, tag: i32 },
    None,
}

fn main() -> i32 {
    let s = Shape::Rect { inner: Inner { a: 10, b: 20 }, tag: 12 };
    match s {
        Shape::Rect { inner: Inner { a, b }, tag } => a + b + tag,
        Shape::None => 0,
    }
}
"""
exit_code = 42

[[case]]
name = "nested_match_top_level_struct_pattern"
spec = ["4.7:23", "4.7:24"]
description = "Top-level struct destructure pattern in a single-arm match (ADR-0049)"
source = """
struct Point { x: i32, y: i32 }

fn main() -> i32 {
    let p = Point { x: 10, y: 32 };
    match p {
        Point { x, y } => x + y,
    }
}
"""
exit_code = 42

[[case]]
name = "nested_match_wildcard_in_variant_field"
spec = ["4.7:23", "4.7:24"]
description = "Wildcard nested sub-pattern in a variant field drops that field (ADR-0049)"
source = """
struct Point { x: i32, y: i32 }

enum PointOpt {
    Some(Point),
    None,
}

fn main() -> i32 {
    let o = PointOpt::Some(Point { x: 42, y: 99 });
    match o {
        PointOpt::Some(Point { x, y: _ }) => x,
        PointOpt::None => 0,
    }
}
"""
exit_code = 42

# =============================================================================
# Tuple patterns at match root (ADR-0049 Phase 5a)
# =============================================================================

[[case]]
name = "tuple_match_root_literals"
spec = ["4.7:23", "4.7:24"]
description = "Tuple pattern at match root with integer literal elements (ADR-0049 Phase 5a)"
source = """
fn main() -> i32 {
    let a: i32 = 0;
    let b: i32 = 0;
    match (a, b) {
        (0, 0) => 42,
        (0, _) => 1,
        (_, 0) => 2,
        _ => 3,
    }
}
"""
exit_code = 42

[[case]]
name = "tuple_match_root_bindings"
spec = ["4.7:23", "4.7:24"]
description = "Tuple pattern at match root binds elements via idents (ADR-0049 Phase 5a)"
source = """
fn main() -> i32 {
    let a: i32 = 10;
    let b: i32 = 32;
    match (a, b) {
        (0, 0) => 100,
        (x, y) => x + y,
    }
}
"""
exit_code = 42

[[case]]
name = "tuple_match_root_bools"
spec = ["4.7:23", "4.7:24"]
description = "Tuple pattern at match root with boolean literal elements (ADR-0049 Phase 5a)"
source = """
fn main() -> i32 {
    let a: bool = true;
    let b: bool = false;
    match (a, b) {
        (true, true) => 0,
        (true, false) => 42,
        (false, true) => 2,
        (_, _) => 3,
    }
}
"""
exit_code = 42

[[case]]
name = "tuple_match_root_non_exhaustive_rejects_at_compile_time"
spec = ["4.7:23", "4.7:24"]
description = "Non-exhaustive tuple-root match is a compile error (ADR-0051 supersedes the ADR-0049 Phase 5a runtime-panic behaviour)"
source = """
fn main() -> i32 {
    let a: i32 = 0;
    let b: i32 = 0;
    match (a, b) {
        (0, 0) => 42,
    }
}
"""
compile_fail = true
error_contains = "not exhaustive"

[[case]]
name = "tuple_match_root_negative_literal"
spec = ["4.7:23", "4.7:24"]
description = "Tuple pattern at match root matches negative integer literals (ADR-0049 Phase 5a)"
source = """
fn main() -> i32 {
    let a: i32 = -5;
    let b: i32 = 47;
    match (a, b) {
        (-5, x) => x,
        _ => 0,
    }
}
"""
exit_code = 47

# =============================================================================
# Rest patterns in match arms (ADR-0049 Phase 6)
# =============================================================================

[[case]]
name = "match_data_variant_trailing_rest"
spec = ["4.7:23", "4.7:24"]
description = "Trailing rest `..` in data variant pattern drops unlisted fields (ADR-0049 Phase 6)"
source = """
enum TripleOpt {
    Some(i32, i32, i32),
    None,
}

fn main() -> i32 {
    let o = TripleOpt::Some(42, 10, 20);
    match o {
        TripleOpt::Some(a, ..) => a,
        TripleOpt::None => 0,
    }
}
"""
exit_code = 42

[[case]]
name = "match_struct_variant_rest"
spec = ["4.7:23", "4.7:24"]
description = "Rest `..` in struct variant pattern drops unlisted fields (ADR-0049 Phase 6)"
source = """
