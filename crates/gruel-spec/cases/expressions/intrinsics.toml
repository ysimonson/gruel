[[case]]
name = "align_of_all_types_8"
spec = ["4.13:22"]
source = """
struct Point { x: i32, y: i32 }
fn main() -> i32 {
    // All types currently have 8-byte alignment
    let eight: usize = 8;
    if @align_of(i8) != eight { return 1; }
    if @align_of(i64) != eight { return 2; }
    if @align_of(bool) != eight { return 3; }
    if @align_of(Point) != eight { return 4; }
    0
}
"""
exit_code = 0

