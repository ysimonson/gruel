# ADR-0087 Phase 3 retired the `@read_line` / `@parse_*` /
# `@random_*` intrinsics. The replacements are ordinary Gruel prelude
# fns (`read_line() -> Vec(u8)`, `parse_i32(s: Ref(String)) -> i32`,
# `random_u32() -> u32`, …) — not language intrinsics. Their tests
# are no longer spec-linked; see the prelude module
# `prelude/runtime_wrappers.gruel` and any future stdlib-style tests
# for coverage.

