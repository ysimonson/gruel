# =============================================================================
# Expanded Arch / Os variants (ADR-0077)
#
# The Arch and Os enums grew to cover the full set of practically relevant
# LLVM targets; existing variants keep their indices and new ones are
# appended. Match all new variants to verify they are reachable by name in
# user code.
# =============================================================================

[[case]]
name = "arch_enum_full_variant_set_x86_64"
spec = ["4.13:69"]
only_on = ["x86-64-linux", "x86-64-macos"]
source = """
// Reference every Arch variant so the compiler verifies they exist by
// name. Existing variants keep their indices; new variants are
// appended (ADR-0077).
fn classify(a: Arch) -> i32 {
    match a {
        Arch::X86_64 => 1,
        Arch::Aarch64 => 2,
        Arch::X86 => 3,
