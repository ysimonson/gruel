[section]
id = "expressions.comparison"
spec_chapter = "4.3"
name = "Comparison Operators"
description = "Comparison operators compare values and produce bool results."

# =============================================================================
# Comparison Produces Bool
# =============================================================================

[[case]]
name = "comparison_{op}"
spec = ["4.3:1"]
source = """
fn main() -> i32 {
    if {expr} { 1 } else { 0 }
}
"""
params = [
  { op = "eq_true", expr = "5 == 5", exit_code = 1 },
  { op = "eq_false", expr = "5 == 6", exit_code = 0 },
  { op = "ne_true", expr = "5 != 6", exit_code = 1 },
]

# =============================================================================
# Equality Works on Integers and Booleans
# =============================================================================

[[case]]
name = "equality_{type}"
spec = ["4.3:2"]
source = """
fn main() -> i32 {
    if {expr} { 1 } else { 0 }
}
"""
params = [
  { type = "integers", expr = "42 == 42", exit_code = 1 },
  { type = "booleans_eq", expr = "true == true", exit_code = 1 },
  { type = "booleans_ne", expr = "true != false", exit_code = 1 },
]

# =============================================================================
# Ordering Works Only on Integers
# =============================================================================

[[case]]
name = "ordering_{op}_integers"
spec = ["4.3:4"]
source = """
fn main() -> i32 {
    if {expr} { 1 } else { 0 }
}
"""
params = [
  { op = "lt", expr = "5 < 10", exit_code = 1 },
  { op = "gt", expr = "10 > 5", exit_code = 1 },
  { op = "le", expr = "5 <= 5", exit_code = 1 },
  { op = "ge", expr = "5 >= 5", exit_code = 1 },
]

# =============================================================================
# Ordering on Booleans is Compile Error
# =============================================================================

[[case]]
name = "ordering_{op}_on_bool"
spec = ["4.3:5"]
source = """
fn main() -> i32 {
    if true {op} false { 1 } else { 0 }
}
"""
compile_fail = true
params = [
  { op = "<" },
  { op = ">" },
  { op = "<=" },
  { op = ">=" },
]

# =============================================================================
# Comparison Precedence Lower Than Arithmetic
# =============================================================================

[[case]]
name = "precedence_comparison_{variant}"
spec = ["4.3:8"]
source = """
fn main() -> i32 {
    if {expr} { 1 } else { 0 }
}
"""
exit_code = 1
params = [
  { variant = "after_add", expr = "2 + 3 == 5" },
  { variant = "both_sides", expr = "2 + 3 < 10 - 3" },
]

# =============================================================================
# Both Operands Must Have Same Type
# =============================================================================

[[case]]
name = "type_mismatch_{types}"
spec = ["4.3:10"]
source = """
fn main() -> i32 {
    let x: {from} = 10;
    let y: {to} = 10;
    if x == y { 1 } else { 0 }
}
"""
compile_fail = true
params = [
  { types = "i32_i64", from = "i32", to = "i64" },
  { types = "i32_u32", from = "i32", to = "u32" },
]

# =============================================================================
# Type Inference from One Operand
# =============================================================================

[[case]]
name = "infer_type_from_left_operand"
spec = ["4.3:11"]
source = """
fn main() -> i32 {
    let x: i64 = 100;
    if x == 100 { 1 } else { 0 }
}
"""
exit_code = 1

# NOTE: Right-operand inference not yet implemented, see integers.toml for tests

# =============================================================================
# Chained Comparisons Are Rejected
# =============================================================================

[[case]]
name = "chained_{variant}_error"
spec = ["4.3:12"]
source = """
fn main() -> i32 {
    if {expr} { 1 } else { 0 }
}
"""
compile_fail = true
error_contains = "comparison operators cannot be chained"
params = [
  { variant = "lt", expr = "1 < 2 < 3" },
  { variant = "eq", expr = "1 == 1 == true" },
  { variant = "mixed", expr = "1 < 2 == true" },
  { variant = "parenthesized", expr = "(1 < 2) < 3" },
]

[[case]]
name = "separate_comparisons_with_and"
spec = ["4.3:13"]
source = """
fn main() -> i32 {
    if 1 < 2 && 2 < 3 { 1 } else { 0 }
}
"""
exit_code = 1

# =============================================================================
# Unit Type Equality
# =============================================================================

[[case]]
name = "unit_{op}"
spec = ["4.3:2", "4.3:3a"]
source = """
fn main() -> i32 {
    if {expr} { 1 } else { 0 }
}
"""
params = [
  { op = "equality", expr = "() == ()", exit_code = 1 },
  { op = "inequality", expr = "() != ()", exit_code = 0 },
]

[[case]]
name = "unit_ordering_disallowed"
spec = ["4.3:6"]
source = """
fn main() -> i32 {
    if () < () { 1 } else { 0 }
}
"""
compile_fail = true

# =============================================================================
# Struct Equality
# =============================================================================

[[case]]
name = "struct_equality_{variant}"
spec = ["4.3:2", "4.3:3b"]
source = """
struct Point { x: i32, y: i32 }

fn main() -> i32 {
    let p1 = Point { x: {x1}, y: {y1} };
    let p2 = Point { x: {x2}, y: {y2} };
    if p1 {op} p2 { 1 } else { 0 }
}
"""
params = [
  { variant = "same_values", x1 = "1", y1 = "2", x2 = "1", y2 = "2", op = "==", exit_code = 1 },
  { variant = "different_values", x1 = "1", y1 = "2", x2 = "1", y2 = "3", op = "==", exit_code = 0 },
  { variant = "inequality", x1 = "1", y1 = "2", x2 = "1", y2 = "3", op = "!=", exit_code = 1 },
]

[[case]]
name = "struct_equality_single_field"
spec = ["4.3:2", "4.3:3b"]
source = """
struct Wrapper { value: i32 }

fn main() -> i32 {
    let a = Wrapper { value: 42 };
    let b = Wrapper { value: 42 };
    if a == b { 1 } else { 0 }
}
"""
exit_code = 1

[[case]]
name = "struct_equality_many_fields"
spec = ["4.3:2", "4.3:3b"]
source = """
struct Record { a: i32, b: i32, c: i32, d: i32 }

fn main() -> i32 {
    let r1 = Record { a: 1, b: 2, c: 3, d: 4 };
    let r2 = Record { a: 1, b: 2, c: 3, d: 4 };
    let r3 = Record { a: 1, b: 2, c: 3, d: 5 };
    if r1 == r2 && r1 != r3 { 1 } else { 0 }
}
"""
exit_code = 1

[[case]]
name = "struct_ordering_disallowed"
spec = ["4.3:6"]
source = """
struct Point { x: i32, y: i32 }

fn main() -> i32 {
    let p1 = Point { x: 1, y: 2 };
    let p2 = Point { x: 1, y: 3 };
    if p1 < p2 { 1 } else { 0 }
}
"""
compile_fail = true

[[case]]
name = "struct_with_bool_field_equality"
spec = ["4.3:2", "4.3:3b"]
source = """
struct Config { enabled: bool, count: i32 }

fn main() -> i32 {
    let c1 = Config { enabled: true, count: 5 };
    let c2 = Config { enabled: true, count: 5 };
    let c3 = Config { enabled: false, count: 5 };
    if c1 == c2 && c1 != c3 { 1 } else { 0 }
}
"""
exit_code = 1
