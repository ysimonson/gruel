# =============================================================================
# Break and Continue
# =============================================================================

[[case]]
name = "for_break"
spec = ["4.8:32"]
source = """
fn main() -> i32 {
    let mut sum: i32 = 0;
    for i in @range(100) {
        if i == 5 {
            break;
        }
        sum = sum + i;
    }
    sum
}
"""
exit_code = 10

[[case]]
name = "for_continue"
spec = ["4.8:32"]
source = """
fn main() -> i32 {
    let mut sum: i32 = 0;
    for i in @range(10) {
        if i % 2 == 0 {
            continue;
        }
        sum = sum + i;
    }
    sum
}
"""
exit_code = 25

