[[case]]
name = "for_array_mutable_binding"
spec = ["4.8:25", "4.8:33"]
source = """
fn main() -> i32 {
    let arr = [1, 2, 3];
    let mut sum = 0;
    for mut x in arr {
        x = x * 10;
        sum = sum + x;
    }
    sum
}
"""
exit_code = 60

[[case]]
name = "for_array_bool_elements"
spec = ["4.8:33", "4.8:34"]
source = """
fn main() -> i32 {
    let arr = [true, false, true, true];
    let mut count = 0;
    for b in arr {
        if b {
            count = count + 1;
        }
    }
    count
}
"""
exit_code = 3

# =============================================================================
# Array For-In Loop (Move Types)
# =============================================================================

[[case]]
name = "for_array_move_type_basic"
spec = ["4.8:33", "4.8:35", "4.8:38"]
source = """
struct Data { value: i32, name: String }

fn main() -> i32 {
    let arr: [Data; 3] = [Data { value: 10, name: "a" }, Data { value: 20, name: "b" }, Data { value: 30, name: "c" }];
    let mut sum = 0;
    for d in arr {
        sum = sum + d.value;
    }
    sum
}
"""
exit_code = 60

[[case]]
name = "for_array_move_type_consumed"
spec = ["4.8:35"]
source = """
struct Data { value: i32, name: String }

fn consume(arr: [Data; 2]) -> i32 { 0 }

fn main() -> i32 {
    let arr: [Data; 2] = [Data { value: 1, name: "a" }, Data { value: 2, name: "b" }];
    for d in arr {
        let _x = d.value;
    }
    consume(arr)
}
"""
compile_fail = true
error_contains = "use of moved value"

[[case]]
name = "for_array_move_type_break_forbidden"
spec = ["4.8:37"]
source = """
struct Data { value: i32, name: String }

fn main() -> i32 {
    let arr: [Data; 3] = [Data { value: 1, name: "a" }, Data { value: 2, name: "b" }, Data { value: 3, name: "c" }];
    let mut sum = 0;
    for d in arr {
        if d.value == 2 {
            break;
        }
        sum = sum + d.value;
    }
    sum
}
"""
compile_fail = true
error_contains = "break"

[[case]]
name = "for_array_move_type_continue_allowed"
spec = ["4.8:32", "4.8:35"]
source = """
struct Data { value: i32, name: String }

fn main() -> i32 {
    let arr: [Data; 3] = [Data { value: 1, name: "a" }, Data { value: 2, name: "b" }, Data { value: 3, name: "c" }];
    let mut sum = 0;
    for d in arr {
        if d.value == 2 {
            continue;
        }
        sum = sum + d.value;
    }
    sum
}
"""
exit_code = 4

[[case]]
name = "for_array_move_type_single"
spec = ["4.8:33", "4.8:35"]
source = """
struct Data { value: i32, name: String }

fn main() -> i32 {
    let arr: [Data; 1] = [Data { value: 42, name: "a" }];
    let mut result = 0;
    for d in arr {
        result = d.value;
    }
    result
}
"""
exit_code = 42

[[case]]
name = "for_array_copy_type_break_still_allowed"
spec = ["4.8:32", "4.8:34"]
source = """
fn main() -> i32 {
    let arr = [1, 2, 3, 4, 5];
    let mut sum = 0;
    for x in arr {
        if x == 4 {
            break;
        }
        sum = sum + x;
    }
    sum
}
"""
exit_code = 6
