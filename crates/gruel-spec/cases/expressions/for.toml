    let mut sum = 0;
    for x in arr {
        sum = sum + x;
    }
    sum
}
"""
exit_code = 15

[[case]]
name = "for_array_remains_valid"
spec = ["4.8:35"]
source = """
fn main() -> i32 {
    let arr = [1, 2, 3];
    let mut sum = 0;
    for x in arr {
        sum = sum + x;
    }
    sum + arr[0] + arr[1] + arr[2]
}
"""
exit_code = 12

[[case]]
