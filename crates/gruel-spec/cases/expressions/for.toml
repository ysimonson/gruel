source = """
fn main() -> i32 {
    let arr = [10, 20, 30];
    let mut sum = 0;
    for x in arr {
        sum = sum + x;
    }
    sum
}
"""
exit_code = 60

[[case]]
name = "for_array_single_element"
spec = ["4.8:33"]
source = """
fn main() -> i32 {
    let arr = [42];
    let mut result = 0;
    for x in arr {
        result = x;
    }
    result
}
"""
exit_code = 42

[[case]]
name = "for_array_copy_type"
spec = ["4.8:34"]
source = """
