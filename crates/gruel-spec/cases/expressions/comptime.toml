fn Capped(comptime max: i32) -> type {
    enum {
        Value(i32),
        Overflow,

        fn new(val: i32) -> Self {
            if val > max {
                Self::Overflow
            } else {
                Self::Value(val)
            }
        }

        fn get_or(self, default: i32) -> i32 {
            match self {
                Self::Value(v) => v,
                Self::Overflow => default,
            }
        }
    }
}

