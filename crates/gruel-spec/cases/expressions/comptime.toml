[[case]]
name = "anon_struct_duplicate_method_error"
spec = ["4.14:14"]
description = "Error on duplicate method names (lazy checking - only when type is instantiated)"
source = """
fn Bad() -> type {
    struct {
        x: i32,

        fn get(self) -> i32 {
            self.x
        }

        fn get(self) -> i32 {
            0
        }
    }
}
fn main() -> i32 {
    let B = Bad();
    0
}
"""
compile_fail = true
error_contains = "comptime evaluation failed"


[[case]]
name = "anon_struct_empty_with_method_ok"
spec = ["4.14:9", "4.14:10"]
description = "Anonymous struct with only methods (no fields) is allowed"
source = """
fn StaticUtils() -> type {
    struct {
        fn constant() -> i32 {
            42
        }
    }
}
fn main() -> i32 {
    let U = StaticUtils();
    U::constant()
}
"""
exit_code = 42

[[case]]
name = "anon_struct_swap_method"
spec = ["4.14:11"]
description = "Swap method from spec example"
source = """
fn Pair(comptime T: type) -> type {
    struct {
        first: T,
        second: T,

        fn swap(self) -> Self {
            Self { first: self.second, second: self.first }
        }
    }
}
fn main() -> i32 {
    let P = Pair(i32);
    let p: P = P { first: 10, second: 32 };
    let swapped = p.swap();
    swapped.first
}
"""
exit_code = 32

[[case]]
name = "anon_struct_no_method_vs_with_method_different_types"
spec = ["4.14:15"]
description = "Struct with method is different from struct without method"
source = """
fn WithMethod() -> type {
    struct {
        x: i32,
        fn get(self) -> i32 { self.x }
    }
}
fn WithoutMethod() -> type {
    struct { x: i32 }
}
fn main() -> i32 {
    let WM = WithMethod();
    let WO = WithoutMethod();
    let wm: WM = WM { x: 42 };
    let wo: WO = WO { x: 10 };
    wm.get()
}
"""
exit_code = 42

