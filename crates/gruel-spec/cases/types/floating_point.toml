# --- Preview gate ---

[[case]]
name = "float_requires_preview"
spec = ["3.11:1"]
source = """
fn main() -> i32 {
    let _x: f64 = 1.0;
    0
}
"""
compile_fail = true
error_contains = "preview feature"
