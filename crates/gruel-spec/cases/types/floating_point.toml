[section]
id = "types.floating_point"
spec_chapter = "3.11"
name = "Floating-Point Types"
description = "Tests for floating-point type declarations, literals, and type inference."

# --- Type declarations ---

[[case]]
name = "f64_variable"
spec = ["3.11:1", "3.11:4"]
preview = "extended_numeric_types"
preview_should_pass = true
source = """
fn main() -> i32 {
    let _x: f64 = 3.14;
    0
}
"""
exit_code = 0

[[case]]
name = "f32_variable"
spec = ["3.11:1", "3.11:3"]
preview = "extended_numeric_types"
preview_should_pass = true
source = """
fn main() -> i32 {
    let _x: f32 = 2.718;
    0
}
"""
exit_code = 0

[[case]]
name = "f16_variable"
spec = ["3.11:1", "3.11:2"]
preview = "extended_numeric_types"
preview_should_pass = true
source = """
fn main() -> i32 {
    let _x: f16 = 1.0;
    0
}
"""
exit_code = 0

