# --- Bitwise rejection ---

[[case]]
name = "float_bitwise_and_rejected"
spec = ["3.11:12"]
preview = "extended_numeric_types"
preview_should_pass = true
source = """
fn main() -> i32 {
    let a: f64 = 1.0;
    let b: f64 = 2.0;
    let _c: f64 = a & b;
    0
}
"""
compile_fail = true
error_contains = "integer type"

