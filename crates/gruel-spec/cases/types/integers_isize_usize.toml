# --- intcast between isize/usize and other types ---

[[case]]
name = "intcast_i32_to_isize"
spec = ["3.1:23"]
source = """
fn main() -> i32 {
    let a: i32 = 42;
    let b: isize = @cast(a);
    let result: i32 = @cast(b);
    result
}
"""
exit_code = 42

[[case]]
name = "intcast_u64_to_usize"
spec = ["3.1:24"]
source = """
fn main() -> i32 {
    let a: u64 = 99;
    let b: usize = @cast(a);
    let result: i32 = @cast(b);
    result
}
"""
exit_code = 99

[[case]]
name = "isize_requires_preview"
