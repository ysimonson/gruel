[section]
id = "types.integers_isize_usize"
spec_chapter = "3.1"
name = "Pointer-Sized Integer Types (isize/usize)"

# --- isize basic ---

[[case]]
name = "isize_basic_literal"
spec = ["3.1:23"]
source = """
fn main() -> i32 {
    let x: isize = 42;
    let result: i32 = @cast(x);
    result
}
"""
exit_code = 42

[[case]]
name = "isize_negative"
spec = ["3.1:23"]
source = """
fn main() -> i32 {
    let x: isize = -10;
    let result: i32 = @cast(x);
    result
}
"""
exit_code = 246

[[case]]
name = "isize_arithmetic"
spec = ["3.1:23"]
source = """
fn main() -> i32 {
    let a: isize = 30;
    let b: isize = 12;
    let sum: isize = a + b;
    let result: i32 = @cast(sum);
    result
}
"""
exit_code = 42

[[case]]
name = "isize_subtraction"
spec = ["3.1:23"]
source = """
fn main() -> i32 {
    let a: isize = 100;
    let b: isize = 58;
    let diff: isize = a - b;
    let result: i32 = @cast(diff);
    result
}
"""
exit_code = 42

[[case]]
name = "isize_multiplication"
spec = ["3.1:23"]
source = """
fn main() -> i32 {
    let a: isize = 6;
    let b: isize = 7;
    let prod: isize = a * b;
    let result: i32 = @cast(prod);
    result
}
"""
exit_code = 42

[[case]]
name = "isize_division"
spec = ["3.1:23"]
source = """
fn main() -> i32 {
    let a: isize = 126;
    let b: isize = 3;
    let quot: isize = a / b;
    let result: i32 = @cast(quot);
    result
}
"""
exit_code = 42

[[case]]
name = "isize_comparison"
spec = ["3.1:23"]
source = """
fn main() -> i32 {
    let a: isize = 10;
    let b: isize = 20;
    if a < b {
        42
    } else {
        0
    }
}
"""
exit_code = 42

[[case]]
name = "isize_function_param"
spec = ["3.1:23"]
source = """
fn double(x: isize) -> isize {
    x * 2
}

fn main() -> i32 {
    let val: isize = 21;
    let result: isize = double(val);
    let out: i32 = @cast(result);
    out
}
"""
exit_code = 42

