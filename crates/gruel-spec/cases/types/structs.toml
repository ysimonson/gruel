[section]
id = "types.structs"
spec_chapter = "3.6"
name = "Struct Types"
description = "Struct types are composite types with named fields."

# =============================================================================
# Struct Type Definition
# =============================================================================

[[case]]
name = "struct_type_definition"
spec = ["3.6:1", "3.6:2"]
source = """
struct Point { x: i32, y: i32 }
fn main() -> i32 {
    let p = Point { x: 10, y: 20 };
    p.x + p.y
}
"""
exit_code = 30

# =============================================================================
# Field Access with Dot Notation
# =============================================================================

[[case]]
name = "struct_field_access"
spec = ["3.6:4"]
source = """
struct Data { value: i32 }
fn main() -> i32 {
    let d = Data { value: 42 };
    d.value
}
"""
exit_code = 42

# =============================================================================
# All Fields Must Be Initialized
# =============================================================================

[[case]]
name = "struct_all_fields_init"
spec = ["3.6:5"]
source = """
struct Point { x: i32, y: i32 }
fn main() -> i32 {
    let p = Point { x: 20, y: 22 };
    p.x + p.y
}
"""
exit_code = 42

[[case]]
name = "struct_missing_field_error"
spec = ["3.6:5"]
source = """
struct Point { x: i32, y: i32 }
fn main() -> i32 {
    let p = Point { x: 10 };
    p.x
}
"""
compile_fail = true

# =============================================================================
# Unique Field Names
# =============================================================================

[[case]]
name = "struct_unique_fields"
spec = ["3.6:6"]
source = """
struct Data { a: i32, b: i32, c: i32 }
fn main() -> i32 {
    let d = Data { a: 10, b: 20, c: 12 };
    d.a + d.b + d.c
}
"""
exit_code = 42

# =============================================================================
# Memory Layout
# =============================================================================

[[case]]
name = "scalar_size_8_bytes"
spec = ["3.6:8"]
source = """
fn main() -> i32 {
    @size_of(i32)
}
"""
exit_code = 8

[[case]]
name = "bool_size_8_bytes"
spec = ["3.6:8"]
source = """
fn main() -> i32 {
    @size_of(bool)
}
"""
exit_code = 8

[[case]]
name = "unit_size_zero"
spec = ["3.0:2", "3.0:3", "3.3:4"]
source = """
fn main() -> i32 {
    @size_of(())
}
"""
exit_code = 0

[[case]]
name = "struct_fields_declaration_order"
spec = ["3.6:9"]
source = """
struct Point { x: i32, y: i32 }
fn main() -> i32 {
    // Two fields, each 8 bytes = 16 bytes total
    @size_of(Point)
}
"""
exit_code = 16

[[case]]
name = "struct_size_sum_of_fields"
spec = ["3.6:10"]
source = """
struct Triple { a: i32, b: i32, c: i32 }
fn main() -> i32 {
    // Three fields, each 8 bytes = 24 bytes
    @size_of(Triple)
}
"""
exit_code = 24

[[case]]
name = "nested_struct_size"
spec = ["3.6:10"]
source = """
struct Point { x: i32, y: i32 }
struct Line { start: Point, end: Point }
fn main() -> i32 {
    // Two Points, each 16 bytes = 32 bytes
    @size_of(Line)
}
"""
exit_code = 32

[[case]]
name = "struct_alignment_8_bytes"
spec = ["3.6:12"]
source = """
struct Point { x: i32, y: i32 }
fn main() -> i32 {
    @align_of(Point)
}
"""
exit_code = 8

[[case]]
name = "scalar_alignment_8_bytes"
spec = ["3.6:12"]
source = """
fn main() -> i32 {
    @align_of(i64)
}
"""
exit_code = 8

# =============================================================================
# Empty Struct (Zero-Sized Type)
# =============================================================================

[[case]]
name = "empty_struct_definition"
spec = ["3.6:13", "3.0:2"]
source = """
struct Empty {}
fn main() -> i32 {
    let e = Empty {};
    42
}
"""
exit_code = 42

[[case]]
name = "empty_struct_size_zero"
spec = ["3.6:13", "3.0:2"]
source = """
struct Empty {}
fn main() -> i32 {
    @size_of(Empty)
}
"""
exit_code = 0

[[case]]
name = "empty_struct_alignment_one"
spec = ["3.6:12", "3.0:4"]
source = """
struct Empty {}
fn main() -> i32 {
    @align_of(Empty)
}
"""
exit_code = 1

[[case]]
name = "empty_struct_pass_by_value"
spec = ["3.6:13", "3.0:2"]
source = """
struct Empty {}
fn take_empty(e: Empty) -> i32 { 42 }
fn main() -> i32 {
    let e = Empty {};
    take_empty(e)
}
"""
exit_code = 42

[[case]]
name = "empty_struct_return_by_value"
spec = ["3.6:13", "3.0:2"]
source = """
struct Empty {}
fn make_empty() -> Empty { Empty {} }
fn main() -> i32 {
    let e = make_empty();
    42
}
"""
exit_code = 42

[[case]]
name = "struct_with_empty_field"
spec = ["3.6:10", "3.6:13"]
source = """
struct Empty {}
struct Container { value: i32, marker: Empty }
fn main() -> i32 {
    // Empty field contributes 0 bytes, so size is just value's 8 bytes
    @size_of(Container)
}
"""
exit_code = 8

[[case]]
name = "nested_empty_structs"
spec = ["3.6:10", "3.6:13"]
source = """
struct Empty {}
struct AlsoEmpty { e: Empty }
fn main() -> i32 {
    @size_of(AlsoEmpty)
}
"""
exit_code = 0

