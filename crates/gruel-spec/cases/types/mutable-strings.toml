[[case]]
name = "string_building_message"
spec = ["3.10:15", "3.10:16", "3.10:20"]
preview = "string_vec_bridge"
preview_should_pass = true
description = "Build a complete message through appending (push_byte from ADR-0072)"
source = """
fn main() -> i32 {
    let mut msg = String::new();
    msg.push_str("Hello");
    msg.push_str(", ");
    msg.push_str("world");
    let exclaim: u8 = 33;  // '!'
    let _ = checked {
        msg.push_byte(exclaim);
        0
    };
    // "Hello, world!" is 13 bytes
    let thirteen: usize = 13;
    if msg.len() == thirteen { 0 } else { 1 }
}
"""
exit_code = 0

