[[case]]
name = "string_push_byte"
spec = ["3.10:16", "3.10:19"]
preview = "string_vec_bridge"
preview_should_pass = true
description = "push_byte() appends a single byte (ADR-0072)"
source = """
fn main() -> i32 {
    let mut s = String::new();
    s.push_str("hello");
    let exclaim: u8 = 33;  // '!'
    let _ = checked {
        s.push_byte(exclaim);
        0
    };
    let six: usize = 6;
    if s.len() == six { 0 } else { 1 }
}
"""
exit_code = 0

[[case]]
name = "string_clear"
spec = ["3.10:17", "3.10:19"]
description = "clear() removes content but retains capacity"
source = """
fn main() -> i32 {
    let cap: usize = 100;
    let mut s = String::with_capacity(cap);
    s.push_str("hello");
    let cap_before = s.capacity();
    s.clear();
    if s.is_empty() && s.capacity() == cap_before { 0 } else { 1 }
}
"""
exit_code = 0

[[case]]
name = "string_reserve"
spec = ["3.10:18", "3.10:19"]
description = "reserve() ensures additional capacity"
source = """
fn main() -> i32 {
    let mut s = String::new();
    s.push_str("hi");
    let additional: usize = 100;
    s.reserve(additional);
    let min_cap: usize = 102;
    if s.capacity() >= min_cap { 0 } else { 1 }
}
"""
exit_code = 0

[[case]]
name = "string_mutation_requires_let mut"
