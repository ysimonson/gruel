[section]
id = "types.c_named"
spec_chapter = "10.3"
name = "C named primitive types"
description = "ADR-0086 C named primitive types: c_schar/c_uchar/c_short/c_ushort/c_int/c_uint/c_long/c_ulong/c_longlong/c_ulonglong/c_float/c_double/c_void. Stable as of ADR-0086 Phase 5."

# =============================================================================
# Basic resolution and literal coercion
# =============================================================================

[[case]]
name = "c_int_return_literal"
spec = ["10.3:1", "10.3:2", "10.3:4"]
source = """
fn main() -> i32 {
    let x: c_int = 42;
    0
}
"""
exit_code = 0

[[case]]
name = "c_long_return_literal"
spec = ["10.3:1", "10.3:2", "10.3:4"]
source = """
fn main() -> i32 {
    let x: c_long = 1234;
    0
}
"""
exit_code = 0

[[case]]
name = "c_uint_return_literal"
spec = ["10.3:1", "10.3:2", "10.3:4"]
source = """
fn main() -> i32 {
    let x: c_uint = 9;
    0
}
"""
exit_code = 0

[[case]]
name = "c_double_return_literal"
spec = ["10.3:1", "10.3:2", "10.3:4"]
source = """
fn main() -> i32 {
    let x: c_double = 1.5;
    0
}
"""
exit_code = 0

# =============================================================================
# c_void pointer-only use
# =============================================================================

[[case]]
name = "mut_ptr_c_void_allowed_in_ffi"
spec = ["10.3:6", "10.3:7"]
source = """
link_extern("c") {
    fn malloc(size: usize) -> MutPtr(c_void);
    fn free(p: MutPtr(c_void)) -> ();
}
fn main() -> i32 {
    let p: MutPtr(c_void) = malloc(64);
    free(p);
    0
}
"""
exit_code = 0

[[case]]
name = "c_void_rejected_in_return_position"
spec = ["10.3:6"]
source = """
fn make() -> c_void {
    0
}
fn main() -> i32 { 0 }
"""
compile_fail = true
error_contains = "c_void"

[[case]]
name = "c_void_rejected_in_param_position"
spec = ["10.3:6"]
source = """
fn take(x: c_void) -> i32 { 0 }
fn main() -> i32 { 0 }
"""
compile_fail = true
error_contains = "c_void"

# =============================================================================
# FFI roundtrip via libc abs
# =============================================================================

[[case]]
name = "c_int_libc_abs"
spec = ["10.3:5"]
source = """
link_extern("c") {
    fn abs(x: c_int) -> c_int;
}
fn main() -> i32 {
    let x: c_int = 7;
    let y: c_int = abs(x);
    0
}
"""
exit_code = 0

# =============================================================================
# Distinctness from native types and from each other
# =============================================================================

[[case]]
name = "i32_not_assignable_to_c_int"
spec = ["10.3:3"]
source = """
fn take(x: c_int) -> i32 { 0 }
fn main() -> i32 {
    let v: i32 = 5;
    take(v)
}
"""
compile_fail = true
error_contains = "i32"

[[case]]
name = "c_int_not_assignable_to_i32"
spec = ["10.3:3"]
source = """
fn take(x: i32) -> i32 { 0 }
fn main() -> i32 {
    let v: c_int = 5;
    take(v)
}
"""
compile_fail = true
error_contains = "c_int"

[[case]]
name = "c_long_distinct_from_c_longlong"
spec = ["10.3:3"]
source = """
fn take(x: c_long) -> i32 { 0 }
fn main() -> i32 {
    let v: c_longlong = 5;
    take(v)
}
"""
compile_fail = true
error_contains = "c_longlong"
