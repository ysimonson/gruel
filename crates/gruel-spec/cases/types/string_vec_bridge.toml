# String / Vec(u8) bridge tests (ADR-0072)
#
# These tests cover spec §7.4 — String as a newtype wrapper over Vec(u8).

[section]
id = "types.string_vec_bridge"
spec_chapter = "7.4"
name = "String / Vec(u8) Relationship"
description = "Tests for ADR-0072: String as a newtype wrapper over Vec(u8)."

# ---- 7.4:1 newtype + privacy ----

[[case]]
name = "private_bytes_field_rejected"
spec = ["7.4:1", "7.4:10"]
source = """
fn main() -> i32 {
    let s = String::new();
    let _ = s.bytes;
    0
}
"""
compile_fail = true
error_contains = "private"

# ---- 7.4:2 UTF-8 invariant: empty / literal trivially valid ----

[[case]]
name = "empty_string_is_valid_utf8"
spec = ["7.4:2"]
source = """
fn main() -> i32 {
    let s = String::new();
    if s.is_empty() { 0 } else { 1 }
}
"""
exit_code = 0

# ---- 7.4:3 method surface: bytes_len / bytes_capacity ----

[[case]]
name = "bytes_len_after_push_char"
spec = ["7.4:3"]
source = """
fn main() -> i32 {
    let mut s = String::new();
    s.push('A');
    let n: i32 = @cast(s.bytes_len());
    n
}
"""
exit_code = 1

[[case]]
name = "bytes_capacity_at_least_reserved"
spec = ["7.4:3"]
source = """
fn main() -> i32 {
    let n: usize = 16;
    let s = String::with_capacity(n);
    let cap = s.bytes_capacity();
    if cap >= n { 0 } else { 1 }
}
"""
exit_code = 0

# ---- 7.4:5 into_bytes ----

[[case]]
name = "into_bytes_round_trip"
spec = ["7.4:5"]
source = """
fn main() -> i32 {
    let s = String::from_char('Z');
    let v: Vec(u8) = s.into_bytes();
    let n: i32 = @cast(v.len());
    n
}
"""
exit_code = 1

# ---- 7.4:6 from_utf8 validated ----

[[case]]
name = "from_utf8_valid_ok"
spec = ["7.4:6"]
source = """
fn main() -> i32 {
    let s = String::from_char('A');
    let v: Vec(u8) = s.into_bytes();
    let r = String::from_utf8(v);
    let R = Result(String, Utf8DecodeError);
    match r {
        R::Ok(s2) => {
            let n: i32 = @cast(s2.bytes_len());
            n
        },
        R::Err(_) => -1,
    }
}
"""
exit_code = 1

[[case]]
name = "from_utf8_invalid_err"
spec = ["7.4:6"]
source = """
fn main() -> i32 {
    let mut v: Vec(u8) = Vec(u8)::new();
    let b1: u8 = 255;
    let b2: u8 = 254;
    v.push(b1);
    v.push(b2);
    let r = String::from_utf8(v);
    let R = Result(String, Utf8DecodeError);
    match r {
        R::Ok(_) => 1,
        R::Err(_) => 0,
    }
}
"""
exit_code = 0

# ---- 7.4:7 from_utf8_unchecked ----

[[case]]
name = "from_utf8_unchecked_basic"
spec = ["7.4:7"]
source = """
fn main() -> i32 {
    let s0 = String::from_char('Q');
    let v: Vec(u8) = s0.into_bytes();
    let s1 = checked { String::from_utf8_unchecked(v) };
    let n: i32 = @cast(s1.bytes_len());
    n
}
"""
exit_code = 1

# ---- 7.4:8 push_char and push_byte ----

[[case]]
name = "push_char_multi_byte"
spec = ["7.4:8"]
source = """
fn main() -> i32 {
    let mut s = String::new();
    s.push('é');
    let n: i32 = @cast(s.bytes_len());
    n
}
"""
exit_code = 2

[[case]]
name = "push_byte_requires_checked"
spec = ["7.4:8"]
source = """
fn main() -> i32 {
    let mut s = String::new();
    let b: u8 = 65;
    s.push_byte(b);
    0
}
"""
compile_fail = true
error_contains = "checked"

[[case]]
name = "push_byte_in_checked_block"
spec = ["7.4:8"]
source = """
fn main() -> i32 {
    let mut s = String::new();
    let b: u8 = 65;
    let _ = checked {
        s.push_byte(b);
        0
    };
    let n: i32 = @cast(s.bytes_len());
    n
}
"""
exit_code = 1

# ---- 7.4:9 C interop ----
#
# ADR-0088 reclassified `terminated_ptr`: it is no longer
# `@mark(unchecked)`. The body writes the terminator inside `checked { }`
# and returns a pointer that is valid at return time; caller-side deref
# hazards are gated at the deref site (ADR-0028's existing rule).

[[case]]
name = "terminated_ptr_call_does_not_require_checked"
spec = ["7.4:9"]
source = """
fn main() -> i32 {
    let mut s = String::new();
    let _p = s.terminated_ptr();
    0
}
"""
exit_code = 0

[[case]]
name = "terminated_ptr_in_checked_block"
spec = ["7.4:9"]
source = """
fn main() -> i32 {
    let mut s = String::from_char('A');
    let _ = checked {
        let _p = s.terminated_ptr();
        0
    };
    let n: i32 = @cast(s.bytes_len());
    n
}
"""
exit_code = 1
