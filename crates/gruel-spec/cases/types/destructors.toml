# Tests for spec paragraphs 3.9:21, 3.9:22, 3.9:23

[[case]]
name = "codegen_nontrivial_drop_call"
spec = ["3.9:21", "3.10:29"]
description = "Non-trivially droppable types generate destructor calls"
source = """
fn main() -> i32 {
    let mut s = String::new();
    s.push_str("hello");
    0
}
"""
exit_code = 0

[[case]]
name = "codegen_trivial_no_drop"
spec = ["3.9:22", "3.9:23"]
description = "Trivially droppable types do not generate drop instructions in CFG"
source = """
fn main() -> i32 {
    let x: i32 = 42;
    let y: bool = true;
    let z = 10;
    x + z
}
"""
expected_cfg = """
cfg main (return_type: i32) {
  bb0:
    v0 : () = storage_live $0
    v1 : i32 = const 42
    v2 : () = alloc $0 = v1
    v3 : () = storage_live $1
    v4 : bool = const true
    v5 : () = alloc $1 = v4
    v6 : () = storage_live $2
    v7 : i32 = const 10
    v8 : () = alloc $2 = v7
    v9 : i32 = load $0
    v10 : i32 = load $2
    v11 : i32 = add v9, v10
    v12 : () = storage_dead $2
    v13 : () = storage_dead $1
    v14 : () = storage_dead $0
    return v11

}
"""

[[case]]
name = "codegen_trivial_struct_no_drop"
spec = ["3.9:9", "3.9:22", "3.9:23"]
description = "Structs with only trivially droppable fields are trivially droppable"
source = """
struct Point { x: i32, y: i32 }

fn main() -> i32 {
    let p = Point { x: 10, y: 20 };
    p.x + p.y
}
"""
exit_code = 30

# =============================================================================
# Function Parameter Drops
# =============================================================================

[[case]]
name = "param_dropped_at_function_exit"
spec = ["3.9:31"]
description = "Unconsumed by-value parameter is dropped at function exit"
source = """
struct Counter {
    value: i32,

    fn __drop(self) {

        @dbg(self.value);
    }
}


fn ignore(c: Counter) -> i32 {
    0
}

fn main() -> i32 {
    ignore(Counter { value: 42 });
    0
}
"""
exit_code = 0
stdout = "42\n"

[[case]]
name = "param_not_double_dropped"
spec = ["3.9:31", "3.9:32"]
description = "Consumed parameter is not dropped again at function exit"
source = """
struct Counter {
    value: i32,

    fn __drop(self) {

        @dbg(self.value);
    }
}


fn consume(c: Counter) -> i32 { c.value }

fn main() -> i32 {
    consume(Counter { value: 99 });
    0
}
"""
exit_code = 0
stdout = "99\n"

[[case]]
name = "caller_does_not_drop_moved_arg"
spec = ["3.9:32"]
description = "Caller does not drop a local that was passed to a function"
source = """
struct Counter {
    value: i32,

    fn __drop(self) {

        @dbg(self.value);
    }
}


fn ignore(c: Counter) -> i32 { 0 }

fn main() -> i32 {
    let c = Counter { value: 7 };
    ignore(c);
    0
}
"""
exit_code = 0
stdout = "7\n"

[[case]]
name = "param_returned_not_dropped_in_callee"
spec = ["3.9:31"]
description = "Returned parameter is not dropped in callee - caller drops it"
source = """
struct Counter {
    value: i32,

    fn __drop(self) {

        @dbg(self.value);
    }
}


fn pass_through(c: Counter) -> Counter { c }

fn main() -> i32 {
    let c = pass_through(Counter { value: 5 });
    @dbg(c.value);
    0
}
"""
exit_code = 0
stdout = "5\n5\n"

# =============================================================================
# User-Defined Destructors (Phase 4)
# =============================================================================

[[case]]
name = "user_defined_destructor_syntax"
spec = ["3.9:24", "3.9:25"]
description = "Basic `fn __drop(self)` method parses correctly"
source = """
struct Data {
    value: i32,

    fn __drop(self) {
        // destructor body
    }
}

fn main() -> i32 {
    let d = Data { value: 42 };
    d.value
}
"""
exit_code = 42

[[case]]
name = "user_defined_destructor_with_field_access"
spec = ["3.9:24", "3.9:25", "3.9:29"]
description = "User-defined destructor can access fields via self"
source = """
struct Counter {
    value: i32,

    fn __drop(self) {

        let _ = self.value;
    }
}


fn main() -> i32 {
    let c = Counter { value: 42 };
    c.value
}
"""
exit_code = 42

[[case]]
name = "user_defined_destructor_runs_at_scope_exit"
spec = ["3.9:28"]
description = "User-defined destructor runs when value goes out of scope"
source = """
struct Counter {
    value: i32,

    fn __drop(self) {

        @dbg(self.value);
    }
}


fn main() -> i32 {
    let c = Counter { value: 99 };
    0
}  // Counter destructor runs, prints 99
"""
exit_code = 0
stdout = "99\n"

[[case]]
name = "duplicate_destructor_error"
spec = ["3.9:26"]
description = "Two `fn __drop(self)` methods on the same type produce a duplicate-method error."
source = """
struct Data {
    value: i32,

    fn __drop(self) {}
    fn __drop(self) {}
}

fn main() -> i32 { 0 }
"""
compile_fail = true
error_contains = "duplicate"


