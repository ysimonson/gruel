[section]
id = "types.destructors"
spec_chapter = "3.9"
name = "Destructors"
description = "Drop semantics and destructor behavior."

# =============================================================================
# Drop Semantics
# =============================================================================

[[case]]
name = "value_dropped_at_scope_exit"
spec = ["3.9:1", "3.9:2"]
description = "Values are dropped when their binding goes out of scope"
source = """
struct Data { value: i32 }

fn main() -> i32 {
    let d = Data { value: 42 };
    d.value
}  // d is dropped here
"""
exit_code = 42

[[case]]
name = "moved_value_not_dropped_at_original_site"
spec = ["3.9:2", "3.9:3"]
description = "Moved values are not dropped at their original binding"
source = """
struct Data { value: i32 }

fn consume(d: Data) -> i32 { d.value }

fn main() -> i32 {
    let d = Data { value: 42 };
    consume(d)  // d is moved, dropped inside consume()
}  // d is NOT dropped here (was moved)
"""
exit_code = 42

# =============================================================================
# Drop Order
# =============================================================================

[[case]]
name = "drop_order_reverse_declaration"
spec = ["3.9:4", "3.9:5", "3.9:6"]
description = "Multiple values dropped in reverse declaration order (LIFO)"
source = """
struct Data { value: i32 }

fn main() -> i32 {
    let a = Data { value: 1 };  // declared first
    let b = Data { value: 2 };  // declared second
    a.value + b.value
}  // b dropped first, then a dropped
"""
exit_code = 3

# =============================================================================
# Trivially Droppable Types
# =============================================================================

[[case]]
name = "primitives_trivially_droppable"
spec = ["3.9:7", "3.9:8"]
description = "Primitive types are trivially droppable (no destructor)"
source = """
fn main() -> i32 {
    let x: i32 = 42;
    let b: bool = true;
    let u: () = ();
    x
}
"""
exit_code = 42

[[case]]
name = "struct_with_trivial_fields_is_trivial"
spec = ["3.9:9", "3.9:10"]
description = "Struct with only trivially droppable fields is trivially droppable"
source = """
struct Point { x: i32, y: i32 }

fn main() -> i32 {
    let p = Point { x: 10, y: 20 };
    p.x + p.y
}
"""
exit_code = 30

[[case]]
name = "enum_trivially_droppable"
spec = ["3.9:8"]
description = "Enum types are trivially droppable"
source = """
enum Color { Red, Green, Blue }

fn main() -> i32 {
    let c = Color::Green;
    match c {
        Color::Red => 1,
        Color::Green => 2,
        Color::Blue => 3,
    }
}
"""
exit_code = 2

[[case]]
name = "array_of_trivial_is_trivial"
spec = ["3.9:8"]
description = "Arrays of trivially droppable types are trivially droppable"
source = """
fn main() -> i32 {
    let arr = [1, 2, 3, 4, 5];
    arr[0] + arr[4]
}
"""
exit_code = 6

# =============================================================================
# Arrays with Destructors
# =============================================================================

[[case]]
name = "array_of_nontrivial_has_destructor"
spec = ["3.9:14"]
description = "Array of non-trivially droppable types has a destructor"
source = """
struct Data {
    value: i32,

    fn __drop(self) {

        // destructor body
    }
}


fn main() -> i32 {
    let arr: [Data; 2] = [Data { value: 1 }, Data { value: 2 }];
    // arr goes out of scope here, each Data is dropped
    0
}
"""
exit_code = 0

[[case]]
name = "array_drop_order_index_order"
spec = ["3.9:15"]
description = "Array elements are dropped in index order (element 0 first)"
source = """
struct Data {
    value: i32,

    fn __drop(self) {

        @dbg(self.value);
    }
}


fn main() -> i32 {
    let arr: [Data; 3] = [Data { value: 1 }, Data { value: 2 }, Data { value: 3 }];
    0
}
"""
exit_code = 0
stdout = "1\n2\n3\n"

[[case]]
name = "array_of_struct_with_destructor_dropped"
spec = ["3.9:14", "3.9:15"]
description = "Arrays of structs with destructors are properly dropped"
source = """
struct Container {
    x: i32,
    y: i32,
    fn __drop(self) {

        @dbg(self.x);
    }
}


fn main() -> i32 {
    let arr: [Container; 2] = [Container { x: 10, y: 1 }, Container { x: 20, y: 2 }];
    // arr dropped: arr[0].__drop() prints 10, arr[1].__drop() prints 20
    0
}
"""
exit_code = 0
stdout = "10\n20\n"

# =============================================================================
# Drop Placement
# =============================================================================

[[case]]
name = "drop_at_block_scope_end"
spec = ["3.9:18"]
description = "Values are dropped at end of block scope"
source = """
struct Data { value: i32 }

fn main() -> i32 {
    let result = {
        let d = Data { value: 42 };
        d.value
    };  // d dropped here, at end of block
    result
}
"""
exit_code = 42

[[case]]
name = "drop_before_early_return"
spec = ["3.9:18", "3.9:20"]
description = "Values are dropped before early return"
source = """
struct Data { value: i32 }

fn example(condition: bool) -> i32 {
    let a = Data { value: 1 };
    if condition {
        return 42;  // a dropped before return
    }
    a.value
}

fn main() -> i32 {
    example(true)
}
"""
exit_code = 42

[[case]]
name = "drop_in_each_branch"
spec = ["3.9:19", "3.9:20"]
description = "Each branch independently drops its bindings"
source = """
struct Data { value: i32 }

fn example(condition: bool) -> i32 {
    let a = Data { value: 1 };
    if condition {
        let b = Data { value: 2 };
        return a.value + b.value;  // b dropped, then a dropped, then return
    }
    let c = Data { value: 3 };
    a.value + c.value  // c dropped, then a dropped
}

fn main() -> i32 {
    example(true)
}
"""
exit_code = 3

# =============================================================================
# Types with Destructors (String)
# =============================================================================

# These tests verify destructor behavior using String, which has a destructor
# that frees heap-allocated buffers when capacity > 0.

[[case]]
name = "type_with_destructor"
spec = ["3.9:11", "3.10:29"]
description = "A type has a destructor if dropping requires cleanup (String drops heap buffer)"
source = """
fn main() -> i32 {
    let mut s = String::new();
    s.push_str("hello");
    // s has heap allocation
    0
}  // String destructor frees heap buffer
"""
exit_code = 0

[[case]]
name = "type_with_destructor_literal_promoted"
spec = ["3.9:11", "3.10:29", "3.10:21"]
description = "String promoted from literal has destructor that frees heap"
source = """
fn main() -> i32 {
    let mut s = "hello";
    s.push_str("!");  // promotes to heap
    // s now has capacity > 0
    0
}  // destructor frees the heap buffer
"""
exit_code = 0

[[case]]
name = "type_with_destructor_literal_no_heap"
spec = ["3.9:11", "3.10:29"]
description = "String literal (cap=0) has no cleanup action"
source = """
fn main() -> i32 {
    let s = "hello";
    // s is a literal with cap=0, no heap allocation
    0
}  // no heap to free
"""
exit_code = 0

[[case]]
name = "struct_with_destructor_field"
spec = ["3.9:12"]
description = "Struct has destructor if any field has destructor"
source = """
struct Container {
    name: String,
    value: i32,
}

fn main() -> i32 {
    let mut s = String::new();
    s.push_str("test");
    let c = Container { name: s, value: 42 };
    c.value
}  // Container dropped: name field (String) is dropped, freeing heap
"""
exit_code = 42

[[case]]
name = "field_drop_order"
spec = ["3.9:13"]
description = "Fields dropped in declaration order"
source = """
struct TwoStrings {
    first: String,
    second: String,
}

fn main() -> i32 {
    let mut a = String::new();
    a.push_str("first");
    let mut b = String::new();
    b.push_str("second");
    let ts = TwoStrings { first: a, second: b };
    0
}  // TwoStrings dropped: first field dropped, then second field dropped
"""
exit_code = 0

# =============================================================================
# Golden Tests: CFG Storage Liveness
# =============================================================================

# These tests verify that StorageLive/StorageDead instructions are emitted
# correctly in the CFG for drop elaboration.

[[case]]
name = "cfg_simple_scope_storage"
description = "CFG shows StorageLive at let binding, StorageDead at scope exit"
source = """
fn main() -> i32 {
    let x = 42;
    x
}
"""
expected_cfg = """
cfg main (return_type: i32) {
  bb0:
    v0 : () = storage_live $0
    v1 : i32 = const 42
    v2 : () = alloc $0 = v1
    v3 : i32 = load $0
    v4 : () = storage_dead $0
    return v3

}
"""

[[case]]
name = "cfg_multiple_variables_drop_order"
description = "CFG shows StorageDead in reverse declaration order (LIFO)"
source = """
fn main() -> i32 {
    let a = 1;
    let b = 2;
    a + b
}
"""
expected_cfg = """
cfg main (return_type: i32) {
  bb0:
    v0 : () = storage_live $0
    v1 : i32 = const 1
    v2 : () = alloc $0 = v1
    v3 : () = storage_live $1
    v4 : i32 = const 2
    v5 : () = alloc $1 = v4
    v6 : i32 = load $0
    v7 : i32 = load $1
    v8 : i32 = add v6, v7
    v9 : () = storage_dead $1
    v10 : () = storage_dead $0
    return v8

}
"""

[[case]]
name = "cfg_break_drops"
description = "CFG shows exactly one StorageDead before break, not duplicate"
source = """
fn foo() -> i32 {
    while true {
        let x = 1;
        break;
    }
    0
}
"""
expected_cfg = """
cfg foo (return_type: i32) {
  bb0:
    goto bb1

  bb1:
    ; preds: bb0
    v0 : bool = const true
    branch v0, bb2, bb3

  bb2:
    ; preds: bb1
    v1 : () = storage_live $0
    v2 : i32 = const 1
    v3 : () = alloc $0 = v2
    v4 : () = storage_dead $0
    goto bb3

  bb3:
    ; preds: bb1, bb2
    v5 : () = const 0
    v6 : i32 = const 0
    return v6

}
"""

[[case]]
name = "cfg_continue_drops"
description = "CFG shows exactly one StorageDead before continue, not duplicate"
source = """
fn foo() -> i32 {
    let mut i = 0;
    while i < 3 {
        let x = 1;
        i = i + 1;
        continue;
    }
    i
}
"""
expected_cfg = """
cfg foo (return_type: i32) {
  bb0:
    v0 : () = storage_live $0
    v1 : i32 = const 0
    v2 : () = alloc $0 = v1
    goto bb1

  bb1:
    ; preds: bb0, bb2
    v3 : i32 = load $0
    v4 : i32 = const 3
    v5 : bool = lt v3, v4
    branch v5, bb2, bb3

  bb2:
    ; preds: bb1
    v6 : () = storage_live $1
    v7 : i32 = const 1
    v8 : () = alloc $1 = v7
    v9 : i32 = load $0
    v10 : i32 = const 1
    v11 : i32 = add v9, v10
    v12 : () = store $0 = v11
    v13 : () = storage_dead $1
    goto bb1

  bb3:
    ; preds: bb1
    v14 : () = const 0
    v15 : i32 = load $0
    v16 : () = storage_dead $0
    return v15

}
"""

[[case]]
name = "cfg_early_return_drops"
description = "CFG shows StorageDead before early return"
source = """
fn foo(cond: bool) -> i32 {
    let a = 1;
    if cond {
        return 42;
    }
    a
}
"""
expected_cfg = """
cfg foo (return_type: i32) {
  bb0:
    v0 : () = storage_live $0
    v1 : i32 = const 1
    v2 : () = alloc $0 = v1
    v3 : bool = param 0
    branch v3, bb1, bb2

  bb1:
    ; preds: bb0
    v4 : i32 = const 42
    v5 : () = storage_dead $0
    return v4

  bb2:
    ; preds: bb0
    v6 : () = const 0
    goto bb3

  bb3:
    ; preds: bb2
    v7 : i32 = load $0
    v8 : () = storage_dead $0
    return v7

}
"""

