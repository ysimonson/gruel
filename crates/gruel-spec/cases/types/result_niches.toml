[section]
id = "types.result_niches"
spec_chapter = "3.13"
name = "Result niche-encoded layout (ADR-0069)"
description = """
Tests for niche-filled Result layouts (ADR-0069). The optimization
preserves observable semantics — pattern matching round-trips for
Result(bool, bool) and Result with niche-bearing payloads should
all return the expected discriminants and payload values.
"""

[[case]]
name = "result_bool_bool_ok_true"
spec = ["3.13:2"]
description = "Result(bool, bool) packs into a single byte using bool niches."
source = """
fn main() -> i32 {
    let R = Result(bool, bool);
    let r: R = R::Ok(true);
    match r {
        R::Ok(b) => if b { 1 } else { 2 },
        R::Err(b) => if b { 3 } else { 4 },
    }
}
"""
exit_code = 1

[[case]]
name = "result_bool_bool_ok_false"
spec = ["3.13:2"]
source = """
fn main() -> i32 {
    let R = Result(bool, bool);
    let r: R = R::Ok(false);
    match r {
        R::Ok(b) => if b { 1 } else { 2 },
        R::Err(b) => if b { 3 } else { 4 },
    }
}
"""
exit_code = 2

[[case]]
name = "result_bool_bool_err_true"
spec = ["3.13:2"]
source = """
