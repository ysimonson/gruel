exit_code = 4

# Result of a unit-only enum on the Err side: niches in the Err payload should
# be available to the Result discriminant.
[[case]]
name = "result_small_enum_round_trip"
spec = ["3.13:2"]
description = "Result(i32, Color) for a 3-variant unit enum round-trips correctly."
source = """
enum Color { Red, Green, Blue }

fn main() -> i32 {
    let R = Result(i32, Color);
    let ok: R = R::Ok(42);
    let r: R = R::Err(Color::Red);
    let g: R = R::Err(Color::Green);
    let b: R = R::Err(Color::Blue);
    let mut acc: i32 = 0;
    acc = acc + (match ok { R::Ok(n) => n, R::Err(_) => 0 });
    acc = acc + (match r { R::Err(c) => match c { Color::Red => 1, Color::Green => 0, Color::Blue => 0 }, R::Ok(_) => 0 });
    acc = acc + (match g { R::Err(c) => match c { Color::Red => 0, Color::Green => 2, Color::Blue => 0 }, R::Ok(_) => 0 });
    acc = acc + (match b { R::Err(c) => match c { Color::Red => 0, Color::Green => 0, Color::Blue => 4 }, R::Ok(_) => 0 });
    acc
}
"""
exit_code = 49
