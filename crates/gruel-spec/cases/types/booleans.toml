[section]
id = "types.booleans"
spec_chapter = "3.2"
name = "Boolean Type"
description = "The bool type represents boolean values true and false."

# =============================================================================
# Boolean Type Definition
# =============================================================================

[[case]]
name = "bool_true"
spec = ["3.2:1", "3.2:2"]
source = """
fn main() -> i32 {
    let b: bool = true;
    if b { 1 } else { 0 }
}
"""
exit_code = 1

[[case]]
name = "bool_false"
spec = ["3.2:1", "3.2:2"]
source = """
fn main() -> i32 {
    let b: bool = false;
    if b { 1 } else { 0 }
}
"""
exit_code = 0

[[case]]
name = "bool_inferred"
spec = ["3.2:1", "3.2:2"]
source = """
fn main() -> i32 {
    let b = true;
    if b { 42 } else { 0 }
}
"""
exit_code = 42

# =============================================================================
# Boolean Comparisons
# =============================================================================

[[case]]
name = "bool_equality_true_true"
spec = ["3.2:4"]
source = """
fn main() -> i32 {
    if true == true { 1 } else { 0 }
}
"""
exit_code = 1

[[case]]
name = "bool_equality_true_false"
spec = ["3.2:4"]
source = """
fn main() -> i32 {
    if true == false { 1 } else { 0 }
}
"""
exit_code = 0

[[case]]
name = "bool_inequality"
spec = ["3.2:4"]
source = """
fn main() -> i32 {
    if true != false { 1 } else { 0 }
}
"""
exit_code = 1

[[case]]
name = "bool_no_ordering_lt"
spec = ["3.2:4"]
source = """
fn main() -> i32 {
    if true < false { 1 } else { 0 }
}
"""
compile_fail = true

[[case]]
name = "bool_no_ordering_gt"
spec = ["3.2:4"]
source = """
fn main() -> i32 {
    if true > false { 1 } else { 0 }
}
"""
compile_fail = true

[[case]]
name = "bool_no_ordering_le"
spec = ["3.2:4"]
source = """
fn main() -> i32 {
    if true <= false { 1 } else { 0 }
}
"""
compile_fail = true

[[case]]
name = "bool_no_ordering_ge"
spec = ["3.2:4"]
source = """
fn main() -> i32 {
    if true >= false { 1 } else { 0 }
}
"""
compile_fail = true

# =============================================================================
# Bool Memory Representation
# =============================================================================

[[case]]
name = "bool_representation"
spec = ["3.2:3"]
source = """
fn main() -> i32 {
    let t = true;
    let f = false;
    if t { if !f { 1 } else { 0 } } else { 0 }
}
"""
exit_code = 1
