[section]
id = "types.clone"
spec_chapter = "3.8"
name = "Clone Interface (ADR-0065)"
description = "Tests for the compiler-recognized Clone structural interface."

# A `comptime T: Clone` bound accepts a Copy primitive (auto-conformance).
[[case]]
name = "clone_interface_accepts_copy_primitive"
spec = ["3.8:70", "3.8:71"]
description = "comptime T: Clone accepts i32 via Copy auto-conformance"
source = """
fn use_clone(comptime T: Clone, t: T) -> i32 {
    0
}

fn main() -> i32 {
    use_clone(i32, 7)
}
"""
exit_code = 0

# A `comptime T: Clone` bound accepts a `@derive(Copy)` struct (Copy → Clone).
[[case]]
name = "clone_interface_accepts_derive_copy_struct"
spec = ["3.8:70", "3.8:71"]
description = "comptime T: Clone accepts a @derive(Copy) struct"
source = """
@derive(Copy)
struct Pair { x: i32, y: i32 }

fn use_clone(comptime T: Clone, t: T) -> i32 {
    0
}

fn main() -> i32 {
    use_clone(Pair, Pair { x: 1, y: 2 })
}
"""
exit_code = 0

# A `comptime T: Clone` bound accepts the built-in `String` type.
[[case]]
name = "clone_interface_accepts_string"
spec = ["3.8:70", "3.8:71"]
description = "comptime T: Clone accepts String via built-in clone method"
source = """
fn use_clone(comptime T: Clone, t: T) -> i32 {
    0
}

fn main() -> i32 {
    use_clone(String, "hello");
    0
}
"""
exit_code = 0

# A user affine struct with `fn clone(self: Ref(Self)) -> Self` conforms.
[[case]]
name = "clone_interface_accepts_user_struct_with_clone_method"
spec = ["3.8:70", "3.8:71"]
description = "comptime T: Clone accepts a user struct with a clone method"
source = """
struct Foo {
    fn clone(self: Ref(Self)) -> Foo { Foo {} }
}

fn use_clone(comptime T: Clone, t: T) -> i32 {
    0
}

fn main() -> i32 {
    use_clone(Foo, Foo {});
    0
}
"""
exit_code = 0

# A user affine struct WITHOUT a clone method does NOT conform.
[[case]]
name = "clone_interface_rejects_struct_without_clone_method"
spec = ["3.8:71"]
description = "comptime T: Clone rejects affine struct without clone method"
source = """
struct Foo {}

fn use_clone(comptime T: Clone, t: T) -> i32 {
    0
}

fn main() -> i32 {
    use_clone(Foo, Foo {});
    0
}
"""
compile_fail = true
error_contains = "does not conform to interface `Clone`"

# A `linear` type does NOT conform to Clone.
[[case]]
name = "clone_interface_rejects_linear"
spec = ["3.8:72"]
description = "comptime T: Clone rejects linear types"
source = """
linear struct MustUse { value: i32 }

fn use_clone(comptime T: Clone, t: T) -> i32 {
    0
}

fn main() -> i32 {
    use_clone(MustUse, MustUse { value: 1 });
    0
}
"""
compile_fail = true
error_contains = "does not conform to interface `Clone`"

# Calling .clone() on a String through a Clone-bounded generic works.
[[case]]
name = "clone_interface_dispatch_on_string"
spec = ["3.8:70", "3.8:71"]
description = "Calling clone() on a Clone-bound generic resolves to the built-in String clone"
source = """
fn duplicate(comptime T: Clone, x: T) -> T {
    x.clone()
}

fn main() -> i32 {
    let s: String = "abc";
    let s2 = duplicate(String, s);
    let len: usize = s2.len();
    @cast(len)
}
"""
exit_code = 3

# A function bounded on Clone can be instantiated with multiple types.
[[case]]
name = "clone_interface_multiple_instantiations"
spec = ["3.8:70", "3.8:71", "3.8:73"]
description = "Clone-bound generic accepts both String and primitives"
source = """
fn use_clone(comptime T: Clone, t: T) -> i32 {
    0
}

fn main() -> i32 {
    use_clone(String, "abc");
    use_clone(i32, 7);
    use_clone(bool, true);
    0
}
"""
exit_code = 0

# A user struct with a clone method directly calls it.
[[case]]
name = "clone_interface_user_struct_direct_call"
spec = ["3.8:70", "3.8:71"]
description = "User struct with hand-written clone is callable directly"
source = """
struct Wrap {
    n: i32,

    fn clone(self: Ref(Self)) -> Wrap {
        Wrap { n: self.n }
    }
}

fn main() -> i32 {
    let w = Wrap { n: 42 };
    let w2 = w.clone();
    w2.n
}
"""
exit_code = 42

# @derive(Clone) on a struct with all-Copy fields synthesizes a clone method.
[[case]]
name = "derive_clone_struct_all_copy_fields"
spec = ["3.8:71"]
description = "@derive(Clone) on a struct with all-Copy fields synthesizes clone"
source = """
@derive(Clone)
struct Point { x: i32, y: i32 }

fn main() -> i32 {
    let p = Point { x: 17, y: 25 };
    let q: Point = p.clone();
    q.x + q.y
}
"""
exit_code = 42

# @derive(Clone) on a struct with non-Copy fields is rejected (v1 limitation).
[[case]]
name = "derive_clone_struct_non_copy_field_rejected"
spec = ["3.8:71"]
description = "@derive(Clone) v1 rejects non-Copy fields"
source = """
@derive(Clone)
struct Holder { s: String }

fn main() -> i32 {
    0
}
"""
compile_fail = true
error_contains = "every field to be Copy"

# @derive(Clone) on a linear struct is rejected.
[[case]]
name = "derive_clone_linear_rejected"
spec = ["3.8:72"]
description = "@derive(Clone) on linear struct is rejected"
source = """
@derive(Clone)
linear struct MustUse { value: i32 }

fn main() -> i32 {
    0
}
"""
compile_fail = true
error_contains = "linear struct"

# @derive(Clone) makes the struct conform to the Clone interface.
[[case]]
name = "derive_clone_struct_conforms_to_clone"
spec = ["3.8:71", "3.8:73"]
description = "@derive(Clone) struct conforms to comptime T: Clone"
source = """
@derive(Clone)
struct Pair { a: i32, b: i32 }

fn use_clone(comptime T: Clone, t: T) -> i32 {
    0
}

fn main() -> i32 {
    use_clone(Pair, Pair { a: 1, b: 2 });
    0
}
"""
exit_code = 0

# Clone constraint dispatches to the user's clone method through a generic.
[[case]]
name = "clone_interface_user_struct_generic_dispatch"
spec = ["3.8:70", "3.8:71", "3.8:73"]
description = "Clone-bound generic dispatches to a user-struct clone"
source = """
struct Wrap {
    n: i32,

    fn clone(self: Ref(Self)) -> Wrap {
        Wrap { n: self.n }
    }
}

fn dup(comptime T: Clone, x: T) -> T {
    x.clone()
}

fn main() -> i32 {
    let w = Wrap { n: 42 };
    let w2 = dup(Wrap, w);
    w2.n
}
"""
exit_code = 42
