# =============================================================================
# Legality errors
# =============================================================================

[[case]]
name = "tuple_index_out_of_bounds_fails"
spec = ["3.12:6", "4.15:8"]
source = """
fn main() -> i32 {
    let t = (1, 2, 3);
    t.5
}
"""
compile_fail = true
error_contains = "tuple index"

[[case]]
name = "tuple_destructure_arity_mismatch_fails"
spec = ["5.1:22"]
source = """
fn main() -> i32 {
    let (a, b) = (1, 2, 3);
    a + b
}
"""
compile_fail = true
error_contains = "missing field"

# =============================================================================
# Copy semantics
# =============================================================================

[[case]]
name = "tuple_of_copy_types_is_copy"
spec = ["3.12:5"]
source = """
fn use_it(t: (i32, bool)) -> i32 {
    if t.1 { t.0 } else { 0 }
}
fn main() -> i32 {
    let t = (42, true);
    let a = use_it(t);  // t is Copy; still usable afterwards
    let b = use_it(t);
    if a == b { a } else { 0 }
}
"""
exit_code = 42

[[case]]
name = "tuple_partial_field_move_of_noncopy_fails"
spec = ["3.12:7", "4.15:11"]
source = """
fn main() -> i32 {
    let t: (String, i32) = (String::new(), 42);
    let s = t.0;  // cannot move non-copy field out of tuple
    0
}
"""
compile_fail = true
error_contains = "cannot move field"

[[case]]
name = "tuple_destructure_consumes_noncopy_tuple"
spec = ["3.12:7", "5.1:25"]
source = """
fn main() -> i32 {
    let t: (String, i32) = (String::new(), 42);
    let (_s, n) = t;  // destructuring consumes t
    n
}
"""
exit_code = 42

# =============================================================================
# Evaluation order
# =============================================================================

[[case]]
name = "tuple_elements_left_to_right"
spec = ["4.15:5"]
source = """
fn main() -> i32 {
    // Each element is computed in a block so we can use the result of
    // sequential mutation as witness of left-to-right evaluation.
    let mut counter: i32 = 0;
    let t = (
        { counter = counter + 1; counter },  // 1
        { counter = counter + 1; counter },  // 2
        { counter = counter + 1; counter },  // 3
    );
    t.0 * 100 + t.1 * 10 + t.2
}
"""
exit_code = 123
