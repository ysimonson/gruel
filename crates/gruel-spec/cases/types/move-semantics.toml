# =============================================================================
# Partial Moves (Field-Level Moves)
# =============================================================================

[[case]]
name = "cannot_move_non_copy_field"
spec = ["3.8:22", "3.8:23"]
description = "Moving a non-copy field out of a struct is a compile error"
source = """
struct Inner { x: i32 }
struct S { a: Inner, b: Inner }

fn main() -> i32 {
    let s = S { a: Inner { x: 1 }, b: Inner { x: 2 } };
    let x = s.a;
    0
}
"""
compile_fail = true
error_contains = "cannot move field"

[[case]]
name = "cannot_move_non_copy_field_in_call"
spec = ["3.8:22"]
description = "Passing a non-copy field as an argument is a move error"
source = """
struct Inner { x: i32 }
struct S { a: Inner, b: Inner }

fn consume(i: Inner) -> i32 { i.x }

fn main() -> i32 {
    let s = S { a: Inner { x: 1 }, b: Inner { x: 2 } };
    consume(s.a)
}
"""
compile_fail = true
error_contains = "cannot move field"

[[case]]
name = "cannot_move_nested_non_copy_field"
spec = ["3.8:22"]
description = "Moving a nested non-copy field is also banned"
source = """
struct Inner { x: i32 }
struct Middle { a: Inner, b: Inner }
struct Outer { m: Middle }

fn main() -> i32 {
    let o = Outer { m: Middle { a: Inner { x: 1 }, b: Inner { x: 2 } } };
    let x = o.m.a;
    0
}
"""
compile_fail = true
error_contains = "cannot move field"

[[case]]
name = "copy_fields_no_partial_move"
spec = ["3.8:28", "3.8:29"]
description = "Copy-type fields can be accessed multiple times"
source = """
struct S { a: i32, b: i32 }

fn main() -> i32 {
    let s = S { a: 1, b: 2 };
    let x = s.a;
    let y = s.a;
    let z = s.b;
    x + y + z
}
"""
exit_code = 4

[[case]]
name = "copy_field_access_with_non_copy_sibling"
spec = ["3.8:28"]
description = "Copy fields can be read even when sibling fields are non-copy"
source = """
struct Inner { x: i32 }

drop fn Inner(self) {
    @dbg(self.x);
}

struct Tagged { tag: i32, data: Inner }

fn main() -> i32 {
    let t = Tagged { tag: 42, data: Inner { x: 99 } };
    t.tag
}
"""
exit_code = 42
expected_stdout = "99\n"

