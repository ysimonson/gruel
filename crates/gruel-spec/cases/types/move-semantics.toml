# =============================================================================
# Handle Interface (ADR-0075)
# =============================================================================

[[case]]
name = "handle_opted_in_without_directive"
spec = ["3.8:41"]
description = "Handle is opted into by defining the method directly; no directive is required"
source = """
struct Token {
    n: i32,

    fn handle(self: Ref(Self)) -> Token {
        Token { n: self.n }
    }
}

fn main() -> i32 {
    let a = Token { n: 7 };
    let b = a.handle();
    b.n
}
"""
exit_code = 7

[[case]]
name = "handle_call_on_non_handle_type_is_error"
spec = ["3.8:43"]
description = "Calling .handle() on a type without a handle method is a compile-time error"
source = """
struct Plain { n: i32 }

fn main() -> i32 {
    let p = Plain { n: 1 };
    let _ = p.handle();
    0
}
"""
compile_fail = true
error_contains = "no method"

[[case]]
name = "handle_struct_basic"
spec = ["3.8:40", "3.8:42", "3.8:44", "3.8:45"]
description = "Struct conforms to Handle by defining fn handle(self: Ref(Self)) -> Self"
source = """
struct Counter {
    count: i32,

    fn handle(self: Ref(Self)) -> Counter {
        Counter { count: self.count }
    }
}

fn main() -> i32 {
    let a = Counter { count: 42 };
    let b = a.handle();
    b.count
}
"""
exit_code = 42

[[case]]
name = "handle_struct_does_not_consume_receiver"
spec = ["3.8:40", "3.8:45"]
description = "Calling .handle() on a Handle type leaves the original valid"
source = """
struct Value {
    n: i32,

    fn handle(self: Ref(Self)) -> Value {
        Value { n: self.n }
    }
}

fn main() -> i32 {
    let a = Value { n: 10 };
    let b = a.handle();  // explicit duplication
    a.n + b.n
}
"""
exit_code = 20

[[case]]
name = "handle_implements_when_method_present"
spec = ["3.8:42"]
description = "@implements(T, Handle) is true when the type defines fn handle(self: Ref(Self)) -> Self"
source = """
struct Counter {
    count: i32,

    fn handle(self: Ref(Self)) -> Counter {
        Counter { count: self.count }
    }
}

fn main() -> i32 {
    let implements = comptime { @implements(Counter, Handle) };
    if implements { 1 } else { 0 }
}
"""
exit_code = 1

[[case]]
name = "handle_does_not_implement_when_method_absent"
spec = ["3.8:42"]
description = "@implements(T, Handle) is false when the type lacks fn handle"
source = """
struct NotHandle { n: i32 }

fn main() -> i32 {
    let implements = comptime { @implements(NotHandle, Handle) };
    if implements { 1 } else { 0 }
}
"""
exit_code = 0

[[case]]
name = "handle_with_linear"
spec = ["3.8:49"]
description = "Linear struct can conform to Handle"
source = """
linear struct Transaction {
    id: i32,

    fn handle(self: Ref(Self)) -> Transaction {
        Transaction { id: self.id }
    }
}

fn consume(t: Transaction) -> i32 { t.id }

fn main() -> i32 {
    let t = Transaction { id: 42 };
    let t2 = t.handle();
    consume(t) + consume(t2)
}
"""
exit_code = 84

[[case]]
name = "copy_struct_implicit_handle_semantics"
spec = ["3.8:47"]
description = "@derive(Copy) struct can be duplicated without an explicit .handle() method"
source = """
@derive(Copy)
struct Point { x: i32, y: i32 }

fn main() -> i32 {
    let p = Point { x: 1, y: 2 };
    let q = p;  // implicit copy
    let r = p;  // can copy again
    p.x + q.x + r.x
}
"""
exit_code = 3
