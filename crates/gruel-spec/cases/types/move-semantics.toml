fn main() -> i32 { 0 }
"""
compile_fail = true
error_contains = "affine"

[[case]]
name = "copy_struct_enum_field"
spec = ["3.8:20"]
description = "@derive(Copy) struct with enum field (enums are Copy)"
source = """
enum Status { Active, Inactive }

@derive(Copy)
struct Data { status: Status, value: i32 }

fn main() -> i32 {
    let d = Data { status: Status::Active, value: 10 };
    let e = d;
    match d.status {
        Status::Active => d.value + e.value,
        Status::Inactive => 0,
    }
}
"""
exit_code = 20

[[case]]
name = "non_copy_struct_still_moves"
spec = ["3.8:3"]
description = "Struct without @derive(Copy) still has move semantics"
source = """
struct Point { x: i32, y: i32 }
fn main() -> i32 {
    let p = Point { x: 1, y: 2 };
    let q = p;
    let r = p;
