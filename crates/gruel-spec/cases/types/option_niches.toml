    }
}
"""
exit_code = 1

[[case]]
name = "nested_option_bool_outer_none"
spec = ["3.8:80"]
preview = "enum_niches"
preview_should_pass = true
source = """
fn main() -> i32 {
    let O = Option(bool);
    let OO = Option(O);
    let x: OO = OO::None;
    match x {
        OO::None => 7,
        OO::Some(inner) => match inner {
            O::None => 1,
            O::Some(b) => if b { 2 } else { 3 },
        },
    }
}
"""
exit_code = 7

[[case]]
name = "option_small_enum_round_trip"
spec = ["3.8:80"]
preview = "enum_niches"
preview_should_pass = true
description = "Option of a unit-only enum collapses to one byte and round-trips correctly."
source = """
enum Color { Red, Green, Blue }

fn main() -> i32 {
    let O = Option(Color);
    let r: O = O::Some(Color::Red);
    let g: O = O::Some(Color::Green);
    let b: O = O::Some(Color::Blue);
    let n: O = O::None;
    let mut acc: i32 = 0;
    acc = acc + (match r { O::Some(c) => match c { Color::Red => 1, Color::Green => 0, Color::Blue => 0 }, O::None => 0 });
    acc = acc + (match g { O::Some(c) => match c { Color::Red => 0, Color::Green => 2, Color::Blue => 0 }, O::None => 0 });
    acc = acc + (match b { O::Some(c) => match c { Color::Red => 0, Color::Green => 0, Color::Blue => 4 }, O::None => 0 });
    acc = acc + (match n { O::Some(_) => 0, O::None => 8 });
    acc
}
"""
exit_code = 15
