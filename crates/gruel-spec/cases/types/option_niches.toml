[section]
id = "types.option_niches"
spec_chapter = "3.8"
name = "Option niche-encoded layout (ADR-0069)"
description = """
Tests for niche-filled Option layouts gated on `--preview enum_niches`.
Programs that compile and run identically with and without the preview
flag verify that the optimization preserves observable semantics.
"""

[[case]]
name = "option_bool_some_true_round_trip"
spec = ["3.8:80"]
preview = "enum_niches"
preview_should_pass = true
source = """
fn main() -> i32 {
    let O = Option(bool);
    let x: O = O::Some(true);
    match x {
        O::Some(b) => if b { 1 } else { 2 },
        O::None => 3,
    }
}
"""
exit_code = 1

[[case]]
name = "option_bool_some_false_round_trip"
spec = ["3.8:80"]
preview = "enum_niches"
preview_should_pass = true
source = """
fn main() -> i32 {
    let O = Option(bool);
    let x: O = O::Some(false);
    match x {
        O::Some(b) => if b { 1 } else { 2 },
        O::None => 3,
    }
}
"""
exit_code = 2

[[case]]
name = "option_bool_none_round_trip"
spec = ["3.8:80"]
preview = "enum_niches"
preview_should_pass = true
