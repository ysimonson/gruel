function main:
air (return_type: i32) {
    %0 : i32 = const 5
    %1 : i32 = const 3
    %2 : i32 = sub %0, %1
    %3 : i32 = ret %2
}
"""

[[case]]
name = "multiplication_rir"
spec = ["4.2:1"]
source = "fn main() -> i32 { 3 * 4 }"
expected_rir = """
%0 = const 3
%1 = const 4
%2 = mul %0, %1
%3 = fn main() -> i32 {
    %2
}
"""

[[case]]
name = "multiplication_air"
spec = ["4.2:1"]
source = "fn main() -> i32 { 3 * 4 }"
expected_air = """
function main:
air (return_type: i32) {
    %0 : i32 = const 3
    %1 : i32 = const 4
    %2 : i32 = mul %0, %1
    %3 : i32 = ret %2
}
"""

[[case]]
name = "division_rir"
spec = ["4.2:1"]
source = "fn main() -> i32 { 10 / 3 }"
expected_rir = """
%0 = const 10
%1 = const 3
%2 = div %0, %1
%3 = fn main() -> i32 {
    %2
}
"""

[[case]]
name = "division_air"
spec = ["4.2:1"]
source = "fn main() -> i32 { 10 / 3 }"
expected_air = """
function main:
air (return_type: i32) {
    %0 : i32 = const 10
    %1 : i32 = const 3
    %2 : i32 = div %0, %1
    %3 : i32 = ret %2
}
"""

[[case]]
name = "modulo_rir"
spec = ["4.2:1"]
source = "fn main() -> i32 { 10 % 3 }"
expected_rir = """
%0 = const 10
%1 = const 3
%2 = mod %0, %1
%3 = fn main() -> i32 {
    %2
}
"""

[[case]]
name = "modulo_air"
spec = ["4.2:1"]
source = "fn main() -> i32 { 10 % 3 }"
expected_air = """
function main:
air (return_type: i32) {
    %0 : i32 = const 10
    %1 : i32 = const 3
    %2 : i32 = mod %0, %1
    %3 : i32 = ret %2
}
"""

[[case]]
name = "precedence_rir"
spec = ["4.2:2"]
source = "fn main() -> i32 { 1 + 2 * 3 }"
expected_rir = """
%0 = const 1
%1 = const 2
%2 = const 3
%3 = mul %1, %2
%4 = add %0, %3
%5 = fn main() -> i32 {
    %4
}
"""

[[case]]
name = "precedence_air"
spec = ["4.2:2"]
source = "fn main() -> i32 { 1 + 2 * 3 }"
expected_air = """
function main:
air (return_type: i32) {
    %0 : i32 = const 1
    %1 : i32 = const 2
    %2 : i32 = const 3
    %3 : i32 = mul %1, %2
    %4 : i32 = add %0, %3
    %5 : i32 = ret %4
}
"""

[[case]]
name = "parens_rir"
spec = ["4.2:2"]
source = "fn main() -> i32 { (1 + 2) * 3 }"
expected_rir = """
%0 = const 1
%1 = const 2
%2 = add %0, %1
%3 = const 3
%4 = mul %2, %3
%5 = fn main() -> i32 {
    %4
}
"""

[[case]]
name = "parens_air"
spec = ["4.2:2"]
source = "fn main() -> i32 { (1 + 2) * 3 }"
expected_air = """
function main:
air (return_type: i32) {
    %0 : i32 = const 1
    %1 : i32 = const 2
    %2 : i32 = add %0, %1
    %3 : i32 = const 3
    %4 : i32 = mul %2, %3
    %5 : i32 = ret %4
}
"""

# =============================================================================
# Unary Negation
# =============================================================================

[[case]]
name = "negation_rir"
spec = ["4.2:3"]
source = "fn main() -> i32 { -42 }"
expected_rir = """
%0 = const 42
%1 = neg %0
%2 = fn main() -> i32 {
    %1
}
"""

[[case]]
name = "negation_air"
spec = ["4.2:3"]
source = "fn main() -> i32 { -42 }"
expected_air = """
function main:
air (return_type: i32) {
    %0 : i32 = const 42
    %1 : i32 = neg %0
    %2 : i32 = ret %1
}
"""

[[case]]
name = "negation_in_expr_rir"
spec = ["4.2:3"]
source = "fn main() -> i32 { 10 + -3 }"
expected_rir = """
%0 = const 10
%1 = const 3
%2 = neg %1
%3 = add %0, %2
%4 = fn main() -> i32 {
    %3
}
"""

[[case]]
name = "double_negation_rir"
spec = ["4.2:3"]
source = "fn main() -> i32 { --5 }"
expected_rir = """
%0 = const 5
%1 = neg %0
%2 = neg %1
%3 = fn main() -> i32 {
    %2
}
"""
