[section]
id = "golden.ir-dumps"
spec_chapter = "A.1"
name = "IR Dumps"
description = "Golden tests for intermediate representation dumps."

# =============================================================================
# Tokens
# =============================================================================

[[case]]
name = "simple_return_tokens"
spec = ["2.1:1"]
source = "fn main() -> i32 { 42 }"
expected_tokens = """
   0..2    FN
   3..7    IDENT(sym:0)
   7..8    LPAREN
   8..9    RPAREN
  10..12   ARROW
  13..16   TYPE(i32)
  17..18   LBRACE
  19..21   INT(42)
  22..23   RBRACE
  23..23   EOF
"""

[[case]]
name = "binary_expr_tokens"
spec = ["2.1:1"]
source = "fn main() -> i32 { 1 + 2 }"
expected_tokens = """
   0..2    FN
   3..7    IDENT(sym:0)
   7..8    LPAREN
   8..9    RPAREN
  10..12   ARROW
  13..16   TYPE(i32)
  17..18   LBRACE
  19..20   INT(1)
  21..22   PLUS
  23..24   INT(2)
  25..26   RBRACE
  26..26   EOF
"""

# =============================================================================
# AST
# =============================================================================

[[case]]
name = "simple_return_ast"
spec = ["2.1:1"]
source = "fn main() -> i32 { 42 }"
expected_ast = """
Function sym:0 -> sym:3
  Block
    Int(42)
"""

[[case]]
name = "binary_expr_ast"
spec = ["2.1:1"]
source = "fn main() -> i32 { 1 + 2 }"
expected_ast = """
Function sym:0 -> sym:3
  Block
    Binary Add
      Int(1)
      Int(2)
"""

[[case]]
name = "let_binding_ast"
spec = ["2.1:1"]
source = "fn main() -> i32 { let x = 42; x }"
expected_ast = """
Function sym:0 -> sym:4
  Block
    Let sym:1
      Int(42)
    Ident(sym:1)
"""

[[case]]
name = "if_else_ast"
spec = ["2.1:1"]
source = "fn main() -> i32 { if true { 1 } else { 2 } }"
expected_ast = """
Function sym:0 -> sym:3
  Block
    If
      Cond:
        Bool(true)
      Then:
        Int(1)
      Else:
        Int(2)
"""

# =============================================================================
# RIR
# =============================================================================

[[case]]
name = "simple_return_rir"
spec = ["2.1:1"]
source = "fn main() -> i32 { 42 }"
expected_rir = """
%0 = const 42
%1 = fn main() -> i32 {
    %0
}
"""

[[case]]
name = "simple_return_air"
spec = ["2.1:1"]
source = "fn main() -> i32 { 42 }"
expected_air = """
function main:
air (return_type: i32) {
    %0 : i32 = const 42
    %1 : i32 = ret %0
}
"""

[[case]]
name = "zero_rir"
spec = ["2.1:1"]
source = "fn main() -> i32 { 0 }"
expected_rir = """
%0 = const 0
%1 = fn main() -> i32 {
    %0
}
"""

[[case]]
name = "zero_air"
spec = ["2.1:1"]
source = "fn main() -> i32 { 0 }"
expected_air = """
function main:
air (return_type: i32) {
    %0 : i32 = const 0
    %1 : i32 = ret %0
}
"""

[[case]]
name = "max_exit_code_rir"
spec = ["2.1:1"]
source = "fn main() -> i32 { 255 }"
expected_rir = """
%0 = const 255
%1 = fn main() -> i32 {
    %0
}
"""

[[case]]
name = "max_exit_code_air"
spec = ["2.1:1"]
source = "fn main() -> i32 { 255 }"
expected_air = """
function main:
air (return_type: i32) {
    %0 : i32 = const 255
    %1 : i32 = ret %0
}
"""

