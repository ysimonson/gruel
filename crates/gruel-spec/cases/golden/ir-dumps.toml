# Arithmetic Operators
# =============================================================================

[[case]]
name = "addition_rir"
spec = ["4.2:1"]
source = "fn main() -> i32 { 1 + 2 }"
expected_rir = """
%0 = const 1
%1 = const 2
%2 = add %0, %1
%3 = fn main() -> i32 {
    %2
}
"""

[[case]]
name = "addition_air"
spec = ["4.2:1"]
source = "fn main() -> i32 { 1 + 2 }"
expected_air = """
function main:
air (return_type: i32) {
    %0 : i32 = const 1
    %1 : i32 = const 2
    %2 : i32 = add %0, %1
    %3 : i32 = ret %2
}
"""

[[case]]
name = "subtraction_rir"
spec = ["4.2:1"]
source = "fn main() -> i32 { 5 - 3 }"
expected_rir = """
%0 = const 5
%1 = const 3
