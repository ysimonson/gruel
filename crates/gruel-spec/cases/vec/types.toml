# Vec(T) Type System (ADR-0066)
#
# Tests for the `Vec(T)` type-position form. Construction methods
# (`Vec::new`, `Vec::with_capacity`) and the rest of the surface land in
# subsequent phases of the ADR.

[section]
id = "vec.types"
spec_chapter = "7.3"
name = "Vec Types"
description = "Tests for ADR-0066 Vec(T) names in type position."

[[case]]
name = "vec_type_in_param"
spec = ["7.3:1"]
preview = "vec"
preview_should_pass = true
source = """
fn take(_v: Vec(i32)) -> i32 {
    7
}

fn main() -> i32 {
    7
}
"""
exit_code = 7

[[case]]
name = "vec_type_in_return"
spec = ["7.3:1"]
preview = "vec"
preview_should_pass = true
source = """
fn make() -> Vec(i32) {
    @panic("not yet implemented")
}

fn main() -> i32 {
    7
}
"""
exit_code = 7

[[case]]
name = "vec_requires_preview_feature"
spec = ["7.3:1"]
description = "Vec(T) without --preview vec is rejected"
source = """
fn take(_v: Vec(i32)) -> i32 {
    7
}

fn main() -> i32 {
    7
}
"""
compile_fail = true
error_contains = "preview feature"

[[case]]
name = "vec_rejects_linear_element_type"
spec = ["7.3:1"]
preview = "vec"
preview_should_pass = true
description = "Vec(T) where T:Linear is rejected"
source = """
linear struct MustUse { value: i32 }

fn take(_v: Vec(MustUse)) -> i32 {
    7
}

fn main() -> i32 {
    7
}
"""
compile_fail = true
error_contains = "does not support linear element"
