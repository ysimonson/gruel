[[case]]
name = "vec_extend_from_slice_grow_doubles_cap"
spec = ["7.3:10"]
source = """
fn main() -> i32 {
    let mut a: Vec(i32) = Vec(i32)::with_capacity(2);
    a.push(1);
    a.push(2);
    let b = @vec(3, 4, 5, 6, 7);
    a.extend_from_slice(&b[..]);
    let n: i32 = @cast(a.len());
    n + a[6]
}
"""
exit_code = 14

[[case]]
name = "vec_eq_struct_element"
spec = ["7.3:10"]
description = "ADR-0082: `Vec(T).eq` requires `T: Eq` (the prelude body dispatches `==` on each element). Pre-prelude semantics used byte-level `memcmp` on aggregates, which masked the requirement and let users compare `Vec(Pair)` for a Copy struct without an `Eq` impl. The prelude flip surfaces the requirement explicitly. A `Pair` with explicit `eq` and `cmp` methods (matching `Eq` / `Ord`'s structural shape) does compare correctly — see `vec_eq_struct_element_with_eq` below."
source = """
copy struct Pair { x: i32, y: i32 }

fn main() -> i32 {
    let a = @vec(Pair { x: 1, y: 2 }, Pair { x: 3, y: 4 });
    let b = @vec(Pair { x: 1, y: 2 }, Pair { x: 3, y: 4 });
    if a == b { 0 } else { 1 }
}
"""
compile_fail = true
error_contains = "Pair"
