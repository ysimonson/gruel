# Vec(T) byte-comparison and search methods (ADR-0081)
#
# Tests for the seven new methods added to Vec(T) for T: Copy:
# eq, cmp, contains, starts_with, ends_with, concat, extend_from_slice.
# These are exercised both directly (`v.eq(other)`, `v.contains(&n[..])`)
# and via the `==` / `<` operator desugarings (ADR-0078).

[section]
id = "vec.byte_methods"
spec_chapter = "7.3"
name = "Vec Byte-Comparison and Search Methods"
description = "Tests for ADR-0081: Vec(T) eq/cmp/contains/starts_with/ends_with/concat/extend_from_slice."

[[case]]
name = "vec_eq_basic_equal"
spec = ["7.3:10"]
source = """
fn main() -> i32 {
    let a = @vec(1, 2, 3);
    let b = @vec(1, 2, 3);
    if a == b { 0 } else { 1 }
}
"""
exit_code = 0

