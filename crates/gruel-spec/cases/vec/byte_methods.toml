[[case]]
name = "vec_concat_basic"
spec = ["7.3:10"]
source = """
fn main() -> i32 {
    let a = @vec(1, 2);
    let b = @vec(3, 4);
    let c = a.concat(&b[..]);
    let n: i32 = @cast(c.len());
    let sum = c[0] + c[1] + c[2] + c[3];
    n + sum
}
"""
exit_code = 14

