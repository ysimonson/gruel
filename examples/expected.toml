# Expected output for each `examples/<name>.gruel` program.
#
# Each `[name]` table is matched against `examples/<name>.gruel`.
# `make test` runs `cargo run -p gruel-test-runner --bin gruel-examples-tests`,
# which compiles every example with the gruel binary, runs the produced binary,
# and verifies its exit code (and `stdout`, when listed here) matches.
#
# Adding a new example:
#   1. Drop the `.gruel` file into `examples/`.
#   2. Add a matching entry below. If you omit the entry the test fails so
#      examples cannot drift out of coverage silently.

[arrays]
exit_code = 157
stdout = """
157
64
12
60
"""

[binary_search]
exit_code = 4
stdout = """
4
"""

[collatz]
# The starting value 2..=100 with the longest Collatz sequence is 97.
exit_code = 97
stdout = """
27
111
"""

