name: Website

on:
  push:
    branches: [trunk]
    paths:
      - 'website/**'
      - 'docs/spec/**'
      - 'scripts/generate-charts.py'
      - '.github/workflows/deploy-website.yml'
  pull_request:
    branches: [trunk]
    paths:
      - 'website/**'
      - 'docs/spec/**'
      - 'scripts/generate-charts.py'
      - '.github/workflows/deploy-website.yml'
  # Trigger when benchmarks complete (updates perf branch with new data)
  workflow_run:
    workflows: ["Benchmarks"]
    types: [completed]
    branches: [trunk]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Use a fixed concurrency group for all website deployments to ensure
# they run sequentially and don't cancel each other (especially important
# when triggered by benchmark workflow completion)
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch benchmark data from perf branch
        run: |
          # Try to fetch benchmark history from the perf branch
          # This may fail if the perf branch doesn't exist yet (new repos)
          mkdir -p website/static/benchmarks

          if git fetch origin perf --depth=1 2>/dev/null; then
            echo "Fetched perf branch, extracting benchmark history..."

            # Fetch per-platform history files
            for platform in x86-64-linux aarch64-linux aarch64-macos; do
              if git show origin/perf:benchmarks/history-${platform}.json > website/static/benchmarks/history-${platform}.json 2>/dev/null; then
                echo "  Fetched history-${platform}.json"
              else
                echo "  No history for ${platform} yet"
                rm -f website/static/benchmarks/history-${platform}.json
              fi
            done

            # Also fetch legacy history.json for backwards compatibility
            git show origin/perf:benchmarks/history.json > website/static/benchmarks/history.json 2>/dev/null || true
          else
            echo "Perf branch not found, using empty benchmark history"
          fi

      - name: Build website
        run: website/build.sh deploy

      - name: Add CNAME
        if: github.ref == 'refs/heads/trunk'
        run: echo "gruel.yusufsimonson.com" > website/public/CNAME

      - name: Upload artifact
        if: github.ref == 'refs/heads/trunk'
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/public

  deploy:
    if: github.ref == 'refs/heads/trunk' && github.repository == 'ysimonson/gruel'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
