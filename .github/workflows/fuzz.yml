name: Fuzz Testing

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC
  workflow_dispatch:  # Allow manual triggering

jobs:
  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 22
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22
          echo "LLVM_SYS_221_PREFIX=/usr/lib/llvm-22" >> $GITHUB_ENV

      - name: Install nightly toolchain
        run: rustup toolchain install nightly

      - name: Install cargo-fuzz
        run: cargo +nightly install cargo-fuzz

      - name: Cache Cargo registry and fuzz corpus
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            fuzz/corpus
          key: cargo-fuzz-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-fuzz-

      - name: Fuzz lexer (5 minutes)
        run: cargo +nightly fuzz run lexer -- -max_total_time=300

      - name: Fuzz parser (5 minutes)
        run: cargo +nightly fuzz run parser -- -max_total_time=300

      - name: Fuzz compiler (5 minutes)
        run: cargo +nightly fuzz run compiler -- -max_total_time=300

      - name: Fuzz x86-64 emitter (5 minutes)
        run: cargo +nightly fuzz run emitter -- -max_total_time=300

      - name: Fuzz x86-64 emitter sequences (5 minutes)
        run: cargo +nightly fuzz run emitter_sequence -- -max_total_time=300

      - name: Fuzz structured compiler (5 minutes)
        run: cargo +nightly fuzz run structured_compiler -- -max_total_time=300

      - name: Fuzz structured invalid programs (5 minutes)
        run: cargo +nightly fuzz run structured_invalid -- -max_total_time=300

      - name: Fuzz structured emitter (5 minutes)
        run: cargo +nightly fuzz run structured_emitter -- -max_total_time=300

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crashes
          path: fuzz/artifacts/
          if-no-files-found: ignore

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Fuzz testing found a crash (${new Date().toISOString().split('T')[0]})`;
            const body = `## Fuzz Testing Failure

            The daily fuzz testing workflow found a crash.

            **Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}

            Please check the workflow logs and crash artifacts for details.

            ### Next Steps
            1. Download the crash artifacts from the workflow run
            2. Reproduce locally: \`cargo +nightly fuzz run <target> fuzz/artifacts/<target>/crash-*\`
            3. Fix the issue and add a regression test
            `;

            // Check if an open issue already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'fuzz-crash'
            });

            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['fuzz-crash', 'bug']
              });
            }
