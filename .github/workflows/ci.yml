name: CI

on:
  push:
    branches: [trunk]
  pull_request:
    branches: [trunk]
  merge_group:
    branches: [trunk]

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dotslash
        uses: facebook/install-dotslash@latest

      - name: Check formatting
        # Uses hermetic rustfmt from Buck2 toolchain
        run: ./fmt.sh check

  test:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x64
          - os: ubuntu-24.04-arm
            name: linux-arm64
          - os: macos-15
            name: macos
    runs-on: ${{ matrix.os }}
    name: test (${{ matrix.name }})
    steps:
      - uses: actions/checkout@v4

      - name: Install dotslash
        uses: facebook/install-dotslash@latest

      # Cache Buck2 outputs including downloaded Rust toolchain
      - name: Cache Buck2 outputs
        uses: actions/cache@v4
        with:
          path: |
            buck-out/v2/gen
            ~/.cache/buck2
          key: buck2-${{ matrix.name }}-${{ hashFiles('**/BUCK', 'toolchains/rust/defs.bzl') }}
          restore-keys: |
            buck2-${{ matrix.name }}-

      # Uses hermetic Rust toolchain downloaded by Buck2
      # First verify everything builds (catches issues tests might miss)
      - name: Build all targets
        run: ./buck2 build //crates/...

      - name: Run tests
        run: ./test.sh
