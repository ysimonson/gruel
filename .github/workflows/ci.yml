name: CI

on:
  push:
    branches: [trunk]
  pull_request:
    branches: [trunk]
  merge_group:
    branches: [trunk]

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check formatting
        run: ./fmt.sh check

  test:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x64
          - os: ubuntu-24.04-arm
            name: linux-arm64
          - os: macos-15
            name: macos
    runs-on: ${{ matrix.os }}
    name: test (${{ matrix.name }})
    steps:
      - uses: actions/checkout@v4

      - name: Cache Cargo registry and build outputs
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ matrix.name }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ matrix.name }}-

      - name: Build all targets
        run: cargo build --workspace --exclude gruel-runtime

      - name: Run tests
        run: ./test.sh
