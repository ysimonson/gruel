name: CI

on:
  push:
    branches: [trunk]
  pull_request:
    branches: [trunk]
  merge_group:
    branches: [trunk]

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dotslash
        uses: facebook/install-dotslash@latest

      - name: Check formatting
        # Uses hermetic rustfmt from Buck2 toolchain
        run: ./fmt.sh check

  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dotslash
        uses: facebook/install-dotslash@latest

      # Cache Buck2 outputs including downloaded Rust toolchain
      - name: Cache Buck2 outputs
        uses: actions/cache@v4
        with:
          path: |
            buck-out/v2/gen
            ~/.cache/buck2
          key: buck2-${{ runner.os }}-${{ hashFiles('**/BUCK', 'toolchains/rust/defs.bzl') }}
          restore-keys: |
            buck2-${{ runner.os }}-

      # Uses hermetic Rust toolchain downloaded by Buck2
      - name: Run tests
        run: ./test.sh
