[workspace]

[package]
name = "rust-third-party"
version = "0.0.0"
publish = false
edition = "2024"

# Fake binary to satisfy Cargo
[[bin]]
name = "fake"
path = "/dev/null"

[dependencies]
annotate-snippets = "0.11"
anyhow = "1.0"
chumsky = { version = "1.0.0-alpha.7", features = ["pratt"] }
libc = "0.2"
libtest2-mimic = "0.0.4"
logos = "0.14"
once_cell = "1.19"
regex = "1.11"
serde = { version = "1", features = ["derive"] }
serde_json = "1.0"
string-interner = "0.19"
tempfile = "3"
thiserror = "2.0"
toml = "0.8"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
rayon = "1.10"
