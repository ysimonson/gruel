[workspace]

[package]
name = "rust-third-party"
version = "0.0.0"
publish = false
edition = "2024"

# Fake binary to satisfy Cargo
[[bin]]
name = "fake"
path = "/dev/null"

[dependencies]
annotate-snippets = "0.11"
chumsky = { version = "1.0.0-alpha.7", features = ["pratt"] }
libtest-mimic = "0.8"
logos = "0.14"
serde = { version = "1", features = ["derive"] }
tempfile = "3"
toml = "0.8"
